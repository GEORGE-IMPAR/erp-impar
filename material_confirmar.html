<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>ERP ÍMPAR • Confirmação PWA</title><style>
:root{--txt:#e5e7eb;--soft:#a9b4c7;--green:#22c55e;--lime:#9BE329;--bd:rgba(255,255,255,.14)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--txt);background:radial-gradient(circle at 20% 5%,rgba(59,130,246,.34),transparent 32%),radial-gradient(circle at 90% 18%,rgba(34,197,94,.24),transparent 31%),linear-gradient(120deg,#0b1e4a,#0e3b6e,#0f766e)}.wrap{width:min(620px,calc(100% - 28px));margin:auto;padding:22px 0 30px}.brand{display:flex;gap:13px;align-items:center;margin-bottom:18px}.orb{width:56px;height:56px;border-radius:20px;background:conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);box-shadow:0 18px 42px rgba(0,0,0,.38),inset 0 0 0 1px rgba(255,255,255,.24)}small{letter-spacing:.22em;text-transform:uppercase;color:#b7ff43;font-weight:950}.brand h1{margin:0;font-size:25px}.brand p{margin:2px 0 0;color:var(--soft);font-weight:700}.card{background:linear-gradient(145deg,rgba(2,6,23,.74),rgba(8,31,55,.72));border:1px solid var(--bd);border-radius:28px;padding:22px;box-shadow:0 28px 70px rgba(0,0,0,.34);backdrop-filter:blur(14px);animation:in .45s cubic-bezier(.16,1,.3,1) both}@keyframes in{from{opacity:0;transform:translateY(18px);filter:blur(8px)}to{opacity:1;transform:none;filter:none}}.eyebrow{color:#b7ff43;text-transform:uppercase;letter-spacing:.16em;font-weight:950;font-size:12px}h2{font-size:28px;margin:8px 0 10px}.info{padding:14px;border:1px solid rgba(34,197,94,.25);background:rgba(2,6,23,.45);border-radius:18px;margin:12px 0}.muted{color:var(--soft)}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,.10);text-align:left}th{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#cbd5e1}.btn{width:100%;border:0;border-radius:18px;padding:16px 14px;font-size:17px;font-weight:950;cursor:pointer;background:linear-gradient(135deg,#22c55e,#16a34a);color:#02130a;box-shadow:0 18px 38px rgba(22,163,74,.42);margin-top:16px}.btn:disabled{opacity:.55}.success{display:none;text-align:center;padding:28px 14px}.check{width:94px;height:94px;border-radius:50%;margin:0 auto 16px;display:grid;place-items:center;background:linear-gradient(135deg,#22c55e,#9BE329);color:#02130a;font-size:56px;font-weight:950;box-shadow:0 0 0 8px rgba(34,197,94,.12),0 20px 60px rgba(34,197,94,.32)}.spin{display:inline-block;width:16px;height:16px;border-radius:50%;border:3px solid rgba(255,255,255,.28);border-top-color:#9BE329;animation:sp .85s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}.footer{margin-top:14px;text-align:center;color:var(--soft);font-size:12px}</style></head><body><main class="wrap"><div class="brand"><div class="orb"></div><div><small>ERP ÍMPAR</small><h1>Confirmação PWA</h1><p>Material recebido/retirado</p></div></div><section class="card"><div id="card">Carregando confirmação...</div><button class="btn" id="btnOk" style="display:none">✅ Confirmo que conferi e recebi</button><div id="msg" class="muted" style="margin-top:12px"></div><div id="success" class="success"><div class="check">✓</div><h2>Confirmado com sucesso</h2><p class="muted">O aceite foi registrado no RP ÍMPAR com data e hora.</p></div></section><div class="footer">ERP ÍMPAR • Gestão inteligente de materiais</div></main><script>
const API='https://api.erpimpar.com.br/materiais/';const params=new URLSearchParams(location.search);const p=params.get('p')||'';let atual=null;function linha(v){return v||'—'}
function render(m){atual=m;document.getElementById('card').innerHTML='<div class="eyebrow">Protocolo '+linha(m.protocolo)+'</div><h2>'+linha(m.tipo||'Confirmação de material')+'</h2><p class="muted">Confira os dados antes de confirmar. O OK será gravado no RP.</p><div class="info"><b>Obra:</b> '+linha(m.obra)+'<br><b>Responsável informado:</b> '+linha(m.responsavel)+'<br><b>Status:</b> '+linha(m.status)+'</div><h3>Materiais</h3><table><thead><tr><th>Material</th><th>Qtd</th><th>UN</th></tr></thead><tbody>'+((m.materiais||[]).map(i=>'<tr><td>'+linha(i.material)+'</td><td>'+linha(i.quantidade)+'</td><td>'+linha(i.unidade||i.und)+'</td></tr>').join('')||'<tr><td colspan="3">Sem itens.</td></tr>')+'</tbody></table>';document.getElementById('btnOk').style.display=/aguardando/i.test(m.status||'')?'block':'none'}
async function jsonSeguro(r){const t=await r.text();try{return JSON.parse(t)}catch(e){throw new Error('PHP não retornou JSON: '+t.substring(0,120))}}
async function load(){try{const url=API+'confirmacao_get.php'+(p?'?p='+encodeURIComponent(p):'');const j=await jsonSeguro(await fetch(url,{cache:'no-store'}));if(!j.success)throw new Error(j.message||'Não encontrado');render(j.movimentacao)}catch(e){document.getElementById('card').innerHTML='<h2>Não foi possível carregar</h2><p class="muted">'+e.message+'</p>'}}
document.getElementById('btnOk').onclick=async()=>{const b=document.getElementById('btnOk');b.disabled=true;document.getElementById('msg').innerHTML='<span class="spin"></span> Gravando confirmação...';try{const j=await jsonSeguro(await fetch(API+'confirmacao_ok.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({protocolo:p||atual?.protocolo||'',responsavelConfirmacao:atual?.responsavel||''})}));if(!j.success)throw new Error(j.message||'Falha');document.getElementById('card').style.display='none';b.style.display='none';document.getElementById('msg').style.display='none';document.getElementById('success').style.display='block';setTimeout(()=>{try{window.close()}catch(e){}},1800)}catch(e){document.getElementById('msg').innerHTML='⚠️ '+e.message;b.disabled=false}};load();
</script></body></html>
