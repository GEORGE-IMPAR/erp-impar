<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ERP ÍMPAR • Confirmar Material</title>
<style>
:root{--bg:#061733;--card:rgba(2,6,23,.68);--border:rgba(255,255,255,.13);--text:#e5e7eb;--soft:rgba(229,231,235,.74);--green:#9BE329;--blue:#38bdf8;--red:#ef4444;--yellow:#facc15}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(900px 600px at 20% 0,rgba(56,189,248,.20),transparent 55%),
    radial-gradient(800px 500px at 90% 10%,rgba(155,227,41,.14),transparent 58%),
    linear-gradient(120deg,#061733,#0b2c52 45%,#0f766e);
  min-height:100vh;
}
.wrap{
  width:min(1480px,calc(100% - 28px));
  margin:0 auto;
  padding:22px 0 28px;
}
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
  margin-bottom:18px;
}
.brand{
  display:flex;
  gap:14px;
  align-items:center;
}
.orb{
  width:58px;
  height:58px;
  border-radius:20px;
  background:conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);
  box-shadow:0 18px 45px rgba(0,0,0,.35),inset 0 0 0 1px rgba(255,255,255,.22);
}
.brand small{
  text-transform:uppercase;
  letter-spacing:.22em;
  color:var(--green);
  font-weight:900;
}
.brand h1{
  margin:0;
  font-size:28px;
  line-height:1;
}
.brand p{
  margin:4px 0 0;
  color:var(--soft);
  font-size:13px;
}
.pill,.pill-btn{
  border:1px solid var(--border);
  background:rgba(2,6,23,.55);
  color:var(--text);
  padding:10px 14px;
  border-radius:999px;
  font-weight:800;
  text-decoration:none;
  cursor:pointer;
}
.gradient{
  background:linear-gradient(90deg,rgba(37,99,235,.35),rgba(34,197,94,.30));
}
.topbox,.panel,.full-panel{
  background:linear-gradient(145deg,rgba(2,6,23,.72),rgba(8,31,55,.70));
  border:1px solid var(--border);
  border-radius:24px;
  box-shadow:0 24px 70px rgba(0,0,0,.28);
  backdrop-filter:blur(12px);
}
.full-panel{
  padding:18px;
  margin-bottom:16px;
}
.user-card{
  display:flex;
  gap:12px;
  align-items:center;
  padding:12px;
  border:1px solid rgba(155,227,41,.40);
  border-radius:18px;
  background:rgba(2,6,23,.55);
}
.small,.user-email,.user-cargo,.user-tel{
  font-size:12px;
  color:var(--soft);
}
.collective-card{
  padding:16px;
  border-radius:20px;
  border:1px solid var(--border);
  background:rgba(2,6,23,.55);
  margin-bottom:12px;
}
.eyebrow{
  color:var(--green);
  font-size:12px;
  text-transform:uppercase;
  font-weight:900;
  letter-spacing:.12em;
}
.btn{
  border:0;
  border-radius:14px;
  padding:11px 14px;
  font-weight:950;
  cursor:pointer;
  background:linear-gradient(135deg,#9BE329,#22c55e);
  color:#04130b;
  transition:.2s;
}
.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 0 1px rgba(155,227,41,.55),0 18px 40px rgba(0,0,0,.30);
}
.btn:disabled{
  opacity:.6;
  cursor:not-allowed;
  transform:none;
}
.table-wrap{
  overflow:auto;
  border:1px solid var(--border);
  border-radius:16px;
}
table{
  width:100%;
  border-collapse:collapse;
  min-width:0;
  background:rgba(2,6,23,.45);
}
th,td{
  padding:11px;
  border-bottom:1px solid rgba(255,255,255,.08);
  text-align:left;
  font-size:13px;
}
th{
  background:rgba(255,255,255,.06);
}
.ok{color:var(--green)}
.bad{color:#fb7185}
.warn{color:var(--yellow)}
.spin{
  display:inline-block;
  width:12px;
  height:12px;
  border-radius:999px;
  border:2px solid rgba(255,255,255,.25);
  border-top-color:var(--green);
  animation:sp 1s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}
.footer{
  margin-top:18px;
  color:var(--soft);
  display:flex;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  font-size:12px;
}
@media(max-width:620px){
  .brand h1{font-size:22px}
}
</style>
</head>

<body>
<main class="wrap" style="max-width:620px">
  <header class="header">
    <div class="brand">
      <div class="orb"></div>
      <div>
        <small>ERP ÍMPAR</small>
        <h1>Confirmação PWA</h1>
        <p>Material recebido/retirado</p>
      </div>
    </div>
  </header>

  <section class="full-panel">
    <div id="card">Carregando confirmação...</div>

    <button class="btn" id="btnOk" style="width:100%;margin-top:14px;display:none">
      ✅ Confirmo que conferi e recebi
    </button>

    <div id="msg" class="small" style="margin-top:12px"></div>
  </section>
</main>

<script>
const API = "https://api.erpimpar.com.br/materiais/";

const params = new URLSearchParams(window.location.search);
const p = params.get("p") || "";
const t = params.get("t") || "";

function render(m) {
  document.getElementById("card").innerHTML = `
    <div class="eyebrow">Protocolo ${m.protocolo || ""}</div>

    <h2>${m.tipo || "Confirmação de material"}</h2>

    <p class="small">
      Confira antes de confirmar. O OK será gravado no RP.
    </p>

    <div class="collective-card">
      <b>Obra:</b> ${m.obra || ""}<br>
      <b>Responsável:</b> ${m.responsavel || ""}<br>
      <b>Status:</b> ${m.status || ""}
    </div>

    <h3>Materiais</h3>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Material</th>
            <th>Qtd</th>
            <th>UN</th>
          </tr>
        </thead>
        <tbody>
          ${(m.materiais || []).map(i => `
            <tr>
              <td>${i.material || ""}</td>
              <td>${i.quantidade || ""}</td>
              <td>${i.unidade || i.und || ""}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;

  document.getElementById("btnOk").style.display =
    /aguardando/i.test(m.status || "") ? "block" : "none";
}

async function lerJsonSeguro(response) {
  const texto = await response.text();

  try {
    return JSON.parse(texto);
  } catch (e) {
    throw new Error(
      "Resposta do PHP não é JSON válido: " + texto.substring(0, 160)
    );
  }
}

async function load() {
  try {
    if (!p || !t) {
      throw new Error("Protocolo ou token ausente no link.");
    }

    const url =
      API +
      "confirmacao_get.php?p=" +
      encodeURIComponent(p) +
      "&t=" +
      encodeURIComponent(t);

    const r = await fetch(url, { cache: "no-store" });
    const j = await lerJsonSeguro(r);

    if (!j.success) {
      throw new Error(j.message || "Não encontrado");
    }

    render(j.movimentacao);

  } catch (e) {
    document.getElementById("card").innerHTML =
      "<h2>Link inválido ou expirado</h2><p>" + e.message + "</p>";
  }
}

document.getElementById("btnOk").onclick = async () => {
  document.getElementById("btnOk").disabled = true;
  document.getElementById("msg").innerHTML =
    "<span class='spin'></span> Gravando confirmação...";

  try {
    const r = await fetch(API + "confirmacao_ok.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        protocolo: p,
        token: t
      })
    });

    const j = await lerJsonSeguro(r);

    if (!j.success) {
      throw new Error(j.message || "Falha");
    }

    document.getElementById("msg").innerHTML = "✅ Confirmação gravada no RP.";
    await load();

  } catch (e) {
    document.getElementById("msg").innerHTML = "⚠️ " + e.message;
    document.getElementById("btnOk").disabled = false;
  }
};

load();
</script>
</body>
</html>
