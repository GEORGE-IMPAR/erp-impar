<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ERP ÍMPAR • Confirmar Material</title><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><style>:root{--txt:#e5e7eb;--soft:#94a3b8;--green:#22c55e;--blue:#3b82f6;--red:#ef4444}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;min-height:100vh;background:linear-gradient(120deg,#0b1e4a,#0e3b6e,#0f766e);color:var(--txt);display:flex;align-items:center;justify-content:center;padding:14px}.card{width:min(580px,100%);background:rgba(2,6,23,.78);border:1px solid rgba(255,255,255,.12);border-radius:26px;padding:18px;box-shadow:0 30px 80px rgba(0,0,0,.42);backdrop-filter:blur(12px)}.orb{width:46px;height:46px;border-radius:50%;background:conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);margin-bottom:10px}.k{font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:#cbd5e1}.title{font-size:23px;font-weight:900;margin:3px 0 4px}.sub{color:var(--soft);font-size:13px}.box{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);border-radius:18px;padding:12px;margin-top:12px}.row{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid rgba(255,255,255,.07);padding:9px 0}.row:last-child{border-bottom:0}.row span{color:var(--soft)}button{width:100%;border:0;border-radius:16px;padding:14px;margin-top:14px;font-weight:900;font-size:15px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#02130a;box-shadow:0 16px 38px rgba(22,163,74,.42)}button:disabled{opacity:.55}.warn{color:#fde68a}.ok{color:#86efac}.bad{color:#fca5a5}textarea{width:100%;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:#020617;color:var(--txt);padding:10px;margin-top:8px;outline:none}textarea:focus{border-color:var(--blue);box-shadow:0 0 0 1px rgba(59,130,246,.9),0 0 24px rgba(59,130,246,.35)}</style></head><body><div class="card"><div class="orb"></div><div class="k">ERP ÍMPAR</div><div class="title">Confirmação de Material</div><p class="sub">Confira os dados abaixo antes de confirmar o recebimento/retirada.</p><div id="conteudo" class="box">Carregando...</div><label class="k" style="display:block;margin-top:12px">Observação opcional</label><textarea id="obs" rows="3" placeholder="Ex.: recebido em bom estado"></textarea><button id="btn" onclick="confirmar()">Confirmar material</button></div><script>const API_BASE='https://api.erpimpar.com.br/materiais';const qs=new URLSearchParams(location.search);const protocolo=qs.get('p')||'';const token=qs.get('t')||'';let mov=null;async function load(){try{const r=await fetch(API_BASE+'/confirmacao_get.php?p='+encodeURIComponent(protocolo)+'&t='+encodeURIComponent(token)+'&ts='+Date.now());if(r.ok)mov=await r.json();else throw new Error('offline')}catch(e){mov=null}render()}function render(){if(!protocolo||!token||!mov){conteudo.innerHTML='<p class="bad">Link inválido ou movimentação não encontrada.</p>';btn.disabled=true;return}if(mov.status==='confirmado')btn.disabled=true;conteudo.innerHTML=`<div class="row"><span>Protocolo</span><b>${mov.protocolo}</b></div><div class="row"><span>Status</span><b class="${mov.status==='confirmado'?'ok':'warn'}">${mov.status}</b></div><div class="row"><span>Tipo</span><b>${mov.tipo}</b></div><div class="row"><span>Obra</span><b>${mov.obra}</b></div><div class="row"><span>Material</span><b>${mov.material}</b></div><div class="row"><span>Quantidade</span><b>${mov.quantidade} ${mov.und||''}</b></div><div class="row"><span>Responsável</span><b>${mov.responsavel}</b></div>`}async function confirmar(){btn.disabled=true;btn.textContent='Confirmando...';try{const r=await fetch(API_BASE+'/confirmacao_ok.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({protocolo,token,observacao:obs.value,dataHora:new Date().toISOString(),origem:'PWA_CONFIRMACAO'})});if(!r.ok)throw new Error('erro');Swal.fire('Confirmado!','Material confirmado com sucesso.','success');mov.status='confirmado';render()}catch(e){Swal.fire('Erro','Não foi possível gravar a confirmação. Tente novamente.','error');btn.disabled=false;btn.textContent='Confirmar material'}}load();</script></body></html>
