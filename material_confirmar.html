<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>ERP ÍMPAR • Confirmar Material</title><style>
:root{--bg:#061733;--card:rgba(2,6,23,.68);--border:rgba(255,255,255,.13);--text:#e5e7eb;--soft:rgba(229,231,235,.74);--green:#9BE329;--blue:#38bdf8;--red:#ef4444;--yellow:#facc15}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(900px 600px at 20% 0,rgba(56,189,248,.20),transparent 55%),radial-gradient(800px 500px at 90% 10%,rgba(155,227,41,.14),transparent 58%),linear-gradient(120deg,#061733,#0b2c52 45%,#0f766e);min-height:100vh}.wrap{width:min(1480px,calc(100% - 28px));margin:0 auto;padding:22px 0 28px}.header{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px}.brand{display:flex;gap:14px;align-items:center}.orb{width:58px;height:58px;border-radius:20px;background:conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);box-shadow:0 18px 45px rgba(0,0,0,.35),inset 0 0 0 1px rgba(255,255,255,.22)}.brand small{text-transform:uppercase;letter-spacing:.22em;color:var(--green);font-weight:900}.brand h1{margin:0;font-size:28px;line-height:1}.brand p{margin:4px 0 0;color:var(--soft);font-size:13px}.pill,.pill-btn{border:1px solid var(--border);background:rgba(2,6,23,.55);color:var(--text);padding:10px 14px;border-radius:999px;font-weight:800;text-decoration:none;cursor:pointer}.gradient{background:linear-gradient(90deg,rgba(37,99,235,.35),rgba(34,197,94,.30))}.topbox,.panel,.full-panel{background:linear-gradient(145deg,rgba(2,6,23,.72),rgba(8,31,55,.70));border:1px solid var(--border);border-radius:24px;box-shadow:0 24px 70px rgba(0,0,0,.28);backdrop-filter:blur(12px)}.topbox{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;padding:20px;margin-bottom:16px}.user-card{display:flex;gap:12px;align-items:center;padding:12px;border:1px solid rgba(155,227,41,.40);border-radius:18px;background:rgba(2,6,23,.55)}.user-avatar{width:56px;height:56px;border-radius:18px;overflow:hidden;background:#0f172a;display:grid;place-items:center;border:1px solid rgba(255,255,255,.18)}.user-avatar img{width:100%;height:100%;object-fit:cover;display:none}.user-iniciais{font-size:20px;font-weight:900;color:var(--green)}.user-nome{font-size:17px;font-weight:900}.small,.user-email,.user-cargo,.user-tel{font-size:12px;color:var(--soft)}.hero-title{font-size:44px;line-height:.95;margin:18px 0 8px}.hero-title span{color:var(--green)}.hero-copy{color:var(--soft)}.tag{display:inline-block;font-size:12px;padding:8px 10px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.05);margin:3px}.collective-card{padding:16px;border-radius:20px;border:1px solid var(--border);background:rgba(2,6,23,.55);margin-bottom:12px}.eyebrow{color:var(--green);font-size:12px;text-transform:uppercase;font-weight:900;letter-spacing:.12em}.cc-title{font-size:20px;font-weight:900;margin:6px 0}.score-big{font-size:38px;font-weight:950;color:var(--green)}.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin:16px 0}.card{padding:17px;border:1px solid var(--border);border-radius:22px;background:rgba(2,6,23,.62);cursor:pointer;transition:.2s}.card:hover,.btn:hover{transform:translateY(-2px);box-shadow:0 0 0 1px rgba(155,227,41,.55),0 18px 40px rgba(0,0,0,.30)}.card .k{color:var(--soft);font-size:12px;text-transform:uppercase;font-weight:800}.card .v{font-size:34px;font-weight:950;margin:4px 0}.card .s{font-size:12px;color:var(--soft)}.full-panel{padding:18px;margin-bottom:16px}.panel-title{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap;margin-bottom:12px}.panel-title h2{margin:0;font-size:22px}.panel-title p{margin:4px 0 0;color:var(--soft)}.action-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.action-box{padding:16px;border-radius:20px;border:1px solid rgba(155,227,41,.28);background:rgba(1,18,34,.70)}.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.item-row{display:grid;grid-template-columns:2fr 1fr .8fr 44px;gap:8px;margin-top:8px}label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--soft);font-weight:800;margin-bottom:5px}input,select{width:100%;padding:11px 12px;border-radius:13px;border:1px solid rgba(255,255,255,.13);background:#061426;color:#fff;outline:none}input:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 1px rgba(155,227,41,.8),0 0 22px rgba(155,227,41,.28)}.btn{border:0;border-radius:14px;padding:11px 14px;font-weight:950;cursor:pointer;background:linear-gradient(135deg,#9BE329,#22c55e);color:#04130b;transition:.2s}.btn.dark{background:rgba(255,255,255,.07);color:#fff;border:1px solid var(--border)}.btn.red{background:linear-gradient(135deg,#fb7185,#ef4444);color:#fff}.content-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}.panel{padding:16px}.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:16px}table{width:100%;border-collapse:collapse;min-width:980px;background:rgba(2,6,23,.45)}th,td{padding:11px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;font-size:13px}th{background:rgba(255,255,255,.06)}.ok{color:var(--green)}.bad{color:#fb7185}.warn{color:var(--yellow)}.step{display:flex;gap:10px;align-items:flex-start;padding:12px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.04);margin-bottom:8px}.dot{width:28px;height:28px;border-radius:999px;display:grid;place-items:center;background:rgba(155,227,41,.18);color:var(--green);font-weight:900;flex:0 0 auto}.chip{display:inline-block;padding:8px 10px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.04);font-size:12px;margin:3px}.spin{display:inline-block;width:12px;height:12px;border-radius:999px;border:2px solid rgba(255,255,255,.25);border-top-color:var(--green);animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}.modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}.modal.open{display:flex}.modal-card{width:min(980px,96vw);max-height:88vh;overflow:auto;background:#061426;border:1px solid var(--border);border-radius:24px;padding:18px}.footer{margin-top:18px;color:var(--soft);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:12px}@media(max-width:1100px){.grid{grid-template-columns:repeat(3,1fr)}.topbox,.content-grid,.action-grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr 1fr}}@media(max-width:620px){.grid,.form-grid,.item-row{grid-template-columns:1fr}.brand h1{font-size:22px}.hero-title{font-size:30px}}
</style></head><body><main class="wrap" style="max-width:620px"><header class="header"><div class="brand"><div class="orb"></div><div><small>ERP ÍMPAR</small><h1>Confirmação PWA</h1><p>Material recebido/retirado</p></div></div></header><section class="full-panel"><div id="card">Carregando confirmação...</div><button class="btn" id="btnOk" style="width:100%;margin-top:14px;display:none">✅ Confirmo que conferi e recebi</button><div id="msg" class="small" style="margin-top:12px"></div></section></main><script>
const API="https://api.erpimpar.com.br/materiais/";
const params=new URLSearchParams(location.search);
const p=params.get("p")||"";

function render(m){
  document.getElementById("card").innerHTML=`<div class="eyebrow">Protocolo ${m.protocolo||""}</div><h2>${m.tipo||"Confirmação de material"}</h2><p class="small">Confira antes de confirmar. O OK será gravado no RP.</p><div class="collective-card"><b>Obra:</b> ${m.obra||""}<br><b>Responsável:</b> ${m.responsavel||""}<br><b>Status:</b> ${m.status||""}</div><h3>Materiais</h3><div class="table-wrap"><table style="min-width:0"><thead><tr><th>Material</th><th>Qtd</th><th>UN</th></tr></thead><tbody>${(m.materiais||[]).map(i=>`<tr><td>${i.material||""}</td><td>${i.quantidade||""}</td><td>${i.unidade||i.und||""}</td></tr>`).join("")}</tbody></table></div>`;
  document.getElementById("btnOk").style.display=/aguardando/i.test(m.status||"")?"block":"none";
}

async function jsonSeguro(r){
  const txt=await r.text();
  try{return JSON.parse(txt)}catch(e){throw new Error("Resposta do PHP não é JSON válido: "+txt.substring(0,140))}
}

async function load(){
  try{
    const url=API+"confirmacao_get.php"+(p?("?p="+encodeURIComponent(p)):"");
    const r=await fetch(url);
    const j=await jsonSeguro(r);
    if(!j.success)throw new Error(j.message||"Não encontrado");
    render(j.movimentacao);
  }catch(e){
    document.getElementById("card").innerHTML="<h2>Link inválido ou expirado</h2><p>"+e.message+"</p>";
  }
}

document.getElementById("btnOk").onclick=async()=>{
  document.getElementById("btnOk").disabled=true;
  document.getElementById("msg").innerHTML="<span class='spin'></span> Gravando confirmação...";
  try{
    const r=await fetch(API+"confirmacao_ok.php",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({protocolo:p})});
    const j=await jsonSeguro(r);
    if(!j.success)throw new Error(j.message||"Falha");
    document.getElementById("msg").innerHTML="✅ Confirmação gravada no RP.";
    await load();
  }catch(e){
    document.getElementById("msg").innerHTML="⚠️ "+e.message;
    document.getElementById("btnOk").disabled=false;
  }
};
load();
</script></body></html>
