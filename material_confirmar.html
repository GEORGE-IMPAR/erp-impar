<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ERP ÍMPAR - Confirmar Material</title><style>
:root{--bg:#020617;--green:#9cea2c;--txt:#e5e7eb;--mut:#94a3b8;--line:rgba(148,163,184,.24)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:radial-gradient(circle at 20% 0,rgba(56,189,248,.35),transparent 40%),radial-gradient(circle at 100% 20%,rgba(156,234,44,.18),transparent 34%),linear-gradient(135deg,#020617,#082f49,#064e3b);color:var(--txt);display:flex;align-items:center;justify-content:center;padding:18px}.phone{width:min(440px,100%);background:linear-gradient(180deg,rgba(2,6,23,.90),rgba(2,6,23,.68));border:1px solid var(--line);border-radius:30px;padding:20px;box-shadow:0 30px 80px rgba(0,0,0,.45)}.top{display:flex;gap:12px;align-items:center}.orb{width:48px;height:48px;border-radius:16px;background:conic-gradient(#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e)}h1{font-size:25px;margin:18px 0 6px;line-height:1;color:var(--green)}.sub{color:var(--mut);font-size:13px}.box{margin-top:16px;border:1px solid var(--line);border-radius:20px;padding:14px;background:rgba(15,23,42,.66)}.row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid rgba(148,163,184,.13)}.row:last-child{border-bottom:0}.lbl{color:var(--mut);font-size:12px}.val{font-weight:800;text-align:right}input,button{width:100%;border:1px solid var(--line);border-radius:16px;background:#020617;color:var(--txt);padding:13px;margin-top:12px}input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 1px var(--green),0 0 24px rgba(156,234,44,.24)}button{border:0;background:linear-gradient(135deg,#9cea2c,#22c55e);color:#031225;font-weight:900;font-size:15px;cursor:pointer;box-shadow:0 16px 38px rgba(34,197,94,.35)}.ok{display:none;text-align:center}.check{font-size:66px;color:var(--green)}.warn{color:#facc15}.err{color:#ef4444}</style></head><body><main class="phone"><div class="top"><div class="orb"></div><div><b>PLATAFORMA ERP ÍMPAR</b><div class="sub">Confirmação PWA de material</div></div></div><div id="view"><h1>Confirmar recebimento</h1><div class="sub">Confira os dados abaixo. Ao clicar em confirmar, o RP registra seu OK digital na Gestão Master de Materiais.</div><div class="box" id="dados"><div class="warn">Carregando dados da entrega...</div></div><input id="nome" placeholder="Digite seu nome para confirmar"><button onclick="confirmar()">Confirmo recebimento</button><div class="sub" style="margin-top:10px">Token: <span id="tok"></span></div></div><div class="ok" id="ok"><div class="check">✓</div><h1>Confirmado!</h1><div class="sub">Seu OK foi registrado no RP ÍMPAR. Obrigado.</div></div></main><script>
const API='https://api.erpimpar.com.br/materiais';const qs=new URLSearchParams(location.search);const token=qs.get('t')||qs.get('token')||'';let item=null;document.getElementById('tok').textContent=token||'não informado';async function carregar(){if(!token){document.getElementById('dados').innerHTML='<div class="err">Link sem token.</div>';return}try{const lista=await fetch(API+'/listar_master.php?ts='+Date.now()).then(r=>r.json());item=lista.find(x=>x.token===token);if(!item){document.getElementById('dados').innerHTML='<div class="err">Entrega não encontrada ou token inválido.</div>';return}document.getElementById('nome').value=item.responsavelRecebe||'';document.getElementById('dados').innerHTML=`<div class="row"><div class="lbl">Obra</div><div class="val">${item.obra||'-'}</div></div><div class="row"><div class="lbl">Material</div><div class="val">${item.material||'-'}</div></div><div class="row"><div class="lbl">Quantidade</div><div class="val">${item.quantidade||0} ${item.unidade||''}</div></div><div class="row"><div class="lbl">Entregue por</div><div class="val">${item.responsavelEntrega||'-'}</div></div><div class="row"><div class="lbl">Recebido por</div><div class="val">${item.responsavelRecebe||'-'}</div></div><div class="row"><div class="lbl">Status</div><div class="val">${item.status||'-'}</div></div>`;if(item.status==='CONFIRMADO_PWA'||item.confirmacaoPWA?.confirmado){document.getElementById('view').style.display='none';document.getElementById('ok').style.display='block'}}catch(e){document.getElementById('dados').innerHTML='<div class="err">Falha ao carregar. Verifique conexão/API.</div>'}}async function confirmar(){if(!token)return alert('Token inválido.');const nome=document.getElementById('nome').value.trim();if(!nome)return alert('Informe seu nome para confirmar.');try{let r=await fetch(API+'/confirmar_entrega.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,confirmadoPor:nome})});let j=await r.json();if(!j.ok)throw new Error(j.erro||'falha');document.getElementById('view').style.display='none';document.getElementById('ok').style.display='block'}catch(e){alert('Não foi possível confirmar. '+e.message)}}carregar();</script></body></html>
