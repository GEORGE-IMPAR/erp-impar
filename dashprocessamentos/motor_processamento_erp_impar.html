<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ERP ÍMPAR — Motor de Processamento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background: linear-gradient(120deg,#0b1e4a,#0e3b6e,#0f766e);
  color:#fff;
  margin:0;
}

.container{
  max-width:1200px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:rgba(0,0,0,.4);
  padding:20px;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.5);
}

.btn{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border:none;
  padding:14px 22px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  color:#000;
}

#pipeline{
  margin-top:20px;
  text-align:center;
  display:none;
}

#pipeline img{
  width:120px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>⚙️ Motor de Processamento de Notas</h2>
<p>OCR + Extração + Base ERP</p>

<button class="btn" onclick="processar()">PROCESSAR NOTAS</button>

<div id="pipeline">
  <img src="https://cdn-icons-png.flaticon.com/512/189/189792.png">
  <h3 id="status">Iniciando...</h3>
</div>

</div>

</div>

<script>
const API = "https://api.erpimpar.com.br/storage/dash/pdfs/";

async function processar(){
  document.getElementById("pipeline").style.display = "block";

  const s = document.getElementById("status");

  try{
    s.innerText = "🔍 Buscando PDFs...";
    await delay(800);

    s.innerText = "📄 Lendo arquivos...";
    await delay(800);

    s.innerText = "⚙️ Processando dados...";
    await delay(800);

    const r = await fetch(API + "processar_pdfs.php");
    const t = await r.text();

    if(t.includes("FINALIZADO")){
      s.innerText = "✅ Sucesso!";
    }else{
      throw new Error(t);
    }

  }catch(e){
    s.innerText = "❌ Erro";
    alert(e.message);
  }
}

function delay(ms){
  return new Promise(r => setTimeout(r, ms));
}
</script>

</body>
</html>
