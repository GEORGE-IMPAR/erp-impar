<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP ÍMPAR - Inteligência de Custos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
  <style>
    body { background: #020617; margin:0; }
    .glass { background: rgba(15,23,42,.72); backdrop-filter: blur(10px); }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(34,197,94,.12); }
    .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 999px; }
    .loader { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,.15); border-top-color: #22c55e; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="text-slate-100 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { ResponsiveContainer, BarChart, Bar, XAxis, YAxis, Tooltip, CartesianGrid, PieChart, Pie, Cell, LineChart, Line, Legend } = Recharts;

    function getLoggedUser() {
      const keys = ['ERPIMPAR_USER','usuarioLogado','impar_user','user','ERP_IMPAR_USER','ERPIMPAR_LOGIN'];
      for (const key of keys) {
        try {
          const raw = localStorage.getItem(key) || sessionStorage.getItem(key);
          if (!raw) continue;
          let parsed = raw;
          try { parsed = JSON.parse(raw); } catch {}
          if (typeof parsed === 'string') {
            if (parsed.includes('@')) return { nome: parsed.split('@')[0], email: parsed };
            return { nome: parsed, email: '' };
          }
          const nome = parsed?.Nome || parsed?.nome || parsed?.userNome || parsed?.username || parsed?.Usuario || 'Usuário';
          const email = parsed?.Email || parsed?.email || parsed?.userEmail || '';
          return { nome, email };
        } catch {}
      }
      const nome = localStorage.getItem('usuarioNome') || sessionStorage.getItem('usuarioNome') || 'Usuário';
      const email = localStorage.getItem('usuarioEmail') || sessionStorage.getItem('usuarioEmail') || '';
      return { nome, email };
    }

    function normalizarMaterial(nome) {
      return String(nome || '')
        .toUpperCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\bTUBO DE\b/g, '')
        .replace(/\bDIAMETRO\b/g, '')
        .replace(/\bDIÂMETRO\b/g, '')
        .replace(/\bUNIDADE\b/g, '')
        .replace(/\bPECA\b/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function money(v) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v || 0)); }
    function numberBR(v) { return new Intl.NumberFormat('pt-BR').format(Number(v || 0)); }
    function pct(v) { return `${Number(v || 0).toFixed(1)}%`; }

    function parseCSV(text) {
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (!lines.length) return [];
      const rows = [];
      let row = [];
      let cell = '';
      let inQuotes = false;
      const flushCell = () => { row.push(cell); cell = ''; };
      const flushRow = () => { rows.push(row.map(v => String(v || '').trim())); row = []; };
      for (let li = 0; li < lines.length; li++) {
        const line = lines[li];
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          const next = line[i + 1];
          if (char === '"') {
            if (inQuotes && next === '"') { cell += '"'; i++; }
            else inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) flushCell();
          else cell += char;
        }
        flushCell();
        flushRow();
      }
      const headers = rows[0] || [];
      return rows.slice(1).map(cols => {
        const obj = {};
        headers.forEach((h, i) => obj[h] = cols[i] ?? '');
        return obj;
      });
    }

    function inferYear(v) {
      const s = String(v || '').trim();
      if (!s) return 'Sem ano';
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 4);
      if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s.slice(-4);
      const m = s.match(/(19\d{2}|20\d{2})/);
      return m ? m[1] : 'Sem ano';
    }

    function toNumber(v) {
      const s = String(v || '').replace(/\./g, '').replace(',', '.').replace(/[^\d.-]/g, '');
      return Number(s) || 0;
    }

    function App() {
      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState('');
      const [obras, setObras] = React.useState([]);
      const [precos, setPrecos] = React.useState([]);
      const [query, setQuery] = React.useState('');
      const [anoFiltro, setAnoFiltro] = React.useState('TODOS');
      const [obraFiltro, setObraFiltro] = React.useState('TODAS');
      const user = React.useMemo(() => getLoggedUser(), []);
      const COLORS = ['#22c55e','#38bdf8','#a78bfa','#f59e0b','#ef4444','#14b8a6','#e879f9','#64748b'];

      async function carregar() {
        setLoading(true); setError('');
        try {
          const [r1, r2] = await Promise.all([
            fetch('./data/consolidado_obras.csv?ts=' + Date.now(), { cache: 'no-store' }),
            fetch('./data/consolidado_precos.csv?ts=' + Date.now(), { cache: 'no-store' })
          ]);
          if (!r1.ok) throw new Error('Não achei ./data/consolidado_obras.csv');
          if (!r2.ok) throw new Error('Não achei ./data/consolidado_precos.csv');
          const [t1, t2] = await Promise.all([r1.text(), r2.text()]);
          const baseObras = parseCSV(t1).map(r => ({
            obra: r.obra || r.OBRA || 'SEM OBRA',
            material: r.material || r.MATERIAL || 'SEM MATERIAL',
            material_norm: normalizarMaterial(r.material || r.MATERIAL || ''),
            preco: toNumber(r.preco || r.PRECO),
            quantidade: toNumber(r.quantidade || r.QUANTIDADE),
            valor: toNumber(r.valor || r.VALOR),
            data: r.data || r.DATA || '',
            percentual: toNumber(r.percentual || r.PERCENTUAL),
            ano: inferYear(r.data || r.DATA || '')
          }));
          const basePrecos = parseCSV(t2).map(r => ({
            material: r.material || r.MATERIAL || 'SEM MATERIAL',
            material_norm: normalizarMaterial(r.material || r.MATERIAL || ''),
            menor_preco: toNumber(r.menor_preco || r.MENOR_PRECO),
            menor_obra: r.menor_obra || r.MENOR_OBRA || '',
            menor_data: r.menor_data || r.MENOR_DATA || '',
            maior_preco: toNumber(r.maior_preco || r.MAIOR_PRECO),
            maior_obra: r.maior_obra || r.MAIOR_OBRA || '',
            maior_data: r.maior_data || r.MAIOR_DATA || '',
            ultimo_preco: toNumber(r.ultimo_preco || r.ULTIMO_PRECO),
            ultimo_obra: r.ultimo_obra || r.ULTIMO_OBRA || '',
            ultimo_data: r.ultimo_data || r.ULTIMO_DATA || '',
            quantidade_total: toNumber(r.quantidade_total || r.QUANTIDADE_TOTAL),
            preco_medio: toNumber(r.preco_medio || r.PRECO_MEDIO)
          }));
          setObras(baseObras); setPrecos(basePrecos);
        } catch (e) { setError(e.message || 'Erro ao carregar base'); }
        finally { setLoading(false); }
      }

      React.useEffect(() => { carregar(); }, []);

      const anos = React.useMemo(() => ['TODOS', ...Array.from(new Set(obras.map(r => r.ano))).filter(Boolean).sort()], [obras]);
      const listaObras = React.useMemo(() => ['TODAS', ...Array.from(new Set(obras.filter(r => anoFiltro === 'TODOS' || r.ano === anoFiltro).map(r => r.obra))).sort((a,b)=>a.localeCompare(b,'pt-BR'))], [obras, anoFiltro]);

      const base = React.useMemo(() => obras.filter(r => {
        const q = query.trim().toUpperCase();
        const okAno = anoFiltro === 'TODOS' || r.ano === anoFiltro;
        const okObra = obraFiltro === 'TODAS' || r.obra === obraFiltro;
        const okQuery = !q || r.material_norm.includes(q) || String(r.obra).toUpperCase().includes(q);
        return okAno && okObra && okQuery;
      }), [obras, query, anoFiltro, obraFiltro]);

      const total = React.useMemo(() => base.reduce((s,r)=>s+r.valor,0), [base]);
      const obrasUnicas = React.useMemo(() => new Set(base.map(r=>r.obra)).size, [base]);
      const materiaisUnicos = React.useMemo(() => new Set(base.map(r=>r.material_norm)).size, [base]);
      const ticketMedio = obrasUnicas ? total / obrasUnicas : 0;

      const topObras = React.useMemo(() => {
        const map = {};
        base.forEach(r => {
          if (!map[r.obra]) map[r.obra] = { obra:r.obra, valor:0, materiais:new Set(), itens:0 };
          map[r.obra].valor += r.valor; map[r.obra].materiais.add(r.material_norm); map[r.obra].itens += 1;
        });
        return Object.values(map).sort((a,b)=>b.valor-a.valor).slice(0,20).map(x => ({...x, materiais:x.materiais.size, percentual: total ? x.valor/total*100 : 0 }));
      }, [base, total]);

      const topMateriais = React.useMemo(() => {
        const map = {};
        base.forEach(r => {
          if (!map[r.material_norm]) map[r.material_norm] = { material:r.material_norm, valor:0, qtd:0, obras:new Set() };
          map[r.material_norm].valor += r.valor; map[r.material_norm].qtd += 1; map[r.material_norm].obras.add(r.obra);
        });
        return Object.values(map).sort((a,b)=>b.valor-a.valor).slice(0,20).map(x => ({ ...x, obras:x.obras.size, percentual: total ? x.valor/total*100 : 0 }));
      }, [base, total]);

      const topPreco = React.useMemo(() => precos.slice().sort((a,b)=>b.preco_medio-a.preco_medio).slice(0,20), [precos]);

      const cruzamento = React.useMemo(() => {
        const map = {};
        base.forEach(r => {
          const key = `${r.material_norm}__${r.obra}`;
          if (!map[key]) map[key] = { material:r.material_norm, obra:r.obra, valor:0, qtd:0 };
          map[key].valor += r.valor; map[key].qtd += 1;
        });
        return Object.values(map).sort((a,b)=>b.valor-a.valor).slice(0,20);
      }, [base]);

      const comparativo = React.useMemo(() => {
        const pmap = {}; precos.forEach(p => pmap[p.material_norm] = p);
        return topMateriais.map(m => {
          const p = pmap[m.material] || {};
          const variacaoUltimoVsMedia = p.preco_medio ? ((p.ultimo_preco - p.preco_medio) / p.preco_medio) * 100 : 0;
          return { ...m, ...p, variacaoUltimoVsMedia };
        }).sort((a,b)=>Math.abs(b.variacaoUltimoVsMedia)-Math.abs(a.variacaoUltimoVsMedia)).slice(0,20);
      }, [topMateriais, precos]);

      const alertas = React.useMemo(() => comparativo.filter(x => (x.variacaoUltimoVsMedia >= 25 || x.percentual >= 8 || x.preco_medio === 0)).slice(0,10), [comparativo]);
      const kpisAno = React.useMemo(() => {
        const map = {};
        obras.forEach(r => { if(!map[r.ano]) map[r.ano] = { ano:r.ano, valor:0, obras:new Set() }; map[r.ano].valor += r.valor; map[r.ano].obras.add(r.obra); });
        return Object.values(map).sort((a,b)=>String(a.ano).localeCompare(String(b.ano))).map(x => ({ ano:x.ano, valor:x.valor, obras:x.obras.size }));
      }, [obras]);

      function Card({children, className=''}) { return <div className={`glass border border-slate-800 rounded-2xl transition-all duration-300 card-hover ${className}`}>{children}</div>; }
      function CardTitle({children, right}) { return <div className="flex items-center justify-between gap-3 p-5 pb-3 border-b border-slate-800/80"><h3 className="text-base md:text-lg font-bold tracking-wide">{children}</h3>{right}</div>; }

      if (loading) return <div className="min-h-screen flex items-center justify-center p-6"><div className="text-center"><div className="loader mx-auto mb-5"></div><div className="text-xl font-bold">PROCESSANDO DADOS...</div><div className="text-slate-400 mt-2">Carregando dashboard executivo</div></div></div>;
      if (error) return <div className="min-h-screen flex items-center justify-center p-6"><div className="max-w-xl w-full bg-red-950/40 border border-red-500 rounded-2xl p-6"><div className="text-2xl font-black text-red-300 mb-2">Erro ao abrir dashboard</div><div className="text-red-100 mb-4">{error}</div><div className="text-slate-300 text-sm mb-4">Coloque os 2 CSVs em <b>./data/</b> no mesmo diretório do HTML.</div><button onClick={carregar} className="px-4 py-2 rounded-xl bg-green-600 hover:bg-green-500 font-bold">Tentar novamente</button></div></div>;

      return <div className="min-h-screen p-4 md:p-6 text-slate-100"><div className="max-w-7xl mx-auto">
        <div className="mb-6 rounded-3xl border border-slate-800 glass p-5 md:p-6">
          <div className="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-4">
            <div>
              <div className="text-xs uppercase tracking-[0.28em] text-green-400 font-black">ERP ÍMPAR</div>
              <h1 className="text-2xl md:text-4xl font-black mt-2">Inteligência de Custos • Nível Diretoria</h1>
              <p className="text-slate-400 mt-2">Leitura direta dos 2 CSVs consolidado_obras.csv e consolidado_precos.csv</p>
            </div>
            <div className="text-sm text-right">
              <div className="font-bold text-slate-200">{user.nome || 'Usuário'}</div>
              <div className="text-slate-400">{user.email || 'Sem e-mail'}</div>
              <div className="mt-2 inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-900 border border-slate-700 text-slate-300"><span className="w-2.5 h-2.5 rounded-full bg-green-400 inline-block"></span>{numberBR(obras.length)} linhas obras • {numberBR(precos.length)} linhas preços</div>
            </div>
          </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 mb-6">
          <div className="lg:col-span-3"><label className="text-xs text-slate-400 font-bold mb-2 block">Busca inteligente</label><input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Material ou obra..." className="w-full h-12 rounded-2xl bg-slate-900 border border-slate-700 px-4 outline-none focus:border-green-500" /></div>
          <div className="lg:col-span-2"><label className="text-xs text-slate-400 font-bold mb-2 block">Ano</label><select value={anoFiltro} onChange={e=>{setAnoFiltro(e.target.value);setObraFiltro('TODAS')}} className="w-full h-12 rounded-2xl bg-slate-900 border border-slate-700 px-4 outline-none focus:border-green-500">{anos.map(a=><option key={a} value={a}>{a}</option>)}</select></div>
          <div className="lg:col-span-5"><label className="text-xs text-slate-400 font-bold mb-2 block">Obra</label><select value={obraFiltro} onChange={e=>setObraFiltro(e.target.value)} className="w-full h-12 rounded-2xl bg-slate-900 border border-slate-700 px-4 outline-none focus:border-green-500">{listaObras.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
          <div className="lg:col-span-2 flex items-end"><button onClick={carregar} className="w-full h-12 rounded-2xl font-black bg-gradient-to-r from-green-500 to-emerald-600 hover:brightness-110 transition-all">Atualizar base</button></div>
        </div>

        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 mb-6">
          <Card className="p-5"><div className="text-slate-400 text-sm">Valor total filtrado</div><div className="text-3xl font-black mt-2">{money(total)}</div></Card>
          <Card className="p-5"><div className="text-slate-400 text-sm">Obras no recorte</div><div className="text-3xl font-black mt-2">{numberBR(obrasUnicas)}</div></Card>
          <Card className="p-5"><div className="text-slate-400 text-sm">Materiais no recorte</div><div className="text-3xl font-black mt-2">{numberBR(materiaisUnicos)}</div></Card>
          <Card className="p-5"><div className="text-slate-400 text-sm">Ticket médio por obra</div><div className="text-3xl font-black mt-2">{money(ticketMedio)}</div></Card>
        </div>

        <div className="grid grid-cols-1 xl:grid-cols-12 gap-4 mb-6">
          <Card className="xl:col-span-7"><CardTitle>Valor por ano</CardTitle><div className="h-[340px] p-3 md:p-5"><ResponsiveContainer width="100%" height="100%"><BarChart data={kpisAno}><CartesianGrid strokeDasharray="3 3" stroke="#334155" /><XAxis dataKey="ano" stroke="#94a3b8" /><YAxis stroke="#94a3b8" tickFormatter={(v)=>`R$ ${Math.round(v/1000)}k`} /><Tooltip formatter={(v)=>money(v)} /><Legend /><Bar dataKey="valor" name="Valor" fill="#22c55e" radius={[8,8,0,0]} /></BarChart></ResponsiveContainer></div></Card>
          <Card className="xl:col-span-5"><CardTitle>Participação das principais obras</CardTitle><div className="h-[340px] p-3 md:p-5"><ResponsiveContainer width="100%" height="100%"><PieChart><Pie data={topObras.slice(0,6).map(x=>({name:x.obra, value:x.valor}))} dataKey="value" nameKey="name" outerRadius={110} innerRadius={55} paddingAngle={3}>{topObras.slice(0,6).map((_,i)=><Cell key={i} fill={COLORS[i % COLORS.length]} />)}</Pie><Tooltip formatter={(v)=>money(v)} /><Legend /></PieChart></ResponsiveContainer></div></Card>
        </div>

        <div className="grid grid-cols-1 xl:grid-cols-12 gap-4 mb-6">
          <Card className="xl:col-span-6"><CardTitle>Top 20 obras por valor</CardTitle><div className="p-3 md:p-5 overflow-auto max-h-[480px] scrollbar-thin"><table className="w-full text-sm"><thead><tr className="text-slate-400 border-b border-slate-800"><th className="text-left py-2 pr-2">Obra</th><th className="text-right py-2 pr-2">Valor</th><th className="text-right py-2 pr-2">%</th><th className="text-right py-2">Materiais</th></tr></thead><tbody>{topObras.map(o=><tr key={o.obra} className="border-b border-slate-900 hover:bg-slate-900/50"><td className="py-3 pr-2 font-semibold">{o.obra}</td><td className="py-3 pr-2 text-right">{money(o.valor)}</td><td className="py-3 pr-2 text-right">{pct(o.percentual)}</td><td className="py-3 text-right">{numberBR(o.materiais)}</td></tr>)}</tbody></table></div></Card>
          <Card className="xl:col-span-6"><CardTitle>Top 20 materiais por valor</CardTitle><div className="p-3 md:p-5 overflow-auto max-h-[480px] scrollbar-thin"><table className="w-full text-sm"><thead><tr className="text-slate-400 border-b border-slate-800"><th className="text-left py-2 pr-2">Material</th><th className="text-right py-2 pr-2">Valor</th><th className="text-right py-2 pr-2">%</th><th className="text-right py-2">Obras</th></tr></thead><tbody>{topMateriais.map(m=><tr key={m.material} className="border-b border-slate-900 hover:bg-slate-900/50"><td className="py-3 pr-2 font-semibold">{m.material}</td><td className="py-3 pr-2 text-right">{money(m.valor)}</td><td className="py-3 pr-2 text-right">{pct(m.percentual)}</td><td className="py-3 text-right">{numberBR(m.obras)}</td></tr>)}</tbody></table></div></Card>
        </div>

        <div className="grid grid-cols-1 xl:grid-cols-12 gap-4 mb-6">
          <Card className="xl:col-span-6"><CardTitle>Cruzamento material x obra</CardTitle><div className="p-3 md:p-5 overflow-auto max-h-[420px] scrollbar-thin"><table className="w-full text-sm"><thead><tr className="text-slate-400 border-b border-slate-800"><th className="text-left py-2 pr-2">Material</th><th className="text-left py-2 pr-2">Obra</th><th className="text-right py-2 pr-2">Qtd</th><th className="text-right py-2">Valor</th></tr></thead><tbody>{cruzamento.map((x,idx)=><tr key={`${x.material}-${x.obra}-${idx}`} className="border-b border-slate-900 hover:bg-slate-900/50"><td className="py-3 pr-2 font-semibold">{x.material}</td><td className="py-3 pr-2">{x.obra}</td><td className="py-3 pr-2 text-right">{numberBR(x.qtd)}</td><td className="py-3 text-right">{money(x.valor)}</td></tr>)}</tbody></table></div></Card>
          <Card className="xl:col-span-6"><CardTitle>Top 20 real por preço médio</CardTitle><div className="p-3 md:p-5 overflow-auto max-h-[420px] scrollbar-thin"><table className="w-full text-sm"><thead><tr className="text-slate-400 border-b border-slate-800"><th className="text-left py-2 pr-2">Material</th><th className="text-right py-2 pr-2">Preço médio</th><th className="text-right py-2 pr-2">Último</th><th className="text-right py-2">Qtd total</th></tr></thead><tbody>{topPreco.map((x,idx)=><tr key={`${x.material}-${idx}`} className="border-b border-slate-900 hover:bg-slate-900/50"><td className="py-3 pr-2 font-semibold">{x.material}</td><td className="py-3 pr-2 text-right">{money(x.preco_medio)}</td><td className="py-3 pr-2 text-right">{money(x.ultimo_preco)}</td><td className="py-3 text-right">{numberBR(x.quantidade_total)}</td></tr>)}</tbody></table></div></Card>
        </div>

        <div className="grid grid-cols-1 xl:grid-cols-12 gap-4 mb-6">
          <Card className="xl:col-span-7"><CardTitle>Comparativo inteligente</CardTitle><div className="p-3 md:p-5 overflow-auto max-h-[480px] scrollbar-thin"><table className="w-full text-sm"><thead><tr className="text-slate-400 border-b border-slate-800"><th className="text-left py-2 pr-2">Material</th><th className="text-right py-2 pr-2">Médio</th><th className="text-right py-2 pr-2">Último</th><th className="text-right py-2 pr-2">Δ Último vs média</th><th className="text-right py-2">Impacto</th></tr></thead><tbody>{comparativo.map((x,idx)=><tr key={`${x.material}-${idx}`} className="border-b border-slate-900 hover:bg-slate-900/50"><td className="py-3 pr-2 font-semibold">{x.material}</td><td className="py-3 pr-2 text-right">{money(x.preco_medio)}</td><td className="py-3 pr-2 text-right">{money(x.ultimo_preco)}</td><td className={`py-3 pr-2 text-right ${x.variacaoUltimoVsMedia >= 0 ? 'text-red-300' : 'text-green-300'}`}>{pct(x.variacaoUltimoVsMedia)}</td><td className="py-3 text-right">{pct(x.percentual)}</td></tr>)}</tbody></table></div></Card>
          <Card className="xl:col-span-5"><CardTitle>Alertas automáticos</CardTitle><div className="p-3 md:p-5 space-y-3 max-h-[480px] overflow-auto scrollbar-thin">{alertas.length ? alertas.map((a,i)=><div key={a.material} className="rounded-2xl border border-red-500/30 bg-red-950/20 p-4"><div className="text-xs font-black text-red-300">ALERTA {i+1}</div><div className="font-bold mt-1">{a.material}</div><div className="text-sm text-slate-300 mt-2">Último vs média: <b>{pct(a.variacaoUltimoVsMedia)}</b></div><div className="text-sm text-slate-300">Impacto na base filtrada: <b>{pct(a.percentual)}</b></div><div className="text-sm text-slate-300">Última obra: <b>{a.ultimo_obra || '-'}</b></div></div>) : <div className="text-slate-400">Nenhum alerta relevante no recorte atual.</div>}</div></Card>
        </div>

        <Card className="mb-6"><CardTitle>Evolução consolidada por ano</CardTitle><div className="h-[320px] p-3 md:p-5"><ResponsiveContainer width="100%" height="100%"><LineChart data={kpisAno}><CartesianGrid strokeDasharray="3 3" stroke="#334155" /><XAxis dataKey="ano" stroke="#94a3b8" /><YAxis stroke="#94a3b8" tickFormatter={(v)=>`R$ ${Math.round(v/1000)}k`} /><Tooltip formatter={(v)=>money(v)} /><Line type="monotone" dataKey="valor" stroke="#38bdf8" strokeWidth={3} dot={{ r: 4 }} /></LineChart></ResponsiveContainer></div></Card>

        <div className="text-center text-xs text-slate-500 pb-6">ERP ÍMPAR • Dashboard executivo plugável • Fonte: ./data/consolidado_obras.csv + ./data/consolidado_precos.csv</div>
      </div></div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
