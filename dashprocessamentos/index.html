<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ERP ÍMPAR - Inteligência de Custos</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

.container {
  padding:16px;
}

.card {
  background:#111827;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
}

.title {
  font-size:20px;
  margin-bottom:10px;
}

.row {
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.kpi {
  flex:1;
  min-width:150px;
  background:#0f172a;
  padding:12px;
  border-radius:10px;
}

input, select {
  padding:8px;
  border-radius:8px;
  border:none;
}

canvas {
  width:100%!important;
  height:300px!important;
}

</style>
</head>

<body>

<div class="container">

<h2>Inteligência de Custos</h2>

<div class="row">
  <input id="search" placeholder="Material..." />
  <select id="grupo"></select>
  <select id="ano"></select>
</div>

<br>

<div class="row">
  <div class="kpi" id="total"></div>
  <div class="kpi" id="materiais"></div>
  <div class="kpi" id="ticket"></div>
</div>

<br>

<div class="card">
  <div class="title">Valor por Ano</div>
  <canvas id="chartAno"></canvas>
</div>

<div class="card">
  <div class="title">Top 20 por Valor</div>
  <canvas id="chartTop"></canvas>
</div>

</div>

<script>

let data = [];
let filtrado = [];

function money(v){
  return "R$ " + v.toLocaleString("pt-BR",{minimumFractionDigits:2});
}

function parseCSV(text){
  const linhas = text.split("\n").slice(1);
  return linhas.map(l=>{
    const c = l.split(";");
    if(c.length < 8) return null;

    return {
      obra:c[0],
      data:c[1],
      grupo:c[2],
      material:c[3],
      qtd:parseFloat(c[4].replace(".","").replace(",","."))||0,
      un:c[5],
      unit:parseFloat(c[6].replace(".","").replace(",","."))||0,
      total:parseFloat(c[7].replace(".","").replace(",","."))||0,
      ano:c[1]?.split("/")[2]
    }
  }).filter(x=>x);
}

async function load(){
  const res = await fetch("data/materiais_extraidos.csv");
  const txt = await res.text();
  data = parseCSV(txt);

  montarFiltros();
  aplicar();
}

function montarFiltros(){

  const grupos = [...new Set(data.map(d=>d.grupo))];
  const anos = [...new Set(data.map(d=>d.ano))];

  grupo.innerHTML = `<option value="">TODOS</option>` + grupos.map(g=>`<option>${g}</option>`).join("");
  ano.innerHTML = `<option value="">TODOS</option>` + anos.map(a=>`<option>${a}</option>`).join("");

}

function aplicar(){

  const s = search.value.toUpperCase();
  const g = grupo.value;
  const a = ano.value;

  filtrado = data.filter(d=>{
    return (!s || d.material.toUpperCase().includes(s))
        && (!g || d.grupo==g)
        && (!a || d.ano==a);
  });

  atualizarKPIs();
  graficoAno();
  graficoTop();

}

function atualizarKPIs(){

  const total = filtrado.reduce((s,x)=>s+x.total,0);
  const materiais = new Set(filtrado.map(x=>x.material)).size;
  const ticket = total / (materiais||1);

  document.getElementById("total").innerHTML = "<b>Total</b><br>"+money(total);
  document.getElementById("materiais").innerHTML = "<b>Materiais</b><br>"+materiais;
  document.getElementById("ticket").innerHTML = "<b>Médio</b><br>"+money(ticket);

}

let chartAnoObj;
function graficoAno(){

  const mapa = {};

  filtrado.forEach(x=>{
    if(!mapa[x.ano]) mapa[x.ano]=0;
    mapa[x.ano]+=x.total;
  });

  const labels = Object.keys(mapa);
  const valores = Object.values(mapa);

  if(chartAnoObj) chartAnoObj.destroy();

  chartAnoObj = new Chart(chartAno,{
    type:"bar",
    data:{
      labels,
      datasets:[{
        data:valores,
        backgroundColor:"#22c55e"
      }]
    },
    options:{
      scales:{
        y:{
          ticks:{
            callback:v=>"R$ "+(v/1000)+"k"
          }
        }
      }
    }
  });

}

let chartTopObj;
function graficoTop(){

  const mapa = {};

  filtrado.forEach(x=>{
    if(!mapa[x.material]) mapa[x.material]=0;
    mapa[x.material]+=x.total;
  });

  const top = Object.entries(mapa)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,20);

  if(chartTopObj) chartTopObj.destroy();

  chartTopObj = new Chart(chartTop,{
    type:"bar",
    data:{
      labels:top.map(x=>x[0]),
      datasets:[{
        data:top.map(x=>x[1]),
        backgroundColor:"#38bdf8"
      }]
    },
    options:{
      indexAxis:"y"
    }
  });

}

search.oninput = aplicar;
grupo.onchange = aplicar;
ano.onchange = aplicar;

load();

</script>

</body>
</html>
