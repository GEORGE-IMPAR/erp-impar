<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP ÍMPAR - Dashboard Orçamentos</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{
      --bg:#06101b;
      --panel:#0b1726;
      --panel-2:#0e1d31;
      --line:#1f3650;
      --txt:#ecf4ff;
      --muted:#9fb3c8;
      --green:#22c55e;
      --green-2:#16a34a;
      --blue:#38bdf8;
      --amber:#f59e0b;
      --red:#ef4444;
      --purple:#8b5cf6;
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,#06101b 0%, #08121d 100%);color:var(--txt);font-family:Inter,Segoe UI,Arial,sans-serif}
    .page{max-width:1600px;margin:0 auto;padding:18px}
    .hero{background:linear-gradient(135deg,rgba(34,197,94,.18),rgba(56,189,248,.10));border:1px solid var(--line);border-radius:24px;padding:18px 20px;box-shadow:var(--shadow);margin-bottom:16px}
    .hero-top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;flex-wrap:wrap}
    .eyebrow{font-size:11px;font-weight:900;letter-spacing:.28em;color:#8ef0b1;text-transform:uppercase}
    .title{font-size:34px;font-weight:900;margin:8px 0 6px}
    .sub{color:var(--muted);font-size:14px}
    .userbox{min-width:260px;text-align:right}
    .userbox .name{font-size:18px;font-weight:800}
    .userbox .email{font-size:13px;color:var(--muted)}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(8,18,29,.75);font-size:12px;color:#dce8f7;margin-top:10px}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(34,197,94,.14)}

    .filters{display:grid;grid-template-columns:2fr 1fr 2fr 1fr 1fr;gap:12px;margin-bottom:16px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .input,.select,.btn{height:46px;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--txt);padding:0 14px;font-size:14px;outline:none}
    .input:focus,.select:focus{border-color:#3bb3ff;box-shadow:0 0 0 3px rgba(56,189,248,.14)}
    .btn{cursor:pointer;background:linear-gradient(135deg,var(--green),var(--green-2));border:none;font-weight:800;transition:.18s transform,.18s filter;box-shadow:0 10px 20px rgba(22,163,74,.18)}
    .btn:hover{filter:brightness(1.06);transform:translateY(-1px)}

    .grid-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .card{background:linear-gradient(180deg,var(--panel) 0%, var(--panel-2) 100%);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .kpi{padding:16px}
    .kpi .label{color:var(--muted);font-size:12px;font-weight:700}
    .kpi .val{margin-top:8px;font-size:31px;font-weight:900;line-height:1.05}

    .grid-2{display:grid;grid-template-columns:1.2fr .8fr;gap:12px;margin-bottom:16px}
    .grid-2-eq{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
    .card-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
    .card-title{font-weight:900;font-size:16px}
    .badge{font-size:11px;padding:6px 10px;border-radius:999px;background:#08121d;border:1px solid var(--line);color:#dfe9f7;font-weight:800}
    .card-body{padding:14px 16px}
    .chart-wrap{height:340px}

    .list{display:flex;flex-direction:column;gap:10px;max-height:520px;overflow:auto;padding-right:2px}
    .item{background:rgba(6,16,27,.72);border:1px solid #17304b;border-radius:16px;padding:12px}
    .item-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .rank{font-size:11px;font-weight:900;color:#86efac;margin-bottom:3px}
    .it-title{font-size:14px;font-weight:800}
    .it-sub{font-size:12px;color:var(--muted);margin-top:4px}
    .it-val{font-size:20px;font-weight:900;text-align:right}
    .it-pct{font-size:12px;color:var(--muted);text-align:right;margin-top:4px}
    .bar-track{margin-top:10px;height:8px;background:#112235;border-radius:999px;overflow:hidden}
    .bar-fill{height:8px;background:linear-gradient(90deg,var(--green),#4ade80);border-radius:999px}

    .alerts{display:flex;flex-direction:column;gap:10px;max-height:520px;overflow:auto}
    .alert{border:1px solid rgba(239,68,68,.30);background:rgba(127,29,29,.18);border-radius:16px;padding:12px}
    .alert .tag{font-size:11px;font-weight:900;color:#fca5a5}
    .alert .a-title{font-size:14px;font-weight:900;margin-top:4px}
    .alert .a-line{font-size:13px;color:#e7eef9;margin-top:6px}

    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid #12263c;font-size:13px}
    th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;text-align:left}
    td.right, th.right{text-align:right}
    tbody tr:hover{background:rgba(255,255,255,.02)}

    .footer-note{text-align:center;color:#7e97b1;font-size:11px;padding:10px 0 4px}
    .loader-wrap{min-height:76vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .loader-card{width:min(520px,100%);background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:24px;padding:30px;text-align:center;box-shadow:var(--shadow)}
    .spinner{width:56px;height:56px;border:5px solid rgba(255,255,255,.10);border-top-color:var(--green);border-radius:50%;margin:0 auto 18px;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .hint{font-size:13px;color:var(--muted);line-height:1.55}
    .ok{color:#8ef0b1;font-weight:800}
    .warn{color:#fdba74;font-weight:800}

    @media (max-width:1200px){
      .filters{grid-template-columns:1fr 1fr}
      .grid-kpi{grid-template-columns:repeat(2,1fr)}
      .grid-2,.grid-2-eq{grid-template-columns:1fr}
      .userbox{text-align:left}
    }
    @media (max-width:760px){
      .page{padding:12px}
      .title{font-size:26px}
      .filters{grid-template-columns:1fr}
      .grid-kpi{grid-template-columns:1fr}
      .kpi .val{font-size:26px}
      .chart-wrap{height:280px}
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const app = document.getElementById('app');
    const money = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Number(v||0));
    const num = v => new Intl.NumberFormat('pt-BR').format(Number(v||0));
    const pct = v => `${Number(v||0).toFixed(1)}%`;

    function getLoggedUser(){
      const keys=['ERPIMPAR_USER','usuarioLogado','impar_user','user','ERP_IMPAR_USER','ERPIMPAR_LOGIN'];
      for(const key of keys){
        try{
          const raw=localStorage.getItem(key)||sessionStorage.getItem(key);
          if(!raw) continue;
          let parsed=raw;
          try{ parsed=JSON.parse(raw);}catch(e){}
          if(typeof parsed==='string'){
            if(parsed.includes('@')) return {nome:parsed.split('@')[0],email:parsed};
            return {nome:parsed,email:''};
          }
          return {
            nome: parsed?.Nome || parsed?.nome || parsed?.userNome || parsed?.Usuario || 'Usuário',
            email: parsed?.Email || parsed?.email || parsed?.userEmail || ''
          };
        }catch(e){}
      }
      return {
        nome: localStorage.getItem('usuarioNome') || sessionStorage.getItem('usuarioNome') || 'Usuário',
        email: localStorage.getItem('usuarioEmail') || sessionStorage.getItem('usuarioEmail') || ''
      };
    }

    function normalizeText(v){
      return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().trim();
    }
    function normalizarMaterial(nome){
      return normalizeText(nome)
        .replace(/\bTUBO DE\b/g,'')
        .replace(/\bUNIDADE\b/g,'')
        .replace(/\bPECA\b/g,'')
        .replace(/\s+/g,' ')
        .trim();
    }
    function parseCSVLine(line, delimiter=','){
      const out=[]; let cur=''; let inQuotes=false;
      for(let i=0;i<line.length;i++){
        const ch=line[i], next=line[i+1];
        if(ch==='"'){
          if(inQuotes && next==='"'){ cur+='"'; i++; }
          else inQuotes=!inQuotes;
        } else if(ch===delimiter && !inQuotes){ out.push(cur); cur=''; }
        else cur+=ch;
      }
      out.push(cur);
      return out.map(v=>String(v||'').trim());
    }
    function parseCSV(text){
      const lines = String(text||'').split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2) return [];
      const firstLine = lines[0].replace(/^\uFEFF/, '');
      const delimiter = (firstLine.split(';').length > firstLine.split(',').length) ? ';' : ',';
      const headers = parseCSVLine(firstLine, delimiter);
      return lines.slice(1).map(line=>{
        const cols = parseCSVLine(line, delimiter);
        const obj = {};
        headers.forEach((h,i)=> obj[h]=cols[i] ?? '');
        return obj;
      });
    }
    function parseBRL(v){
      return Number(String(v||'0').replace(/\./g,'').replace(',', '.').replace(/[^\d.-]/g,'')) || 0;
    }
    function inferYear(dateValue){
      const v=String(dateValue||'').trim();
      if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v.slice(0,4);
      if(/^\d{2}\/\d{2}\/\d{4}$/.test(v)) return v.slice(-4);
      const m=v.match(/(19\d{2}|20\d{2})/);
      return m ? m[1] : 'Sem ano';
    }
    function pick(obj, names, fallback=''){
      for(const n of names){ if(obj[n] !== undefined && obj[n] !== '') return obj[n]; }
      return fallback;
    }

    let chartAno, chartObras, chartLinha;

    function renderLoading(){
      app.innerHTML = `
        <div class="loader-wrap">
          <div class="loader-card">
            <div class="spinner"></div>
            <div style="font-size:24px;font-weight:900">PROCESSANDO DADOS...</div>
            <div class="hint" style="margin-top:10px">Carregando dashboard executivo do ERP ÍMPAR.</div>
          </div>
        </div>`;
    }

    function renderError(msg){
      app.innerHTML = `
        <div class="loader-wrap">
          <div class="loader-card" style="text-align:left">
            <div style="font-size:26px;font-weight:900;color:#fda4af">Erro ao abrir o dashboard</div>
            <div class="hint" style="margin-top:10px;color:#e9eef8">${msg}</div>
            <div class="hint" style="margin-top:16px">
              Estrutura esperada:<br>
              <span class="ok">/dashprocessamentos/index.html</span><br>
              <span class="ok">/dashprocessamentos/data/consolidado_obras.csv</span><br>
              <span class="ok">/dashprocessamentos/data/consolidado_precos.csv</span>
            </div>
          </div>
        </div>`;
    }

    async function loadData(){
      renderLoading();
      try{
        const [obrasResp, precosResp] = await Promise.all([
          fetch('./data/consolidado_obras.csv?ts=' + Date.now(), {cache:'no-store'}),
          fetch('./data/consolidado_precos.csv?ts=' + Date.now(), {cache:'no-store'})
        ]);
        if(!obrasResp.ok) throw new Error('Não encontrei ./data/consolidado_obras.csv');
        if(!precosResp.ok) throw new Error('Não encontrei ./data/consolidado_precos.csv');

        const obrasCsv = parseCSV(await obrasResp.text());
        const precosCsv = parseCSV(await precosResp.text());
        const obras = obrasCsv.map(r=>{
          const materialOriginal = pick(r,['MATERIAL','Material','material'],'SEM MATERIAL');
          const obra = pick(r,['OBRA','Obra','obra'],'SEM OBRA');
          const data = pick(r,['DATA','Data','data','ultimo_data','ULTIMO_DATA'],'');
          return {
            obra,
            materialOriginal,
            material: normalizarMaterial(materialOriginal),
            valor: parseBRL(pick(r,['VALOR','CUSTO','TOTAL','Valor','valor'],0)),
            data,
            ano: inferYear(data)
          };
        }).filter(r => r.obra || r.material || r.valor);

        const precos = precosCsv.map(r=>{
          const materialOriginal = pick(r,['MATERIAL','Material','material'],'SEM MATERIAL');
          const obra = pick(r,['OBRA','Obra','obra','ultimo_obra','ULTIMO_OBRA'],'');
          const data = pick(r,['DATA','Data','data','ultimo_data','ULTIMO_DATA'],'');
          return {
            obra,
            materialOriginal,
            material: normalizarMaterial(materialOriginal),
            preco: parseBRL(pick(r,['VALOR','PRECO','PREÇO','CUSTO','TOTAL','Valor','valor','ultimo_preco','ULTIMO_PRECO'],0)),
            preco_medio: parseBRL(pick(r,['preco_medio','PRECO_MEDIO','PREÇO_MEDIO'],0)),
            ultimo_preco: parseBRL(pick(r,['ultimo_preco','ULTIMO_PRECO','PRECO','PREÇO'],0)),
            quantidade_total: parseBRL(pick(r,['quantidade_total','QUANTIDADE_TOTAL','quantidade','QUANTIDADE'],0)),
            data,
            ano: inferYear(data)
          };
        }).filter(r => r.material || r.preco);

        renderDashboard(obras, precos);
      }catch(err){
        renderError(err.message || 'Erro ao carregar bases.');
      }
    }

    function aggregateTopMateriais(rows, topN){
      const map={};
      rows.forEach(r=>{
        if(!map[r.material]) map[r.material]={material:r.material, valor:0, qtd:0, obras:new Set()};
        map[r.material].valor += r.valor;
        map[r.material].qtd += 1;
        map[r.material].obras.add(r.obra);
      });
      const total = Object.values(map).reduce((s,x)=>s+x.valor,0);
      return Object.values(map).sort((a,b)=>b.valor-a.valor).slice(0,topN).map(x=>({
        material:x.material, valor:x.valor, qtd:x.qtd, obras:x.obras.size, percentual: total ? (x.valor/total)*100 : 0
      }));
    }
    function aggregateTopObras(rows){
      const map={};
      rows.forEach(r=>{
        if(!map[r.obra]) map[r.obra]={obra:r.obra, valor:0, materiais:new Set(), itens:0};
        map[r.obra].valor += r.valor;
        map[r.obra].materiais.add(r.material);
        map[r.obra].itens += 1;
      });
      const total = Object.values(map).reduce((s,x)=>s+x.valor,0);
      return Object.values(map).sort((a,b)=>b.valor-a.valor).slice(0,20).map(x=>({
        obra:x.obra, valor:x.valor, materiais:x.materiais.size, itens:x.itens, percentual: total ? (x.valor/total)*100 : 0
      }));
    }
    function cruzamentoMaterialObra(rows, topN){
      const map={};
      rows.forEach(r=>{
        const key = `${r.material}__${r.obra}`;
        if(!map[key]) map[key] = {material:r.material, obra:r.obra, valor:0, qtd:0};
        map[key].valor += r.valor;
        map[key].qtd += 1;
      });
      return Object.values(map).sort((a,b)=>b.valor-a.valor).slice(0,topN);
    }
    function kpiAno(rows){
      const map={};
      rows.forEach(r=>{
        if(!map[r.ano]) map[r.ano]={ano:r.ano, valor:0, obras:new Set()};
        map[r.ano].valor += r.valor;
        map[r.ano].obras.add(r.obra);
      });
      return Object.values(map).sort((a,b)=>String(a.ano).localeCompare(String(b.ano))).map(x=>({ano:x.ano, valor:x.valor, obras:x.obras.size}));
    }
    function linhaAno(rows){
      const map={};
      rows.forEach(r=>{
        if(!map[r.ano]) map[r.ano]={ano:r.ano, valor:0};
        map[r.ano].valor += r.valor;
      });
      return Object.values(map).sort((a,b)=>String(a.ano).localeCompare(String(b.ano)));
    }
    function comparativoPrecos(precos, topN){
      const hasAggregated = precos.some(r => r.preco_medio || r.ultimo_preco || r.quantidade_total);
      if(hasAggregated){
        return precos.map(r=>{
          const media = r.preco_medio || r.preco || 0;
          const ultimo = r.ultimo_preco || r.preco || 0;
          const variacao = media ? ((ultimo-media)/media)*100 : 0;
          return { material:r.material, media, ultimo, variacao, qtd:r.quantidade_total || 1 };
        }).sort((a,b)=>Math.abs(b.variacao)-Math.abs(a.variacao)).slice(0,topN);
      }
      const map={};
      precos.forEach(r=>{
        if(!map[r.material]) map[r.material]=[];
        map[r.material].push(r);
      });
      const out=[];
      Object.entries(map).forEach(([material, rows])=>{
        const valid = rows.filter(x=>x.preco>0).sort((a,b)=>String(a.data).localeCompare(String(b.data)));
        if(!valid.length) return;
        const media = valid.reduce((s,x)=>s+x.preco,0)/valid.length;
        const ultimo = valid[valid.length-1].preco;
        const variacao = media ? ((ultimo-media)/media)*100 : 0;
        out.push({ material, media, ultimo, variacao, qtd: valid.length });
      });
      return out.sort((a,b)=>Math.abs(b.variacao)-Math.abs(a.variacao)).slice(0,topN);
    }
    function alertasInteligentes(topMateriais, comparativos){
      const materialMap = {};
      comparativos.forEach(c=> materialMap[c.material]=c);
      return topMateriais.map(m=>{
        const cmp = materialMap[m.material];
        return {
          material:m.material,
          valor:m.valor,
          impacto:m.percentual,
          media: cmp ? cmp.media : 0,
          ultimo: cmp ? cmp.ultimo : 0,
          variacao: cmp ? cmp.variacao : 0,
          sinal: cmp && cmp.variacao > 15 ? 'alta' : (cmp && cmp.variacao < -15 ? 'queda' : 'estavel')
        };
      }).filter(a => a.impacto >= 4 || Math.abs(a.variacao) >= 15).sort((a,b)=> (Math.abs(b.variacao)+b.impacto) - (Math.abs(a.variacao)+a.impacto)).slice(0,10);
    }

    function buildOptions(list, key){
      return [...new Set(list.map(x=>x[key]).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),'pt-BR'));
    }

    function renderDashboard(obras, precos){
      const user = getLoggedUser();
      const anos = buildOptions(obras,'ano');

      app.innerHTML = `
        <div class="page">
          <section class="hero">
            <div class="hero-top">
              <div>
                <div class="eyebrow">ERP ÍMPAR</div>
                <div class="title">Dashboard Executivo de Processamentos</div>
                <div class="sub">Leitura direta de <b>consolidado_obras.csv</b> e <b>consolidado_precos.csv</b>, sem React, sem Babel e sem Recharts.</div>
              </div>
              <div class="userbox">
                <div class="name" id="userNome">${user.nome || 'Usuário'}</div>
                <div class="email" id="userEmail">${user.email || 'Sem e-mail'}</div>
                <div class="pill"><span class="dot"></span> Base: ${num(obras.length)} registros de obras • ${num(precos.length)} registros de preços</div>
              </div>
            </div>
          </section>

          <section class="filters">
            <div class="field">
              <label>Busca inteligente</label>
              <input id="fQuery" class="input" placeholder="Material ou obra..." />
            </div>
            <div class="field">
              <label>Ano</label>
              <select id="fAno" class="select">
                <option value="TODOS">TODOS</option>
                ${anos.map(a=>`<option value="${a}">${a}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>Obra</label>
              <select id="fObra" class="select"><option value="TODAS">TODAS</option></select>
            </div>
            <div class="field">
              <label>Top materiais</label>
              <select id="fTop" class="select">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="30">30</option>
              </select>
            </div>
            <div class="field">
              <label>&nbsp;</label>
              <button id="btnAtualizar" class="btn">Atualizar base</button>
            </div>
          </section>

          <section class="grid-kpi">
            <div class="card kpi"><div class="label">Valor total filtrado</div><div class="val" id="kpiTotal">-</div></div>
            <div class="card kpi"><div class="label">Obras no recorte</div><div class="val" id="kpiObras">-</div></div>
            <div class="card kpi"><div class="label">Materiais no recorte</div><div class="val" id="kpiMateriais">-</div></div>
            <div class="card kpi"><div class="label">Ticket médio por obra</div><div class="val" id="kpiTicket">-</div></div>
          </section>

          <section class="grid-2">
            <div class="card">
              <div class="card-head"><div class="card-title">Valor por ano</div></div>
              <div class="card-body"><div class="chart-wrap"><canvas id="chartAno"></canvas></div></div>
            </div>
            <div class="card">
              <div class="card-head"><div class="card-title">Participação das principais obras</div></div>
              <div class="card-body"><div class="chart-wrap"><canvas id="chartObras"></canvas></div></div>
            </div>
          </section>

          <section class="grid-2">
            <div class="card">
              <div class="card-head"><div class="card-title">Top materiais por valor</div><div class="badge" id="badgeTop">TOP 20</div></div>
              <div class="card-body"><div id="listaMateriais" class="list"></div></div>
            </div>
            <div class="card">
              <div class="card-head"><div class="card-title">Alertas executivos</div></div>
              <div class="card-body"><div id="listaAlertas" class="alerts"></div></div>
            </div>
          </section>

          <section class="grid-2-eq">
            <div class="card">
              <div class="card-head"><div class="card-title">Top obras por valor</div></div>
              <div class="card-body"><div style="max-height:420px;overflow:auto"><table><thead><tr><th>Obra</th><th class="right">Valor</th><th class="right">%</th><th class="right">Materiais</th></tr></thead><tbody id="tbObras"></tbody></table></div></div>
            </div>
            <div class="card">
              <div class="card-head"><div class="card-title">Top 20 cruzamento material x obra</div></div>
              <div class="card-body"><div style="max-height:420px;overflow:auto"><table><thead><tr><th>Material</th><th>Obra</th><th class="right">Qtd</th><th class="right">Valor</th></tr></thead><tbody id="tbCross"></tbody></table></div></div>
            </div>
          </section>

          <section class="grid-2-eq">
            <div class="card">
              <div class="card-head"><div class="card-title">Top 20 real de preços</div></div>
              <div class="card-body"><div style="max-height:420px;overflow:auto"><table><thead><tr><th>Material</th><th class="right">Preço médio</th><th class="right">Último preço</th><th class="right">Variação</th><th class="right">Amostras</th></tr></thead><tbody id="tbPrecos"></tbody></table></div></div>
            </div>
            <div class="card">
              <div class="card-head"><div class="card-title">Evolução consolidada por ano</div></div>
              <div class="card-body"><div class="chart-wrap"><canvas id="chartLinha"></canvas></div></div>
            </div>
          </section>

          <div class="footer-note">ERP ÍMPAR • Estrutura esperada: <b>/dashprocessamentos/index.html</b> + <b>/dashprocessamentos/data/*.csv</b></div>
        </div>`;

      const els = {
        fQuery: document.getElementById('fQuery'),
        fAno: document.getElementById('fAno'),
        fObra: document.getElementById('fObra'),
        fTop: document.getElementById('fTop'),
        btnAtualizar: document.getElementById('btnAtualizar'),
        kpiTotal: document.getElementById('kpiTotal'),
        kpiObras: document.getElementById('kpiObras'),
        kpiMateriais: document.getElementById('kpiMateriais'),
        kpiTicket: document.getElementById('kpiTicket'),
        listaMateriais: document.getElementById('listaMateriais'),
        listaAlertas: document.getElementById('listaAlertas'),
        tbObras: document.getElementById('tbObras'),
        tbCross: document.getElementById('tbCross'),
        tbPrecos: document.getElementById('tbPrecos'),
        badgeTop: document.getElementById('badgeTop')
      };

      function fillObras(){
        const ano = els.fAno.value;
        const rows = obras.filter(r => ano==='TODOS' ? true : r.ano===ano);
        const opts = ['TODAS', ...buildOptions(rows,'obra')];
        els.fObra.innerHTML = opts.map(o=>`<option value="${o}">${o}</option>`).join('');
      }

      function apply(){
        const q = normalizeText(els.fQuery.value);
        const ano = els.fAno.value;
        const obra = els.fObra.value;
        const topN = Number(els.fTop.value || 20);
        els.badgeTop.textContent = `TOP ${topN}`;

        const rows = obras.filter(r => {
          const okAno = ano==='TODOS' || r.ano===ano;
          const okObra = obra==='TODAS' || r.obra===obra;
          const okQ = !q || r.material.includes(q) || normalizeText(r.obra).includes(q);
          return okAno && okObra && okQ;
        });
        const precosRows = precos.filter(r => {
          const okAno = ano==='TODOS' || r.ano===ano;
          const okObra = obra==='TODAS' || !r.obra || r.obra===obra;
          const okQ = !q || r.material.includes(q) || normalizeText(r.obra).includes(q);
          return okAno && okObra && okQ;
        });

        const total = rows.reduce((s,r)=>s+r.valor,0);
        const obrasUnicas = new Set(rows.map(r=>r.obra)).size;
        const materiaisUnicos = new Set(rows.map(r=>r.material)).size;
        const ticket = obrasUnicas ? total / obrasUnicas : 0;
        els.kpiTotal.textContent = money(total);
        els.kpiObras.textContent = num(obrasUnicas);
        els.kpiMateriais.textContent = num(materiaisUnicos);
        els.kpiTicket.textContent = money(ticket);

        const topMat = aggregateTopMateriais(rows, topN);
        const topObr = aggregateTopObras(rows).slice(0,10);
        const cross = cruzamentoMaterialObra(rows, 20);
        const anos = kpiAno(obras);
        const linha = linhaAno(obras);
        const priceComp = comparativoPrecos(precosRows, 20);
        const alerts = alertasInteligentes(topMat, priceComp);

        els.listaMateriais.innerHTML = topMat.map((m,i)=>`
          <div class="item">
            <div class="item-top">
              <div>
                <div class="rank">#${i+1}</div>
                <div class="it-title">${m.material || 'SEM MATERIAL'}</div>
                <div class="it-sub">${num(m.qtd)} lançamentos • ${num(m.obras)} obras</div>
              </div>
              <div>
                <div class="it-val">${money(m.valor)}</div>
                <div class="it-pct">${pct(m.percentual)}</div>
              </div>
            </div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.min(m.percentual,100)}%"></div></div>
          </div>`).join('') || `<div class="hint">Sem dados no filtro atual.</div>`;

        els.listaAlertas.innerHTML = alerts.map((a,i)=>`
          <div class="alert">
            <div class="tag">ALERTA ${i+1}</div>
            <div class="a-title">${a.material}</div>
            <div class="a-line">Impacto no recorte: <b>${pct(a.impacto)}</b></div>
            <div class="a-line">Custo acumulado: <b>${money(a.valor)}</b></div>
            <div class="a-line">Último preço vs média: <b style="color:${a.variacao>0?'#fdba74':'#93c5fd'}">${pct(a.variacao)}</b></div>
          </div>`).join('') || `<div class="hint">Nenhum alerta relevante no recorte atual.</div>`;

        els.tbObras.innerHTML = topObr.map(o=>`
          <tr>
            <td>${o.obra}</td>
            <td class="right">${money(o.valor)}</td>
            <td class="right">${pct(o.percentual)}</td>
            <td class="right">${num(o.materiais)}</td>
          </tr>`).join('') || `<tr><td colspan="4">Sem dados</td></tr>`;

        els.tbCross.innerHTML = cross.map(x=>`
          <tr>
            <td>${x.material}</td>
            <td>${x.obra}</td>
            <td class="right">${num(x.qtd)}</td>
            <td class="right">${money(x.valor)}</td>
          </tr>`).join('') || `<tr><td colspan="4">Sem dados</td></tr>`;

        els.tbPrecos.innerHTML = priceComp.map(x=>`
          <tr>
            <td>${x.material}</td>
            <td class="right">${money(x.media)}</td>
            <td class="right">${money(x.ultimo)}</td>
            <td class="right" style="color:${x.variacao>0?'#fdba74':'#93c5fd'}">${pct(x.variacao)}</td>
            <td class="right">${num(x.qtd)}</td>
          </tr>`).join('') || `<tr><td colspan="5">Sem dados</td></tr>`;

        drawAno(anos);
        drawObras(topObr.slice(0,6));
        drawLinha(linha);
      }

      fillObras();
      apply();
      els.fAno.addEventListener('change',()=>{ fillObras(); apply(); });
      els.fObra.addEventListener('change',apply);
      els.fQuery.addEventListener('input',apply);
      els.fTop.addEventListener('change',apply);
      els.btnAtualizar.addEventListener('click',()=>{
        els.btnAtualizar.disabled = true;
        els.btnAtualizar.textContent = 'Atualizando...';
        const url = new URL(window.location.href);
        url.searchParams.set('ts_reload', Date.now());
        window.location.href = url.toString();
      });
    }

    function destroyChart(ref){ if(ref) ref.destroy(); }
    function drawAno(data){
      const ctx=document.getElementById('chartAno');
      destroyChart(chartAno);
      chartAno = new Chart(ctx,{type:'bar',data:{labels:data.map(x=>x.ano),datasets:[{label:'Valor',data:data.map(x=>x.valor),backgroundColor:'#22c55e',borderRadius:8}]},options:baseChartOptions(true)});
    }
    function drawObras(data){
      const ctx=document.getElementById('chartObras');
      destroyChart(chartObras);
      chartObras = new Chart(ctx,{type:'doughnut',data:{labels:data.map(x=>x.obra),datasets:[{data:data.map(x=>x.valor),backgroundColor:['#22c55e','#38bdf8','#8b5cf6','#f59e0b','#ef4444','#14b8a6'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#dbe8f6'}},tooltip:{callbacks:{label:(c)=>`${c.label}: ${money(c.raw)}`}}},cutout:'52%'}});
    }
    function drawLinha(data){
      const ctx=document.getElementById('chartLinha');
      destroyChart(chartLinha);
      chartLinha = new Chart(ctx,{type:'line',data:{labels:data.map(x=>x.ano),datasets:[{label:'Valor',data:data.map(x=>x.valor),borderColor:'#38bdf8',backgroundColor:'rgba(56,189,248,.15)',fill:true,tension:.35,pointRadius:4,pointBackgroundColor:'#38bdf8'}]},options:baseChartOptions(false)});
    }
    function baseChartOptions(barMode){
      return {
        responsive:true,
        maintainAspectRatio:false,
        scales:{
          x:{ticks:{color:'#cfe0f2'},grid:{display:false}},
          y:{ticks:{color:'#cfe0f2',callback:(v)=>`R$ ${Math.round(v/1000)}k`},grid:{color:'rgba(159,179,200,.14)'}}
        },
        plugins:{
          legend:{display:!barMode,labels:{color:'#dbe8f6'}},
          tooltip:{callbacks:{label:(ctx)=>`${ctx.dataset.label || ''} ${money(ctx.raw)}`}}
        }
      };
    }

    loadData();
  </script>
</body>
</html>
