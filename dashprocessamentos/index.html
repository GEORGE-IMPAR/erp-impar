<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP ÍMPAR — Inteligência de Custos + Montador de Orçamento</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{
      --bg:#06101b;
      --panel:#0b1726;
      --panel2:#0e1d31;
      --line:#1d334a;
      --txt:#edf4ff;
      --muted:#9db2c6;
      --green:#22c55e;
      --green2:#16a34a;
      --blue:#38bdf8;
      --blue2:#0ea5e9;
      --amber:#f59e0b;
      --red:#ef4444;
      --purple:#8b5cf6;
      --shadow:0 14px 34px rgba(0,0,0,.28);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,#06101b 0%, #08131f 100%);color:var(--txt);font-family:Inter,Segoe UI,Arial,sans-serif}
    body{min-height:100vh}
    .page{max-width:1700px;margin:0 auto;padding:16px}
    .hero{background:linear-gradient(135deg,rgba(34,197,94,.18),rgba(56,189,248,.10));border:1px solid var(--line);border-radius:24px;padding:18px 20px;box-shadow:var(--shadow);margin-bottom:14px}
    .hero-top{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:flex-start}
    .eyebrow{font-size:11px;font-weight:900;letter-spacing:.28em;color:#8df0b2;text-transform:uppercase}
    .title{font-size:32px;font-weight:900;margin:8px 0 6px}
    .sub{color:var(--muted);font-size:14px;line-height:1.5}
    .userbox{min-width:260px;text-align:right}
    .userbox .name{font-size:18px;font-weight:900}
    .userbox .email{font-size:13px;color:var(--muted)}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(8,18,29,.76);font-size:12px;color:#dce8f6;margin-top:10px}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(34,197,94,.14)}
    .tabs{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 14px}
    .tab{height:42px;padding:0 16px;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--txt);font-weight:800;cursor:pointer}
    .tab.active{background:linear-gradient(135deg,var(--green),var(--green2));border:none}
    .panel{display:none}
    .panel.active{display:block}
    .filters{display:grid;grid-template-columns:1.8fr .8fr 1.5fr .8fr .8fr .9fr;gap:12px;margin-bottom:14px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .input,.select,.btn{height:46px;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--txt);padding:0 14px;font-size:14px;outline:none}
    .input:focus,.select:focus{border-color:#3bb3ff;box-shadow:0 0 0 3px rgba(56,189,248,.14)}
    .btn{cursor:pointer;background:linear-gradient(135deg,var(--green),var(--green2));border:none;font-weight:900;transition:.18s transform,.18s filter;box-shadow:0 10px 20px rgba(22,163,74,.18)}
    .btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
    .btn.secondary{background:linear-gradient(135deg,#1f3b57,#284d73)}
    .btn.amber{background:linear-gradient(135deg,#d97706,#f59e0b)}
    .btn.red{background:linear-gradient(135deg,#b91c1c,#ef4444)}
    .grid-kpi{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px}
    .card{background:linear-gradient(180deg,var(--panel) 0%, var(--panel2) 100%);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .kpi{padding:16px}
    .kpi .label{font-size:12px;color:var(--muted);font-weight:800}
    .kpi .val{font-size:30px;font-weight:900;margin-top:8px;line-height:1.05}
    .card-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
    .card-title{font-weight:900;font-size:16px}
    .badge{font-size:11px;padding:6px 10px;border-radius:999px;background:#08121d;border:1px solid var(--line);font-weight:900;color:#dfe9f7}
    .card-body{padding:14px 16px}
    .grid-2{display:grid;grid-template-columns:1.1fr .9fr;gap:12px;margin-bottom:14px}
    .grid-2-eq{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .grid-3{display:grid;grid-template-columns:1.1fr .95fr .95fr;gap:12px;margin-bottom:14px}
    .chart-wrap{height:330px}
    .list{display:flex;flex-direction:column;gap:10px;max-height:560px;overflow:auto;padding-right:4px}
    .item{background:rgba(6,16,27,.72);border:1px solid #17304b;border-radius:16px;padding:12px}
    .item-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .rank{font-size:11px;font-weight:900;color:#86efac;margin-bottom:3px}
    .it-title{font-size:14px;font-weight:900;line-height:1.35;word-break:break-word}
    .it-sub{font-size:12px;color:var(--muted);margin-top:4px}
    .it-val{font-size:19px;font-weight:900;text-align:right}
    .it-pct{font-size:12px;color:var(--muted);text-align:right;margin-top:4px}
    .bar-track{margin-top:10px;height:8px;background:#112235;border-radius:999px;overflow:hidden}
    .bar-fill{height:8px;background:linear-gradient(90deg,var(--green),#4ade80);border-radius:999px}
    .alerts{display:flex;flex-direction:column;gap:10px;max-height:560px;overflow:auto}
    .alert{border:1px solid rgba(239,68,68,.30);background:rgba(127,29,29,.18);border-radius:16px;padding:12px}
    .alert .tag{font-size:11px;font-weight:900;color:#fca5a5}
    .alert .a-title{font-size:14px;font-weight:900;margin-top:4px;line-height:1.35}
    .alert .a-line{font-size:13px;color:#e7eef9;margin-top:6px}
    table{width:100%;border-collapse:collapse;min-width:900px}
    th,td{padding:10px 8px;border-bottom:1px solid #12263c;font-size:13px;vertical-align:top}
    th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;text-align:left}
    td.right,th.right{text-align:right}
    tbody tr:hover{background:rgba(255,255,255,.02)}
    .table-wrap{overflow:auto;border-radius:14px}
    .tiny{font-size:11px;color:var(--muted)}
    .good{color:#8df0b2;font-weight:900}
    .warn{color:#fdba74;font-weight:900}
    .bad{color:#fca5a5;font-weight:900}
    .builder-grid{display:grid;grid-template-columns:1.05fr 1.15fr;gap:12px}
    .library-toolbar{display:grid;grid-template-columns:1.3fr .9fr .8fr .8fr;gap:10px;margin-bottom:12px}
    .library-list{display:flex;flex-direction:column;gap:10px;max-height:640px;overflow:auto;padding-right:4px}
    .material-card{border:1px solid #1b3550;background:rgba(8,18,29,.75);border-radius:16px;padding:12px;cursor:grab}
    .material-card:hover{border-color:#2f5c87;transform:translateY(-1px)}
    .material-name{font-weight:900;font-size:14px;line-height:1.35}
    .material-meta{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    .meta-box{background:#091321;border:1px solid #132a43;border-radius:12px;padding:8px}
    .meta-box .k{font-size:10px;color:var(--muted);font-weight:900;text-transform:uppercase}
    .meta-box .v{font-size:13px;font-weight:900;margin-top:4px}
    .dropzone{border:2px dashed #2a4a68;border-radius:18px;padding:16px;background:rgba(8,18,29,.62);min-height:640px}
    .dropzone.over{border-color:#4ade80;background:rgba(10,28,24,.7)}
    .budget-top{display:grid;grid-template-columns:1.2fr .8fr .8fr .8fr;gap:10px;margin-bottom:12px}
    .budget-items{display:flex;flex-direction:column;gap:10px;max-height:500px;overflow:auto;padding-right:4px}
    .budget-row{border:1px solid #1b3550;background:rgba(8,18,29,.78);border-radius:16px;padding:12px}
    .budget-grid{display:grid;grid-template-columns:1.6fr .55fr .55fr .7fr .8fr .14fr;gap:8px;align-items:end}
    .budget-grid .input,.budget-grid .select{height:40px}
    .budget-total{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
    .tot-box{background:#091321;border:1px solid #132a43;border-radius:14px;padding:10px}
    .tot-box .k{font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase}
    .tot-box .v{font-size:22px;font-weight:900;margin-top:6px}
    .empty{padding:18px;border:1px dashed #26496a;border-radius:16px;color:var(--muted);text-align:center}
    .footer-note{text-align:center;color:#7e97b1;font-size:11px;padding:10px 0 4px}
    .loader-wrap{min-height:76vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .loader-card{width:min(560px,100%);background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:24px;padding:30px;text-align:center;box-shadow:var(--shadow)}
    .spinner{width:56px;height:56px;border:5px solid rgba(255,255,255,.10);border-top-color:var(--green);border-radius:50%;margin:0 auto 18px;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (max-width:1300px){
      .filters,.library-toolbar,.budget-top{grid-template-columns:1fr 1fr}
      .grid-kpi{grid-template-columns:repeat(3,1fr)}
      .grid-2,.grid-2-eq,.grid-3,.builder-grid{grid-template-columns:1fr}
      .userbox{text-align:left}
    }
    @media (max-width:760px){
      .page{padding:12px}
      .title{font-size:26px}
      .filters,.library-toolbar,.budget-top,.grid-kpi,.budget-total{grid-template-columns:1fr}
      .budget-grid{grid-template-columns:1fr 1fr}
      .chart-wrap{height:280px}
      .kpi .val{font-size:24px}
      table{min-width:760px}
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const app = document.getElementById('app');
    const money = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Number(v||0));
    const num = v => new Intl.NumberFormat('pt-BR').format(Number(v||0));
    const pct = v => `${Number(v||0).toFixed(1)}%`;

    const EQUIPAMENTOS_BLOQUEADOS = [
      'EVAPORADORA','CASSETE','SPLIT','HI WALL','PISO TETO','CONDENSADORA','BUILT-IN','BUILT IN','VRF','EXAUSTOR','VENTILADOR','FANCOIL','FAN COIL'
    ];
    const GRUPOS_VALIDOS = ['REDE FRIGORIGENA','DUTO','DIFUSAO','CONTROLE ELETRICO'];

    function getLoggedUser(){
      const keys=['ERPIMPAR_USER','usuarioLogado','impar_user','user','ERP_IMPAR_USER','ERPIMPAR_LOGIN'];
      for(const key of keys){
        try{
          const raw=localStorage.getItem(key)||sessionStorage.getItem(key);
          if(!raw) continue;
          let parsed=raw; try{ parsed=JSON.parse(raw);}catch(e){}
          if(typeof parsed==='string') return parsed.includes('@') ? {nome:parsed.split('@')[0],email:parsed} : {nome:parsed,email:''};
          return {nome:parsed?.Nome||parsed?.nome||parsed?.userNome||parsed?.Usuario||'Usuário',email:parsed?.Email||parsed?.email||parsed?.userEmail||''};
        }catch(e){}
      }
      return {nome:localStorage.getItem('usuarioNome')||sessionStorage.getItem('usuarioNome')||'Usuário',email:localStorage.getItem('usuarioEmail')||sessionStorage.getItem('usuarioEmail')||''};
    }
    function normalizeText(v){return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().trim();}
    function normalizarMaterial(nome){
      return normalizeText(nome)
        .replace(/\bTUBO DE\b/g,'')
        .replace(/\bUNIDADE\b/g,'')
        .replace(/\bPECA\b/g,'')
        .replace(/\bPCS\b/g,'')
        .replace(/\bPC\b/g,'')
        .replace(/\s+/g,' ')
        .trim();
    }
    function isEquipamento(material){
      const m = normalizeText(material);
      return EQUIPAMENTOS_BLOQUEADOS.some(x => m.includes(x));
    }
    function grupoValido(grupo){
      const g = normalizeText(grupo);
      return GRUPOS_VALIDOS.some(x => g.includes(x));
    }
    function parseBR(v){
      if(v===null || v===undefined || v==='') return 0;
      const s = String(v).trim();
      if(!s) return 0;
      if(/^[-]?\d+(\.\d+)?$/.test(s)) return Number(s);
      if(s.includes(',') && s.includes('.')) return Number(s.replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,'')) || 0;
      if(s.includes(',')) return Number(s.replace(',','.').replace(/[^\d.-]/g,'')) || 0;
      return Number(s.replace(/[^\d.-]/g,'')) || 0;
    }
    function inferYear(dateValue){
      const v=String(dateValue||'').trim();
      if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v.slice(0,4);
      if(/^\d{2}\/\d{2}\/\d{4}$/.test(v)) return v.slice(-4);
      const m=v.match(/(19\d{2}|20\d{2})/);
      return m ? m[1] : 'Sem ano';
    }
    function isRecent(dateStr){
      if(!dateStr) return false;
      const raw = String(dateStr).trim();
      let d;
      if(/^\d{4}-\d{2}-\d{2}/.test(raw)) d = new Date(raw.slice(0,10));
      else if(/^\d{2}\/\d{2}\/\d{4}$/.test(raw)){ const [dd,mm,yy]=raw.split('/'); d = new Date(`${yy}-${mm}-${dd}`); }
      else d = new Date(raw);
      if(Number.isNaN(d.getTime())) return false;
      const diff = (Date.now()-d.getTime())/(1000*60*60*24);
      return diff <= 180;
    }
    function pick(obj,names,fallback=''){ for(const n of names){ if(obj[n]!==undefined && obj[n]!==null && obj[n]!== '') return obj[n]; } return fallback; }
    function parseCSVLine(line, delimiter=','){
      const out=[]; let cur=''; let inQuotes=false;
      for(let i=0;i<line.length;i++){
        const ch=line[i], next=line[i+1];
        if(ch==='"'){
          if(inQuotes && next==='"'){ cur+='"'; i++; } else inQuotes=!inQuotes;
        } else if(ch===delimiter && !inQuotes){ out.push(cur); cur=''; }
        else cur+=ch;
      }
      out.push(cur);
      return out.map(v=>String(v||'').trim());
    }
    function parseCSV(text){
      const lines = String(text||'').split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2) return [];
      const firstLine = lines[0].replace(/^\uFEFF/, '');
      const delimiter = (firstLine.split(';').length > firstLine.split(',').length) ? ';' : ',';
      const headers = parseCSVLine(firstLine, delimiter);
      return lines.slice(1).map(line=>{
        const cols = parseCSVLine(line, delimiter);
        const obj = {};
        headers.forEach((h,i)=> obj[h]=cols[i] ?? '');
        return obj;
      });
    }
    function downloadText(filename, content, type='text/plain;charset=utf-8'){ const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename; a.click(); setTimeout(()=>URL.revokeObjectURL(url),2000); }
    function csvEscape(v){ const s=String(v??''); return /[;"\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }
    function wrapLabel(v,size=24){ const s = String(v||''); const parts=[]; let cur=''; s.split(' ').forEach(word=>{ const test=(cur?cur+' ':'')+word; if(test.length>size){ if(cur) parts.push(cur); cur=word; } else cur=test; }); if(cur) parts.push(cur); return parts; }

    const state = {
      obrasRaw: [],
      precosRaw: [],
      obras: [],
      precos: [],
      library: [],
      budget: [],
      charts: {},
      activeTab: 'dashboard'
    };

    function renderLoading(){
      app.innerHTML = `<div class="loader-wrap"><div class="loader-card"><div class="spinner"></div><div style="font-size:24px;font-weight:900">PROCESSANDO DADOS...</div><div class="sub" style="margin-top:8px">Carregando dashboard executivo e montador de orçamento.</div></div></div>`;
    }
    function renderError(msg){
      app.innerHTML = `<div class="loader-wrap"><div class="loader-card" style="text-align:left"><div style="font-size:26px;font-weight:900;color:#fda4af">Erro ao abrir o sistema</div><div class="sub" style="margin-top:12px;color:#e9eef8">${msg}</div><div class="sub" style="margin-top:16px">Estrutura esperada:<br><b>/dashprocessamentos/index.html</b><br><b>/dashprocessamentos/data/consolidado_obras.csv</b><br><b>/dashprocessamentos/data/consolidado_precos.csv</b></div></div></div>`;
    }

    async function loadData(){
      renderLoading();
      try{
        const [obrasResp, precosResp] = await Promise.all([
          fetch('./data/consolidado_obras.csv?ts=' + Date.now(), {cache:'no-store'}),
          fetch('./data/consolidado_precos.csv?ts=' + Date.now(), {cache:'no-store'})
        ]);
        if(!obrasResp.ok) throw new Error('Não encontrei ./data/consolidado_obras.csv');
        if(!precosResp.ok) throw new Error('Não encontrei ./data/consolidado_precos.csv');
        state.obrasRaw = parseCSV(await obrasResp.text());
        state.precosRaw = parseCSV(await precosResp.text());
        state.obras = normalizeObras(state.obrasRaw);
        state.precos = normalizePrecos(state.precosRaw);
        state.library = buildLibrary(state.obras, state.precos);
        renderApp();
        applyDashboard();
        applyBuilder();
      }catch(err){ renderError(err.message || 'Erro ao carregar bases.'); }
    }

    function normalizeObras(rows){
      return rows.map(r=>{
        const materialOriginal = pick(r,['material','MATERIAL','Material'],'');
        const grupo = pick(r,['grupo','GRUPO','Grupo'],'');
        const obra = pick(r,['obra','OBRA','Obra'],'SEM OBRA');
        const quantidade = parseBR(pick(r,['quantidade','QUANTIDADE','Quantidade'],0));
        const valorUnit = parseBR(pick(r,['valor_unitario','VALOR UNITARIO','VALOR_UNITARIO','preco','PRECO','PREÇO','valor unitario','valor unitário'],0));
        const valorTotalRaw = parseBR(pick(r,['valor','VALOR','TOTAL','total','valor_total','VALOR_TOTAL'],0));
        const data = pick(r,['data','DATA','Data'],'');
        const material = normalizarMaterial(materialOriginal);
        const valorTotal = valorTotalRaw || (quantidade * valorUnit);
        const valido = material && quantidade>0 && valorUnit>0 && !isEquipamento(materialOriginal) && (!grupo || grupoValido(grupo));
        return { obra, grupo, materialOriginal, material, quantidade, valorUnit, valorTotal, data, ano: inferYear(data), valido };
      }).filter(r=>r.valido);
    }
    function normalizePrecos(rows){
      return rows.map(r=>{
        const materialOriginal = pick(r,['material','MATERIAL','Material'],'');
        const material = normalizarMaterial(materialOriginal);
        const menor = parseBR(pick(r,['menor_preco','MENOR_PRECO'],0));
        const maior = parseBR(pick(r,['maior_preco','MAIOR_PRECO'],0));
        const ultimo = parseBR(pick(r,['ultimo_preco','ULTIMO_PRECO','preco','PRECO','PREÇO'],0));
        const media = parseBR(pick(r,['preco_medio','PRECO_MEDIO','PREÇO_MEDIO'],0));
        const qtd = parseBR(pick(r,['quantidade_total','QUANTIDADE_TOTAL','quantidade','QUANTIDADE'],0));
        const data = pick(r,['ultimo_data','ULTIMO_DATA','data','DATA'],'');
        const obra = pick(r,['ultimo_obra','ULTIMO_OBRA','obra','OBRA'],'');
        return { materialOriginal, material, menor, maior, ultimo, media, qtd, data, obra, recente: isRecent(data), valido: !!material && !isEquipamento(materialOriginal) };
      }).filter(r=>r.valido);
    }
    function buildLibrary(obras, precos){
      const priceMap = {};
      precos.forEach(p=>{ if(!priceMap[p.material]) priceMap[p.material]=p; });
      const usageMap = {};
      obras.forEach(r=>{
        if(!usageMap[r.material]) usageMap[r.material]={material:r.material, grupo:r.grupo, usos:0, obras:new Set(), valorTotal:0, qtdTotal:0};
        usageMap[r.material].usos += 1;
        usageMap[r.material].obras.add(r.obra);
        usageMap[r.material].valorTotal += r.valorTotal;
        usageMap[r.material].qtdTotal += r.quantidade;
        if(!usageMap[r.material].grupo && r.grupo) usageMap[r.material].grupo = r.grupo;
      });
      return Object.values(usageMap).map(x=>{
        const price = priceMap[x.material] || {};
        const media = price.media || (x.qtdTotal ? x.valorTotal/x.qtdTotal : 0);
        const ultimo = price.ultimo || media;
        const variacao = media ? ((ultimo-media)/media)*100 : 0;
        return {
          material:x.material,
          grupo:x.grupo || 'SEM GRUPO',
          usos:x.usos,
          obras:x.obras.size,
          valorTotal:x.valorTotal,
          qtdTotal:x.qtdTotal,
          precoMedio:media,
          ultimoPreco:ultimo,
          ultimoData:price.data || '',
          ultimaObra:price.obra || '',
          variacao,
          recente: !!price.recente,
          confiavel: (price.qtd || x.usos || 0) >= 2,
          amostras: price.qtd || x.usos || 0
        };
      }).sort((a,b)=>b.valorTotal-a.valorTotal);
    }

    function renderApp(){
      const user = getLoggedUser();
      const anos = [...new Set(state.obras.map(x=>x.ano).filter(Boolean))].sort();
      app.innerHTML = `
      <div class="page">
        <section class="hero">
          <div class="hero-top">
            <div>
              <div class="eyebrow">ERP ÍMPAR</div>
              <div class="title">Inteligência de Custos + Montador de Orçamento</div>
              <div class="sub">Agora em uma versão maior e fechada: dashboard executivo, biblioteca normalizada de materiais, drag and drop / adicionar, orçamento automático e exportação de planilha.</div>
            </div>
            <div class="userbox">
              <div class="name">${user.nome || 'Usuário'}</div>
              <div class="email">${user.email || 'Sem e-mail'}</div>

      document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>setTab(btn.dataset.tab)));

    function setTab(tab){
      state.activeTab = tab;
      document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active', x.dataset.tab===tab));
      document.getElementById('panel-dashboard').classList.toggle('active', tab==='dashboard');
      document.getElementById('panel-builder').classList.toggle('active', tab==='builder');
    }
    function fillObrasFiltro(){
      const ano = document.getElementById('fAno').value;
      const grupo = document.getElementById('fGrupo').value;
      const list = state.obras.filter(r => (ano==='TODOS'||r.ano===ano) && matchesGrupo(r.grupo,grupo));
      const obras = ['TODAS', ...[...new Set(list.map(x=>x.obra))].sort((a,b)=>String(a).localeCompare(String(b),'pt-BR'))];
      document.getElementById('fObra').innerHTML = obras.map(o=>`<option value="${o}">${o}</option>`).join('');
    }
    function matchesGrupo(grupo, filtro){
      if(filtro==='TODOS') return true;
      const g = normalizeText(grupo);
      if(filtro==='REDE') return g.includes('REDE');
      if(filtro==='DUTO') return g.includes('DUTO') || g.includes('DIFUSAO');
      if(filtro==='CONTROLE') return g.includes('CONTROLE');
      return true;
    }

    function filteredDashboardRows(){
      const q = normalizeText(document.getElementById('fQuery').value);
      const ano = document.getElementById('fAno').value;
      const obra = document.getElementById('fObra').value;
      const grupo = document.getElementById('fGrupo').value;
      return state.obras.filter(r=>{
        const okAno = ano==='TODOS' || r.ano===ano;
        const okObra = obra==='TODAS' || r.obra===obra;
        const okGrupo = matchesGrupo(r.grupo,grupo);
        const okQ = !q || r.material.includes(q) || normalizeText(r.obra).includes(q);
        return okAno && okObra && okGrupo && okQ;
      });
    }
    function filteredPriceRows(){
      const q = normalizeText(document.getElementById('fQuery').value);
      return state.precos.filter(r => !q || r.material.includes(q) || normalizeText(r.obra).includes(q));
    }
    function applyDashboard(){
      const rows = filteredDashboardRows();
      const precos = filteredPriceRows();
      const topN = Number(document.getElementById('fTop').value || 20);
      document.getElementById('badgeTop').textContent = `TOP ${topN}`;
      const total = rows.reduce((s,r)=>s+r.valorTotal,0);
      const obrasUn = new Set(rows.map(r=>r.obra)).size;
      const matsUn = new Set(rows.map(r=>r.material)).size;
      const ticket = obrasUn ? total / obrasUn : 0;
      const lastDate = precos.map(p=>p.data).filter(Boolean).sort().slice(-1)[0] || '-';
      document.getElementById('kpiTotal').textContent = money(total);
      document.getElementById('kpiObras').textContent = num(obrasUn);
      document.getElementById('kpiMateriais').textContent = num(matsUn);
      document.getElementById('kpiTicket').textContent = money(ticket);
      document.getElementById('kpiData').textContent = lastDate;

      const byYear = aggregateYear(rows);
      const topObras = aggregateObras(rows).slice(0,10);
      const topMats = aggregateMaterials(rows).slice(0,topN);
      const cross = aggregateCross(rows).slice(0,20);
      const priceTop = aggregatePriceTable(precos).slice(0,20);
      const alerts = aggregateAlerts(topMats, priceTop, total).slice(0,10);
      const busca = aggregateSearch(precos, normalizeText(document.getElementById('fQuery').value)).slice(0,20);

      document.getElementById('listaMateriais').innerHTML = topMats.map((m,i)=>`
        <div class="item"><div class="item-top"><div><div class="rank">#${i+1}</div><div class="it-title">${m.material}</div><div class="it-sub">${num(m.qtd)} lançamentos • ${num(m.obras)} obras • grupo: ${m.grupo || '-'}</div></div><div><div class="it-val">${money(m.valor)}</div><div class="it-pct">${pct(m.percentual)}</div></div></div><div class="bar-track"><div class="bar-fill" style="width:${Math.min(m.percentual,100)}%"></div></div></div>`).join('') || `<div class="empty">Sem dados no filtro atual.</div>`;
      document.getElementById('listaAlertas').innerHTML = alerts.map((a,i)=>`
        <div class="alert"><div class="tag">ALERTA ${i+1}</div><div class="a-title">${a.material}</div><div class="a-line">Impacto no recorte: <b>${pct(a.impacto)}</b></div><div class="a-line">Preço médio: <b>${money(a.media)}</b> • Último preço: <b>${money(a.ultimo)}</b></div><div class="a-line">Última data: <b>${a.data || '-'}</b> • Variação: <b class="${a.variacao>0?'warn':'good'}">${pct(a.variacao)}</b></div></div>`).join('') || `<div class="empty">Nenhum alerta relevante no recorte atual.</div>`;
      document.getElementById('tbObras').innerHTML = topObras.map(o=>`<tr><td>${o.obra}</td><td class="right">${money(o.valor)}</td><td class="right">${pct(o.percentual)}</td><td class="right">${num(o.materiais)}</td><td class="right">${num(o.itens)}</td></tr>`).join('') || `<tr><td colspan="5">Sem dados</td></tr>`;
      document.getElementById('tbCross').innerHTML = cross.map(x=>`<tr><td>${x.material}</td><td>${x.obra}</td><td class="right">${num(x.qtd)}</td><td class="right">${money(x.valor)}</td></tr>`).join('') || `<tr><td colspan="4">Sem dados</td></tr>`;
      document.getElementById('tbPrecos').innerHTML = priceTop.map(x=>`<tr><td>${x.material}</td><td class="right">${money(x.media)}</td><td class="right">${money(x.ultimo)}</td><td class="right">${x.data || '-'}</td><td class="right">${num(x.qtd)}</td></tr>`).join('') || `<tr><td colspan="5">Sem dados</td></tr>`;
      document.getElementById('tbBusca').innerHTML = busca.map(x=>`<tr><td>${x.material}</td><td class="right">${money(x.media)}</td><td class="right">${money(x.ultimo)}</td><td class="right">${x.data || '-'}</td><td>${x.obra || '-'}</td><td class="right">${num(x.qtd)}</td></tr>`).join('') || `<tr><td colspan="6">Digite um material na busca acima.</td></tr>`;

      drawBar('chartAno', byYear.map(x=>x.ano), byYear.map(x=>x.valor), '#22c55e', false, 'Valor');
      drawBar('chartObras', topObras.map(x=>wrapLabel(x.obra,24)), topObras.map(x=>x.valor), '#38bdf8', true, 'Valor');
      drawLine('chartLinha', byYear.map(x=>x.ano), byYear.map(x=>x.valor), '#8b5cf6');
    }
    function aggregateYear(rows){ const map={}; rows.forEach(r=>{ if(!map[r.ano]) map[r.ano]={ano:r.ano,valor:0}; map[r.ano].valor+=r.valorTotal; }); return Object.values(map).sort((a,b)=>String(a.ano).localeCompare(String(b.ano))); }
    function aggregateObras(rows){ const map={}; rows.forEach(r=>{ if(!map[r.obra]) map[r.obra]={obra:r.obra,valor:0,materiais:new Set(),itens:0}; map[r.obra].valor+=r.valorTotal; map[r.obra].materiais.add(r.material); map[r.obra].itens+=1; }); const total=Object.values(map).reduce((s,x)=>s+x.valor,0); return Object.values(map).sort((a,b)=>b.valor-a.valor).map(x=>({...x,materiais:x.materiais.size,percentual: total ? (x.valor/total)*100 : 0})); }
    function aggregateMaterials(rows){ const map={}; rows.forEach(r=>{ if(!map[r.material]) map[r.material]={material:r.material,grupo:r.grupo,valor:0,qtd:0,obras:new Set()}; map[r.material].valor+=r.valorTotal; map[r.material].qtd+=1; map[r.material].obras.add(r.obra); }); const total=Object.values(map).reduce((s,x)=>s+x.valor,0); return Object.values(map).sort((a,b)=>b.valor-a.valor).map(x=>({...x,obras:x.obras.size,percentual: total ? (x.valor/total)*100 : 0})); }
    function aggregateCross(rows){ const map={}; rows.forEach(r=>{ const k=`${r.material}__${r.obra}`; if(!map[k]) map[k]={material:r.material,obra:r.obra,qtd:0,valor:0}; map[k].qtd+=r.quantidade; map[k].valor+=r.valorTotal; }); return Object.values(map).sort((a,b)=>b.valor-a.valor); }
    function aggregatePriceTable(precos){ return precos.map(p=>({material:p.material,media:p.media||0,ultimo:p.ultimo||0,data:p.data||'',obra:p.obra||'',qtd:p.qtd||0})).sort((a,b)=>b.media-a.media); }
    function aggregateAlerts(topMats, priceTop, total){ const pm={}; priceTop.forEach(p=>pm[p.material]=p); return topMats.map(m=>{ const p=pm[m.material]||{}; const media=p.media||0, ultimo=p.ultimo||0; const variacao=media?((ultimo-media)/media)*100:0; return {material:m.material,impacto: total ? (m.valor/total)*100 : 0,media,ultimo,data:p.data||'',variacao}; }).filter(x=>x.impacto>=3 || Math.abs(x.variacao)>=15).sort((a,b)=>(Math.abs(b.variacao)+b.impacto)-(Math.abs(a.variacao)+a.impacto)); }
    function aggregateSearch(precos, query){ if(!query) return []; return precos.filter(p=>p.material.includes(query)).sort((a,b)=>(b.qtd||0)-(a.qtd||0)).map(x=>({material:x.material,media:x.media,ultimo:x.ultimo,data:x.data,obra:x.obra,qtd:x.qtd})); }

    function destroyChart(id){ if(state.charts[id]) state.charts[id].destroy(); }
    function baseChartOptions(horizontal=false){ return { responsive:true, maintainAspectRatio:false, indexAxis: horizontal ? 'y' : 'x', scales:{ x:{ticks:{color:'#cfe0f2', callback:(v)=>horizontal?v:`R$ ${Math.round(v/1000)}k`},grid:{color:'rgba(159,179,200,.10)'}}, y:{ticks:{color:'#cfe0f2'},grid:{display:false}} }, plugins:{ legend:{display:false}, tooltip:{callbacks:{label:(ctx)=>`${ctx.dataset.label||'Valor'}: ${money(ctx.raw)}`}} } }; }
    function drawBar(id, labels, values, color, horizontal, label){ destroyChart(id); state.charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels,datasets:[{label:label||'Valor',data:values,backgroundColor:color,borderRadius:8}]},options:baseChartOptions(horizontal)}); }
    function drawLine(id, labels, values, color){ destroyChart(id); state.charts[id]=new Chart(document.getElementById(id),{type:'line',data:{labels,datasets:[{label:'Valor',data:values,borderColor:color,backgroundColor:'rgba(139,92,246,.14)',fill:true,tension:.35,pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>`Valor: ${money(ctx.raw)}`}}},scales:{x:{ticks:{color:'#cfe0f2'},grid:{display:false}},y:{ticks:{color:'#cfe0f2',callback:(v)=>`R$ ${Math.round(v/1000)}k`},grid:{color:'rgba(159,179,200,.10)'}}}}); }

    function builderFilteredLibrary(){
      const q = normalizeText(document.getElementById('bQuery').value);
      const g = document.getElementById('bGrupo').value;
      return state.library.filter(item=>{
        const okQ = !q || item.material.includes(q);
        const okG = g==='TODOS' || matchesGrupo(item.grupo, g);
        return okQ && okG;
      });
    }
    function applyBuilder(){
      const list = builderFilteredLibrary();
      document.getElementById('libCount').textContent = `${num(list.length)} itens`;
      const html = list.map((item, idx)=>`
        <div class="material-card" draggable="true" data-index="${state.library.indexOf(item)}">
          <div class="material-name">${item.material}</div>
          <div class="tiny" style="margin-top:4px">Grupo: ${item.grupo || '-'} • Obras: ${num(item.obras)} • Usos: ${num(item.usos)}</div>
          <div class="material-meta">
            <div class="meta-box"><div class="k">Preço médio</div><div class="v">${money(item.precoMedio)}</div></div>
            <div class="meta-box"><div class="k">Último preço</div><div class="v">${money(item.ultimoPreco)}</div></div>
            <div class="meta-box"><div class="k">Última data</div><div class="v">${item.ultimoData || '-'}</div></div>
            <div class="meta-box"><div class="k">Confiabilidade</div><div class="v ${item.confiavel?'good':'warn'}">${item.confiavel?'Boa':'Baixa'}</div></div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:10px">
            <div class="tiny">Amostras: ${num(item.amostras)} • Variação: <span class="${item.variacao>0?'warn':'good'}">${pct(item.variacao)}</span></div>
            <button class="btn" type="button" data-add="${state.library.indexOf(item)}" style="height:36px;padding:0 12px">Adicionar</button>
          </div>
        </div>`).join('') || `<div class="empty">Nenhum material encontrado.</div>`;
      document.getElementById('libraryList').innerHTML = html;
      document.querySelectorAll('.material-card').forEach(el=> el.addEventListener('dragstart', ev => ev.dataTransfer.setData('text/plain', el.dataset.index)));
      document.querySelectorAll('[data-add]').forEach(btn=> btn.addEventListener('click',()=> addBudgetItem(Number(btn.dataset.add))));
      renderBudget();
    }
    function setupDropzone(){
      const dz = document.getElementById('dropzone');
      dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('over'); });
      dz.addEventListener('dragleave', ()=> dz.classList.remove('over'));
      dz.addEventListener('drop', e=>{ e.preventDefault(); dz.classList.remove('over'); const idx=Number(e.dataTransfer.getData('text/plain')); addBudgetItem(idx); });
    }
    function addBudgetItem(index){
      const base = state.library[index];
      if(!base) return;
      const precoBase = document.getElementById('bPrecoBase').value;
      const valor = precoBase==='ultimo' ? (base.ultimoPreco || base.precoMedio || 0) : (base.precoMedio || base.ultimoPreco || 0);
      state.budget.push({
        id: Date.now()+Math.random(),
        grupo: base.grupo || '',
        material: base.material,
        quantidade: 1,
        unidade: 'UN',
        valorUnitario: valor,
        ultimoPreco: base.ultimoPreco || 0,
        precoMedio: base.precoMedio || 0,
        ultimaData: base.ultimoData || '',
        observacao: base.confiavel ? '' : 'Validar preço manualmente'
      });
      renderBudget();
    }
    function renderBudget(){
      const wrap = document.getElementById('budgetItems');
      const empty = document.getElementById('budgetEmpty');
      if(!wrap) return;
      wrap.innerHTML = state.budget.map(item=>`
        <div class="budget-row" data-id="${item.id}">
          <div class="budget-grid">
            <div><div class="tiny">Material</div><input class="input bi-material" value="${item.material}" /></div>
            <div><div class="tiny">Qtd</div><input type="number" step="0.01" class="input bi-qtd" value="${item.quantidade}" /></div>
            <div><div class="tiny">Unid.</div><input class="input bi-un" value="${item.unidade}" /></div>
            <div><div class="tiny">Valor unit.</div><input type="number" step="0.01" class="input bi-vu" value="${item.valorUnitario}" /></div>
            <div><div class="tiny">Subtotal</div><div style="height:40px;display:flex;align-items:center;font-weight:900">${money(item.quantidade*item.valorUnitario)}</div><div class="tiny">Médio: ${money(item.precoMedio)} • Último: ${money(item.ultimoPreco)} • Data: ${item.ultimaData || '-'}</div></div>
            <div><button class="btn red bi-del" style="height:40px;padding:0">X</button></div>
          </div>
        </div>`).join('');
      empty.style.display = state.budget.length ? 'none' : 'block';
      wrap.querySelectorAll('.budget-row').forEach(row=>{
        const id = Number(row.dataset.id);
        const item = state.budget.find(x=>x.id===id);
        row.querySelector('.bi-material').addEventListener('input',e=>{ item.material=e.target.value; });
        row.querySelector('.bi-qtd').addEventListener('input',e=>{ item.quantidade=parseBR(e.target.value)||0; renderBudget(); });
        row.querySelector('.bi-un').addEventListener('input',e=>{ item.unidade=e.target.value; });
        row.querySelector('.bi-vu').addEventListener('input',e=>{ item.valorUnitario=parseBR(e.target.value)||0; renderBudget(); });
        row.querySelector('.bi-del').addEventListener('click',()=>{ state.budget = state.budget.filter(x=>x.id!==id); renderBudget(); });
      });
      const total = state.budget.reduce((s,x)=>s+(x.quantidade*x.valorUnitario),0);
      const lastDate = state.budget.map(x=>x.ultimaData).filter(Boolean).sort().slice(-1)[0] || '-';
      document.getElementById('totItens').textContent = num(state.budget.reduce((s,x)=>s+x.quantidade,0));
      document.getElementById('totUnicos').textContent = num(state.budget.length);
      document.getElementById('totValor').textContent = money(total);
      document.getElementById('totData').textContent = lastDate;
    }
    function exportLibrary(){
      const rows = builderFilteredLibrary();
      const headers = ['grupo','material','preco_medio','ultimo_preco','ultima_data','ultima_obra','variacao','amostras','confiavel'];
      const body = rows.map(r=>[r.grupo,r.material,r.precoMedio,r.ultimoPreco,r.ultimoData,r.ultimaObra,r.variacao,r.amostras,r.confiavel?'SIM':'NAO'].map(csvEscape).join(';')).join('\n');
      downloadText('biblioteca_materiais.csv', headers.join(';')+'\n'+body, 'text/csv;charset=utf-8');
    }
    function exportBudgetCSV(){
      const headers = ['obra','cliente','data_orcamento','grupo','material','quantidade','unidade','valor_unitario','subtotal','preco_medio','ultimo_preco','ultima_data','observacao'];
      const obra = document.getElementById('budgetObra').value || '';
      const cliente = document.getElementById('budgetCliente').value || '';
      const data = document.getElementById('budgetData').value || '';
      const body = state.budget.map(r=>[
        obra,cliente,data,r.grupo,r.material,r.quantidade,r.unidade,r.valorUnitario,(r.quantidade*r.valorUnitario),r.precoMedio,r.ultimoPreco,r.ultimaData,r.observacao
      ].map(csvEscape).join(';')).join('\n');
      downloadText('orcamento_automatico.csv', headers.join(';')+'\n'+body, 'text/csv;charset=utf-8');
    }
    function renderSuggestions(){
      const insights = [];
      state.budget.forEach(r=>{
        if(!r.ultimaData) insights.push(`• ${r.material}: sem data do último preço.`);
        if(r.precoMedio && r.valorUnitario > r.precoMedio*1.15) insights.push(`• ${r.material}: valor adotado acima de 15% da média histórica.`);
        if(r.precoMedio && r.valorUnitario < r.precoMedio*0.85) insights.push(`• ${r.material}: valor adotado abaixo de 15% da média histórica.`);
        if(r.ultimaData && !isRecent(r.ultimaData)) insights.push(`• ${r.material}: última referência antiga (${r.ultimaData}).`);
      });
      const html = insights.length ? `<div class="card"><div class="card-head"><div class="card-title">Sugestões automáticas</div></div><div class="card-body"><div class="sub">${insights.join('<br>')}</div></div></div>` : `<div class="card"><div class="card-head"><div class="card-title">Sugestões automáticas</div></div><div class="card-body"><div class="sub">Sem alertas relevantes no orçamento atual.</div></div></div>`;
      document.getElementById('builderInsights').innerHTML = html;
    }

    loadData();
  </script>
</body>
</html>
