<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Consulta de Preços</title>

<style>
body{
  margin:0;
  font-family:Candara;
  background:linear-gradient(135deg,#020617,#0b1e4a,#0f766e);
  color:#fff;
}

.header{
  padding:15px;
  background:rgba(0,0,0,.3);
  display:flex;
  justify-content:space-between;
}

.container{
  padding:20px;
}

.card{
  background:rgba(2,6,23,.7);
  padding:15px;
  border-radius:15px;
  margin-bottom:20px;
}

select,button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#22c55e;
  color:#fff;
  font-weight:bold;
}

.console{
  background:black;
  height:200px;
  overflow:auto;
  padding:10px;
  font-family:monospace;
}

table{
  width:100%;
  margin-top:10px;
}

td,th{
  padding:8px;
}
</style>

</head>

<body>

<div class="header">
<div>ERP ÍMPAR</div>
<div>George</div>
</div>

<div class="container">

<div class="card">
<select id="material">
<option value="elastomerico">Elastomérico</option>
<option value="cobre">Cobre</option>
<option value="aco">Chapa</option>
</select>

<button onclick="buscar()">Buscar</button>

<div class="console" id="console"></div>
</div>

<div class="card">
<button onclick="baixar()">Baixar Excel</button>

<table>
<thead>
<tr>
<th>Fornecedor</th>
<th>Origem</th>
<th>Brasil</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

<script>
function log(msg){
  let c = document.getElementById("console");
  c.innerHTML += msg + "<br>";
  c.scrollTop = c.scrollHeight;
}

function buscar(){
  document.getElementById("console").innerHTML="";
  document.getElementById("tabela").innerHTML="";

  fetch("http://localhost:8765/buscar",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      material:document.getElementById("material").value
    })
  })
  .then(r=>r.json())
  .then(data=>{
    data.logs.forEach(l=>log(l));

    data.dados.forEach(d=>{
      document.getElementById("tabela").innerHTML += `
      <tr>
        <td>${d.fornecedor}</td>
        <td>R$ ${d.origem}</td>
        <td>R$ ${d.brasil}</td>
      </tr>`;
    });
  });
}

function baixar(){
  window.open("http://localhost:8765/baixar");
}
</script>

</body>
</html>
