<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ERP ÍMPAR — CEO Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Candara,sans-serif;
    background:#020617;
    color:#fff;
}

.container{padding:20px;}

h1{margin-bottom:20px;}

.cards{
    display:grid;
    grid-template-columns: repeat(5,1fr);
    gap:15px;
}

.card{
    background:#0f172a;
    padding:15px;
    border-radius:12px;
}

.card h2{margin:0;color:#22c55e;}

.alert{
    background:#7f1d1d;
    padding:15px;
    border-radius:12px;
    margin-top:20px;
}

.ok{
    background:#064e3b;
}

.insights{
    margin-top:20px;
}

.insight{
    padding:10px;
    margin-bottom:10px;
    background:#020617;
    border-left:4px solid #22c55e;
}

</style>
</head>

<body>

<div class="container">

<h1>🚀 ERP ÍMPAR — CEO Intelligence</h1>

<div class="cards">
    <div class="card"><h2 id="k1">0</h2><span>Atividades</span></div>
    <div class="card"><h2 id="k2">0</h2><span>Obras</span></div>
    <div class="card"><h2 id="k3">0</h2><span>Pessoas</span></div>
    <div class="card"><h2 id="k4">0</h2><span>Média</span></div>
    <div class="card"><h2 id="k5">0%</h2><span>Concentração Top Obra</span></div>
</div>

<div id="alertBox" class="alert"></div>

<div class="insights" id="insights"></div>

</div>

<script>

const API="https://api.erpimpar.com.br/atividades/dashboard_data.php";

async function load(){

const res=await fetch(API);
const json=await res.json();
const dados=json.dados;

let obras={}, pessoas={}, datas={};

dados.forEach(d=>{
    let obra=d.obra||"N/A";
    let pessoa=d.nome||"N/A";
    let data=d.data||d._arquivo.substring(0,10);

    obras[obra]=(obras[obra]||0)+1;
    pessoas[pessoa]=(pessoas[pessoa]||0)+1;
    datas[data]=(datas[data]||0)+1;
});

k1.innerText=dados.length;
k2.innerText=Object.keys(obras).length;
k3.innerText=Object.keys(pessoas).length;
k4.innerText=Math.round(dados.length/Object.keys(datas).length);

// TOP OBRA
let topObra=Object.entries(obras).sort((a,b)=>b[1]-a[1])[0];
let concentracao=Math.round((topObra[1]/dados.length)*100);
k5.innerText=concentracao+"%";

// ALERTA INTELIGENTE
let alertBox=document.getElementById("alertBox");

if(concentracao>50){
    alertBox.innerHTML="🔥 ALERTA: Alta concentração em uma única obra ("+topObra[0]+")";
}else{
    alertBox.className="alert ok";
    alertBox.innerHTML="✅ Operação balanceada";
}

// TOP PESSOA
let topPessoa=Object.entries(pessoas).sort((a,b)=>b[1]-a[1])[0];

// TENDÊNCIA (últimos 2 dias)
let dias=Object.entries(datas).sort();
let tendencia="estável";

if(dias.length>=2){
    let ult=dias[dias.length-1][1];
    let pen=dias[dias.length-2][1];

    if(ult>pen) tendencia="📈 Crescendo";
    if(ult<pen) tendencia="📉 Caindo";
}

// INSIGHTS
let insights=[
`📊 Obra dominante: ${topObra[0]} (${topObra[1]})`,
`👤 Colaborador crítico: ${topPessoa[0]} (${topPessoa[1]})`,
`📡 Tendência operacional: ${tendencia}`,
`⚖️ Nível de concentração: ${concentracao}%`
];

let div=document.getElementById("insights");

insights.forEach(i=>{
    let el=document.createElement("div");
    el.className="insight";
    el.innerHTML=i;
    div.appendChild(el);
});

}

load();

</script>

</body>
</html>
