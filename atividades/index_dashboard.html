<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ERP ÍMPAR — Gestão Inteligente</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Candara;
    background: linear-gradient(135deg,#020617,#0b1e4a);
    color:#fff;
}

/* HEADER */
.header{
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title{
    font-size:22px;
    font-weight:bold;
}

.clock{
    opacity:0.7;
}

/* KPIs */
.cards{
    display:grid;
    grid-template-columns: repeat(5,1fr);
    gap:15px;
    padding:0 20px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:14px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.kpi{
    font-size:28px;
    color:#22c55e;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    padding:20px;
}

.box{
    background:rgba(255,255,255,0.05);
    border-radius:14px;
    padding:15px;
}

/* RANKING */
.ranking{
    max-height:300px;
    overflow:auto;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

/* INSIGHTS */
.insights{
    padding:20px;
}

.insight{
    background:rgba(255,255,255,0.05);
    padding:12px;
    margin-bottom:10px;
    border-left:4px solid #22c55e;
}

/* ALERT */
.alert{
    margin:20px;
    padding:15px;
    border-radius:10px;
    background:#7f1d1d;
}

.ok{
    background:#064e3b;
}
</style>
</head>

<body>

<div class="header">
    <div class="title">🚀 ERP ÍMPAR — Gestão Inteligente</div>
    <div class="clock" id="clock"></div>
</div>

<div class="cards">
    <div class="card"><div class="kpi" id="k1">0</div>Total Alocações</div>
    <div class="card"><div class="kpi" id="k2">0</div>Total Horas</div>
    <div class="card"><div class="kpi" id="k3">0</div>Pessoas</div>
    <div class="card"><div class="kpi" id="k4">0</div>Obras</div>
    <div class="card"><div class="kpi" id="k5">0%</div>Concentração</div>
</div>

<div id="alertBox" class="alert"></div>

<div class="grid">
    <div class="box">
        <canvas id="chartDias"></canvas>
    </div>

    <div class="box">
        <div class="ranking" id="ranking"></div>
    </div>
</div>

<div class="insights" id="insights"></div>

<script>

const API = "https://api.erpimpar.com.br/atividades/events/consolidado_atividades.json";

function clock(){
    document.getElementById("clock").innerText = new Date().toLocaleString();
}
setInterval(clock,1000);

async function load(){

const res = await fetch(API);
const json = await res.json();
const dados = json.alocacoes;

let pessoas={}, obras={}, dias={};

dados.forEach(d=>{

    let p = d.pessoa;
    let o = d.obra;
    let h = d.horas;
    let dia = d.data;

    if(!pessoas[p]){
        pessoas[p]={horas:0,count:0};
    }

    pessoas[p].horas+=h;
    pessoas[p].count++;

    obras[o]=(obras[o]||0)+h;
    dias[dia]=(dias[dia]||0)+h;

});

// KPIs
k1.innerText = dados.length;
k2.innerText = Object.values(pessoas).reduce((a,b)=>a+b.horas,0);
k3.innerText = Object.keys(pessoas).length;
k4.innerText = Object.keys(obras).length;

// CONCENTRAÇÃO
let topObra = Object.entries(obras).sort((a,b)=>b[1]-a[1])[0];
let concentracao = Math.round((topObra[1]/k2.innerText)*100);
k5.innerText = concentracao+"%";

// ALERTA
let alertBox = document.getElementById("alertBox");

if(concentracao>50){
    alertBox.innerHTML = "🔥 ALERTA: concentração alta em "+topObra[0];
}else{
    alertBox.className="alert ok";
    alertBox.innerHTML="✅ Operação equilibrada";
}

// GRÁFICO
new Chart(chartDias,{
    type:'line',
    data:{
        labels:Object.keys(dias),
        datasets:[{
            data:Object.values(dias)
        }]
    }
});

// RANKING
let rankingArr = Object.entries(pessoas)
    .map(([nome,val])=>({nome,...val}))
    .sort((a,b)=>b.horas-a.horas)
    .slice(0,10);

rankingArr.forEach(r=>{
    let div=document.createElement("div");
    div.className="item";
    div.innerHTML = `<span>${r.nome}</span><span>${r.horas}h</span>`;
    ranking.appendChild(div);
});

// INSIGHTS
let topPessoa = rankingArr[0];
let diasArr = Object.entries(dias).sort((a,b)=>b[1]-a[1]);
let topDia = diasArr[0];

let insights = [
`👤 Mais demandado: ${topPessoa.nome} (${topPessoa.horas}h)`,
`🏗 Obra dominante: ${topObra[0]}`,
`📅 Pico operacional: ${topDia[0]}`,
`⚖️ Concentração: ${concentracao}%`
];

insights.forEach(i=>{
    let div=document.createElement("div");
    div.className="insight";
    div.innerHTML=i;
    insightsBox.appendChild(div);
});

}

load();

</script>

</body>
</html>
