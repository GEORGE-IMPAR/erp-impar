<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ERP ÍMPAR — BI Operacional</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Candara;
    background:#020617;
    color:#fff;
}

.container{padding:20px;}

h1{margin-bottom:20px;}

.cards{
    display:grid;
    grid-template-columns: repeat(5,1fr);
    gap:12px;
}

.card{
    background:#0f172a;
    padding:15px;
    border-radius:10px;
}

.card h2{
    margin:0;
    color:#22c55e;
}

.grid{
    display:grid;
    grid-template-columns: 2fr 1fr;
    gap:20px;
    margin-top:20px;
}

.chart{
    background:#0f172a;
    padding:15px;
    border-radius:10px;
}

.table{
    margin-top:20px;
    background:#0f172a;
    border-radius:10px;
}

table{width:100%;border-collapse:collapse;}

th,td{padding:10px;}

tr:nth-child(even){background:#020617;}
</style>
</head>

<body>

<div class="container">

<h1>🚀 ERP ÍMPAR — BI Operacional</h1>

<div class="cards">
    <div class="card"><h2 id="k1">0</h2><span>Alocações</span></div>
    <div class="card"><h2 id="k2">0</h2><span>Horas</span></div>
    <div class="card"><h2 id="k3">0</h2><span>Pessoas</span></div>
    <div class="card"><h2 id="k4">0</h2><span>Obras</span></div>
    <div class="card"><h2 id="k5">0</h2><span>Média/Dia</span></div>
</div>

<div class="grid">
    <div class="chart"><canvas id="chartDias"></canvas></div>
    <div class="chart"><canvas id="chartObras"></canvas></div>
</div>

<div class="table">
    <table>
        <thead>
            <tr>
                <th>Pessoa</th>
                <th>Horas</th>
                <th>Alocações</th>
                <th>Obras</th>
            </tr>
        </thead>
        <tbody id="ranking"></tbody>
    </table>
</div>

</div>

<script>

const API = "https://api.erpimpar.com.br/atividades/events/consolidado_atividades.json";

async function load(){

const res = await fetch(API);
const json = await res.json();

const dados = json.alocacoes;

// MAPAS
let pessoas={}, obras={}, dias={};

dados.forEach(d=>{

    let p = d.pessoa;
    let o = d.obra;
    let dia = d.data;
    let h = d.horas;

    // PESSOAS
    if(!pessoas[p]){
        pessoas[p]={horas:0, count:0, obras:new Set()};
    }

    pessoas[p].horas+=h;
    pessoas[p].count++;
    pessoas[p].obras.add(o);

    // OBRAS
    obras[o]=(obras[o]||0)+h;

    // DIAS
    dias[dia]=(dias[dia]||0)+h;

});

// KPIs
k1.innerText = dados.length;
k2.innerText = Object.values(pessoas).reduce((a,b)=>a+b.horas,0);
k3.innerText = Object.keys(pessoas).length;
k4.innerText = Object.keys(obras).length;
k5.innerText = Math.round(k2.innerText / Object.keys(dias).length);

// GRÁFICO DIAS
new Chart(chartDias,{
    type:'line',
    data:{
        labels:Object.keys(dias),
        datasets:[{data:Object.values(dias)}]
    }
});

// GRÁFICO OBRAS
new Chart(chartObras,{
    type:'bar',
    data:{
        labels:Object.keys(obras),
        datasets:[{data:Object.values(obras)}]
    }
});

// RANKING
let rankingArr = Object.entries(pessoas)
    .map(([nome,val])=>({
        nome,
        horas:val.horas,
        count:val.count,
        obras:val.obras.size
    }))
    .sort((a,b)=>b.horas-a.horas);

rankingArr.forEach(r=>{
    let tr=document.createElement("tr");
    tr.innerHTML=`
        <td>${r.nome}</td>
        <td>${r.horas}</td>
        <td>${r.count}</td>
        <td>${r.obras}</td>
    `;
    ranking.appendChild(tr);
});

}

load();

</script>

</body>
</html>
