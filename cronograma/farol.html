<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERP ÍMPAR — Farol de Obras</title>
  <style>
    :root{
      --bg1:#0b1e4a;
      --bg2:#0e3b6e;
      --bg3:#0f766e;
      --text:#e5e7eb;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
      padding:18px;
    }
    .wrap{max-width:1440px;margin:0 auto}
    .hero{
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
      padding:14px 16px;border-radius:16px;
      border:2px solid rgba(34,197,94,.45);
      background:linear-gradient(120deg, rgba(2,6,23,.78), rgba(2,6,23,.35));
      box-shadow:0 18px 60px rgba(0,0,0,.35);
      margin-bottom:14px;
    }
    .title{font-size:22px;font-weight:1000}
    .sub{margin-top:4px;font-size:13px;color:#cbd5e1}
    .user{font-size:12px;color:#cfd8ff;font-weight:800}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .btn{
      border:none;border-radius:999px;padding:10px 16px;font-size:12px;
      text-transform:uppercase;letter-spacing:.12em;font-weight:900;cursor:pointer;
      display:flex;align-items:center;gap:10px;min-width:180px;justify-content:center;
    }
    .btn-primary{background:linear-gradient(135deg,#22c55e,#16a34a);color:#020617}
    .btn-secondary{background:#111827;color:#fff;border:1px solid #374151}
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
      gap:14px;
    }
    .card{
      border-radius:18px;
      border:1px solid rgba(148,163,184,.25);
      background:rgba(2,6,23,.55);
      padding:16px;
      box-shadow:0 18px 48px rgba(0,0,0,.16);
      backdrop-filter:blur(10px);
    }
    .obra{font-size:18px;font-weight:1000}
    .meta{margin-top:4px;font-size:12px;color:#cbd5e1}
    .stats{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:10px;
      margin-top:14px;
    }
    .stat{
      border-radius:14px;
      border:1px solid rgba(148,163,184,.16);
      background:rgba(255,255,255,.04);
      padding:10px;
    }
    .k{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#94a3b8;font-weight:900}
    .v{margin-top:6px;font-size:20px;font-weight:1000}
    .status-ok{color:#86efac}
    .status-warn{color:#fde68a}
    .status-bad{color:#fca5a5}
    .status-info{color:#93c5fd}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .mini-btn{
      border:none;border-radius:999px;padding:10px 14px;font-size:11px;
      font-weight:900;cursor:pointer;background:#0f172a;color:#fff;border:1px solid rgba(148,163,184,.25);
    }
    .empty{
      border-radius:18px;
      border:1px dashed rgba(148,163,184,.35);
      padding:24px;
      text-align:center;
      color:#cbd5e1;
      background:rgba(2,6,23,.25);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <div class="title">Farol de Obras</div>
        <div class="sub">Visão consolidada lendo o resumo oficial do cronograma salvo no servidor</div>
      </div>
      <div class="user">
        <div id="userName">Usuário</div>
        <div id="userEmail">—</div>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn btn-secondary" id="btnVoltarMenu" type="button">🏠 Menu principal</button>
      <button class="btn btn-primary" id="btnAtualizar" type="button">🔄 Atualizar</button>
    </div>

    <div class="grid" id="grid"></div>
  </div>

<script>
(() => {
  const KEY = "ERPIMPAR_USER";
  const API = "https://api.erpimpar.com.br/cronograma/";
  const grid = document.getElementById("grid");

  function getSessaoERP(){
    const raw = localStorage.getItem(KEY) || sessionStorage.getItem(KEY);
    if(!raw) return null;
    try { return JSON.parse(raw); } catch { return null; }
  }

  function loadUser(){
    const u = getSessaoERP();
    if(!u){
      location.href = "/index.html";
      return;
    }
    document.getElementById("userName").textContent  = (u.nome || u.Nome || "Usuário");
    document.getElementById("userEmail").textContent = (u.email || u.Email || "—");
  }

  function statusClass(s){
    if(s === "Concluído") return "status-ok";
    if(s === "Atrasado") return "status-bad";
    if(s === "Em andamento") return "status-warn";
    return "status-info";
  }

  async function loadFarol(){
    grid.innerHTML = `<div class="empty">Carregando…</div>`;
    try{
      const r = await fetch(API + "listar_obras_farol.php", { cache:"no-store" });
      const j = await r.json();
      const list = Array.isArray(j.data) ? j.data : [];

      if(!list.length){
        grid.innerHTML = `<div class="empty">Nenhuma obra encontrada.</div>`;
        return;
      }

      grid.innerHTML = "";
      list.forEach(o=>{
        const resumo = o.resumo || {};
        const status = resumo.status || "Sem baseline";
        const el = document.createElement("div");
        el.className = "card";
        el.innerHTML = `
          <div class="obra">${o.nome || ("Obra " + o.id)}</div>
          <div class="meta">ID: ${o.id}</div>

          <div class="stats">
            <div class="stat">
              <div class="k">Previsto</div>
              <div class="v">${Number(resumo.previsto || 0)}%</div>
            </div>
            <div class="stat">
              <div class="k">Real</div>
              <div class="v">${Number(resumo.real || 0)}%</div>
            </div>
            <div class="stat">
              <div class="k">Status</div>
              <div class="v ${statusClass(status)}">${status}</div>
            </div>
          </div>

          <div class="actions">
            <button class="mini-btn">📂 Abrir cronograma</button>
          </div>
        `;

        el.querySelector(".mini-btn").addEventListener("click", ()=>{
          location.href = "/cronograma/cronograma.html?id=" + encodeURIComponent(o.id);
        });

        grid.appendChild(el);
      });
    }catch(e){
      console.error(e);
      grid.innerHTML = `<div class="empty">Erro ao carregar o farol.</div>`;
    }
  }

  document.getElementById("btnVoltarMenu").addEventListener("click", ()=> location.href = "/menu.html");
  document.getElementById("btnAtualizar").addEventListener("click", loadFarol);

  loadUser();
  loadFarol();
})();
</script>
</body>
</html>
