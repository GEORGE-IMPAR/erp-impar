<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERP ÍMPAR — Farol de Obras</title>

  <style>
    :root{
      --bg1:#0b1e4a;
      --bg2:#0e3b6e;
      --bg3:#0f766e;

      --panel: rgba(2,6,23,.66);
      --panel2: rgba(2,6,23,.78);
      --border: rgba(148,163,184,.35);

      --text: #e5e7eb;
      --soft: rgba(229,231,235,.78);

      --blue:#3b82f6;
      --green:#22c55e;
      --green2:#16a34a;
      --yellow:#facc15;
      --red:#ef4444;

      --radius: 18px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      min-height:100vh;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
      display:flex;
      flex-direction:column;
      overflow-x:hidden;
    }

    body{opacity:0}
    @keyframes imparEnter{
      0%{opacity:0; transform: translateY(28px) scale(.98); filter: blur(10px);}
      100%{opacity:1; transform: translateY(0) scale(1); filter: blur(0);}
    }
    body.impar-enter{animation:imparEnter .75s cubic-bezier(.16,1,.3,1) both;}
    @media (prefers-reduced-motion: reduce){
      body{opacity:1}
      body.impar-enter{animation:none}
    }

    header{
      padding:14px 14px 10px;
      display:flex;
      justify-content:center;
    }
    .header-inner{
      width:100%;
      max-width:1360px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-shadow:0 2px 6px rgba(0,0,0,.75);
      min-width:0;
    }
    .logo-orb{
      width:36px;height:36px;border-radius:999px;flex:0 0 auto;
      position:relative;
      background: conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);
      box-shadow:0 10px 22px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.18) inset;
      overflow:hidden;
    }
    .logo-orb:before{
      content:""; position:absolute; inset:-6px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.55), transparent 55%);
    }
    .brand-text{display:flex; flex-direction:column; gap:2px; min-width:0;}
    .brand-kicker{font-size:12px; letter-spacing:.22em; text-transform:uppercase; font-weight:800; opacity:.9;}
    .brand-title{font-size:18px; font-weight:900; line-height:1.05;}
    .brand-sub{font-size:14px; font-weight:800; opacity:.92; line-height:1.1;}

    .tag-top{
      margin-left:auto;
      font-size:11px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(15,23,42,.85);
      border:1px solid rgba(148,163,184,.6);
      color:var(--soft);
      display:flex;
      align-items:center;
      gap:8px;
    }
    .pill-btn{
      border:none;
      background:transparent;
      color:inherit;
      font:inherit;
      display:flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
      padding:0;
      transition: transform .2s cubic-bezier(.16,1,.3,1), box-shadow .2s cubic-bezier(.16,1,.3,1);
    }
    .pill-btn:hover{
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 12px 28px rgba(0,0,0,.28);
      filter:brightness(1.08);
    }

    main{
      flex:1 0 auto;
      display:flex;
      justify-content:center;
      padding:8px 16px 16px;
    }
    .layout{
      width:100%;
      max-width:1360px;
      display:flex;
      justify-content:center;
    }
    .container{
      width:100%;
      border-radius:var(--radius);
      border:1px solid rgba(148,163,184,.45);
      box-shadow:0 24px 60px rgba(15,23,42,.65);
      background:linear-gradient(120deg, rgba(8,23,60,.80), rgba(9,47,96,.58), rgba(15,118,110,.35));
      padding:14px;
      min-height:calc(100vh - 145px);
    }

    .topbox{
      display:grid;
      grid-template-columns: 260px 1fr auto;
      align-items:center;
      gap:14px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(34,197,94,.55);
      background:linear-gradient(120deg, rgba(2,6,23,.88), rgba(2,6,23,.42));
      box-shadow:0 18px 60px rgba(0,0,0,.30);
    }
    .topbox-left .title{
      font-size:16px;
      font-weight:900;
      margin-bottom:4px;
      line-height:1.05;
    }
    .user-label{
      font-size:10px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(156,163,175,.92);
      margin-bottom:2px;
      font-weight:800;
    }
    .user-values{
      font-size:12px;
      color:#cfd8ff;
      line-height:1.25;
      font-weight:700;
    }
    .topbox-center{
      text-align:center;
      min-width:0;
      padding:0 10px;
    }
    .code-line{
      font-size:18px;
      font-weight:900;
      letter-spacing:.3px;
      color:rgba(229,231,235,.98);
    }
    .sub-line{
      margin-top:4px;
      font-size:13px;
      color:rgba(229,231,235,.88);
      opacity:.95;
    }

    .legend-top{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
    }
    .legend-pill{
      display:flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(2,6,23,.52);
      border:1px solid rgba(148,163,184,.18);
      font-size:11px;
      font-weight:800;
      color:#dbe7ff;
    }
    .legend-dot{
      width:10px;height:10px;border-radius:999px;display:inline-block;
      box-shadow:0 0 10px rgba(255,255,255,.18);
    }
    .legend-dot.green{background:#22c55e}
    .legend-dot.yellow{background:#facc15}
    .legend-dot.red{background:#ef4444}
    .legend-dot.blue{background:#60a5fa}

    .toolbar{
      margin-top:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:11px 18px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-weight:900;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition: transform .22s cubic-bezier(.16,1,.3,1),
                  box-shadow .22s cubic-bezier(.16,1,.3,1),
                  filter .22s cubic-bezier(.16,1,.3,1);
      will-change: transform;
    }
    .btn:focus-visible{
      outline:none;
    }
    .btn-green-premium{
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:#03140b;
      border:1px solid rgba(134,239,172,.85);
      box-shadow:
        0 0 0 1px rgba(34,197,94,.28),
        0 0 18px rgba(34,197,94,.38),
        0 12px 30px rgba(22,163,74,.38);
    }
    .btn-green-premium:hover{
      transform: translateY(-1px) scale(1.035);
      filter: saturate(1.16) brightness(1.08);
      box-shadow:
        0 0 0 1px rgba(34,197,94,.85),
        0 0 24px rgba(34,197,94,.55),
        0 18px 42px rgba(22,163,74,.45);
    }

    .board{
      margin-top:12px;
      border-radius:18px;
      border:1px dashed rgba(148,163,184,.26);
      background:rgba(2,6,23,.20);
      padding:12px;
      min-height:540px;
      display:flex;
      flex-direction:column;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      align-items:stretch;
    }

    .obra-card{
      position:relative;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.20);
      background:
        linear-gradient(180deg, rgba(2,6,23,.62), rgba(5,16,42,.54)),
        radial-gradient(circle at top right, rgba(59,130,246,.14), transparent 35%);
      padding:12px;
      min-height:172px;
      box-shadow:0 16px 34px rgba(0,0,0,.20);
      transition: transform .22s cubic-bezier(.16,1,.3,1),
                  box-shadow .22s cubic-bezier(.16,1,.3,1),
                  border-color .22s cubic-bezier(.16,1,.3,1),
                  filter .22s cubic-bezier(.16,1,.3,1);
      overflow:hidden;
    }
    .obra-card:hover{
      transform: translateY(-3px);
      box-shadow:0 20px 42px rgba(0,0,0,.34), 0 0 0 1px rgba(96,165,250,.18);
      border-color: rgba(96,165,250,.38);
      filter: brightness(1.03);
    }

    .obra-card::after{
      content:"";
      position:absolute;
      left:10px; right:10px; bottom:10px;
      height:2px;
      border-radius:999px;
      background:linear-gradient(90deg, rgba(34,197,94,.0), rgba(96,165,250,.25), rgba(34,197,94,.0));
      opacity:.6;
    }

    .card-farol{
      position:absolute;
      top:12px;
      right:12px;
      width:26px;
      height:26px;
      border-radius:999px;
      box-shadow:0 0 0 4px rgba(255,255,255,.03), 0 0 20px rgba(255,255,255,.08);
    }
    .card-farol.green{
      background:#22c55e;
      box-shadow:0 0 0 4px rgba(34,197,94,.10), 0 0 20px rgba(34,197,94,.35);
    }
    .card-farol.yellow{
      background:#facc15;
      box-shadow:0 0 0 4px rgba(250,204,21,.10), 0 0 20px rgba(250,204,21,.35);
    }
    .card-farol.red{
      background:#ef4444;
      box-shadow:0 0 0 4px rgba(239,68,68,.10), 0 0 20px rgba(239,68,68,.35);
    }
    .card-farol.blue{
      background:#60a5fa;
      box-shadow:0 0 0 4px rgba(96,165,250,.10), 0 0 20px rgba(96,165,250,.35);
    }

    .obra-name{
      font-size:15px;
      font-weight:1000;
      line-height:1.05;
      color:#f8fbff;
      padding-right:36px;
      min-height:32px;
      display:flex;
      align-items:flex-start;
      text-transform:uppercase;
    }

    .obra-id{
      margin-top:5px;
      font-size:11px;
      color:rgba(203,213,225,.72);
      font-weight:800;
      letter-spacing:.05em;
    }

    .kpis{
      margin-top:12px;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
    }
    .kpi{
      border-radius:12px;
      border:1px solid rgba(148,163,184,.15);
      background:rgba(255,255,255,.035);
      padding:8px 10px;
      min-height:48px;
    }
    .kpi-label{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:rgba(203,213,225,.65);
      font-weight:900;
    }
    .kpi-value{
      margin-top:4px;
      font-size:14px;
      font-weight:1000;
      color:#f8fbff;
    }

    .bars{
      margin-top:10px;
      display:grid;
      gap:6px;
    }
    .bar-row{
      display:grid;
      grid-template-columns:66px 1fr 34px;
      gap:8px;
      align-items:center;
      font-size:10px;
      font-weight:900;
      color:rgba(203,213,225,.74);
    }
    .bar-track{
      height:6px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      overflow:hidden;
      border:1px solid rgba(148,163,184,.10);
    }
    .bar-fill{
      height:100%;
      border-radius:999px;
    }
    .bar-fill.prev{background:linear-gradient(90deg,#60a5fa,#3b82f6)}
    .bar-fill.real{background:linear-gradient(90deg,#22c55e,#16a34a)}

    .card-actions{
      margin-top:10px;
      display:flex;
      justify-content:flex-start;
    }
    .btn-open{
      border:none;
      border-radius:999px;
      padding:8px 14px;
      font-size:11px;
      font-weight:900;
      cursor:pointer;
      display:inline-flex;
      gap:8px;
      align-items:center;
      background:rgba(2,6,23,.64);
      color:#f8fbff;
      border:1px solid rgba(148,163,184,.20);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, filter .18s ease;
    }
    .btn-open:hover{
      transform: translateY(-1px);
      border-color: rgba(96,165,250,.36);
      box-shadow:0 10px 24px rgba(0,0,0,.26), 0 0 16px rgba(96,165,250,.16);
      filter: brightness(1.05);
    }

    .empty-state{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:240px;
      text-align:center;
      border-radius:16px;
      color:#dbe7ff;
      background:rgba(2,6,23,.18);
      border:1px dashed rgba(148,163,184,.22);
      font-weight:800;
      padding:18px;
    }

    footer{
      margin-top:auto;
      background:#020617;
      color:#9ca3af;
      padding:8px 12px;
      font-size:10px;
    }
    .rodape-inner{
      max-width:1360px;
      margin:0 auto;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .impar-modal{
      position:fixed; inset:0; display:none; z-index:9999;
    }
    .impar-modal[aria-hidden="false"]{display:block;}
    .impar-modal-backdrop{
      position:absolute; inset:0; background:rgba(0,0,0,.55); backdrop-filter: blur(6px);
    }
    .impar-modal-card{
      position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
      width:min(720px, calc(100% - 32px));
      border-radius:22px;
      border:1px solid rgba(148,163,184,.22);
      background:
        radial-gradient(1200px 600px at 10% 10%, rgba(59,130,246,.14), transparent 55%),
        radial-gradient(900px 500px at 90% 20%, rgba(34,197,94,.12), transparent 55%),
        rgba(2,6,23,.94);
      box-shadow: 0 30px 80px rgba(0,0,0,.55);
      padding:22px 22px 18px;
    }
    .impar-modal-head{
      display:flex; gap:14px; align-items:flex-start; padding-bottom:10px;
    }
    .impar-modal-icon{
      width:46px; height:46px; border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      background: rgba(59,130,246,.15);
      border:1px solid rgba(59,130,246,.35);
      box-shadow: 0 0 24px rgba(59,130,246,.25);
      font-size:22px;
    }
    .impar-modal-title{
      font-size:22px; font-weight:800; letter-spacing:.2px; color:rgba(255,255,255,.92);
    }
    .impar-modal-subtitle{
      margin-top:4px; font-size:13px; color:rgba(229,231,235,.72);
    }
    .impar-modal-body{padding:8px 0 0;}
    .impar-modal-message{
      color:rgba(229,231,235,.88); font-size:14px; line-height:1.35; white-space:pre-wrap;
    }
    .impar-modal-footer{
      display:flex; justify-content:flex-end; padding-top:14px;
    }
    .impar-modal-btn{
      border:none;
      border-radius:999px;
      padding:10px 16px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-weight:900;
      cursor:pointer;
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:#020617;
      box-shadow:0 10px 30px rgba(22,163,74,.5);
    }

    @media (max-width: 1180px){
      .cards{grid-template-columns:repeat(2,minmax(0,1fr));}
      .topbox{
        grid-template-columns: 1fr;
        text-align:left;
      }
      .topbox-center{text-align:left;padding:0}
      .legend-top{justify-content:flex-start}
    }

    @media (max-width: 680px){
      .container{padding:12px; min-height:auto;}
      .cards{grid-template-columns:1fr;}
      .toolbar{align-items:stretch}
      .btn-green-premium{width:100%}
      .legend-top{justify-content:flex-start}
      .topbox-left .title{font-size:18px}
      .code-line{font-size:16px}
      .sub-line{font-size:12px}
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="logo-orb" aria-hidden="true"></div>
        <div class="brand-text">
          <div class="brand-kicker">PLATAFORMA</div>
          <div class="brand-title">ERP ÍMPAR</div>
          <div class="brand-sub">Farol de Obras</div>
        </div>
      </div>

      <div class="tag-top">
        <button class="pill-btn" id="btnVoltarMenu" type="button"><span>🏠</span> Menu principal</button>
      </div>
    </div>
  </header>

  <main>
    <div class="layout">
      <div class="container">

        <div class="topbox">
          <div class="topbox-left">
            <div class="title">Visão Executiva</div>
            <div class="user-label">Logado como</div>
            <div class="user-values">
              <strong id="userName">Usuário</strong><br/>
              <span id="userEmail">—</span>
            </div>
          </div>

          <div class="topbox-center">
            <div class="code-line">Farol consolidado das obras</div>
            <div class="sub-line">Leitura oficial do cronograma salvo no servidor</div>
          </div>

          <div class="legend-top">
            <div class="legend-pill"><span class="legend-dot blue"></span> Novo</div>
            <div class="legend-pill"><span class="legend-dot yellow"></span> Em andamento</div>
            <div class="legend-pill"><span class="legend-dot red"></span> Atrasado</div>
            <div class="legend-pill"><span class="legend-dot green"></span> Concluído</div>
          </div>
        </div>

        <div class="toolbar">
          <button class="btn btn-green-premium" id="btnAtualizar" type="button">🔄 Atualizar</button>
        </div>

        <div class="board">
          <div id="cardsWrap" class="cards"></div>
        </div>

      </div>
    </div>
  </main>

  <footer>
    <div class="rodape-inner">
      <div>ERP ÍMPAR • Farol de Obras</div>
      <div>v4 • Leitura oficial do servidor</div>
    </div>
  </footer>

  <div class="impar-modal" id="imparModal" aria-hidden="true">
    <div class="impar-modal-backdrop"></div>
    <div class="impar-modal-card">
      <div class="impar-modal-head">
        <div class="impar-modal-icon" id="imparModalIcon">ℹ️</div>
        <div>
          <div class="impar-modal-title" id="imparModalTitle">Informação</div>
          <div class="impar-modal-subtitle" id="imparModalSubtitle">ERP ÍMPAR</div>
        </div>
      </div>
      <div class="impar-modal-body">
        <div class="impar-modal-message" id="imparModalMessage"></div>
      </div>
      <div class="impar-modal-footer">
        <button class="impar-modal-btn" id="imparModalBtn" type="button">OK</button>
      </div>
    </div>
  </div>

  <script>
    const KEY = "ERPIMPAR_USER";
    const API_BASE = "https://api.erpimpar.com.br/cronograma/";
    const API_LIST = API_BASE + "listar_obras_farol.php";

    function escapeHtml(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    function getSessaoERP(){
      const raw = localStorage.getItem(KEY) || sessionStorage.getItem(KEY);
      if(!raw) return null;
      try { return JSON.parse(raw); } catch { return null; }
    }

    function loadUser(){
      const u = getSessaoERP();
      if(!u){
        window.location.href = "/index.html";
        return;
      }
      document.getElementById("userName").textContent  = (u.nome  || u.Nome  || "Usuário");
      document.getElementById("userEmail").textContent = (u.email || u.Email || "—");
    }

    function openModal(title, msg, icon="ℹ️", subtitle="ERP ÍMPAR"){
      document.getElementById("imparModalTitle").textContent = title || "Informação";
      document.getElementById("imparModalMessage").textContent = msg || "";
      document.getElementById("imparModalIcon").textContent = icon || "ℹ️";
      document.getElementById("imparModalSubtitle").textContent = subtitle || "ERP ÍMPAR";
      document.getElementById("imparModal").setAttribute("aria-hidden", "false");
    }

    function closeModal(){
      document.getElementById("imparModal").setAttribute("aria-hidden", "true");
    }

    function safePercent(v){
      const n = Number(v || 0);
      if(!Number.isFinite(n)) return 0;
      return Math.max(0, Math.min(100, Math.round(n)));
    }

    function statusColor(item){
      const previsto = safePercent(item.previsto);
      const real = safePercent(item.real);
      const status = String(item.status || "").toLowerCase().trim();

      if(status.includes("concl")) return "green";
      if(status.includes("atra")) return "red";
      if(status.includes("novo")) return "blue";
      if(status.includes("and")) return "yellow";

      if(real >= 100) return "green";
      if(real === 0 && previsto === 0) return "blue";
      if(real + 10 < previsto) return "red";
      return "yellow";
    }

    function normalizaLista(payload){
      if(Array.isArray(payload)) return payload;
      if(payload && Array.isArray(payload.data)) return payload.data;
      if(payload && Array.isArray(payload.items)) return payload.items;
      return [];
    }

    function nomeObra(item){
      return String(
        item.nome ||
        item.obra ||
        item.nomeObra ||
        item.titulo ||
        `OBRA ${item.id || ""}`
      ).trim();
    }

    function renderCards(lista){
      const wrap = document.getElementById("cardsWrap");
      wrap.innerHTML = "";

      if(!lista.length){
        wrap.innerHTML = `<div class="empty-state">Nenhuma obra encontrada no servidor.</div>`;
        return;
      }

      const html = lista.map(item => {
        const id = String(item.id || item.codigo || item.indice || "000").trim();
        const nome = nomeObra(item);
        const previsto = safePercent(item.previsto);
        const real = safePercent(item.real);
        const cor = statusColor(item);

        return `
          <div class="obra-card">
            <div class="card-farol ${cor}" title="${escapeHtml(item.status || cor)}"></div>

            <div class="obra-name">${escapeHtml(nome)}</div>
            <div class="obra-id">ID: ${escapeHtml(id || "—")}</div>

            <div class="kpis">
              <div class="kpi">
                <div class="kpi-label">Previsto</div>
                <div class="kpi-value">${previsto}%</div>
              </div>
              <div class="kpi">
                <div class="kpi-label">Real</div>
                <div class="kpi-value">${real}%</div>
              </div>
            </div>

            <div class="bars">
              <div class="bar-row">
                <div>Planejado</div>
                <div class="bar-track"><div class="bar-fill prev" style="width:${previsto}%"></div></div>
                <div>${previsto}%</div>
              </div>
              <div class="bar-row">
                <div>Executado</div>
                <div class="bar-track"><div class="bar-fill real" style="width:${real}%"></div></div>
                <div>${real}%</div>
              </div>
            </div>

            <div class="card-actions">
              <button class="btn-open" type="button" onclick="abrirCronograma('${escapeHtml(id)}')">🗂️ Abrir cronograma</button>
            </div>
          </div>
        `;
      }).join("");

      wrap.innerHTML = html;
    }

    async function fetchJsonSafe(url){
      const r = await fetch(url, { cache: "no-store" });
      const text = await r.text();

      if(!r.ok){
        throw new Error(`HTTP ${r.status}`);
      }

      if(!text || !text.trim()){
        throw new Error("Resposta vazia do servidor.");
      }

      try{
        return JSON.parse(text);
      }catch(e){
        console.error("Resposta não JSON:", text);
        throw new Error("Resposta inválida do servidor.");
      }
    }

    async function loadFarol(){
      try{
        const payload = await fetchJsonSafe(API_LIST);
        const lista = normalizaLista(payload);
        renderCards(lista);
      }catch(e){
        console.error(e);
        document.getElementById("cardsWrap").innerHTML =
          `<div class="empty-state">Erro ao carregar o farol.\n\n${escapeHtml(e.message || "Falha inesperada.")}</div>`;
      }
    }

    function abrirCronograma(id){
      if(!id){
        openModal("Atenção", "ID da obra não informado.", "⚠️");
        return;
      }
      window.location.href = `/cronograma/cronograma.html?id=${encodeURIComponent(id)}`;
    }

    document.getElementById("btnAtualizar").addEventListener("click", loadFarol);
    document.getElementById("btnVoltarMenu").addEventListener("click", () => {
      window.location.href = "/menu.html";
    });
    document.getElementById("imparModalBtn").addEventListener("click", closeModal);
    document.querySelector(".impar-modal-backdrop").addEventListener("click", closeModal);

    document.body.classList.add("impar-enter");
    loadUser();
    loadFarol();
  </script>
</body>
</html>
