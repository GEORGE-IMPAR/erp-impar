<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ERP ÍMPAR - Farol v3</title>
</head>
<body>
<h1>Farol de Obras v3</h1>
<div id="lista"></div>
<script>
fetch('https://api.erpimpar.com.br/cronograma/listar_obras_farol.php')
.then(r=>r.json())
.then(data=>{
  const div = document.getElementById('lista');
  div.innerHTML = data.map(o=>`
    <div style="border:1px solid #ccc;padding:10px;margin:10px;">
      <b>${o.obra}</b><br>
      Previsto: ${o.resumoConsolidado?.previstoPercentual || 0}%<br>
      Real: ${o.resumoConsolidado?.realPercentual || 0}%<br>
      Status: ${o.resumoConsolidado?.status || 'Sem baseline'}
    </div>
  `).join('');
});
</script>
</body>
</html>
