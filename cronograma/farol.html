<!DOCTYPE html>
<html lang="pt-BR">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>  
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERP ÍMPAR — Farol de Obras</title>

  <style>
    :root{
      --bg1:#0b1e4a;
      --bg2:#0e3b6e;
      --bg3:#0f766e;
      --text:#e5e7eb;
      --soft:rgba(229,231,235,.78);
      --blue:#60a5fa;
      --green:#22c55e;
      --red:#ef4444;
      --yellow:#f59e0b;
      --slate:#94a3b8;
      --radius:18px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      min-height:100vh;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
      display:flex;
      flex-direction:column;
      opacity:0;
    }

    @keyframes imparEnter{
      0%{opacity:0; transform:translateY(28px) scale(.98); filter:blur(10px);}
      100%{opacity:1; transform:translateY(0) scale(1); filter:blur(0);}
    }
    body.impar-enter{animation:imparEnter .75s cubic-bezier(.16,1,.3,1) both;}

    header{padding:14px 14px 10px;display:flex;justify-content:center;}
    .header-inner{
      width:100%;max-width:1600px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;
    }
    .brand{display:flex;align-items:center;gap:12px;text-shadow:0 2px 6px rgba(0,0,0,.75);min-width:0;}
    .logo-orb{
      width:36px;height:36px;border-radius:999px;flex:0 0 auto;position:relative;
      background:conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);
      box-shadow:0 10px 22px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.18) inset;
      overflow:hidden;
    }
    .logo-orb:before{
      content:"";position:absolute;inset:-6px;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.55), transparent 55%);
    }
    .brand-text{display:flex;flex-direction:column;gap:2px;min-width:0;}
    .brand-kicker{font-size:12px;letter-spacing:.22em;text-transform:uppercase;font-weight:800;opacity:.9;}
    .brand-title{font-size:18px;font-weight:900;line-height:1.05;}
    .brand-sub{font-size:14px;font-weight:800;opacity:.92;line-height:1.1;}

    .tag-top{
      margin-left:auto;font-size:11px;padding:6px 10px;border-radius:999px;background:rgba(15,23,42,.85);
      border:1px solid rgba(148,163,184,.6);color:var(--soft);display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    }
    .pill-btn{
      border:none;background:transparent;color:inherit;font:inherit;display:flex;align-items:center;gap:6px;cursor:pointer;padding:0;
      transition:transform .16s ease, filter .16s ease;
    }
    .pill-btn:hover{filter:brightness(1.08);transform:translateY(-1px)}

    main{flex:1 0 auto;display:flex;justify-content:center;padding:12px 16px 18px;}
    .layout{width:100%;max-width:1600px;display:flex;justify-content:center;}
    .container{
      width:100%;border-radius:var(--radius);border:1px solid rgba(148,163,184,.45);box-shadow:0 24px 60px rgba(15,23,42,.9);
      background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));padding:18px;
    }

    .topbox{
      display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 14px;border-radius:14px;
      border:2px solid rgba(34,197,94,.45);background:linear-gradient(120deg, rgba(2,6,23,.78), rgba(2,6,23,.35));
      box-shadow:0 18px 60px rgba(0,0,0,.35);flex-wrap:wrap;
    }
    .topbox-left .title{font-size:18px;font-weight:900;margin-bottom:4px;}
    .user-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(156,163,175,.92);margin-bottom:2px;font-weight:800;}
    .user-values{font-size:12px;color:#cfd8ff;line-height:1.25;font-weight:700;}
    .topbox-center{flex:1 1 360px;min-width:300px;text-align:center;padding:0 10px;}
    .code-line{font-size:24px;font-weight:1000;letter-spacing:.3px;color:rgba(229,231,235,.98);}
    .sub-line{margin-top:4px;font-size:14px;color:rgba(229,231,235,.92);opacity:.95;}

    .toolbar{
      display:flex;justify-content:flex-start;align-items:center;gap:10px;flex-wrap:wrap;margin:12px 0 14px;
    }
    .btn{
      border:none;border-radius:999px;padding:10px 16px;font-size:12px;text-transform:uppercase;letter-spacing:.12em;font-weight:900;
      cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:10px;
      transition:transform .22s cubic-bezier(.16,1,.3,1), box-shadow .22s cubic-bezier(.16,1,.3,1), filter .22s cubic-bezier(.16,1,.3,1);
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-green{
      background:linear-gradient(135deg,#22c55e,#16a34a)!important;color:#020617!important;border:1px solid rgba(34,197,94,.85)!important;
      box-shadow:0 0 0 1px rgba(34,197,94,.85),0 0 18px rgba(34,197,94,.28),0 10px 28px rgba(22,163,74,.45)!important;
    }

    .cards-wrap{
      border-radius:18px;border:1px dashed rgba(148,163,184,.18);background:rgba(2,6,23,.25);padding:10px;
    }

    .cards-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
      align-items:start;
    }

    .obra-card{
      min-height:184px;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.20);
      background:
        radial-gradient(circle at top right, rgba(96,165,250,.14), transparent 22%),
        linear-gradient(135deg, rgba(2,6,23,.88), rgba(5,24,60,.88) 42%, rgba(8,48,76,.88));
      box-shadow:0 16px 34px rgba(2,6,23,.42);
      padding:14px;
      position:relative;
      overflow:hidden;
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, filter .18s ease;
    }
    .obra-card:hover{
      transform:translateY(-2px);
      box-shadow:0 24px 44px rgba(2,6,23,.55);
      border-color:rgba(96,165,250,.34);
      filter:brightness(1.03);
    }

    .obra-card--novo{
      border:1px solid rgba(34,197,94,.45);
      box-shadow:
        0 0 0 1px rgba(34,197,94,.22) inset,
        0 20px 40px rgba(2,6,23,.42),
        0 0 28px rgba(34,197,94,.14);
      background:
        radial-gradient(circle at top right, rgba(34,197,94,.18), transparent 24%),
        linear-gradient(135deg, rgba(2,6,23,.92), rgba(8,28,62,.92) 38%, rgba(6,62,74,.92));
    }

    .card-farol{
      position:absolute;top:12px;right:12px;width:18px;height:18px;border-radius:50%;
      box-shadow:0 0 0 4px rgba(255,255,255,.05);
    }
    .card-farol.blue{background:#60a5fa; box-shadow:0 0 0 4px rgba(96,165,250,.14), 0 0 20px rgba(96,165,250,.45);}
    .card-farol.yellow{background:#facc15; box-shadow:0 0 0 4px rgba(250,204,21,.14), 0 0 20px rgba(250,204,21,.38);}
    .card-farol.red{background:#ef4444; box-shadow:0 0 0 4px rgba(239,68,68,.14), 0 0 20px rgba(239,68,68,.42);}
    .card-farol.green{background:#22c55e; box-shadow:0 0 0 4px rgba(34,197,94,.14), 0 0 20px rgba(34,197,94,.42);}

    .obra-name{
      font-size:14px;
      font-weight:1000;
      line-height:1.1;
      color:#fff;
      text-transform:uppercase;
      margin-bottom:8px;
      padding-right:28px;
      min-height:31px;
    }
    .obra-id{
      font-size:11px;color:#cbd5e1;font-weight:900;opacity:.92;margin-bottom:12px;
    }

    .kpis{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
      margin-bottom:10px;
    }
    .kpi{
      border-radius:12px;
      border:1px solid rgba(148,163,184,.16);
      background:rgba(255,255,255,.03);
      padding:10px 10px 8px;
      min-height:56px;
    }
    .kpi-label{
      font-size:9px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:#94a3b8;
      font-weight:1000;
      margin-bottom:5px;
    }
    .kpi-value{
      font-size:15px;
      font-weight:1000;
      color:#fff;
      line-height:1.05;
    }

    .bars{
      display:flex;flex-direction:column;gap:6px;margin-bottom:12px;
    }
    .bar-row{
      display:grid;
      grid-template-columns:44px 1fr 34px;
      gap:8px;
      align-items:center;
      font-size:10px;
      font-weight:900;
      color:#cbd5e1;
    }
    .bar-track{
      height:6px;border-radius:999px;background:rgba(148,163,184,.16);overflow:hidden;
      border:1px solid rgba(148,163,184,.12);
    }
    .bar-fill{
      height:100%;border-radius:999px;
    }
    .bar-fill.prev{background:linear-gradient(90deg,#60a5fa,#22d3ee);}
    .bar-fill.real{background:linear-gradient(90deg,#22c55e,#4ade80);}

    .card-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .btn-open{
      border:none;
      border-radius:999px;
      background:rgba(2,6,23,.74);
      color:#fff;
      font-size:11px;
      font-weight:900;
      padding:8px 12px;
      cursor:pointer;
      border:1px solid rgba(148,163,184,.22);
      transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }
    .btn-open:hover{
      transform:translateY(-1px);
      border-color:rgba(96,165,250,.35);
      box-shadow:0 0 14px rgba(96,165,250,.16);
    }

    .btn-open--novo{
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:#020617;
      border:1px solid rgba(34,197,94,.85);
      box-shadow:0 0 18px rgba(34,197,94,.18);
    }
    .btn-open--novo:hover{
      box-shadow:0 0 24px rgba(34,197,94,.32);
      border-color:rgba(34,197,94,.95);
    }

    .hint-card{
      font-size:11px;
      color:#cbd5e1;
      font-weight:800;
      line-height:1.3;
      margin-bottom:10px;
      max-width:320px;
    }

    .legend-top{
      display:flex;justify-content:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:8px;
    }
    .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:900;color:#e5e7eb;background:rgba(2,6,23,.35);padding:6px 10px;border-radius:999px;border:1px solid rgba(148,163,184,.12);}
    .legend-dot{width:8px;height:8px;border-radius:50%;}
    .legend-dot.blue{background:#60a5fa}
    .legend-dot.yellow{background:#facc15}
    .legend-dot.red{background:#ef4444}
    .legend-dot.green{background:#22c55e}

    .status-msg{
      margin-top:12px;
      font-size:12px;
      font-weight:900;
      color:#cbd5e1;
      min-height:16px;
    }
    .status-msg.err{color:#fca5a5}
    .status-msg.ok{color:#86efac}

    footer{margin-top:auto;background:#020617;color:#9ca3af;padding:8px 12px;font-size:10px;}
    .rodape-inner{max-width:1600px;margin:0 auto;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;}

    @media (max-width:1200px){
      .cards-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
    }
    @media (max-width:800px){
      .cards-grid{grid-template-columns:1fr;}
      .topbox-center{text-align:left}
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="brand">
      <div class="logo-orb" aria-hidden="true"></div>
      <div class="brand-text">
        <div class="brand-kicker">PLATAFORMA</div>
        <div class="brand-title">ERP ÍMPAR</div>
        <div class="brand-sub">Farol de Obras</div>
      </div>
    </div>

    <div class="tag-top">
      <button class="pill-btn" id="btnVoltarMenu" type="button"><span>🏠</span> Menu principal</button>
    </div>
  </div>
</header>

<main>
  <div class="layout">
    <div class="container">
      <div class="topbox">
        <div class="topbox-left">
          <div class="title">Visão Executiva</div>
          <div class="user-label">Logado como</div>
          <div class="user-values">
            <strong id="userName">Usuário</strong><br/>
            <span id="userEmail">—</span>
          </div>
        </div>

        <div class="topbox-center">
          <div class="code-line">Farol consolidado das obras</div>
          <div class="sub-line">Leitura oficial do cronograma salvo no servidor</div>
        </div>

        <div class="legend-top">
          <div class="legend-item"><span class="legend-dot blue"></span> Novo</div>
          <div class="legend-item"><span class="legend-dot yellow"></span> Em andamento</div>
          <div class="legend-item"><span class="legend-dot red"></span> Atrasado</div>
          <div class="legend-item"><span class="legend-dot green"></span> Concluído</div>
        </div>
      </div>

      <div class="toolbar">
        <button class="btn btn-green" id="btnAtualizar" type="button">🔄 Atualizar</button>
      </div>

      <div class="cards-wrap">
        <div class="cards-grid" id="cardsGrid"></div>
      </div>

      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>
</main>

<footer>
  <div class="rodape-inner">
    <div>ERP ÍMPAR • Farol de Obras</div>
    <div>v4 • Leitura oficial do servidor</div>
  </div>
</footer>

<script>
(() => {
  const KEY = "ERPIMPAR_USER";
  const API = "https://api.erpimpar.com.br/cronograma/";
  const cardsGrid = document.getElementById("cardsGrid");
  const statusMsg = document.getElementById("statusMsg");

  function getSessaoERP(){
    const raw = localStorage.getItem(KEY) || sessionStorage.getItem(KEY);
    if(!raw) return null;
    try { return JSON.parse(raw); } catch { return null; }
  }

  function loadUser(){
    const u = getSessaoERP();
    if(!u){
      location.href = "/index.html";
      return;
    }
    document.getElementById("userName").textContent  = (u.nome || u.Nome || "Usuário");
    document.getElementById("userEmail").textContent = (u.email || u.Email || "—");
  }

  function setStatus(text, cls=""){
    statusMsg.className = "status-msg" + (cls ? " " + cls : "");
    statusMsg.textContent = text || "";
  }

  async function fetchJsonSafe(url, opts){
    const r = await fetch(url, opts || { cache:"no-store" });
    const text = await r.text();

    if(!r.ok){
      throw new Error("HTTP " + r.status + " - " + text);
    }
    if(!text || !text.trim()){
      throw new Error("Resposta vazia do servidor.");
    }

    try{
      return JSON.parse(text);
    }catch(e){
      console.error("Resposta bruta:", text);
      throw new Error("JSON inválido retornado pela API.");
    }
  }

  function pct(n){
    const v = Number(n || 0);
    if(!Number.isFinite(v)) return 0;
    return Math.max(0, Math.min(100, Math.round(v * 10) / 10));
  }

  function getStatusMeta(status){
    const s = String(status || "").toLowerCase();
    if(s.includes("conclu")) return { cls:"green", label:"Concluído" };
    if(s.includes("atras")) return { cls:"red", label:"Atrasado" };
    if(s.includes("andamento")) return { cls:"yellow", label:"Em andamento" };
    return { cls:"blue", label:"Novo" };
  }

  function normalizeId(id){
    return String(id || "").trim();
  }

  function isInvalidGhostId(id){
    const v = normalizeId(id);
    return !v || v === "0" || v === "00" || v === "000";
  }

  function isGroup(atividades, idx){
    const base = Number(atividades[idx].nivel || 0);
    for(let i = idx + 1; i < atividades.length; i++){
      const lvl = Number(atividades[i].nivel || 0);
      if(lvl <= base) break;
      return true;
    }
    return false;
  }

  function computeResumoCronograma(data){
    const atividades = Array.isArray(data.atividades) ? data.atividades : [];
    const folhas = atividades.filter((a, i) => !isGroup(atividades, i));

    const nome = String(data.nome || data.obra || "").trim();
    const id = normalizeId(data.id);

    if(!folhas.length){
      return {
        id,
        nome,
        previsto: 0,
        real: 0,
        status: "Novo"
      };
    }

    let pesoPrev = 0, somaPrev = 0, pesoReal = 0, somaReal = 0;
    let statusFinal = "Não iniciado";

    const prioridade = {
      "Não iniciado": 1,
      "Novo": 1,
      "Concluído": 2,
      "Em andamento": 3,
      "Atrasado": 4
    };

    folhas.forEach(f => {
      const dur = Math.max(0.1, Number(f.duracao || 0.1));
      const prev = pct(f.previsto);
      const real = pct(f.real);

      pesoPrev += dur;
      somaPrev += prev * dur;

      pesoReal += dur;
      somaReal += real * dur;

      const st = String(f.status || "Não iniciado");
      if((prioridade[st] || 1) > (prioridade[statusFinal] || 1)){
        statusFinal = st;
      }
    });

    return {
      id,
      nome,
      previsto: pesoPrev > 0 ? Math.round((somaPrev / pesoPrev) * 10) / 10 : 0,
      real: pesoReal > 0 ? Math.round((somaReal / pesoReal) * 10) / 10 : 0,
      status: statusFinal
    };
  }

  function abrirNovoCronograma(){
    location.href = "/cronograma/cronograma.html?novo=1";
  }

function abrirImportacaoPlanilha(){
  const inp = document.getElementById("excelImportInput");
  if(!inp) return;
  inp.value = "";
  inp.click();
}

  function abrirCronograma(id){
    if(isInvalidGhostId(id)) return;
    location.href = "/cronograma/cronograma.html?id=" + encodeURIComponent(id);
  }

  function cardNovoHtml(){
    return `
      <div class="obra-card obra-card--novo">
        <div class="card-farol blue" title="Novo cronograma"></div>

        <div class="obra-name">Novo cronograma</div>
        <div class="obra-id">Criar cronograma do zero ou importar planilha base</div>

        <div class="hint-card">
          Abra um cronograma vazio, escolha a obra dentro do editor e salve no servidor.
        </div>

        <div class="kpis">
          <div class="kpi">
            <div class="kpi-label">Ação</div>
            <div class="kpi-value">Nova</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Entrada</div>
            <div class="kpi-value">Manual / Planilha</div>
          </div>
        </div>

        <div class="bars">
          <div class="bar-row">
            <div>Planej.</div>
            <div class="bar-track"><div class="bar-fill prev" style="width:100%"></div></div>
            <div>Base</div>
          </div>
          <div class="bar-row">
            <div>Real</div>
            <div class="bar-track"><div class="bar-fill real" style="width:100%"></div></div>
            <div>Nova</div>
          </div>
        </div>

        <div class="card-actions">
          <button class="btn-open btn-open--novo" type="button" onclick="window.__abrirNovoCronograma()">✚ Criar agora</button>
          <button class="btn-open" type="button" onclick="window.__abrirImportacaoPlanilha()">⭳ Importar planilha</button>
        </div>
      </div>
    `;
  }

  function cardObraHtml(item){
    const status = getStatusMeta(item.status);
    const nomeExib = item.nome || ("OBRA " + item.id);

    return `
      <div class="obra-card">
        <div class="card-farol ${status.cls}" title="${status.label}"></div>

        <div class="obra-name">${escapeHtml(nomeExib)}</div>
        <div class="obra-id">ID: ${escapeHtml(item.id)}</div>

        <div class="kpis">
          <div class="kpi">
            <div class="kpi-label">Previsto</div>
            <div class="kpi-value">${item.previsto}%</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Real</div>
            <div class="kpi-value">${item.real}%</div>
          </div>
        </div>

        <div class="bars">
          <div class="bar-row">
            <div>Planej.</div>
            <div class="bar-track"><div class="bar-fill prev" style="width:${item.previsto}%"></div></div>
            <div>${item.previsto}%</div>
          </div>
          <div class="bar-row">
            <div>Execut.</div>
            <div class="bar-track"><div class="bar-fill real" style="width:${item.real}%"></div></div>
            <div>${item.real}%</div>
          </div>
        </div>

        <div class="card-actions">
          <button class="btn-open" type="button" onclick="window.__abrirCronograma('${escapeHtml(item.id)}')">📁 Abrir cronograma</button>
        </div>
      </div>
    `;
  }

  function escapeHtml(s){
    return String(s ?? "").replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  function excelDateToISO(value){
  if(value == null || value === "") return "";

  // data serial do Excel
  if(typeof value === "number"){
    const parsed = XLSX.SSF.parse_date_code(value);
    if(!parsed) return "";
    const y = parsed.y;
    const m = String(parsed.m).padStart(2, "0");
    const d = String(parsed.d).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  const s = String(value).trim();

  // dd/mm/aaaa
  let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){
    const dd = String(m[1]).padStart(2, "0");
    const mm = String(m[2]).padStart(2, "0");
    const yy = m[3];
    return `${yy}-${mm}-${dd}`;
  }

  // aaaa-mm-dd
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m){
    return s;
  }

  return "";
}

function normalizeImportId(v){
  return String(v || "")
    .trim()
    .replace(",", ".")
    .replace(/\s+/g, "")
    .replace(/\.+$/g, "");
}

function levelFromId(id){
  const s = normalizeImportId(id);
  if(!s) return 0;
  return Math.max(0, s.split(".").length - 1);
}

function computeDurationInclusive(inicio, fim){
  if(!inicio || !fim) return 0;
  const a = new Date(inicio + "T12:00:00");
  const b = new Date(fim + "T12:00:00");
  const diff = Math.round((b - a) / 86400000) + 1;
  return diff > 0 ? diff : 0;
}

function plannedPercentToday(inicio, fim){
  if(!inicio || !fim) return 0;

  const hoje = new Date();
  hoje.setHours(12,0,0,0);

  const dtInicio = new Date(inicio + "T12:00:00");
  const dtFim = new Date(fim + "T12:00:00");

  if(hoje < dtInicio) return 0;
  if(hoje >= dtFim) return 100;

  const total = computeDurationInclusive(inicio, fim);
  if(total <= 0) return 0;

  const hojeIso = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,"0")}-${String(hoje.getDate()).padStart(2,"0")}`;
  const decorridos = computeDurationInclusive(inicio, hojeIso);

  return Math.max(0, Math.min(100, Math.round((decorridos / total) * 1000) / 10));
}

function calcImportedStatus(inicio, fim, real){
  const hoje = new Date();
  hoje.setHours(12,0,0,0);

  const dtInicio = inicio ? new Date(inicio + "T12:00:00") : null;
  const dtFim = fim ? new Date(fim + "T12:00:00") : null;
  const realNum = Number(real || 0);
  const previstoHoje = plannedPercentToday(inicio, fim);

  if(realNum >= 100) return "Concluído";
  if(dtFim && hoje > dtFim && realNum < 100) return "Atrasado";
  if(dtInicio && hoje < dtInicio && realNum <= 0) return "Não iniciado";
  if(dtInicio && hoje >= dtInicio && realNum <= 0 && previstoHoje > 0) return "Atrasado";
  if(realNum > 0 && realNum < 100 && realNum + 0.001 < previstoHoje) return "Atrasado";
  if(realNum > 0 && realNum < 100) return "Em andamento";
  if(previstoHoje > 0 && realNum < previstoHoje) return "Atrasado";
  return "Não iniciado";
}

function mapExcelRowsToCronograma(rows){
  const mapped = [];

  rows.forEach((r, idx) => {
    const id = normalizeImportId(r.ID ?? r.Id ?? r.id ?? "");
    const atividade = String(r.ATIVIDADE ?? r.Atividade ?? r.atividade ?? "").trim();
    const inicio = excelDateToISO(r.DATA_INICIO ?? r["DATA INICIO"] ?? r.INICIO ?? "");
    const fim = excelDateToISO(r.DATA_FIM ?? r["DATA FIM"] ?? r.FIM ?? "");
    const predecessora = normalizeImportId(r.PREDECESSORA ?? r.Predecessora ?? r.predecessora ?? "");

    if(!id && !atividade && !inicio && !fim && !predecessora){
      return;
    }

    if(!id) throw new Error(`Linha ${idx + 2}: ID obrigatório.`);
    if(!atividade) throw new Error(`Linha ${idx + 2}: ATIVIDADE obrigatória.`);
    if(!inicio) throw new Error(`Linha ${idx + 2}: DATA_INICIO obrigatória.`);
    if(!fim) throw new Error(`Linha ${idx + 2}: DATA_FIM obrigatória.`);

    const duracao = computeDurationInclusive(inicio, fim);
    if(duracao <= 0){
      throw new Error(`Linha ${idx + 2}: DATA_FIM menor que DATA_INICIO.`);
    }

    const previsto = plannedPercentToday(inicio, fim);
    const real = 0;
    const status = calcImportedStatus(inicio, fim, real);

    mapped.push({
      id: cryptoRandomId(),
      ordem: idx + 1,
      ordemHier: id,
      nivel: levelFromId(id),
      nome: atividade,
      responsavel: "",
      inicio,
      fim,
      duracao,
      previsto,
      real,
      status,
      collapsed: false,
      comentarios: [],
      predecessora,
      modo: "comercial"
    });
  });

  // valida predecessoras
  const ids = new Set(mapped.map(x => x.ordemHier));
  mapped.forEach((item) => {
    if(item.predecessora && !ids.has(item.predecessora)){
      throw new Error(`Predecessora ${item.predecessora} não encontrada no arquivo.`);
    }
  });

  return mapped;
}

async function importarExcelParaCronograma(file){
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array" });
  const firstSheetName = wb.SheetNames[0];
  if(!firstSheetName){
    throw new Error("Planilha vazia.");
  }

  const ws = wb.Sheets[firstSheetName];
  const rows = XLSX.utils.sheet_to_json(ws, {
    defval: "",
    raw: true
  });

  if(!rows.length){
    throw new Error("Nenhuma linha encontrada na planilha.");
  }

  const atividades = mapExcelRowsToCronograma(rows);

  if(!atividades.length){
    throw new Error("Nenhuma atividade válida encontrada.");
  }

  const payload = {
    origem: "excel",
    importedAt: new Date().toISOString(),
    atividades
  };

  sessionStorage.setItem("ERPIMPAR_CRONO_IMPORT", JSON.stringify(payload));
  location.href = "/cronograma/cronograma.html?novo=1&importado=1";
}

  async function loadFarol(){
    setStatus("Atualizando farol...", "ok");
    cardsGrid.innerHTML = cardNovoHtml();

    let lista = [];

    try{
      const j = await fetchJsonSafe(API + "listar_obras_farol.php");
      lista = Array.isArray(j.data) ? j.data : [];
    }catch(e){
      console.warn("listar_obras_farol.php falhou:", e);
      try{
        const j2 = await fetchJsonSafe(API + "listar_obras.php");
        lista = Array.isArray(j2.data) ? j2.data : [];
      }catch(e2){
        console.error(e2);
        setStatus("Erro ao carregar o farol.", "err");
        return;
      }
    }

    const obrasValidas = lista
      .map(x => ({
        id: normalizeId(x.id),
        nome: String(x.nome || x.obra || "").trim()
      }))
      .filter(x => !isInvalidGhostId(x.id));

    const unicas = [];
    const seen = new Set();
    obrasValidas.forEach(x => {
      const k = x.id;
      if(seen.has(k)) return;
      seen.add(k);
      unicas.push(x);
    });

    const resumos = [];

    for(const obra of unicas){
      try{
        const j = await fetchJsonSafe(API + "carregar_cronograma.php?id=" + encodeURIComponent(obra.id));
        if(!j || j.ok !== true || !j.data) continue;

        const data = j.data;
        const idReal = normalizeId(data.id || obra.id);
        if(isInvalidGhostId(idReal)) continue;

        const resumo = computeResumoCronograma(data);
        resumo.id = idReal;
        resumo.nome = String(data.nome || obra.nome || "").trim();

        resumos.push(resumo);
      }catch(e){
        console.warn("Falha ao resumir obra", obra.id, e);
      }
    }

    resumos.sort((a, b) => a.nome.localeCompare(b.nome, "pt-BR"));

    const html = [cardNovoHtml(), ...resumos.map(cardObraHtml)].join("");
    cardsGrid.innerHTML = html;

    setStatus(`Farol atualizado. ${resumos.length} obra(s) carregada(s).`, "ok");
  }

  document.getElementById("btnVoltarMenu").addEventListener("click", () => {
    location.href = "/menu.html";
  });

  document.getElementById("btnAtualizar").addEventListener("click", loadFarol);

  window.__abrirNovoCronograma = abrirNovoCronograma;
  window.__abrirImportacaoPlanilha = abrirImportacaoPlanilha;
  window.__abrirCronograma = abrirCronograma;

      console.error(err);
      setStatus("Erro ao importar planilha.", "err");
      alert("Erro ao importar planilha:\n\n" + (err.message || err));
    }
  });
}

  loadUser();
  loadFarol();
})();
