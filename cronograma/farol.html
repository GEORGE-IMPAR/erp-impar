<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERP ÍMPAR — Farol de Obras</title>

  <style>
    :root{
      --bg1:#0b1e4a;
      --bg2:#0e3b6e;
      --bg3:#0f766e;

      --panel: rgba(2,6,23,.66);
      --panel2: rgba(2,6,23,.78);
      --border: rgba(148,163,184,.45);

      --text: #e5e7eb;
      --soft: rgba(229,231,235,.78);

      --blue:#3b82f6;
      --green:#22c55e;
      --red:#ef4444;
      --yellow:#f59e0b;

      --radius: 18px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      min-height:100vh;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
      display:flex;
      flex-direction:column;
      opacity:0;
    }

    @keyframes imparEnter{
      0%{opacity:0; transform: translateY(28px) scale(.98); filter: blur(10px);}
      100%{opacity:1; transform: translateY(0) scale(1); filter: blur(0);}
    }
    body.impar-enter{animation:imparEnter .75s cubic-bezier(.16,1,.3,1) both;}
    @media (prefers-reduced-motion: reduce){
      body{opacity:1}
      body.impar-enter{animation:none}
    }

    header{
      padding:14px 14px 10px;
      display:flex;
      justify-content:center;
    }
    .header-inner{
      width:100%;
      max-width:1440px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-shadow:0 2px 6px rgba(0,0,0,.75);
      min-width:0;
    }
    .logo-orb{
      width:36px;height:36px;border-radius:999px;flex:0 0 auto;
      position:relative;
      background: conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);
      box-shadow:0 10px 22px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.18) inset;
      overflow:hidden;
    }
    .logo-orb:before{
      content:""; position:absolute; inset:-6px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.55), transparent 55%);
    }
    .brand-text{display:flex; flex-direction:column; gap:2px; min-width:0;}
    .brand-kicker{font-size:12px; letter-spacing:.22em; text-transform:uppercase; font-weight:800; opacity:.9;}
    .brand-title{font-size:18px; font-weight:900; line-height:1.05;}
    .brand-sub{font-size:14px; font-weight:800; opacity:.92; line-height:1.1;}

    .tag-top{
      margin-left:auto;
      font-size:11px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(15,23,42,.85);
      border:1px solid rgba(148,163,184,.6);
      color:var(--soft);
      display:flex;
      align-items:center;
      gap:8px;
    }
    .pill-btn{
      border:none;
      background:transparent;
      color:inherit;
      font:inherit;
      display:flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
      padding:0;
    }
    .pill-btn:hover{filter:brightness(1.08)}

    main{
      flex:1 0 auto;
      display:flex;
      justify-content:center;
      padding:12px 16px 18px;
    }
    .layout{
      width:100%;
      max-width:1440px;
      display:flex;
      justify-content:center;
    }
    .container{
      width:100%;
      border-radius:var(--radius);
      border:1px solid rgba(148,163,184,.6);
      box-shadow:0 24px 60px rgba(15,23,42,.9);
      background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
      padding:18px;
    }

    .topbox{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:12px 14px;
      border-radius:14px;
      border:2px solid rgba(34,197,94,.45);
      background:linear-gradient(120deg, rgba(2,6,23,.78), rgba(2,6,23,.35));
      box-shadow:0 18px 60px rgba(0,0,0,.35);
      flex-wrap:wrap;
    }
    .topbox-left .title{
      font-size:18px;
      font-weight:900;
      margin-bottom:4px;
    }
    .user-label{
      font-size:11px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(156,163,175,.92);
      margin-bottom:2px;
      font-weight:800;
    }
    .user-values{
      font-size:12px;
      color:#cfd8ff;
      line-height:1.25;
      font-weight:700;
    }
    .topbox-center{
      flex:1 1 300px;
      min-width:260px;
      text-align:center;
      padding:0 10px;
    }
    .code-line{
      font-size:20px;
      font-weight:900;
      letter-spacing:.4px;
      color:rgba(229,231,235,.98);
    }
    .sub-line{
      margin-top:4px;
      font-size:15px;
      color:rgba(229,231,235,.92);
      opacity:.95;
    }

    .toolbar{
      margin:14px 0;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:10px 16px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-weight:900;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-width:220px;
      transition: transform .22s cubic-bezier(.16,1,.3,1),
                  box-shadow .22s cubic-bezier(.16,1,.3,1),
                  filter .22s cubic-bezier(.16,1,.3,1);
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{
        background:linear-gradient(135deg,#22c55e,#16a34a);
        color:#020617;
        box-shadow:
          0 0 0 1px rgba(34,197,94,.85),
          0 0 18px rgba(34,197,94,.35),
          0 10px 30px rgba(22,163,74,.55);
    }
    .btn-primary:hover{
        transform:translateY(-1px) scale(1.02);
        filter:brightness(1.05) saturate(1.1);
        box-shadow:
          0 0 0 1px rgba(34,197,94,.95),
          0 0 24px rgba(34,197,94,.55),
          0 18px 45px rgba(22,163,74,.55);
    }
    .btn-secondary{
      background:#111827;
      color:#fff;
      border:1px solid #374151;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:14px;
    }

    .card{
      border-radius:18px;
      border:1px solid rgba(148,163,184,.25);
      background:rgba(2,6,23,.55);
      padding:16px;
      box-shadow:0 18px 48px rgba(0,0,0,.16);
      backdrop-filter:blur(10px);
    }

    .obra-title{
      font-size:18px;
      font-weight:1000;
      color:#fff;
      line-height:1.2;
    }
    .obra-id{
      margin-top:4px;
      font-size:12px;
      color:#cbd5e1;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:10px;
      margin-top:14px;
    }
    .stat{
      border-radius:14px;
      border:1px solid rgba(148,163,184,.16);
      background:rgba(255,255,255,.04);
      padding:10px;
    }
    .stat-k{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:#94a3b8;
      font-weight:900;
    }
    .stat-v{
      margin-top:6px;
      font-size:20px;
      font-weight:1000;
    }

    .status-ok{color:#86efac}
    .status-warn{color:#fde68a}
    .status-bad{color:#fca5a5}
    .status-info{color:#93c5fd}

    .card-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .mini-btn{
      border:none;
      border-radius:999px;
      padding:10px 14px;
      font-size:11px;
      font-weight:900;
      cursor:pointer;
      background:#0f172a;
      color:#fff;
      border:1px solid rgba(148,163,184,.25);
    }

    .empty{
      border-radius:18px;
      border:1px dashed rgba(148,163,184,.35);
      padding:24px;
      text-align:center;
      color:#cbd5e1;
      background:rgba(2,6,23,.25);
    }

    footer{
      margin-top:auto;
      background:#020617;
      color:#9ca3af;
      padding:8px 12px;
      font-size:10px;
    }
    .rodape-inner{
      max-width:1440px;
      margin:0 auto;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    @media (max-width: 900px){
      .topbox-center{text-align:left}
      .btn{width:100%; min-width:unset;}
      .stats{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="brand">
      <div class="logo-orb" aria-hidden="true"></div>
      <div class="brand-text">
        <div class="brand-kicker">PLATAFORMA</div>
        <div class="brand-title">ERP ÍMPAR</div>
        <div class="brand-sub">Farol de Obras</div>
      </div>
    </div>
    <div class="tag-top">
      <button class="pill-btn" id="btnVoltarMenu" type="button"><span>🏠</span> Menu principal</button>
    </div>
  </div>
</header>

<main>
  <div class="layout">
    <div class="container">

      <div class="topbox">
        <div class="topbox-left">
          <div class="title">Farol de Obras</div>
          <div class="user-label">Logado como</div>
          <div class="user-values">
            <strong id="userName">Usuário</strong><br/>
            <span id="userEmail">—</span>
          </div>
        </div>

        <div class="topbox-center">
          <div class="code-line">Visão Consolidada</div>
          <div class="sub-line">O farol reflete exatamente o resumo oficial salvo no cronograma</div>
        </div>
      </div>

      <div class="toolbar">
        <button class="btn btn-primary" id="btnAtualizar" type="button">🔄 Atualizar</button>
      </div>

      <div class="grid" id="grid"></div>

    </div>
  </div>
</main>

<footer>
  <div class="rodape-inner">
    <div>ERP ÍMPAR • Farol de Obras</div>
    <div>Leitura oficial do servidor</div>
  </div>
</footer>

<script>
(() => {
  const KEY = "ERPIMPAR_USER";
  const API = "https://api.erpimpar.com.br/cronograma/";
  const grid = document.getElementById("grid");

  function getSessaoERP(){
    const raw = localStorage.getItem(KEY) || sessionStorage.getItem(KEY);
    if(!raw) return null;
    try { return JSON.parse(raw); } catch { return null; }
  }

  function loadUser(){
    const u = getSessaoERP();
    if(!u){
      location.href = "/index.html";
      return;
    }
    document.getElementById("userName").textContent  = (u.nome || u.Nome || "Usuário");
    document.getElementById("userEmail").textContent = (u.email || u.Email || "—");
  }

  function statusClass(s){
    if(s === "Concluído") return "status-ok";
    if(s === "Atrasado") return "status-bad";
    if(s === "Em andamento") return "status-warn";
    return "status-info";
  }

  async function fetchJsonSafe(url){
    const r = await fetch(url, { cache:"no-store" });
    const text = await r.text();

    if(!r.ok){
      throw new Error("HTTP " + r.status + " - " + text);
    }

    if(!text || !text.trim()){
      throw new Error("Resposta vazia do servidor.");
    }

    try{
      return JSON.parse(text);
    }catch(err){
      console.error("Resposta bruta da API:", text);
      throw new Error("API não retornou JSON válido.");
    }
  }

  async function loadFarol(){
    grid.innerHTML = `<div class="empty">Carregando farol…</div>`;

    try{
      const j = await fetchJsonSafe(API + "listar_obras_farol.php");
      const list = Array.isArray(j.data) ? j.data : [];

      if(!list.length){
        grid.innerHTML = `<div class="empty">Nenhuma obra encontrada.</div>`;
        return;
      }

      grid.innerHTML = "";

      list.forEach(o=>{
        const resumo = o.resumo || {};
        const status = resumo.status || "Sem baseline";

        const el = document.createElement("div");
        el.className = "card";

        el.innerHTML = `
          <div class="obra-title">${o.nome || ("Obra " + o.id)}</div>
          <div class="obra-id">ID: ${o.id}</div>

          <div class="stats">
            <div class="stat">
              <div class="stat-k">Previsto</div>
              <div class="stat-v">${Number(resumo.previsto || 0)}%</div>
            </div>
            <div class="stat">
              <div class="stat-k">Real</div>
              <div class="stat-v">${Number(resumo.real || 0)}%</div>
            </div>
            <div class="stat">
              <div class="stat-k">Status</div>
              <div class="stat-v ${statusClass(status)}">${status}</div>
            </div>
          </div>

          <div class="card-actions">
            <button class="mini-btn btn-open" type="button">📂 Abrir cronograma</button>
          </div>
        `;

        el.querySelector(".btn-open").addEventListener("click", ()=>{
          location.href = "/cronograma/cronograma.html?id=" + encodeURIComponent(o.id);
        });

        grid.appendChild(el);
      });

    }catch(e){
      console.error(e);
      grid.innerHTML = `<div class="empty">Erro ao carregar o farol.<br><br>${e.message || e}</div>`;
    }
  }

  document.getElementById("btnVoltarMenu").addEventListener("click", ()=> location.href = "/menu.html");
  document.getElementById("btnAtualizar").addEventListener("click", loadFarol);

  document.body.classList.add("impar-enter");
  loadUser();
  loadFarol();
})();
</script>
</body>
</html>
