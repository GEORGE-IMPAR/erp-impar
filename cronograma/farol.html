<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERP ÍMPAR — Farol de Obras</title>

  <style>
    :root{
      --bg1:#0b1e4a;
      --bg2:#0e3b6e;
      --bg3:#0f766e;

      --panel: rgba(2,6,23,.66);
      --panel2: rgba(2,6,23,.78);
      --border: rgba(148,163,184,.45);

      --text:#e5e7eb;
      --soft:rgba(229,231,235,.78);

      --blue:#3b82f6;
      --green:#22c55e;
      --red:#ef4444;
      --yellow:#f59e0b;
      --slate:#94a3b8;

      --radius:18px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      min-height:100vh;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
      display:flex;
      flex-direction:column;
      opacity:0;
    }

    @keyframes imparEnter{
      0%{opacity:0; transform:translateY(28px) scale(.98); filter:blur(10px);}
      100%{opacity:1; transform:translateY(0) scale(1); filter:blur(0);}
    }
    body.impar-enter{animation:imparEnter .75s cubic-bezier(.16,1,.3,1) both;}

    header{
      padding:14px 14px 10px;
      display:flex;
      justify-content:center;
    }
    .header-inner{
      width:100%;
      max-width:1440px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-shadow:0 2px 6px rgba(0,0,0,.75);
      min-width:0;
    }
    .logo-orb{
      width:36px;height:36px;border-radius:999px;flex:0 0 auto;
      position:relative;
      background:conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);
      box-shadow:0 10px 22px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.18) inset;
      overflow:hidden;
    }
    .logo-orb:before{
      content:""; position:absolute; inset:-6px;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.55), transparent 55%);
    }
    .brand-text{display:flex;flex-direction:column;gap:2px;min-width:0;}
    .brand-kicker{font-size:12px;letter-spacing:.22em;text-transform:uppercase;font-weight:800;opacity:.9;}
    .brand-title{font-size:18px;font-weight:900;line-height:1.05;}
    .brand-sub{font-size:14px;font-weight:800;opacity:.92;line-height:1.1;}

    .tag-top{
      margin-left:auto;
      font-size:11px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(15,23,42,.85);
      border:1px solid rgba(148,163,184,.6);
      color:var(--soft);
      display:flex;
      align-items:center;
      gap:8px;
    }
    .pill-btn{
      border:none;
      background:transparent;
      color:inherit;
      font:inherit;
      display:flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
      padding:0;
      transition:transform .16s ease, filter .16s ease;
    }
    .pill-btn:hover{filter:brightness(1.08); transform:translateY(-1px)}

    main{
      flex:1 0 auto;
      display:flex;
      justify-content:center;
      padding:12px 16px 18px;
    }
    .layout{
      width:100%;
      max-width:1440px;
      display:flex;
      justify-content:center;
    }
    .container{
      width:100%;
      border-radius:var(--radius);
      border:1px solid rgba(148,163,184,.45);
      box-shadow:0 24px 60px rgba(15,23,42,.9);
      background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
      padding:18px;
    }

    .topbox{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:12px 14px;
      border-radius:14px;
      border:2px solid rgba(34,197,94,.45);
      background:linear-gradient(120deg, rgba(2,6,23,.78), rgba(2,6,23,.35));
      box-shadow:0 18px 60px rgba(0,0,0,.35);
      flex-wrap:wrap;
    }
    .topbox-left .title{
      font-size:18px;
      font-weight:900;
      margin-bottom:4px;
    }
    .user-label{
      font-size:11px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(156,163,175,.92);
      margin-bottom:2px;
      font-weight:800;
    }
    .user-values{
      font-size:12px;
      color:#cfd8ff;
      line-height:1.25;
      font-weight:700;
    }
    .topbox-center{
      flex:1 1 320px;
      min-width:280px;
      text-align:center;
      padding:0 10px;
    }
    .code-line{
      font-size:20px;
      font-weight:900;
      letter-spacing:.4px;
      color:rgba(229,231,235,.98);
    }
    .sub-line{
      margin-top:4px;
      font-size:15px;
      color:rgba(229,231,235,.92);
      opacity:.95;
    }

    .toolbar{
      margin:14px 0 10px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:10px 16px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-weight:900;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-width:210px;
      transition:transform .22s cubic-bezier(.16,1,.3,1),
                 box-shadow .22s cubic-bezier(.16,1,.3,1),
                 filter .22s cubic-bezier(.16,1,.3,1);
      will-change:transform;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:#020617;
      border:1px solid rgba(34,197,94,.85);
      box-shadow:
        0 0 0 1px rgba(34,197,94,.85),
        0 0 18px rgba(34,197,94,.28),
        0 10px 28px rgba(22,163,74,.45);
    }
    .btn-primary:hover{
      filter:brightness(1.06) saturate(1.12);
      box-shadow:
        0 0 0 1px rgba(34,197,94,.95),
        0 0 24px rgba(34,197,94,.55),
        0 18px 45px rgba(22,163,74,.55);
    }
    .btn-secondary{
      background:#111827;
      color:#fff;
      border:1px solid #374151;
    }

    .legend{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin:4px 0 14px;
    }
    .legend-item{
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(2,6,23,.45);
      border:1px solid rgba(148,163,184,.18);
      font-size:11px;
      font-weight:900;
      color:#e5e7eb;
    }
    .legend-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      display:inline-block;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:14px;
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:18px;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(2,6,23,.52);
      padding:16px;
      box-shadow:0 18px 48px rgba(0,0,0,.14);
      backdrop-filter:blur(10px);
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, filter .18s ease;
    }
    .card:hover{
      transform:translateY(-3px) scale(1.01);
      box-shadow:0 24px 54px rgba(0,0,0,.22);
      border-color:rgba(255,255,255,.16);
      filter:brightness(1.03);
    }
    .card::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:radial-gradient(circle at top right, rgba(255,255,255,.09), transparent 28%);
    }

    .card-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }

    .icon-wrap{
      width:42px;
      height:42px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      font-size:20px;
      box-shadow:0 10px 20px rgba(0,0,0,.18);
    }

    .title-wrap{flex:1 1 auto; min-width:0;}
    .obra-title{
      font-size:24px;
      font-weight:1000;
      color:#fff;
      line-height:1.08;
      letter-spacing:.01em;
    }
    .obra-id{
      margin-top:6px;
      font-size:12px;
      color:#cbd5e1;
      font-weight:800;
      letter-spacing:.05em;
      text-transform:uppercase;
    }

    .status-badge{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.20);
      background:rgba(2,6,23,.55);
      font-size:11px;
      font-weight:900;
      color:#e5e7eb;
      white-space:nowrap;
    }
    .status-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      display:inline-block;
    }

    .status-nao-iniciado .status-dot{background:#94a3b8;box-shadow:0 0 0 4px rgba(148,163,184,.12)}
    .status-em-andamento .status-dot{background:#f59e0b;box-shadow:0 0 0 4px rgba(245,158,11,.12)}
    .status-atrasado .status-dot{background:#ef4444;box-shadow:0 0 0 4px rgba(239,68,68,.12)}
    .status-concluido .status-dot{background:#22c55e;box-shadow:0 0 0 4px rgba(34,197,94,.12)}

    .status-nao-iniciado{border-color:rgba(148,163,184,.20)}
    .status-em-andamento{border-color:rgba(245,158,11,.24)}
    .status-atrasado{border-color:rgba(239,68,68,.24)}
    .status-concluido{border-color:rgba(34,197,94,.24)}

    .metrics{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:16px;
    }

    .metric{
      border-radius:14px;
      border:1px solid rgba(148,163,184,.16);
      background:rgba(255,255,255,.04);
      padding:10px;
    }
    .metric-k{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:#94a3b8;
      font-weight:900;
    }
    .metric-v{
      margin-top:6px;
      font-size:24px;
      font-weight:1000;
      line-height:1;
    }

    .bars{
      margin-top:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .bar-label{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:11px;
      font-weight:900;
      color:#cbd5e1;
      margin-bottom:5px;
    }
    .bar-track{
      height:10px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.04);
    }
    .bar-fill{
      height:100%;
      border-radius:999px;
      width:0%;
      transition:width .4s ease;
    }
    .bar-prev{background:linear-gradient(90deg,#38bdf8,#3b82f6)}
    .bar-real{background:linear-gradient(90deg,#22c55e,#16a34a)}

    .card-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .mini-btn{
      border:none;
      border-radius:999px;
      padding:10px 14px;
      font-size:11px;
      font-weight:900;
      cursor:pointer;
      background:#0f172a;
      color:#fff;
      border:1px solid rgba(148,163,184,.25);
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease, filter .18s ease;
    }
    .mini-btn:hover{
      transform:translateY(-1px);
      border-color:rgba(59,130,246,.35);
      box-shadow:0 10px 20px rgba(0,0,0,.22), 0 0 16px rgba(59,130,246,.16);
      filter:brightness(1.04);
    }

    .new-card{
      background:
        radial-gradient(circle at 90% 0%, rgba(34,197,94,.18), transparent 28%),
        radial-gradient(circle at 0% 100%, rgba(59,130,246,.18), transparent 28%),
        rgba(2,6,23,.58);
      border:1px solid rgba(34,197,94,.28);
      box-shadow:0 18px 48px rgba(0,0,0,.14), 0 0 20px rgba(34,197,94,.08);
    }
    .new-card:hover{
      border-color:rgba(34,197,94,.48);
      box-shadow:0 22px 52px rgba(0,0,0,.20), 0 0 30px rgba(34,197,94,.18);
    }

    .empty{
      border-radius:18px;
      border:1px dashed rgba(148,163,184,.35);
      padding:24px;
      text-align:center;
      color:#cbd5e1;
      background:rgba(2,6,23,.25);
    }

    footer{
      margin-top:auto;
      background:#020617;
      color:#9ca3af;
      padding:8px 12px;
      font-size:10px;
    }
    .rodape-inner{
      max-width:1440px;
      margin:0 auto;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    @media (max-width: 900px){
      .topbox-center{text-align:left}
      .btn{width:100%; min-width:unset;}
      .metrics{grid-template-columns:1fr 1fr}
      .obra-title{font-size:20px}
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="brand">
      <div class="logo-orb" aria-hidden="true"></div>
      <div class="brand-text">
        <div class="brand-kicker">PLATAFORMA</div>
        <div class="brand-title">ERP ÍMPAR</div>
        <div class="brand-sub">Farol de Obras</div>
      </div>
    </div>

    <div class="tag-top">
      <button class="pill-btn" id="btnVoltarMenu" type="button"><span>🏠</span> Menu principal</button>
    </div>
  </div>
</header>

<main>
  <div class="layout">
    <div class="container">

      <div class="topbox">
        <div class="topbox-left">
          <div class="title">Farol de Obras</div>
          <div class="user-label">Logado como</div>
          <div class="user-values">
            <strong id="userName">Usuário</strong><br/>
            <span id="userEmail">—</span>
          </div>
        </div>

        <div class="topbox-center">
          <div class="code-line">Visão Consolidada</div>
          <div class="sub-line">O farol reflete exatamente o resumo oficial salvo no cronograma</div>
        </div>
      </div>

      <div class="toolbar">
        <button class="btn btn-primary" id="btnAtualizar" type="button">🔄 Atualizar</button>
      </div>

      <div class="legend">
        <div class="legend-item"><span class="legend-dot" style="background:#94a3b8"></span> Não iniciado</div>
        <div class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span> Em andamento</div>
        <div class="legend-item"><span class="legend-dot" style="background:#ef4444"></span> Atrasado</div>
        <div class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> Concluído</div>
      </div>

      <div class="grid" id="grid"></div>
    </div>
  </div>
</main>

<footer>
  <div class="rodape-inner">
    <div>ERP ÍMPAR • Farol de Obras</div>
    <div>Leitura oficial do servidor</div>
  </div>
</footer>

<script>
(() => {
  const KEY = "ERPIMPAR_USER";
  const API = "https://api.erpimpar.com.br/cronograma/";
  const grid = document.getElementById("grid");

  function getSessaoERP(){
    const raw = localStorage.getItem(KEY) || sessionStorage.getItem(KEY);
    if(!raw) return null;
    try { return JSON.parse(raw); } catch { return null; }
  }

  function loadUser(){
    const u = getSessaoERP();
    if(!u){
      location.href = "/index.html";
      return;
    }
    document.getElementById("userName").textContent  = (u.nome || u.Nome || "Usuário");
    document.getElementById("userEmail").textContent = (u.email || u.Email || "—");
  }

  function pct(n){
    const v = Number(n || 0);
    if(!Number.isFinite(v)) return 0;
    return Math.max(0, Math.min(100, v));
  }

  function getStatusMeta(status){
    const s = String(status || "").toLowerCase();

    if (s.indexOf("conclu") >= 0) return { cls:"status-concluido", label:"Concluído", icon:"🟢" };
    if (s.indexOf("atras") >= 0) return { cls:"status-atrasado", label:"Atrasado", icon:"🔴" };
    if (s.indexOf("andamento") >= 0) return { cls:"status-em-andamento", label:"Em andamento", icon:"🟡" };
    return { cls:"status-nao-iniciado", label:"Não iniciado", icon:"⚪" };
  }

  async function fetchJsonSafe(url){
    const r = await fetch(url, { cache:"no-store" });
    const text = await r.text();

    if(!r.ok){
      throw new Error("HTTP " + r.status + " - " + text);
    }
    if(!text || !text.trim()){
      throw new Error("Resposta vazia do servidor.");
    }

    try{
      return JSON.parse(text);
    }catch(e){
      console.error("Resposta bruta:", text);
      throw new Error("JSON inválido retornado pela API.");
    }
  }

  function cardNovoCronograma(){
    const el = document.createElement("div");
    el.className = "card new-card";
    el.innerHTML = `
      <div class="card-top">
        <div class="icon-wrap">✨</div>
        <div class="title-wrap">
          <div class="obra-title">Novo cronograma</div>
          <div class="obra-id">Criar nova obra ou importar template base</div>
        </div>
        <div class="status-badge status-concluido">
          <span class="status-dot"></span>
          <span>Pronto</span>
        </div>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-k">Ação</div>
          <div class="metric-v">Nova</div>
        </div>
        <div class="metric">
          <div class="metric-k">Modelo</div>
          <div class="metric-v">Template</div>
        </div>
      </div>

      <div class="bars">
        <div>
          <div class="bar-label"><span>Início rápido</span><span>100%</span></div>
          <div class="bar-track"><div class="bar-fill bar-real" style="width:100%"></div></div>
        </div>
      </div>

      <div class="card-actions">
        <button class="mini-btn" type="button" id="btnNovoCronogramaCard">➕ Criar agora</button>
      </div>
    `;
    el.querySelector("#btnNovoCronogramaCard").addEventListener("click", () => {
      location.href = "/cronograma/cronograma.html?id=001";
    });
    return el;
  }

  function buildCard(item){
    const el = document.createElement("div");
    el.className = "card";

    const nome = item.nome || item.obra || ("OBRA " + (item.id || ""));
    const id = item.id || "—";
    const resumo = item.resumo || {};
    const previsto = pct(resumo.previsto);
    const real = pct(resumo.real);
    const meta = getStatusMeta(resumo.status);

    el.innerHTML = `
      <div class="card-top">
        <div class="icon-wrap">🏗️</div>

        <div class="title-wrap">
          <div class="obra-title">${escapeHtml(nome)}</div>
          <div class="obra-id">ID: ${escapeHtml(String(id))}</div>
        </div>

        <div class="status-badge ${meta.cls}">
          <span class="status-dot"></span>
          <span>${meta.label}</span>
        </div>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-k">Previsto</div>
          <div class="metric-v">${previsto}%</div>
        </div>
        <div class="metric">
          <div class="metric-k">Real</div>
          <div class="metric-v">${real}%</div>
        </div>
      </div>

      <div class="bars">
        <div>
          <div class="bar-label"><span>Planejado</span><span>${previsto}%</span></div>
          <div class="bar-track"><div class="bar-fill bar-prev" style="width:${previsto}%"></div></div>
        </div>

        <div>
          <div class="bar-label"><span>Executado</span><span>${real}%</span></div>
          <div class="bar-track"><div class="bar-fill bar-real" style="width:${real}%"></div></div>
        </div>
      </div>

      <div class="card-actions">
        <button class="mini-btn btn-open" type="button">📂 Abrir cronograma</button>
      </div>
    `;

    el.querySelector(".btn-open").addEventListener("click", () => {
      location.href = "/cronograma/cronograma.html?id=" + encodeURIComponent(id);
    });

    return el;
  }

  function escapeHtml(s){
    return String(s ?? "").replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  async function loadFarol(){
    grid.innerHTML = `<div class="empty">Carregando farol…</div>`;

    try{
      const j = await fetchJsonSafe(API + "listar_obras_farol.php");
      const list = Array.isArray(j.data) ? j.data : [];

      grid.innerHTML = "";
      grid.appendChild(cardNovoCronograma());

      if(!list.length){
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Nenhuma obra encontrada.";
        grid.appendChild(empty);
        return;
      }

      list.forEach(item => grid.appendChild(buildCard(item)));
    }catch(e){
      console.error(e);
      grid.innerHTML = `<div class="empty">Erro ao carregar o farol.<br><br>${escapeHtml(e.message || String(e))}</div>`;
    }
  }

  document.getElementById("btnVoltarMenu").addEventListener("click", () => {
    location.href = "/menu.html";
  });

  document.getElementById("btnAtualizar").addEventListener("click", loadFarol);

  document.body.classList.add("impar-enter");
  loadUser();
  loadFarol();
})();
</script>
</body>
</html>
