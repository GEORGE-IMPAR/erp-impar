<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ERP ÍMPAR - Cronograma v3</title>
</head>
<body>
<h1>Cronograma v3</h1>
<button onclick="salvarBaseline()">Salvar Baseline</button>
<table border="1" width="100%">
<thead>
<tr>
<th>Ordem</th>
<th>Atividade</th>
<th>% Real</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>
let obra;

function load(){
 fetch('https://api.erpimpar.com.br/cronograma/carregar_cronograma.php?id=001')
 .then(r=>r.json())
 .then(data=>{
   obra = data;
   render();
 });
}

function render(){
 const tbody = document.getElementById('tabela');
 tbody.innerHTML = obra.real.atividades.map(a=>`
  <tr>
   <td>${a.ordem}</td>
   <td contenteditable oninput="update(${a.id}, this.innerText)">${a.atividade}</td>
   <td><input type="number" value="${a.realPercent}" 
       onchange="updateReal(${a.id}, this.value)" /></td>
  </tr>
 `).join('');
}

function update(id, txt){
 const a = obra.real.atividades.find(x=>x.id===id);
 a.atividade = txt;
 autosave();
}

function updateReal(id, val){
 const a = obra.real.atividades.find(x=>x.id===id);
 a.realPercent = Number(val);
 autosave();
}

function autosave(){
 fetch('https://api.erpimpar.com.br/cronograma/salvar_cronograma.php',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify(obra)
 });
}

function salvarBaseline(){
 fetch('https://api.erpimpar.com.br/cronograma/salvar_baseline.php',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({id:obra.id})
 });
}

load();
</script>
</body>
</html>
