<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ERP ÍMPAR | Centro Integrado de Gestão de Obras</title>
  <style>
    :root{--azul:#0f2f57;--azul2:#123f74;--verde:#23c55e;--verde2:#15a34a;--bg:#eef5fb;--card:#fff;--text:#102033;--muted:#607086;--amarelo:#f5b301;--vermelho:#ef4444;--borda:rgba(15,47,87,.12);--shadow:0 18px 42px rgba(15,47,87,.13)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(145deg,#eaf4fb,#f7fbff);color:var(--text)}
    .topbar{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;padding:14px 16px;box-shadow:0 12px 30px rgba(15,47,87,.24)}
    .topbar-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:14px;justify-content:space-between}.brand{display:flex;align-items:center;gap:12px}.orb{width:42px;height:42px;border-radius:999px;background:radial-gradient(circle at 30% 30%,#7df7ae,var(--verde),#0b7d3a);box-shadow:0 0 22px rgba(35,197,94,.55)}.brand h1{font-size:18px;margin:0}.brand p{font-size:12px;margin:2px 0 0;color:rgba(255,255,255,.72)}.user{font-size:12px;text-align:right;color:rgba(255,255,255,.78)}
    main{max-width:1180px;margin:0 auto;padding:18px 14px 92px}.hero{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;margin:8px 0 18px}.hero h2{margin:0;font-size:22px}.hero p{margin:4px 0 0;color:var(--muted);font-size:13px}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    button{border:0;border-radius:14px;padding:11px 14px;font-weight:800;cursor:pointer}.btn-primary{background:linear-gradient(135deg,var(--verde),var(--verde2));color:#fff;box-shadow:0 12px 24px rgba(35,197,94,.25)}.btn-secondary{background:#fff;color:var(--azul);border:1px solid var(--borda)}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.kpi{background:#fff;border:1px solid var(--borda);border-radius:20px;padding:14px;box-shadow:0 10px 26px rgba(15,47,87,.07)}.kpi strong{display:block;font-size:22px}.kpi span{color:var(--muted);font-size:12px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{background:var(--card);border:1px solid var(--borda);border-radius:22px;padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--verde)}.card.amarelo:before{background:var(--amarelo)}.card.vermelho:before{background:var(--vermelho)}
    .card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.obra{font-weight:900;font-size:16px;line-height:1.2}.coord{font-size:12px;color:var(--muted);margin-top:4px}.badge{border-radius:999px;padding:7px 10px;font-size:11px;font-weight:900;background:#e9fff2;color:#0d813b}.badge.amarelo{background:#fff7da;color:#9a6800}.badge.vermelho{background:#ffecec;color:#b91c1c}
    .progress{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}.prog{background:#f3f7fb;border-radius:15px;padding:10px}.prog small{display:block;color:var(--muted);font-size:11px}.prog b{font-size:18px}.bar{height:8px;background:#dfeaf4;border-radius:999px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--verde),#7ee787)}
    .status-tv{border-radius:15px;background:#f8fbfe;padding:10px;color:#344357;font-size:12px;min-height:58px;line-height:1.35}.status-tv b{display:block;color:#123f74;margin-bottom:3px}.datas{font-size:11px;color:#607086;margin-top:6px}.meta{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:12px 0}.mini{background:#f8fbfe;border:1px solid var(--borda);border-radius:14px;padding:8px;text-align:center}.mini b{display:block;font-size:15px}.mini span{font-size:9px;color:var(--muted);text-transform:uppercase}.open{width:100%;margin-top:12px}.empty,.error{background:#fff;border:1px dashed var(--borda);border-radius:22px;padding:24px;text-align:center;color:var(--muted);grid-column:1/-1}
    .loader{position:fixed;inset:0;background:rgba(238,245,251,.82);display:none;align-items:center;justify-content:center;z-index:50}.loader.on{display:flex}.spin{width:54px;height:54px;border:6px solid #cfe0ee;border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--azul);color:#fff;padding:12px 16px;border-radius:16px;display:none;box-shadow:var(--shadow);z-index:60}.toast.on{display:block}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.hero{grid-template-columns:1fr}.actions{justify-content:flex-start}.user{display:none}.meta{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
  <div class="loader" id="loader"><div class="spin"></div></div><div class="toast" id="toast"></div>
  <header class="topbar"><div class="topbar-inner"><div class="brand"><div class="orb"></div><div><h1>Centro Integrado de Gestão de Obras</h1><p>ERP ÍMPAR · Dashboard operacional</p></div></div><div class="user" id="userBox">Usuário ERP</div></div></header>
  <main>
    <section class="hero"><div><h2>Obras integradas</h2><p>Resumo executivo + status diário consumidos das fontes oficiais/cache do ERP.</p></div><div class="actions"><button class="btn-secondary" onclick="voltarMenu()">Voltar ao menu</button><button class="btn-primary" onclick="carregarDashboard()">Atualizar</button></div></section>
    <section class="kpis"><div class="kpi"><strong id="kpiObras">0</strong><span>Obras carregadas</span></div><div class="kpi"><strong id="kpiVerde">0</strong><span>Farol verde</span></div><div class="kpi"><strong id="kpiAmarelo">0</strong><span>Farol amarelo</span></div><div class="kpi"><strong id="kpiVermelho">0</strong><span>Farol vermelho</span></div></section>
    <section id="grid" class="grid"></section>
  </main>
<script>
const API_CRONO='https://api.erpimpar.com.br/cronograma/';
const API_CIGO='https://api.erpimpar.com.br/centro-integrado-obras/';
const TV_JSON='https://api.erpimpar.com.br/tv/data/projetos.json';
const $=id=>document.getElementById(id);
function toast(msg){$('toast').textContent=msg;$('toast').classList.add('on');setTimeout(()=>$('toast').classList.remove('on'),3000)}
function loader(on){$('loader').classList.toggle('on',!!on)}
function voltarMenu(){ location.href='../menu.html'; }
function norm(v){return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z0-9]+/g,'_').replace(/^_|_$/g,'')}
function pct(v){const n=Number(String(v??0).replace('%','').replace(',','.'));return Number.isFinite(n)?Math.max(0,Math.min(100,Math.round(n*10)/10)):0}
function farolClasse(v){const f=norm(v);if(f.includes('VERMELH')||f.includes('ATRAS'))return'vermelho';if(f.includes('AMAREL')||f.includes('ATEN'))return'amarelo';return'verde'}
async function fetchJson(url,opts){const r=await fetch(url,opts||{cache:'no-store'});const t=await r.text();if(!r.ok)throw new Error(url+' '+r.status+' '+t);return JSON.parse(t)}
function arr(d){return Array.isArray(d)?d:(Array.isArray(d?.data?.projetos)?d.data.projetos:(Array.isArray(d?.projetos)?d.projetos:(Array.isArray(d?.data)?d.data:[])))}
function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[m]))}
function num(v){return Number(v||0)}
function id3(v){return String(v||'').replace(/\D/g,'').padStart(3,'0')}
function tvMap(tv){const m=new Map();arr(tv).forEach(x=>m.set(String(x.id||''),x));return m}
function cacheMap(cache){const m=new Map();(cache.items||[]).forEach(x=>m.set(id3(x.id),x));return m}
function isInvalid(id){const v=String(id||'').trim();return !v||v==='0'||v==='00'||v==='000'}
function isGroup(atividades,idx){const base=Number(atividades[idx]?.nivel||0);for(let i=idx+1;i<atividades.length;i++){const lvl=Number(atividades[i]?.nivel||0);if(lvl<=base)break;return true}return false}
function timelinePercent(inicio,fim){if(!inicio||!fim)return 0;const a=new Date(inicio+'T12:00:00'),b=new Date(fim+'T12:00:00'),h=new Date();h.setHours(12,0,0,0);const total=b-a;if(!(total>0))return 0;if(h<=a)return 0;if(h>=b)return 100;return pct(((h-a)/total)*100)}
function resumoCronograma(data){const atividades=Array.isArray(data.atividades)?data.atividades:[];const folhas=atividades.filter((a,i)=>!isGroup(atividades,i));const r=(data.resumo&&typeof data.resumo==='object')?data.resumo:{};const inicio=String(r.inicio||data.inicio||'').trim();const fim=String(r.fim||data.fim||'').trim();const previsto=Number(r.previsto??data.previsto??0);const real=Number(r.real??data.real??0);let andamento=0,concluidas=0,atrasadas=0,naoIniciadas=0;folhas.forEach(f=>{const st=String(f.status||'').toLowerCase();if(st.includes('conclu'))concluidas++;else if(st.includes('atras'))atrasadas++;else if(st.includes('andamento'))andamento++;else naoIniciadas++});let status=r.status||data.status||'Não iniciado';if(!status||status==='Não iniciado'){if(real>=100)status='Concluído';else if(real<=0&&previsto<=0)status='Não iniciado';else if(real>=previsto)status='Em andamento';else status='Atrasado'}return{id:String(data.id||'').trim(),nome:String(data.nome||data.obra||'').trim(),coordenador:String(data.coordenador||'').trim(),previsto:pct(previsto),real:pct(real),status,totalTarefas:folhas.length,duracaoProjeto:Number(r.dias??data.dias??0),inicioPrevisto:inicio,fimPrevisto:fim,andamento,concluidas,atrasadas,naoIniciadas,timelineHoje:timelinePercent(inicio,fim)}}
async function atualizarCacheFarol(){
  console.log('[CIGO] Atualizando cache do Farol...');
  const base=await fetchJson(API_CRONO+'listar_obras_farol.php');
  const ids=[...new Set((base.data||[]).map(x=>String(x.id||'').trim()).filter(id=>!isInvalid(id)))];
  const items=[];
  for(const id of ids){try{const j=await fetchJson(API_CRONO+'carregar_cronograma.php?id='+encodeURIComponent(id));if(j&&j.ok&&j.data)items.push(resumoCronograma(j.data));}catch(e){console.warn('[CIGO] Falha obra',id,e)}}
  const salvo=await fetchJson(API_CIGO+'cache_farol_save.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items})});
  console.log('[CIGO] Cache Farol salvo:',salvo);
  return {items,gerado_em:salvo.gerado_em,total:salvo.total};
}
async function carregarCache(){try{return await fetchJson(API_CIGO+'data/farol_cache.json?ts='+Date.now())}catch(e){return null}}
async function carregarDepara(){return await fetchJson(API_CIGO+'data/obra_depara.json?ts='+Date.now())}
function renderCard(r){
  const it=r.farol||{}; const tv=r.tv||{}; const nome=r.nome||it.nome||tv.nome||'Obra sem nome';
  const coord=it.coordenador||tv.coordenador||'Coordenador não informado'; const classe=farolClasse(tv.farol||it.status); const prev=pct(it.previsto); const real=pct(it.real);
  const statusTv=tv.status||'Status diário não informado.'; const datas=(it.inicioPrevisto||it.fimPrevisto)?`<div class="datas">Cronograma: ${esc(it.inicioPrevisto||'—')} até ${esc(it.fimPrevisto||'—')} · ${esc(it.duracaoProjeto||'—')} dias</div>`:'';
  return `<article class="card ${classe}"><div class="card-head"><div><div class="obra">${esc(nome)}</div><div class="coord">${esc(coord)}</div></div><span class="badge ${classe}">${esc(String(tv.farol||classe).toUpperCase())}</span></div><div class="progress"><div class="prog"><small>Planejado</small><b>${prev.toFixed(1).replace('.',',')}%</b><div class="bar"><i style="width:${prev}%"></i></div></div><div class="prog"><small>Realizado</small><b>${real.toFixed(1).replace('.',',')}%</b><div class="bar"><i style="width:${real}%"></i></div></div></div><div class="status-tv"><b>Status diário (TV)</b>${esc(statusTv)}${datas}</div><div class="meta"><div class="mini"><b>${num(it.andamento)}</b><span>And.</span></div><div class="mini"><b>${num(it.concluidas)}</b><span>Conc.</span></div><div class="mini"><b>${num(it.atrasadas)}</b><span>Atras.</span></div><div class="mini"><b>${num(it.naoIniciadas)}</b><span>N/I</span></div><div class="mini"><b>${num(it.totalTarefas)}</b><span>Total</span></div></div><button class="btn-primary open" onclick="abrirRdo('${encodeURIComponent(nome)}')">Abrir RDO</button></article>`;
}
function abrirRdo(nome){ location.href=`sala.html?obra=${nome}`; }
async function carregarDashboard(){loader(true);try{
  let cache=await atualizarCacheFarol().catch(async e=>{console.warn('[CIGO] cache novo falhou, usando cache existente',e);return await carregarCache()});
  if(!cache) cache=await carregarCache();
  const [depara,tv]=await Promise.all([carregarDepara(),fetchJson(TV_JSON)]);
  const cm=cacheMap(cache||{}), tm=tvMap(tv); const linhas=Object.values(depara.obras||depara||{});
  const dados=linhas.map(l=>({nome:l.obra||l.obra_key,farol:cm.get(id3(l.cronograma_id||l.farol_id)),tv:tm.get(String(l.tv_id||''))||{}}));
  $('grid').innerHTML=dados.length?dados.map(renderCard).join(''):'<div class="empty">Nenhuma obra retornou.</div>';
  const c={verde:0,amarelo:0,vermelho:0};dados.forEach(o=>c[farolClasse(o.tv?.farol||o.farol?.status)]++);$('kpiObras').textContent=dados.length;$('kpiVerde').textContent=c.verde;$('kpiAmarelo').textContent=c.amarelo;$('kpiVermelho').textContent=c.vermelho;toast('Dashboard e cache do RDO atualizados.');
}catch(e){console.error(e);$('grid').innerHTML='<div class="error">Erro ao carregar dados/cache do ERP.</div>';toast('Falha ao carregar dashboard.')}finally{loader(false)}}
(function init(){try{const u=JSON.parse(localStorage.getItem('ERPIMPAR_USER')||'{}');$('userBox').textContent=u.nome||u.email||'Usuário ERP'}catch(e){}carregarDashboard()})();
</script>
</body>
</html>
