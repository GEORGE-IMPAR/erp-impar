<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ERP ÍMPAR — Participantes RDO</title>
<style>:root{--bg1:#071d46;--bg2:#064b52;--ink:#eef6ff;--muted:#a8bdd4;--green:#22c55e;--blue:#3b82f6;--border:rgba(255,255,255,.14)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:linear-gradient(135deg,var(--bg1),#0d3f72,var(--bg2))}.head{position:sticky;top:0;z-index:10;padding:13px 18px;background:linear-gradient(90deg,rgba(11,42,90,.98),rgba(6,83,84,.98));border-bottom:1px solid var(--border);box-shadow:0 14px 36px rgba(0,0,0,.25)}.headin{max-width:1240px;margin:0 auto;display:flex;justify-content:space-between;gap:12px;align-items:center}.brand{display:flex;align-items:center;gap:12px}.logo{width:50px;height:50px;border-radius:17px;background:conic-gradient(from 210deg,#22d3ee,#7c3aed,#fb7185,#facc15,#22c55e,#22d3ee)}.k{font-size:11px;letter-spacing:.22em;color:#b8ff38;font-weight:950}.t{font-size:23px;font-weight:950}.sub{font-size:12px;color:#cbd5e1;font-weight:800}.menu{border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;border-radius:999px;padding:10px 14px;font-weight:950;text-decoration:none}.wrap{max-width:1240px;margin:0 auto;padding:18px}.panel{background:linear-gradient(135deg,rgba(8,26,58,.96),rgba(5,54,57,.92));border:1px solid var(--border);border-left:3px solid var(--green);border-radius:22px;padding:18px;box-shadow:0 24px 70px rgba(0,0,0,.34);margin-bottom:14px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.form{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}label{display:block;text-transform:uppercase;font-size:10px;letter-spacing:.14em;color:#b8c7dc;font-weight:950;margin-bottom:6px}input,select{width:100%;height:44px;border-radius:13px;border:1px solid rgba(255,255,255,.12);background:#020817;color:#fff;padding:0 13px;font-weight:900;outline:none}.obras{max-height:220px;overflow:auto;border:1px solid rgba(255,255,255,.12);background:rgba(2,8,23,.38);border-radius:16px;padding:10px;display:grid;gap:7px}.ck{display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.04);border-radius:12px;padding:9px}.ck input{width:18px;height:18px}.btn{border:0;border-radius:999px;padding:12px 16px;font-weight:950;text-transform:uppercase;letter-spacing:.08em;color:#031312;background:linear-gradient(135deg,#22c55e,#16a34a);cursor:pointer}.btn.blue{background:linear-gradient(135deg,#60a5fa,#2563eb);color:#fff}.btn.dark{background:#07142d;color:#dbeafe;border:1px solid var(--border)}.list{display:grid;gap:10px}.card{border:1px solid rgba(255,255,255,.12);background:rgba(2,8,23,.44);border-radius:18px;padding:14px}.cardtop{display:flex;justify-content:space-between;gap:10px}.name{font-size:18px;font-weight:950}.meta{font-size:12px;color:#cbd5e1;margin-top:4px}.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.tag{border:1px solid rgba(34,197,94,.32);background:rgba(34,197,94,.10);color:#bbf7d0;border-radius:999px;padding:5px 8px;font-size:10px;font-weight:900}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.status{font-size:12px;color:#cbd5e1;margin-top:10px;min-height:18px}.ok{color:#bbf7d0}.err{color:#fecaca}@media(max-width:900px){.grid,.form{grid-template-columns:1fr}.headin{align-items:flex-start;flex-direction:column}}</style></head><body>
<header class="head"><div class="headin"><div class="brand"><div class="logo"></div><div><div class="k">PLATAFORMA</div><div class="t">ERP ÍMPAR</div><div class="sub">Participantes do RDO</div></div></div><a class="menu" href="/menu.html">🏠 Menu principal</a></div></header>
<div class="wrap"><div class="grid"><section class="panel"><h2>👥 Convidar participante</h2><div class="form"><div><label>Nome</label><input id="nome" placeholder="Ex.: Fábio Silva"></div><div><label>Telefone WhatsApp</label><input id="telefone" placeholder="5547999999999"></div><div><label>E-mail</label><input id="email" placeholder="email@empresa.com.br"></div><div><label>Perfil</label><select id="perfil"><option value="coordenador">Coordenador</option><option value="gerente">Gerente</option><option value="cliente">Cliente</option><option value="empreiteiro">Empreiteiro</option></select></div><div class="full"><label>Obras liberadas</label><div class="obras" id="obrasBox">Carregando...</div></div><div class="full actions"><button class="btn" onclick="salvarEnviar()">💬 Salvar e enviar convite</button><button class="btn dark" onclick="limpar()">Limpar</button></div></div><div id="status" class="status"></div></section><section class="panel"><h2>📋 Participantes cadastrados</h2><div id="lista" class="list"></div></section></div></div>
<script>
const API='https://api.erpimpar.com.br/centro-integrado-obras/participantes_api.php';let obras=[],items=[],editId='';
function qs(id){return document.getElementById(id)}function st(t,c=''){qs('status').className='status '+c;qs('status').textContent=t||''}
async function api(action,data={}){const r=await fetch(API+'?action='+encodeURIComponent(action),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data),cache:'no-store'});const j=await r.json();if(!j.ok)throw new Error(j.erro||'Falha');return j}
async function load(){const j=await api('list');obras=j.obras||[];items=j.items||[];renderObras();renderLista()}
function renderObras(){qs('obrasBox').innerHTML=obras.map(o=>`<label class="ck"><input type="checkbox" value="${esc(o)}"><span>${esc(o)}</span></label>`).join('')||'Nenhuma obra no de-para.'}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function dados(){return {id:editId,nome:qs('nome').value.trim(),telefone:qs('telefone').value.trim(),email:qs('email').value.trim(),perfil:qs('perfil').value,obras:[...document.querySelectorAll('#obrasBox input:checked')].map(x=>x.value),ativo:true}}
function setForm(p){editId=p.id||'';qs('nome').value=p.nome||'';qs('telefone').value=p.telefone||'';qs('email').value=p.email||'';qs('perfil').value=p.perfil||'coordenador';document.querySelectorAll('#obrasBox input').forEach(i=>i.checked=(p.obras||[]).includes(i.value));scrollTo(0,0)}
function limpar(){editId='';qs('nome').value='';qs('telefone').value='';qs('email').value='';qs('perfil').value='coordenador';document.querySelectorAll('#obrasBox input').forEach(i=>i.checked=false);st('')}
async function salvarEnviar(){try{st('Salvando...');const p=dados();const sj=await api('save',{participante:p});const ij=await api('invite',{id:sj.participante.id});st('Convite gerado. Abrindo WhatsApp...', 'ok');window.open(ij.links.whatsapp,'_blank');await load();limpar()}catch(e){st(e.message,'err')}}
async function reenviar(id,meio='whatsapp'){try{const j=await api('invite',{id});window.open(j.links[meio]||j.links.whatsapp,'_blank');st('Convite reenviado.','ok');await load()}catch(e){st(e.message,'err')}}
async function remover(id){if(!confirm('Remover participante?'))return;await api('remove',{id});await load()}
function renderLista(){qs('lista').innerHTML=items.map(p=>{const c=p.ultimo_convite||{};return `<div class="card"><div class="cardtop"><div><div class="name">${esc(p.nome)}</div><div class="meta">${esc(p.telefone||'—')} • ${esc(p.email||'—')} • ${esc(p.perfil||'')}</div></div><div class="tag">${c.status==='ativado'?'🟢 Ativado':c.token?'⚪ Convite enviado':'⚪ Sem convite'}</div></div><div class="tags">${(p.obras||[]).map(o=>`<span class="tag">${esc(o)}</span>`).join('')}</div><div class="actions"><button class="btn blue" onclick='setForm(${JSON.stringify(p).replace(/'/g,"&#39;")})'>Editar</button><button class="btn" onclick="reenviar('${p.id}','whatsapp')">WhatsApp</button><button class="btn dark" onclick="reenviar('${p.id}','email')">E-mail</button><button class="btn dark" onclick="navigator.clipboard.writeText('${p.links?.convite||''}')">Copiar link</button><button class="btn dark" onclick="remover('${p.id}')">Remover</button></div></div>`}).join('')||'<div class="meta">Nenhum participante cadastrado.</div>'}
load().catch(e=>st(e.message,'err'));
</script></body></html>
