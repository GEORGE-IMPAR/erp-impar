<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ERP ÍMPAR | Participantes RDO</title>
<style>
:root{--azul:#0f2f57;--azul2:#123f74;--verde:#22c55e;--bg:#eef5fb;--card:#fff;--text:#102033;--muted:#607086;--borda:rgba(15,47,87,.14);--shadow:0 18px 42px rgba(15,47,87,.13)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(145deg,#eaf4fb,#f7fbff);color:var(--text)}
.topbar{background:linear-gradient(135deg,var(--azul),var(--azul2));color:white;padding:18px}.topbar-inner{max-width:1180px;margin:auto;display:flex;justify-content:space-between;gap:12px;align-items:center}.brand{display:flex;gap:12px;align-items:center}.orb{width:48px;height:48px;border-radius:16px;background:conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e)}h1{font-size:24px;margin:0}.sub{font-size:13px;opacity:.8}
main{max-width:1180px;margin:auto;padding:20px 14px}.hero{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}.btn{border:0;border-radius:14px;padding:11px 14px;font-weight:900;cursor:pointer}.primary{background:linear-gradient(135deg,#22c55e,#16a34a);color:white;box-shadow:0 12px 26px rgba(22,163,74,.25)}.secondary{background:white;color:var(--azul);border:1px solid var(--borda)}
.grid{display:grid;grid-template-columns:1fr 420px;gap:14px}.card{background:white;border:1px solid var(--borda);border-radius:22px;padding:16px;box-shadow:var(--shadow)}
.search{display:flex;gap:8px;margin-bottom:12px}.search input,.form input,.form select{width:100%;border:1px solid var(--borda);border-radius:13px;padding:11px;font:inherit}.list{display:flex;flex-direction:column;gap:10px}.person{border:1px solid var(--borda);background:#f8fbfe;border-radius:16px;padding:12px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.person b{font-size:15px}.person small{display:block;color:var(--muted);margin-top:4px}.tag{display:inline-flex;margin:5px 5px 0 0;border-radius:999px;background:#eef4ff;color:#16437a;padding:4px 8px;font-size:11px;font-weight:900}.status{border-radius:999px;padding:5px 9px;font-size:11px;font-weight:900;background:#f1f5f9;color:#64748b}.status.ok{background:#e9fff2;color:#0d813b}.status.warn{background:#fff7da;color:#9a6800}.actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}.form{display:grid;gap:10px}.form label{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:900}.obras{max-height:310px;overflow:auto;border:1px solid var(--borda);border-radius:16px;padding:10px;background:#f8fbfe}.obra-line{display:flex;gap:8px;align-items:center;padding:7px;border-bottom:1px solid rgba(15,47,87,.06)}.obra-line:last-child{border-bottom:0}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:var(--azul);color:white;padding:12px 16px;border-radius:16px;display:none}.toast.on{display:block}@media(max-width:940px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="topbar"><div class="topbar-inner"><div class="brand"><div class="orb"></div><div><h1>Gerenciar Participantes RDO</h1><div class="sub">Cadastro único por telefone · Obras liberadas · Convites</div></div></div><button class="btn secondary" onclick="location.href='index.html'">Voltar ao dashboard</button></div></header>
<main>
<section class="hero"><div><h2>Participantes</h2><p>Cadastre uma vez, selecione as obras e envie um único convite.</p></div><button class="btn primary" onclick="novo()">+ Novo participante</button></section>
<section class="grid">
<div class="card">
 <div class="search"><input id="q" placeholder="Pesquisar por nome ou telefone..." oninput="render()"><button class="btn secondary" onclick="carregar()">Atualizar</button></div>
 <div id="lista" class="list"></div>
</div>
<div class="card">
 <h3 id="formTitulo">Novo participante</h3>
 <div class="form">
  <label>Nome</label><input id="nome">
  <label>Telefone / WhatsApp</label><input id="telefone" placeholder="5548999999999">
  <label>E-mail</label><input id="email">
  <label>Perfil</label><select id="perfil"><option>Equipe de campo</option><option>Empreiteiro</option><option>Coordenador</option><option>Diretor</option><option>Gestor ERP</option></select>
  <label><input type="checkbox" id="todas" onchange="toggleTodas()"> Acesso a todas as obras</label>
  <label>Obras liberadas</label><div id="obras" class="obras"></div>
  <div class="actions"><button class="btn secondary" onclick="excluirAtual()">Excluir</button><button class="btn secondary" onclick="reenviarAtual()">Reenviar convite</button><button class="btn primary" onclick="salvar()">Salvar</button></div>
 </div>
</div>
</section>
</main><div id="toast" class="toast"></div>
<script>
const API='https://api.erpimpar.com.br/centro-integrado-obras/participantes_api.php';
const INFO='https://api.erpimpar.com.br/centro-integrado-obras/obra_info.php';
let participantes=[], obras=[], atual='';
const $=id=>document.getElementById(id);function toast(t){$('toast').textContent=t;$('toast').classList.add('on');setTimeout(()=>$('toast').classList.remove('on'),2500)}
function digits(s){return String(s||'').replace(/\D+/g,'')}function norm(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z0-9]+/g,'_').replace(/^_|_$/g,'')}
async function api(action,payload={}){const r=await fetch(API+'?action='+encodeURIComponent(action),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const j=await r.json();if(!j.ok)throw new Error(j.erro||'Erro API');return j}
async function carregar(){try{let j=await api('list');participantes=j.participantes||[];obras=j.obras||[];if(!obras.length){obras=['CORPORATE_8_LINHAS','CLINICA_ARTISTI','CLINICA_FOCUS','FIESC','GIASSI_ARARANGUA','GIASSI_TUBARAO','HOSPITAL_FATIMA','SOS_ONCOLOGIA'];}renderObras();render();}catch(e){toast(e.message)}}
function renderObras(){const sel=new Set((getForm().obras)||[]);$('obras').innerHTML=obras.map(o=>`<label class="obra-line"><input type="checkbox" class="obraCheck" value="${o}" ${sel.has(o)?'checked':''}> ${o}</label>`).join('');toggleTodas()}
function getForm(){return {id:atual,nome:$('nome').value.trim(),telefone:digits($('telefone').value),email:$('email').value.trim(),perfil:$('perfil').value,todas:$('todas').checked,obras:[...document.querySelectorAll('.obraCheck:checked')].map(x=>x.value)}}
function setForm(p={}){atual=p.id||'';$('formTitulo').textContent=atual?'Editar participante':'Novo participante';$('nome').value=p.nome||'';$('telefone').value=p.telefone||'';$('email').value=p.email||'';$('perfil').value=p.perfil||'Equipe de campo';$('todas').checked=!!p.todas;renderObras();(p.obras||[]).forEach(o=>{const c=[...document.querySelectorAll('.obraCheck')].find(x=>x.value===o); if(c)c.checked=true});toggleTodas()}
function novo(){setForm({})}
function toggleTodas(){const dis=$('todas').checked;document.querySelectorAll('.obraCheck').forEach(c=>c.disabled=dis)}
function status(p){if(p.chat_id||p.telegram_chat_id)return ['Ativo','ok']; if(p.convite_pendente||p.ultimo_convite)return ['Convite pendente','warn']; return ['Não convidado',''];}
function render(){const q=String($('q').value||'').toLowerCase();const arr=participantes.filter(p=>(p.nome+' '+p.telefone).toLowerCase().includes(q));$('lista').innerHTML=arr.length?arr.map(p=>{const s=status(p);const os=p.todas?['TODAS AS OBRAS']:(p.obras||[]);return `<div class="person"><div><b>${p.nome||'Sem nome'}</b><small>${p.telefone||''}</small><small>${p.perfil||''} · <span class="status ${s[1]}">${s[0]}</span></small><div>${os.slice(0,7).map(o=>`<span class="tag">${o}</span>`).join('')}${os.length>7?`<span class="tag">+${os.length-7}</span>`:''}</div></div><div class="actions"><button class="btn secondary" onclick="editar('${p.id}')">Editar</button><button class="btn secondary" onclick="reenviar('${p.id}')">Reenviar</button></div></div>`}).join(''):'<p>Nenhum participante encontrado.</p>'}
function editar(id){const p=participantes.find(x=>x.id===id); if(p)setForm(p)}
async function salvar(){try{const p=getForm(); if(!p.nome||!p.telefone){toast('Informe nome e telefone');return}const j=await api('save',{participante:p});participantes=j.participantes||participantes;atual=j.participante.id;render();toast('Participante salvo.')}catch(e){toast(e.message)}}
async function reenviar(id){try{const j=await api('invite',{id}); if(j.links?.whatsapp) window.open(j.links.whatsapp,'_blank'); toast('Convite pronto.')}catch(e){toast(e.message)}}
function reenviarAtual(){const p=getForm(); if(!p.id){toast('Salve primeiro.');return} reenviar(p.id)}
async function excluirAtual(){if(!atual){toast('Selecione um participante.');return} if(!confirm('Excluir participante?'))return;try{const j=await api('delete',{id:atual});participantes=j.participantes||[];novo();render();toast('Excluído.')}catch(e){toast(e.message)}}
carregar();
</script>
</body></html>
