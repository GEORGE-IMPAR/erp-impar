<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ERP ÍMPAR | Participantes RDO</title>
<style>
:root{--azul:#0f2f57;--azul2:#123f74;--verde:#23c55e;--verde2:#15a34a;--bg:#eef5fb;--card:#fff;--text:#102033;--muted:#607086;--borda:rgba(15,47,87,.12);--shadow:0 18px 42px rgba(15,47,87,.13);--warn:#f5b301;--red:#ef4444}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(145deg,#eaf4fb,#f7fbff);color:var(--text)}.topbar{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;padding:14px 16px;box-shadow:0 12px 30px rgba(15,47,87,.24)}.topbar-inner{max-width:1180px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px}.brand{display:flex;align-items:center;gap:12px}.orb{width:42px;height:42px;border-radius:999px;background:radial-gradient(circle at 30% 30%,#7df7ae,var(--verde),#0b7d3a);box-shadow:0 0 22px rgba(35,197,94,.55)}h1,p{margin:0}.brand h1{font-size:18px}.brand p{font-size:12px;color:rgba(255,255,255,.72);margin-top:2px}main{max-width:1180px;margin:0 auto;padding:18px 14px 80px}.hero{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px}.hero h2{font-size:24px;margin:0}.hero p{color:var(--muted);font-size:13px;margin-top:4px}.layout{display:grid;grid-template-columns:390px 1fr;gap:14px}.card{background:var(--card);border:1px solid var(--borda);border-radius:22px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}label{display:block;font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:900;margin:10px 0 6px}input,select{width:100%;border:1px solid var(--borda);border-radius:13px;padding:11px;font:inherit;background:#fff}.btn{border:0;border-radius:14px;padding:11px 14px;font-weight:900;cursor:pointer}.btn-primary{background:linear-gradient(135deg,var(--verde),var(--verde2));color:#fff;box-shadow:0 12px 24px rgba(35,197,94,.25)}.btn-secondary{background:#fff;color:var(--azul);border:1px solid var(--borda)}.btn-danger{background:#fff1f1;color:#b91c1c;border:1px solid #ffd5d5}.row{display:flex;gap:8px;flex-wrap:wrap}.row .btn{flex:1}.search{display:flex;gap:8px;margin-bottom:12px}.search input{flex:1}.person{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:#f8fbfe;border:1px solid var(--borda);border-radius:16px;padding:12px;margin-bottom:10px}.person b{font-size:14px}.person small{display:block;color:var(--muted);font-size:11px;margin-top:3px}.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}.badge{display:inline-flex;border-radius:999px;padding:5px 8px;font-size:10px;font-weight:900;background:#eef4ff;color:#16437a}.badge.ok{background:#e9fff2;color:#0d813b}.badge.warn{background:#fff7da;color:#9a6800}.badge.red{background:#ffecec;color:#b91c1c}.works{max-height:430px;overflow:auto;border:1px solid var(--borda);border-radius:16px;padding:10px;background:#f8fbfe}.work{display:flex;align-items:center;gap:8px;padding:8px;border-radius:10px}.work:hover{background:#fff}.work input{width:18px;height:18px}.empty{padding:18px;text-align:center;color:var(--muted);border:1px dashed var(--borda);border-radius:18px;background:#fff}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--azul);color:#fff;padding:12px 16px;border-radius:16px;display:none;box-shadow:var(--shadow);z-index:60}.toast.on{display:block}.loader{position:fixed;inset:0;background:rgba(238,245,251,.82);display:none;align-items:center;justify-content:center;z-index:50}.loader.on{display:flex}.spin{width:54px;height:54px;border:6px solid #cfe0ee;border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:900px){.layout{grid-template-columns:1fr}.topbar-inner{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="spin"></div></div><div class="toast" id="toast"></div>
<header class="topbar"><div class="topbar-inner"><div class="brand"><div class="orb"></div><div><h1>Centro Integrado de Gestão de Obras</h1><p>Participantes · Convites · Permissões por obra</p></div></div><button class="btn btn-secondary" onclick="location.href='index.html'">Voltar ao Dashboard</button></div></header>
<main>
<section class="hero"><div><h2>Participantes do RDO</h2><p>Cadastre uma pessoa uma única vez, selecione as obras permitidas e envie um único convite.</p></div><div class="row"><button class="btn btn-primary" onclick="novoParticipante()">➕ Novo participante</button><button class="btn btn-secondary" onclick="carregarTudo()">🔄 Atualizar</button></div></section>
<section class="layout">
<aside>
<div class="card">
<h3>Cadastro / manutenção</h3>
<input type="hidden" id="pId">
<label>Nome</label><input id="pNome" placeholder="Ex.: Fabio Silva">
<label>Telefone / WhatsApp</label><input id="pTel" placeholder="Ex.: 5548999999999">
<label>E-mail</label><input id="pEmail" placeholder="opcional">
<label>Perfil</label><select id="pPerfil"><option value="campo">Equipe de campo / empreiteiro</option><option value="coordenador">Coordenador</option><option value="diretor">Diretor</option><option value="admin">Administrador</option></select>
<label><input type="checkbox" id="pTodas" style="width:auto;margin-right:6px"> Acesso a todas as obras</label>
<label>Obras liberadas</label><div id="obrasBox" class="works"></div>
<div class="row" style="margin-top:12px"><button class="btn btn-primary" onclick="salvarParticipante()">💾 Salvar</button><button class="btn btn-secondary" onclick="enviarConviteAtual()">📨 Enviar/Reenviar</button></div>
</div>
</aside>
<section>
<div class="card"><h3>Consulta</h3><div class="search"><input id="busca" placeholder="Pesquisar por nome, telefone, obra..." oninput="renderParticipantes()"><button class="btn btn-secondary" onclick="limparBusca()">Limpar</button></div><div id="lista"></div></div>
</section>
</section>
</main>
<script>
const API='https://api.erpimpar.com.br/centro-integrado-obras/participantes_api.php';
const DEPARA='https://api.erpimpar.com.br/centro-integrado-obras/data/obra_depara.json';
let PARTICIPANTES=[]; let OBRAS=[]; let SELECTED_ID='';
const $=id=>document.getElementById(id);function toast(t){$('toast').textContent=t;$('toast').classList.add('on');setTimeout(()=>$('toast').classList.remove('on'),3000)}function loader(on){$('loader').classList.toggle('on',!!on)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[m]))}function digits(s){return String(s||'').replace(/\D+/g,'')}function norm(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase()}
async function api(action,payload){const r=await fetch(API+'?action='+encodeURIComponent(action),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload||{})});const j=await r.json().catch(()=>null);if(!j||!j.ok)throw new Error((j&&j.erro)||'Falha API');return j}
async function carregarObras(){try{const j=await fetch(DEPARA+'?t='+Date.now(),{cache:'no-store'}).then(r=>r.json());const arr=Array.isArray(j)?j:(j.obras||j.data||[]);OBRAS=arr.map(x=>typeof x==='string'?x:(x.obra||x.nome_rdo||x.nome||'')).filter(Boolean)}catch(e){OBRAS=[]}renderObras([])}
function renderObras(sel){const set=new Set((sel||[]).map(String));$('obrasBox').innerHTML=OBRAS.length?OBRAS.map(o=>`<label class="work"><input type="checkbox" value="${esc(o)}" ${set.has(o)?'checked':''}> <span>${esc(o)}</span></label>`).join(''):'<div class="empty">Não encontrei o de-para de obras.</div>'}
function obrasSelecionadas(){return Array.from(document.querySelectorAll('#obrasBox input:checked')).map(i=>i.value)}
async function carregarTudo(){loader(true);try{await carregarObras();const j=await api('list',{});PARTICIPANTES=j.participantes||[];renderParticipantes();}catch(e){toast('Erro: '+e.message)}finally{loader(false)}}
function novoParticipante(){SELECTED_ID='';$('pId').value='';$('pNome').value='';$('pTel').value='';$('pEmail').value='';$('pPerfil').value='campo';$('pTodas').checked=false;renderObras([])}
function editar(id){const p=PARTICIPANTES.find(x=>x.id===id);if(!p)return;SELECTED_ID=id;$('pId').value=p.id;$('pNome').value=p.nome||'';$('pTel').value=p.telefone||'';$('pEmail').value=p.email||'';$('pPerfil').value=p.perfil||'campo';$('pTodas').checked=!!p.todas||((p.obras||[]).includes('*'));renderObras(p.obras||[]);scrollTo({top:0,behavior:'smooth'})}
async function salvarParticipante(){const tel=digits($('pTel').value);const nome=$('pNome').value.trim();if(!nome){toast('Informe o nome.');return}if(!tel){toast('Informe o telefone.');return}const todas=$('pTodas').checked;const p={id:$('pId').value||'',nome,telefone:tel,email:$('pEmail').value.trim(),perfil:$('pPerfil').value,todas,obras:todas?['*']:obrasSelecionadas(),ativo:true};loader(true);try{const j=await api('save',{participante:p});SELECTED_ID=j.participante.id;toast('Participante salvo.');await carregarTudo();editar(SELECTED_ID)}catch(e){toast('Erro: '+e.message)}finally{loader(false)}}
async function enviarConviteAtual(){if(!$('pId').value){await salvarParticipante()}const id=$('pId').value||SELECTED_ID;if(!id){toast('Salve o participante primeiro.');return}loader(true);try{const j=await api('invite',{id});if(j.links&&j.links.whatsapp)window.open(j.links.whatsapp,'_blank');else if(j.links&&j.links.convite){await navigator.clipboard?.writeText(j.links.convite);alert('Convite copiado:\n'+j.links.convite)}toast('Convite gerado.');await carregarTudo();editar(id)}catch(e){toast('Erro convite: '+e.message)}finally{loader(false)}}
async function reenviar(id){editar(id);setTimeout(enviarConviteAtual,150)}
function limparBusca(){$('busca').value='';renderParticipantes()}
function renderParticipantes(){const q=norm($('busca').value);let arr=PARTICIPANTES.filter(p=>!q||norm([p.nome,p.telefone,p.email,p.perfil,(p.obras||[]).join(' ')].join(' ')).includes(q));$('lista').innerHTML=arr.length?arr.map(p=>{const ativ=p.telegram_chat_id?'ok':(p.convite_pendente?'warn':'');const status=p.telegram_chat_id?'Telegram ativo':(p.convite_pendente?'Convite pendente':'Não convidado');const obras=p.todas||((p.obras||[]).includes('*'))?'Todas as obras':((p.obras||[]).join(', ')||'Nenhuma obra');return `<div class="person"><div><b>${esc(p.nome)}</b><small>${esc(p.telefone||'sem telefone')} · ${esc(p.email||'sem e-mail')}</small><div class="badges"><span class="badge">${esc(p.perfil||'campo')}</span><span class="badge ${ativ}">${esc(status)}</span><span class="badge">${esc(obras)}</span></div></div><div class="row"><button class="btn btn-secondary" onclick="editar('${esc(p.id)}')">Editar</button><button class="btn btn-primary" onclick="reenviar('${esc(p.id)}')">📨 Convite</button></div></div>`}).join(''):'<div class="empty">Nenhum participante encontrado.</div>'}
carregarTudo();
</script>
</body>
</html>
