<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ERP ÍMPAR | Centro Integrado de Gestão de Obras</title>
  <style>
    :root{
      --azul:#0f2f57; --azul2:#123f74; --verde:#23c55e; --verde2:#15a34a;
      --bg:#eef5fb; --card:#ffffff; --text:#102033; --muted:#607086;
      --amarelo:#f5b301; --vermelho:#ef4444; --borda:rgba(15,47,87,.12);
      --shadow:0 18px 42px rgba(15,47,87,.13);
    }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(145deg,#eaf4fb,#f7fbff);color:var(--text)}
    .topbar{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;padding:14px 16px;box-shadow:0 12px 30px rgba(15,47,87,.24)}
    .topbar-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:14px;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:12px}.orb{width:42px;height:42px;border-radius:999px;background:radial-gradient(circle at 30% 30%,#7df7ae,var(--verde),#0b7d3a);box-shadow:0 0 22px rgba(35,197,94,.55)}
    .brand h1{font-size:18px;margin:0}.brand p{font-size:12px;margin:2px 0 0;color:rgba(255,255,255,.72)}
    .user{font-size:12px;text-align:right;color:rgba(255,255,255,.78)}
    main{max-width:1180px;margin:0 auto;padding:18px 14px 92px}.hero{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;margin:8px 0 18px}
    .hero h2{margin:0;font-size:22px}.hero p{margin:4px 0 0;color:var(--muted);font-size:13px}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    button{border:0;border-radius:14px;padding:11px 14px;font-weight:800;cursor:pointer}.btn-primary{background:linear-gradient(135deg,var(--verde),var(--verde2));color:#fff;box-shadow:0 12px 24px rgba(35,197,94,.25)}.btn-secondary{background:#fff;color:var(--azul);border:1px solid var(--borda)}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.kpi{background:#fff;border:1px solid var(--borda);border-radius:20px;padding:14px;box-shadow:0 10px 26px rgba(15,47,87,.07)}.kpi strong{display:block;font-size:22px}.kpi span{color:var(--muted);font-size:12px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{background:var(--card);border:1px solid var(--borda);border-radius:22px;padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--verde)}.card.amarelo:before{background:var(--amarelo)}.card.vermelho:before{background:var(--vermelho)}
    .card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.obra{font-weight:900;font-size:16px;line-height:1.2}.coord{font-size:12px;color:var(--muted);margin-top:4px}.badge{border-radius:999px;padding:7px 10px;font-size:11px;font-weight:900;background:#e9fff2;color:#0d813b}.badge.amarelo{background:#fff7da;color:#9a6800}.badge.vermelho{background:#ffecec;color:#b91c1c}
    .progress{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}.prog{background:#f3f7fb;border-radius:15px;padding:10px}.prog small{display:block;color:var(--muted);font-size:11px}.prog b{font-size:18px}.bar{height:8px;background:#dfeaf4;border-radius:999px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--verde),#7ee787)}
    .meta{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}.mini{background:#f8fbfe;border:1px solid var(--borda);border-radius:14px;padding:8px;text-align:center}.mini b{display:block;font-size:15px}.mini span{font-size:10px;color:var(--muted)}
    .agenda{border-radius:15px;background:#f8fbfe;padding:10px;color:#344357;font-size:12px;min-height:42px}.open{width:100%;margin-top:12px}.empty,.error{background:#fff;border:1px dashed var(--borda);border-radius:22px;padding:24px;text-align:center;color:var(--muted)}
    .loader{position:fixed;inset:0;background:rgba(238,245,251,.82);display:none;align-items:center;justify-content:center;z-index:50}.loader.on{display:flex}.spin{width:54px;height:54px;border:6px solid #cfe0ee;border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--azul);color:#fff;padding:12px 16px;border-radius:16px;display:none;box-shadow:var(--shadow);z-index:60}.toast.on{display:block}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.hero{grid-template-columns:1fr}.actions{justify-content:flex-start}.user{display:none}}
  </style>
</head>
<body>
  <div class="loader" id="loader"><div class="spin"></div></div>
  <div class="toast" id="toast"></div>
  <header class="topbar"><div class="topbar-inner"><div class="brand"><div class="orb"></div><div><h1>Centro Integrado de Gestão de Obras</h1><p>ERP ÍMPAR · Dashboard operacional</p></div></div><div class="user" id="userBox">Usuário ERP</div></div></header>
  <main>
    <section class="hero"><div><h2>Obras integradas</h2><p>Uma obra = uma sala/RDO. Dados consumidos das fontes oficiais do ERP.</p></div><div class="actions"><button class="btn-secondary" onclick="location.href='participantes.html'">👥 Gerenciar participantes</button><button class="btn-primary" onclick="carregarDashboard()">Atualizar</button></div></section>
    <section class="kpis"><div class="kpi"><strong id="kpiObras">0</strong><span>Obras carregadas</span></div><div class="kpi"><strong id="kpiVerde">0</strong><span>Farol verde</span></div><div class="kpi"><strong id="kpiAmarelo">0</strong><span>Farol amarelo</span></div><div class="kpi"><strong id="kpiVermelho">0</strong><span>Farol vermelho</span></div></section>
    <section id="grid" class="grid"></section>
  </main>
<script>
const ENDPOINTS = {
  tvListar: 'https://api.erpimpar.com.br/tv/listar.php',
  tvProjetos: 'https://api.erpimpar.com.br/tv/data/projetos.json',
  obrasFarol: 'https://api.erpimpar.com.br/cronograma/listar_obras_farol.php',
  obrasAgenda: 'https://api.erpimpar.com.br/cronograma/listar_obras_agenda.php',
  kpi: 'https://api.erpimpar.com.br/cronograma/listar_kpi.php'
};
const $ = id => document.getElementById(id);
function toast(msg){$('toast').textContent=msg;$('toast').classList.add('on');setTimeout(()=>$('toast').classList.remove('on'),2800)}
function loader(on){$('loader').classList.toggle('on',!!on)}
function voltarMenu(){ location.href = '../menu.html'; }
function norm(v){return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim()}
function pct(v){ const n = Number(String(v ?? 0).replace('%','').replace(',','.')); return Number.isFinite(n)?Math.max(0,Math.min(100,n)):0; }
function farolClasse(v){ const f=norm(v); if(f.includes('vermelh')||f.includes('atras')) return 'vermelho'; if(f.includes('amarel')||f.includes('aten')) return 'amarelo'; return 'verde'; }
async function fetchJson(url){ const r = await fetch(url,{cache:'no-store'}); if(!r.ok) throw new Error(url+' '+r.status); return await r.json(); }
function asArray(data){ if(Array.isArray(data)) return data; if(Array.isArray(data?.projetos)) return data.projetos; if(Array.isArray(data?.obras)) return data.obras; if(Array.isArray(data?.data)) return data.data; return Object.values(data||{}).filter(x=>typeof x==='object'); }
function indexPorObra(arr){ const map=new Map(); asArray(arr).forEach(o=>{ const nome=o.obra||o.nome||o.projeto||o.titulo||o.codigo; if(nome) map.set(norm(nome),o); }); return map; }
function mergeObras(tv, farol, agenda, kpi){
  const mapas = [indexPorObra(tv), indexPorObra(farol), indexPorObra(agenda), indexPorObra(kpi)];
  const chaves = new Set(mapas.flatMap(m=>[...m.keys()]));
  return [...chaves].map(ch => Object.assign({}, ...mapas.map(m=>m.get(ch)||{})));
}
function campo(o, nomes, padrao=''){ for(const n of nomes){ if(o[n]!==undefined && o[n]!==null && o[n]!== '') return o[n]; } return padrao; }
function renderCard(o){
  const nome = campo(o,['obra','nome','projeto','titulo','codigo'],'Obra sem nome');
  const coord = campo(o,['coordenador','responsavel','gestor'],'Coordenador não informado');
  const farol = campo(o,['farol','status_farol','status'],'verde');
  const classe = farolClasse(farol);
  const previsto = pct(campo(o,['percentual_previsto','previsto','pct_previsto','progresso_previsto','perc_previsto'],0));
  const realizado = pct(campo(o,['percentual_realizado','realizado','pct_real','progresso_real','perc_real','percentual_real'],0));
  const agenda = campo(o,['agenda_dia','atividade_dia','atividadeHoje','atividades_hoje','agenda'],'Sem agenda do dia informada.');
  const participantes = campo(o,['qtd_participantes','participantes_count','participantes'],0);
  const mensagens = campo(o,['qtd_mensagens','mensagens_count','mensagens'],0);
  const fotos = campo(o,['qtd_fotos','fotos_count','fotos'],0);
  const videos = campo(o,['qtd_videos','videos_count','videos'],0);
  const id = encodeURIComponent(nome);
  return `<article class="card ${classe}"><div class="card-head"><div><div class="obra">${escapeHtml(nome)}</div><div class="coord">${escapeHtml(coord)}</div></div><span class="badge ${classe}">${escapeHtml(String(farol||classe).toUpperCase())}</span></div><div class="progress"><div class="prog"><small>Previsto</small><b>${previsto.toFixed(1).replace('.',',')}%</b><div class="bar"><i style="width:${previsto}%"></i></div></div><div class="prog"><small>Realizado</small><b>${realizado.toFixed(1).replace('.',',')}%</b><div class="bar"><i style="width:${realizado}%"></i></div></div></div><div class="agenda">${escapeHtml(String(agenda))}</div><div class="meta"><div class="mini"><b>${num(participantes)}</b><span>Participantes</span></div><div class="mini"><b>${num(mensagens)}</b><span>Mensagens</span></div><div class="mini"><b>${num(fotos)}</b><span>Fotos</span></div><div class="mini"><b>${num(videos)}</b><span>Vídeos</span></div></div><button class="btn-primary open" onclick="abrirRdo('${id}')">Abrir RDO</button></article>`;
}
function num(v){ return Array.isArray(v) ? v.length : (Number(v)||0); }
function escapeHtml(s){ return String(s).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[m])); }
function abrirRdo(nome){ location.href = `sala.html?obra=${nome}`; }
async function carregarDashboard(){
  loader(true);
  try{
    const [tv1,tv2,farol,agenda,kpi] = await Promise.allSettled([fetchJson(ENDPOINTS.tvListar),fetchJson(ENDPOINTS.tvProjetos),fetchJson(ENDPOINTS.obrasFarol),fetchJson(ENDPOINTS.obrasAgenda),fetchJson(ENDPOINTS.kpi)]);
    const dados = mergeObras(tv1.value||[], tv2.value||farol.value||[], agenda.value||[], kpi.value||[]).filter(o=>campo(o,['obra','nome','projeto','titulo','codigo'],''));
    $('grid').innerHTML = dados.length ? dados.map(renderCard).join('') : '<div class="empty">Nenhuma obra retornou dos endpoints oficiais.</div>';
    const c = {verde:0,amarelo:0,vermelho:0}; dados.forEach(o=>c[farolClasse(campo(o,['farol','status_farol','status'],'verde'))]++);
    $('kpiObras').textContent=dados.length; $('kpiVerde').textContent=c.verde; $('kpiAmarelo').textContent=c.amarelo; $('kpiVermelho').textContent=c.vermelho;
    toast('Dashboard atualizado com dados oficiais do ERP.');
  }catch(e){ console.error(e); $('grid').innerHTML='<div class="error">Erro ao carregar os dados oficiais do ERP. Verifique CORS, endpoint ou conexão.</div>'; toast('Falha ao carregar dashboard.'); }
  finally{ loader(false); }
}
(function init(){
  try{ const u=JSON.parse(localStorage.getItem('ERPIMPAR_USER')||'{}'); $('userBox').textContent = u.nome || u.email || 'Usuário ERP'; }catch(e){}
  carregarDashboard();
})();
</script>
</body>
</html>
