<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#061b2a">
<title>ERP ÍMPAR — Abertura</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ERP ÍMPAR">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;min-height:100dvh;overflow:hidden;background:#061b2a;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{position:fixed;inset:0;min-height:100dvh}
.app{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;background:#061b2a;overflow:hidden}
.slide{
  position:absolute;inset:0;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  opacity:0;transform:scale(1.025);
  transition:opacity .65s ease, transform 5s linear;
}
.slide.is-active{opacity:1;transform:scale(1)}
.top-safe{
  position:absolute;top:calc(14px + env(safe-area-inset-top));left:16px;right:16px;z-index:5;
}
.barras{display:flex;gap:7px}
.barra{height:5px;flex:1;border-radius:999px;background:rgba(255,255,255,.35);overflow:hidden}
.barra span{display:block;width:0;height:100%;background:#78f05d;border-radius:999px}
.barra.is-active span{animation:progress 5s linear forwards}
@keyframes progress{from{width:0}to{width:100%}}
.action{
  position:absolute;left:16px;right:16px;bottom:calc(24px + env(safe-area-inset-bottom));z-index:10;
}
.btn{
  width:100%;height:66px;border:0;border-radius:16px;
  background:#fff;color:#111827;font-weight:900;font-size:19px;
  box-shadow:0 16px 45px rgba(0,0,0,.35);
}
.ajuda{
  margin-top:16px;width:100%;border:0;background:transparent;
  color:#fff;font-size:16px;font-weight:800;text-shadow:0 2px 10px rgba(0,0,0,.55);
  padding:8px;
}
@supports (height:100svh){
  .app{height:100svh}
}
@supports (height:100dvh){
  .app{height:100dvh}
}
@media (min-width:700px){
  .app{max-width:430px;left:50%;transform:translateX(-50%);box-shadow:0 0 80px rgba(0,0,0,.45)}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="top-safe"><div class="barras" id="barras"></div></div>
  <div class="action">
    <button class="btn" type="button" onclick="entrar()">Entrar no ERP ÍMPAR</button>
  </div>
</div>

<script>
const slides = [
  "assets/abertura/material.png",
  "assets/abertura/inventario.png",
  "assets/abertura/planejamento.png",
  "assets/abertura/gestao.png",
  "assets/abertura/contratos.png",
  "assets/abertura/kpi.png"
];

const app = document.getElementById("app");
const barras = document.getElementById("barras");
let atual = 0;

slides.forEach((src, i) => {
  const s = document.createElement("div");
  s.className = "slide" + (i === 0 ? " is-active" : "");
  s.style.backgroundImage = `url('${src}')`;
  app.prepend(s);

  const b = document.createElement("div");
  b.className = "barra" + (i === 0 ? " is-active" : "");
  b.innerHTML = "<span></span>";
  barras.appendChild(b);
});

function render(){
  document.querySelectorAll(".slide").forEach((el,i)=>el.classList.toggle("is-active", i === atual));
  document.querySelectorAll(".barra").forEach((el,i)=>{
    el.classList.toggle("is-active", i === atual);
    const span = el.querySelector("span");
    span.style.animation = "none";
    span.offsetHeight;
    span.style.animation = "";
  });
}

setInterval(() => {
  atual = (atual + 1) % slides.length;
  render();
}, 5000);

function getSessao(){
  const raw = localStorage.getItem("ERPIMPAR_USER") || sessionStorage.getItem("ERPIMPAR_USER");
  if(!raw) return null;
  try { return JSON.parse(raw); } catch(e) { return null; }
}

function entrar(){
  window.location.href = getSessao() ? "menu.html" : "index.html";
}


// Quando estiver na abertura, mantém a navegação "presa" aqui.
// Isso ajuda a seta nativa do Android a não voltar para telas internas.
try{
  history.replaceState(null, "", "abertura.html");
  history.pushState(null, "", "abertura.html");
  window.addEventListener("popstate", () => {
    history.pushState(null, "", "abertura.html");
  });
}catch(e){}
</script>
</body>
</html>
