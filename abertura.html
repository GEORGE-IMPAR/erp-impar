<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#02080f">
<title>ERP ÍMPAR — Abertura</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ERP ÍMPAR">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;min-height:100dvh;overflow:hidden;background:#02080f;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{position:fixed;inset:0;background:#02080f}
.app{position:fixed;inset:0;width:100vw;height:100dvh;overflow:hidden;background:#02080f}
.splash{position:absolute;inset:0;background:url('assets/abertura/material.png') center center / cover no-repeat;background-color:#02080f}
/* Botão invisível por cima do botão desenhado na imagem */
.action-hit{position:absolute;left:22px;right:22px;bottom:calc(34px + env(safe-area-inset-bottom));height:76px;border:0;background:transparent;z-index:10;border-radius:22px;cursor:pointer}
@media (min-width:700px){.app{max-width:430px;left:50%;transform:translateX(-50%);box-shadow:0 0 80px rgba(0,0,0,.45)}}
</style>
</head>
<body>
<div class="app">
  <div class="splash" aria-hidden="true"></div>
  <button class="action-hit" type="button" aria-label="Entrar no ERP ÍMPAR" onclick="entrar()"></button>
</div>
<script>
function getSessao(){
  const raw = localStorage.getItem("ERPIMPAR_USER") || sessionStorage.getItem("ERPIMPAR_USER");
  if(!raw) return null;
  try { return JSON.parse(raw); } catch(e) { return null; }
}
function entrar(){
  window.location.href = getSessao() ? "menu.html" : "index.html";
}
try{
  history.replaceState(null, "", "abertura.html");
  history.pushState(null, "", "abertura.html");
  window.addEventListener("popstate", () => history.pushState(null, "", "abertura.html"));
}catch(e){}
</script>
</body>
</html>
