<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>ERP ÍMPAR — Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0f766e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ERP ÍMPAR">
<link rel="apple-touch-icon" href="/icons/erp-icon-192.png">


<style>
:root{
  --bg:#020617;
  --card:#0b1220;
  --border:#1f2937;
  --text:#f9fafb;
  --muted:#cbd5e1;
  --blue:#1d4ed8;
  --green:#22c55e;
}

*{box-sizing:border-box;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}

body{
  margin:0;
  height:100vh;
  background:linear-gradient(120deg,#0b1e4a,#0e3b6e,#0f766e);
  display:flex;
  flex-direction:column;
  color:var(--text);
  overflow:hidden;
}

/* HEADER */
header{
  padding:14px 24px;
  background:rgba(2,6,23,0.94);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:14px;
}

.logo-ball{
  width:40px;height:40px;border-radius:16px;
  background:conic-gradient(from 210deg,#22c55e,#38bdf8,#1d4ed8,#fb923c,#22c55e);
  box-shadow:0 0 0 1px rgba(255,255,255,.04), 0 18px 40px rgba(0,0,0,.35);
}

header .brand small{
  font-size:11px;
  letter-spacing:.18em;
  color:#9ca3af;
}
header .brand strong{
  display:block;
  font-size:18px;
}

/* MAIN */
main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px 12px;
}

/* entrada do card */
@keyframes cardIn{
  from{opacity:0; transform:translateY(10px) scale(.985);}
  to{opacity:1; transform:translateY(0) scale(1);}
}

.login-card{
  width:100%;
  max-width:520px;
  background:var(--card);
  border-radius:22px;
  padding:36px 36px 30px;
  box-shadow:0 30px 80px rgba(0,0,0,.55);
  animation:cardIn .35s ease-out both;
  transition:transform .18s ease, box-shadow .18s ease;
}
.login-card:hover{
  transform:translateY(-1px);
  box-shadow:0 36px 95px rgba(0,0,0,.58);
}

h1{margin:0 0 8px;font-size:22px}
p{margin:0 0 22px;color:var(--muted);font-size:14px;line-height:1.35}

label{display:block;margin:14px 0 6px;font-size:14px;color:var(--muted)}

select,input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#020617;
  color:var(--text);
  font-size:15px;
  outline:none;
  transition:border-color .14s ease, box-shadow .14s ease, transform .08s ease;
}
select:hover,input:hover{border-color:rgba(148,163,184,.55)}
select:focus,input:focus{
  border-color:rgba(29,78,216,.95);
  box-shadow:0 0 0 4px rgba(29,78,216,.18);
}
select:active,input:active{transform:scale(.997)}

.password{position:relative}
.password input{padding-right:48px}

.password button{
  position:absolute;
  right:12px; top:50%;
  transform:translateY(-50%);
  width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  background:#020617;
  border:none;
  color:#9ca3af;
  font-size:16px;
  cursor:pointer;
  border-radius:10px;
  z-index:2;
  transition:transform .12s ease, color .12s ease, background .12s ease;
}
.password button:hover{
  color:#e5e7eb;
  background:rgba(255,255,255,.04);
}
.password button:active{transform:translateY(-50%) scale(.96)}

.remember{
  display:flex;
  align-items:center;
  gap:10px;
  margin:16px 0 18px;
  font-size:14px;
  color:var(--muted);
}
.remember input{
  width:16px;height:16px;
  accent-color:var(--green);
}
.remember input:focus{
  outline:none;
  box-shadow:0 0 0 4px rgba(29,78,216,.18);
  border-radius:4px;
}

/* botão wax */
button.login{
  width:100%;
  padding:15px;
  border:none;
  border-radius:999px;
  background:linear-gradient(120deg,var(--blue),var(--green));
  color:#fff;
  font-size:15px;
  font-weight:800;
  letter-spacing:.12em;
  cursor:pointer;
  transition:transform .12s ease, box-shadow .14s ease, filter .14s ease, letter-spacing .14s ease;
  box-shadow:0 14px 30px rgba(29,78,216,.20);
}
button.login:hover{
  filter:saturate(1.06) brightness(1.03);
  transform:translateY(-1px);
  letter-spacing:.16em;
  box-shadow:0 18px 42px rgba(34,197,94,.18), 0 16px 34px rgba(29,78,216,.22);
}
button.login:active{
  transform:translateY(1px) scale(.992);
  box-shadow:0 10px 22px rgba(0,0,0,.35);
}
button.login.is-loading{
  pointer-events:none;
  opacity:.92;
  filter:saturate(1.02);
}


button.exit-app{
  width:100%;
  margin-top:10px;
  padding:13px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,.35);
  background:rgba(2,6,23,.72);
  color:#e5e7eb;
  font-size:13px;
  font-weight:800;
  letter-spacing:.10em;
  cursor:pointer;
  transition:transform .12s ease, border-color .14s ease, background .14s ease;
}
button.exit-app:hover{
  background:rgba(15,23,42,.92);
  border-color:rgba(34,197,94,.55);
  transform:translateY(-1px);
}
button.exit-app:active{transform:translateY(1px) scale(.992)}

#loginStatus{
  margin-top:12px;
  font-size:12px;
  color:#cbd5e1;
  min-height:16px;
}

/* FOOTER */
footer{
  padding:12px 24px;
  font-size:12px;
  color:#9ca3af;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  background:rgba(2,6,23,0.94);
  border-top:1px solid var(--border);
}

@media (prefers-reduced-motion: reduce){
  .login-card{animation:none; transition:none;}
  *{transition:none !important;}
}
</style>
</head>

<body>
<header>
  <div class="logo-ball"></div>
  <div class="brand">
    <small>PLATAFORMA</small>
    <strong>ERP ÍMPAR</strong>
    <small>Gestão integrada de obras & contratos</small>
  </div>
</header>

<main>
  <div class="login-card">
    <h1>Login — ERP ÍMPAR</h1>
    <p>Selecione seu usuário corporativo, informe a senha e acesse a plataforma.</p>

    <label for="usuario">Usuário</label>
    <select id="usuario">
      <option value="">Carregando usuários...</option>
    </select>

    <label for="senha">Senha</label>
    <div class="password">
      <input id="senha" type="password" placeholder="Digite sua senha" autocomplete="current-password" />
      <button id="btnOlho" type="button" aria-label="Mostrar/ocultar senha" title="Mostrar/ocultar senha">👁</button>
    </div>

    <div class="remember">
      <input id="lembrar" type="checkbox" />
      <span>Lembrar meu usuário (e senha) neste computador</span>
    </div>

    <button class="login" id="btnEntrar" type="button">ENTRAR</button>
    <div id="loginStatus"></div>
    <button class="exit-app" id="btnSairApp" type="button">SAIR DO APLICATIVO</button>
  </div>
</main>

<footer>
  <span>© 2025 ERP ÍMPAR</span>
  <span>Ambiente interno · Desenvolvido por ÍMPAR Sistemas</span>
</footer>

<script>

  // ====== PWA ERP ÍMPAR: instalação, limpeza e saída segura ======
  const ERP_PWA_VERSION = "2026-06-01-logout-fix-v3";

  function isStandalonePWA(){
    return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  }

  async function limparMemoriaERP(){
    try { localStorage.removeItem("ERPIMPAR_USER"); } catch(e) {}
    try { sessionStorage.removeItem("ERPIMPAR_USER"); } catch(e) {}
    try { localStorage.setItem("ERPIMPAR_LOGOUT_TS", String(Date.now())); } catch(e) {}

    // Limpa cache antigo do ERP sem mexer em dados do navegador fora do domínio.
    if ("caches" in window) {
      try {
        const keys = await caches.keys();
        await Promise.all(keys
          .filter(k => String(k).toLowerCase().includes("erp-impar"))
          .map(k => caches.delete(k))
        );
      } catch(e) {}
    }
  }

  async function sairDoAplicativoERP(){
    const btn = document.getElementById("btnSairApp");
    if(btn) btn.textContent = "SAINDO...";

    await limparMemoriaERP();

    // Remove a tela atual da pilha. Isso evita que a seta nativa volte para dentro do app.
    try {
      history.replaceState(null, "", "/index.html?logout=1&t=" + Date.now());
    } catch(e) {}

    // Em PWA Android/Samsung, window.close pode funcionar quando a página foi aberta como app.
    try { window.close(); } catch(e) {}

    // Fallback: deixa uma página neutra, sem histórico útil para voltar ao ERP.
    setTimeout(() => {
      try { window.location.replace("about:blank"); }
      catch(e) { window.location.replace("/index.html?logout=1&t=" + Date.now()); }
    }, 180);
  }

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/service-worker.js", { scope: "/" })
        .then(() => console.log("PWA ERP ÍMPAR ativo", ERP_PWA_VERSION))
        .catch(err => console.error("Erro no Service Worker:", err));
    });
  }

  window.addEventListener("pageshow", async () => {
    const params = new URLSearchParams(location.search);
    if(params.has("logout")) await limparMemoriaERP();
  });

  // ====== Olho funcionando ======
  const senhaEl = document.getElementById("senha");
  const btnOlho = document.getElementById("btnOlho");
  btnOlho.addEventListener("click", () => {
    const isPwd = senhaEl.type === "password";
    senhaEl.type = isPwd ? "text" : "password";
    btnOlho.textContent = isPwd ? "🙈" : "👁";
  });

  // ====== Login único ======
  const KEY = "ERPIMPAR_USER";
  const selUsuario = document.getElementById("usuario");
  const chkLembrar = document.getElementById("lembrar");
  const btnEntrar = document.getElementById("btnEntrar");
  const statusEl = document.getElementById("loginStatus");
  const btnSairApp = document.getElementById("btnSairApp");
  if(btnSairApp) btnSairApp.addEventListener("click", sairDoAplicativoERP);

  function setStatus(msg, ok=false){
    statusEl.textContent = msg || "";
    statusEl.style.color = ok ? "#86efac" : "#cbd5e1";
  }

  function getStore(remember){
    return remember ? localStorage : sessionStorage;
  }

  function salvarSessao(user, remember){
    const store = getStore(remember);
    const payload = {
      nome: user.nome || "",
      email: user.email || "",
      cargo: user.cargo || "",
      telefone: user.telefone || "",
      foto: user.foto || "",
      modulos: Array.isArray(user.modulos) ? user.modulos : [],
      ts: Date.now(),
      remember: !!remember
    };
    store.setItem(KEY, JSON.stringify(payload));
    (remember ? sessionStorage : localStorage).removeItem(KEY);
  }

  async function carregarUsuarios(){
    // cache-bust + remove BOM
    const url = "/usuarios_erp.json?v=" + Date.now();
    const r = await fetch(url, { cache: "no-store" });
    if(!r.ok) throw new Error("HTTP " + r.status + " ao abrir " + url);
    const txt = await r.text();
    const clean = txt.replace(/^\uFEFF/, "").trim();
    const data = JSON.parse(clean);
    if(!Array.isArray(data)) throw new Error("usuarios_erp.json não é um array");
    return data;
  }

  function getSessao(){
    const raw = localStorage.getItem(KEY) || sessionStorage.getItem(KEY);
    if(!raw) return null;
    try { return JSON.parse(raw); } catch { return null; }
  }

  (async () => {
    // se já tiver sessão, vai direto pro menu
    const s = getSessao();
    const paramsLogin = new URLSearchParams(location.search);
    if(s && !paramsLogin.has("logout")){
      window.location.replace("menu.html");
      return;
    }

    let usuarios = [];
    try{
      usuarios = await carregarUsuarios();
      selUsuario.innerHTML = `<option value="">Selecione o usuário</option>`;
      usuarios.forEach((u, idx) => {
        const opt = document.createElement("option");
        opt.value = String(idx);
        opt.textContent = u.nome || ("Usuário " + (idx+1));
        selUsuario.appendChild(opt);
      });
      setStatus("");
    }catch(e){
      console.error(e);
      selUsuario.innerHTML = `<option value="">Erro ao carregar usuários</option>`;
      setStatus("Erro ao carregar usuários (JSON). Confira se usuarios_erp.json está publicado na raiz do site.");
      return;
    }

    btnEntrar.addEventListener("click", () => {
      const idx = selUsuario.value;
      const senhaDigitada = senhaEl.value || "";

      if(!idx){
        setStatus("Selecione um usuário.");
        return;
      }

      const user = usuarios[Number(idx)];
      if(!user){
        setStatus("Usuário inválido.");
        return;
      }

      if(String(user.senha || "") !== String(senhaDigitada)){
        setStatus("Senha incorreta.");
        return;
      }

      btnEntrar.classList.add("is-loading");
      btnEntrar.textContent = "ENTRANDO...";
      setStatus("✅ Login efetuado com sucesso. Carregando menu...", true);

      salvarSessao(user, chkLembrar.checked);

      setTimeout(() => {
        window.location.href = "menu.html";
      }, 450);
    });
  })();
</script>
</body>
</html>
