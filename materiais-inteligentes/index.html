
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ERP ÍMPAR • Materiais Inteligentes</title>

<style>
:root{
    --bg1:#07111f;
    --bg2:#0b1f35;
    --bg3:#12385b;
    --card:#10203a;
    --line:#20304a;
    --txt:#f8fbff;
    --muted:#9db7dd;
    --green:#22c55e;
    --green2:#16a34a;
}

*{box-sizing:border-box}

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    color:var(--txt);
    background:
        radial-gradient(circle at top left,rgba(34,197,94,.12),transparent 30%),
        linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
}

.header{
    display:flex;
    align-items:center;
    gap:14px;
    padding:20px 26px;
    border-bottom:1px solid rgba(255,255,255,.08);
    background:rgba(7,17,31,.92);
    position:sticky;
    top:0;
    z-index:10;
    backdrop-filter:blur(10px);
}

.logo-orb{
    width:52px;
    height:52px;
    border-radius:50%;
    background:linear-gradient(135deg,#22c55e,#06b6d4,#2563eb);
    box-shadow:0 0 30px rgba(34,197,94,.35);
}

.brand h1{
    margin:0;
    font-size:26px;
}

.brand small{
    color:#9dc2ff;
}

.back{
    margin-left:auto;
    color:#fff;
    text-decoration:none;
    border:1px solid #244064;
    padding:10px 14px;
    border-radius:12px;
    background:#0b1627;
    font-weight:800;
}

.wrap{
    padding:18px;
    display:grid;
    gap:18px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:16px;
}

.card{
    background:linear-gradient(180deg,#10203a,#0a1424);
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px;
    box-shadow:0 14px 30px rgba(0,0,0,.22);
}

.card span{
    color:var(--muted);
    font-size:12px;
    text-transform:uppercase;
    font-weight:900;
}

.card strong{
    display:block;
    margin-top:10px;
    font-size:36px;
}

.panel{
    background:linear-gradient(180deg,#10203a,#0a1424);
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px;
}

.panel h2{
    margin-top:0;
}

.search{
    display:flex;
    gap:10px;
    margin-bottom:14px;
}

.search input{
    flex:1;
    padding:12px;
    border-radius:12px;
    border:1px solid var(--line);
    background:#081323;
    color:#fff;
}

button{
    border:none;
    border-radius:12px;
    padding:12px 16px;
    font-weight:900;
    cursor:pointer;
    background:linear-gradient(135deg,var(--green),var(--green2));
}

.tableWrap{
    overflow:auto;
    border:1px solid var(--line);
    border-radius:14px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #1c2b43;
    text-align:left;
    font-size:12px;
}

th{
    background:#081323;
    color:#dbeafe;
}

.badge{
    background:rgba(34,197,94,.15);
    color:#86efac;
    border:1px solid rgba(34,197,94,.3);
    padding:5px 8px;
    border-radius:999px;
    font-size:11px;
    font-weight:900;
}

@media(max-width:1000px){
    .cards{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<header class="header">

<div class="logo-orb"></div>

<div class="brand">
    <h1>ERP ÍMPAR • Materiais Inteligentes</h1>
    <small>Base histórica de materiais, preços e fornecedores extraídos via OCR DANFE.</small>
</div>

<a class="back" href="/">
    Voltar ao menu
</a>

</header>

<main class="wrap">

<section class="cards">

<div class="card">
    <span>Notas processadas</span>
    <strong id="cNotas">0</strong>
</div>

<div class="card">
    <span>Itens catalogados</span>
    <strong id="cItens">0</strong>
</div>

<div class="card">
    <span>Fornecedores</span>
    <strong id="cFornecedores">0</strong>
</div>

<div class="card">
    <span>Pendências</span>
    <strong id="cPendencias">0</strong>
</div>

</section>

<section class="panel">

<h2>Consulta de materiais</h2>

<div class="search">
    <input id="busca" placeholder="Pesquisar material...">
    <button onclick="buscar()">Buscar</button>
</div>

<div class="tableWrap">

<table>

<thead>
<tr>
    <th>Material</th>
    <th>Fornecedor</th>
    <th>Data</th>
    <th>Qtd</th>
    <th>UN</th>
    <th>Valor</th>
    <th>NF</th>
    <th>Modo</th>
</tr>
</thead>

<tbody id="tbody">
<tr>
<td colspan="8">Carregando...</td>
</tr>
</tbody>

</table>

</div>

</section>

</main>

<script>

const API = 'https://api.erpimpar.com.br/danfe';

async function dashboard(){

    const r = await fetch(API + '/dashboard.php?t=' + Date.now());
    const j = await r.json();

    if(!j.ok) return;

    document.getElementById('cNotas').innerText = j.cards.notas || 0;
    document.getElementById('cItens').innerText = j.cards.itens || 0;
    document.getElementById('cFornecedores').innerText = j.cards.fornecedores || 0;
    document.getElementById('cPendencias').innerText = j.cards.pendencias || 0;
}

async function buscar(){

    const q = document.getElementById('busca').value;

    const r = await fetch(API + '/listar_materiais.php?q=' + encodeURIComponent(q));
    const j = await r.json();

    const tbody = document.getElementById('tbody');

    tbody.innerHTML = '';

    (j.data || []).forEach(item=>{

        tbody.innerHTML += `
        <tr>
            <td>${item.material || ''}</td>
            <td>${item.cnpj_emitente || ''}</td>
            <td>${item.data_saida || ''}</td>
            <td>${item.quantidade || ''}</td>
            <td>${item.unidade || ''}</td>
            <td>${item.valor_unitario || ''}</td>
            <td>${item.numero_nfe || ''}</td>
            <td><span class="badge">${item.modo || ''}</span></td>
        </tr>
        `;
    });
}

dashboard();
buscar();

</script>

</body>
</html>
