<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP ÍMPAR • TV Master</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#020617;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;}
    .tv-wrap{width:100vw;height:100vh;position:relative;background:#020617;}
    iframe{width:100%;height:100%;border:none;display:block;background:#020617;opacity:1;}
    .fade-out{animation:fadeOut .4s ease forwards;}
    .fade-in{animation:fadeIn .4s ease forwards;}
    @keyframes fadeOut{from{opacity:1}to{opacity:0}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .tv-control{position:fixed;right:14px;bottom:14px;z-index:9999;border:none;border-radius:999px;padding:10px 14px;background:rgba(2,6,23,.72);color:#e5e7eb;border:1px solid rgba(148,163,184,.25);font-weight:800;cursor:pointer;backdrop-filter:blur(6px);}
  </style>
</head>
<body>
  <div class="tv-wrap">
    <iframe id="tvFrame" src=""></iframe>
  </div>
  <button class="tv-control" id="btnFullscreen" type="button">⛶ Tela cheia</button>
  <script>
    const paginas = [
      { nome:'Gestão à Vista', url:'https://www.erpimpar.com.br/tv/gestao_projetos_tv_adaptado.html?tv=1', fallback:100000 },
      { nome:'Farol das Obras', url:'https://www.erpimpar.com.br/cronograma/farol_tv_adaptado.html?tv=1', fallback:40000 },
      { nome:'KPIs', url:'https://www.erpimpar.com.br/KPI_Coordenadores/index_tv_resumo_adaptado.html?tv=1', fallback:25000 }
    ];

    let indiceAtual = 0;
    let timer = null;
    let cycleMs = paginas[0].fallback;
    const frame = document.getElementById('tvFrame');
    const btnFullscreen = document.getElementById('btnFullscreen');

    function requestFullscreen(){
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }
    btnFullscreen.addEventListener('click', requestFullscreen);

    function carregarPagina(indice){
      const pagina = paginas[indice];
      cycleMs = pagina.fallback;
      frame.classList.remove('fade-in');
      frame.classList.add('fade-out');
      setTimeout(() => {
        frame.src = pagina.url + (pagina.url.includes('?') ? '&' : '?') + 'tvts=' + Date.now();
        frame.classList.remove('fade-out');
        frame.classList.add('fade-in');
      }, 400);
    }

    function agendarProxima(){
      clearTimeout(timer);
      timer = setTimeout(() => {
        indiceAtual = (indiceAtual + 1) % paginas.length;
        carregarPagina(indiceAtual);
      }, cycleMs);
    }

    window.addEventListener('message', (event) => {
      const data = event.data || {};
      if (data.type === 'ERP_IMPAR_TV_CYCLE_MS' && Number(data.value) > 0) {
        cycleMs = Number(data.value);
        agendarProxima();
      }
    });

    frame.addEventListener('load', () => {
      setTimeout(() => {
        try {
          const reported = Number(frame.contentWindow && frame.contentWindow.__TV_CYCLE_MS__);
          if (reported > 0) cycleMs = reported;
        } catch (e) {}
        agendarProxima();
      }, 1200);
    });

    carregarPagina(indiceAtual);
  </script>
</body>
</html>
