<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ERP ÍMPAR — Gestão à Vista TV</title>

<style>
:root{
  --bg1:#0b1e4a;
  --bg2:#0e3b6e;
  --bg3:#0f766e;
  --text:#e5e7eb;
  --green:#22c55e;
  --red:#ef4444;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Arial;
  background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
  color:var(--text);
}

.projetos-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:20px;
  padding:20px;
  height:100vh;
}

.projeto-card{
  background:rgba(2,6,23,.8);
  border-radius:16px;
  padding:20px;
  border:2px solid rgba(255,255,255,.2);
}

.projeto-card.stale{
  border-color:var(--red);
  box-shadow:0 0 20px var(--red);
}

.projeto-card.atualizado{
  border-color:var(--green);
  box-shadow:0 0 20px var(--green);
}
</style>
</head>

<body>

<div id="grid" class="projetos-grid"></div>

<!-- ALERTA 16:00 -->
<div id="dailyAllocOverlay" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
color:white;
z-index:99999;
text-align:center;
">
<div>
<h1 style="font-size:60px;color:#ef4444;">🚨 ALERTA</h1>
<h2 style="font-size:40px;">COORDENADORES</h2>
<p style="font-size:28px;margin-top:20px;">ENVIAR ALOCAÇÕES DO DIA</p>
</div>
</div>

<script>
const API = "https://api.erpimpar.com.br/tv/listar.php";
const STALE_MS = 7 * 24 * 60 * 60 * 1000;

let projetos = [];

async function carregar(){
  const r = await fetch(API);
  const j = await r.json();

  projetos = j.data.projetos;

  // ORDEM FIXA
  projetos.sort((a,b)=> a.nome.localeCompare(b.nome));

  render();
}

function render(){
  const grid = document.getElementById("grid");

  grid.innerHTML = projetos.map(p=>{

    const data = new Date(p.data_atualizacao);
    const age = Date.now() - data.getTime();

    let classe = "";
    if(age > STALE_MS) classe = "stale";

    return `
      <div class="projeto-card ${classe}">
        <h2>${p.nome}</h2>
        <p>${p.status}</p>
      </div>
    `;
  }).join("");
}

setInterval(carregar,10000);
carregar();

// ===== ALERTA 16:00 =====
const KEY="ALERTA_";

function isWeekday(d){
  return d.getDay()>=1 && d.getDay()<=5;
}

function shouldFire(now){
  if(!isWeekday(now)) return false;
  if(now.getHours()!=16) return false;
  if(now.getMinutes()!=0) return false;

  const k=KEY+now.toDateString();
  if(localStorage.getItem(k)) return false;

  localStorage.setItem(k,1);
  return true;
}

// ALARME
function alarm(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  const g=ctx.createGain();

  o.type="square";
  g.gain.value=0.7;

  o.connect(g);
  g.connect(ctx.destination);

  o.start();

  setTimeout(()=>o.stop(),30000);
}

function showAlert(){
  const o=document.getElementById("dailyAllocOverlay");
  o.style.display="flex";
  alarm();

  setTimeout(()=>o.style.display="none",30000);
}

setInterval(()=>{
  const now=new Date();
  if(shouldFire(now)) showAlert();
},3000);

</script>

</body>
</html>
