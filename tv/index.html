<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERP ÍMPAR — Gestão à Vista</title>
  <style>
    :root{
      --bg1:#0b1e4a;
      --bg2:#0e3b6e;
      --bg3:#0f766e;
      --panel: rgba(2,6,23,.66);
      --panel2: rgba(2,6,23,.78);
      --border: rgba(148,163,184,.45);
      --text: #e5e7eb;
      --soft: rgba(229,231,235,.78);
      --green:#22c55e;
      --yellow:#facc15;
      --red:#ef4444;
      --radius: 18px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      min-height:100vh;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
      display:flex;
      flex-direction:column;
      opacity:0;
    }

    @keyframes imparEnter{
      0%{opacity:0; transform: translateY(28px) scale(.98); filter: blur(10px);}
      100%{opacity:1; transform: translateY(0) scale(1); filter: blur(0);}
    }
    body.impar-enter{animation:imparEnter .75s cubic-bezier(.16,1,.3,1) both;}

    header{
      padding:14px 14px 10px;
      display:flex;
      justify-content:center;
    }
    .header-inner{
      width:100%;
      max-width:1240px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-shadow:0 2px 6px rgba(0,0,0,.75);
      min-width:0;
    }
    .logo-orb{
      width:36px;height:36px;border-radius:999px;flex:0 0 auto;
      position:relative;
      background: conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);
      box-shadow:0 10px 22px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.18) inset;
      overflow:hidden;
    }
    .logo-orb:before{
      content:""; position:absolute; inset:-6px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.55), transparent 55%);
    }
    .brand-text{display:flex; flex-direction:column; gap:2px; min-width:0;}
    .brand-kicker{font-size:12px; letter-spacing:.22em; text-transform:uppercase; font-weight:800; opacity:.9;}
    .brand-title{font-size:18px; font-weight:900; line-height:1.05;}
    .brand-sub{font-size:14px; font-weight:800; opacity:.92; line-height:1.1;}

    .tag-top{
      margin-left:auto;
      font-size:11px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(15,23,42,.85);
      border:1px solid rgba(148,163,184,.6);
      color:var(--soft);
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .pill-btn{
      border:none;
      background:transparent;
      color:inherit;
      font:inherit;
      display:flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
      padding:0;
    }
    .pill-btn:hover{filter:brightness(1.08)}

    main{
      flex:1 0 auto;
      display:flex;
      justify-content:center;
      padding:12px 16px 18px;
    }
    .layout{
      width:100%;
      max-width:1240px;
      display:flex;
      justify-content:center;
    }
    .container{
      width:100%;
      border-radius:var(--radius);
      border:1px solid rgba(148,163,184,.6);
      box-shadow:0 24px 60px rgba(15,23,42,.9);
      background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
      padding:18px;
    }

    .topbox{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:12px 14px;
      border-radius:14px;
      border:2px solid rgba(34,197,94,.45);
      background:linear-gradient(120deg, rgba(2,6,23,.78), rgba(2,6,23,.35));
      box-shadow:0 18px 60px rgba(0,0,0,.35);
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .topbox-left{
      min-width:240px;
    }
    .topbox-left .title{
      font-size:18px;
      font-weight:900;
      margin-bottom:4px;
      line-height:1.1;
    }
    .user-label{
      font-size:11px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(229,231,235,.72);
      font-weight:800;
      margin-bottom:3px;
    }
    .user-values{
      font-size:13px;
      line-height:1.35;
      color:#fff;
      font-weight:700;
      word-break:break-word;
    }

    .topbox-center{
      flex:1 1 320px;
      min-width:280px;
      text-align:center;
      padding:0 8px;
    }
    .topbox-center .main-title{
      font-size:18px;
      font-weight:900;
      line-height:1.2;
      margin-bottom:4px;
    }
    .topbox-center .subtitle{
      font-size:12px;
      opacity:.86;
    }

    .content-grid{
      display:grid;
      grid-template-columns:minmax(320px, 1fr) minmax(380px, 1.05fr);
      gap:18px;
      align-items:start;
    }

    .panel{
      border-radius:16px;
      border:1px solid var(--border);
      background:var(--panel);
      box-shadow:0 18px 40px rgba(0,0,0,.30);
      overflow:hidden;
    }

    .menu-stack{
      display:grid;
      gap:14px;
    }

    .menu-card{
      padding:24px;
      border-radius:16px;
      border:2px solid rgba(148,163,184,.30);
      background:linear-gradient(135deg, rgba(15,23,42,.82), rgba(15,23,42,.56));
      cursor:pointer;
      transition:all .25s ease;
      text-decoration:none;
      color:inherit;
      display:block;
      min-height:178px;
    }
    .menu-card:hover{
      transform:translateY(-4px);
      border-color:var(--green);
      box-shadow:0 20px 40px rgba(0,0,0,.4), 0 0 20px rgba(34,197,94,.22);
    }

      background:linear-gradient(135deg, rgba(15,23,42,.50), rgba(15,118,110
