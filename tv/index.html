<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ERP ÍMPAR — Gestão à Vista</title>

<style>
:root{
  --bg1:#0b1e4a;
  --bg2:#0e3b6e;
  --bg3:#0f766e;
  --text:#e5e7eb;
  --border:rgba(148,163,184,.45);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui;
  color:var(--text);
  background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
}

/* HEADER PADRÃO */
header{
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#22c55e,#3b82f6);
}

.tag-top{
  display:flex;
  gap:10px;
}

.pill-btn{
  background:#020617;
  border:1px solid var(--border);
  color:#fff;
  padding:6px 12px;
  border-radius:999px;
  cursor:pointer;
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* TOPBOX */
.topbox{
  background:rgba(2,6,23,.6);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.user-values{
  font-size:12px;
  color:#cbd5e1;
}

.code-line{
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-top:20px;
}

.card{
  background:rgba(2,6,23,.6);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
  cursor:pointer;
}

.card:hover{
  border-color:#22c55e;
}

/* HISTÓRICO */
.history{
  background:#020617;
  padding:20px;
  border-radius:12px;
  min-height:200px;
}

</style>
</head>

<body>

<header>
  <div class="brand">
    <div class="logo"></div>
    <div>
      <div><strong>ERP ÍMPAR</strong></div>
      <div style="font-size:12px">Gestão à Vista</div>
    </div>
  </div>

  <div class="tag-top">
    <button class="pill-btn" onclick="voltarMenu()">🏠 Menu principal</button>
  </div>
</header>

<div class="container">

  <div class="topbox">
    <div>
      <div><strong>Gestão à Vista</strong></div>
      <div class="user-values">
        <span id="userName">Usuário</span><br>
        <span id="userEmail">—</span>
      </div>
    </div>

    <div class="code-line">
      Painel de atualização + dashboard TV
    </div>
  </div>

  <div class="grid">
    
    <div>
      <div class="card" onclick="abrirApp()">
        <h3>Atualizar Projeto</h3>
        <p>Atualizar status, farol e informações.</p>
      </div>

      <div class="card" onclick="abrirTV()">
        <h3>Dashboard TV</h3>
        <p>Visualização em tempo real.</p>
      </div>
    </div>

    <div>
      <select id="obraHistorico" style="width:100%;padding:10px;margin-bottom:10px;">
        <option>Selecione uma obra</option>
      </select>

      <div class="history" id="historicoContainer">
        Selecione uma obra para visualizar o histórico.
      </div>
    </div>

  </div>

</div>

<script>

function obterUsuarioLogado(){
  return {
    nome:
      localStorage.getItem("usuarioNome") ||
      localStorage.getItem("usuario") ||
      sessionStorage.getItem("usuarioNome") ||
      "Usuário",

    email:
      localStorage.getItem("usuarioEmail") ||
      localStorage.getItem("email") ||
      sessionStorage.getItem("usuarioEmail") ||
      "—"
  };
}

function preencherUsuario(){
  const u = obterUsuarioLogado();
  document.getElementById("userName").textContent = u.nome;
  document.getElementById("userEmail").textContent = u.email;
}

function voltarMenu(){
  window.location.href = "../menu.html";
}

function abrirApp(){
  window.location.href = "gestao_projetos_app.html";
}

function abrirTV(){
  window.location.href = "gestao_projetos_tv.html";
}

window.onload = preencherUsuario;

</script>

</body>
</html>
