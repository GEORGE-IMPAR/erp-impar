<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÍMPAR • Institucional TV</title>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#020617;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  }

  body{
    opacity:0;
    animation:pageIn .9s ease forwards;
  }

  @keyframes pageIn{
    from{opacity:0}
    to{opacity:1}
  }

.slide{
  position:fixed;
  inset:14px 22px 18px 22px;
  border-radius:18px;
  background:url('./tv_marketing.png') center/contain no-repeat;
  transform:scale(1.015);
  filter:saturate(1.02) contrast(1.01);
  animation:kenburns 14s ease-out forwards;
}
 
@keyframes kenburns{
  from{transform:scale(1.025)}
  to{transform:scale(1)}
}
 
  .shine{
    position:fixed;
    inset:-20%;
    pointer-events:none;
    background:linear-gradient(
      115deg,
      transparent 0%,
      transparent 42%,
      rgba(255,255,255,.12) 48%,
      rgba(255,255,255,.22) 50%,
      rgba(255,255,255,.10) 52%,
      transparent 58%,
      transparent 100%
    );
    transform:translateX(-65%);
    animation:shineMove 5.8s ease-in-out 1.2s forwards;
    mix-blend-mode:screen;
  }

  @keyframes shineMove{
    from{transform:translateX(-65%)}
    to{transform:translateX(65%)}
  }

  /* Molduras sutis para chamar atenção nos QR Codes já presentes na imagem */
  .qr-focus{
    position:fixed;
    left:20px;
    top:143px;
    width:174px;
    height:174px;
    border-radius:10px;
    border:3px solid rgba(34,197,94,.0);
    box-shadow:0 0 0 rgba(34,197,94,0);
    opacity:0;
    animation:qrPremium 9s ease-in-out 1.6s infinite;
    pointer-events:none;
  }

  .qr-focus.site{
    left:257px;
    top:143px;
  }

  @keyframes qrPremium{
    0%{
      opacity:0;
      border-color:rgba(34,197,94,0);
      box-shadow:0 0 0 rgba(34,197,94,0);
      transform:scale(.98);
    }
    10%{
      opacity:1;
      border-color:rgba(34,197,94,.85);
      box-shadow:
        0 0 0 5px rgba(34,197,94,.12),
        0 0 24px rgba(34,197,94,.40);
      transform:scale(1);
    }
    22%{
      opacity:.85;
      border-color:rgba(56,189,248,.8);
      box-shadow:
        0 0 0 8px rgba(56,189,248,.10),
        0 0 28px rgba(56,189,248,.34);
    }
    34%{
      opacity:1;
      border-color:rgba(34,197,94,.95);
      box-shadow:
        0 0 0 5px rgba(34,197,94,.12),
        0 0 24px rgba(34,197,94,.40);
    }
    48%,100%{
      opacity:0;
      border-color:rgba(34,197,94,0);
      box-shadow:0 0 0 rgba(34,197,94,0);
    }
  }

  .callout{
    position:fixed;
    left:34px;
    top:24px;
    width:390px;
    height:96px;
    border-radius:18px;
    pointer-events:none;
    background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.04));
    border:1px solid rgba(34,197,94,.0);
    opacity:0;
    filter:blur(8px);
    animation:calloutIn 3.6s ease 1s forwards;
  }

  @keyframes calloutIn{
    0%{opacity:0;filter:blur(10px);transform:translateY(-8px)}
    35%{opacity:.55;filter:blur(0);transform:translateY(0)}
    100%{opacity:0;filter:blur(4px);transform:translateY(0)}
  }

  .bottom-glow{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    height:34%;
    pointer-events:none;
    background:radial-gradient(circle at 50% 70%,rgba(34,197,94,.12),transparent 62%);
    opacity:0;
    animation:glowIn 8s ease 1.8s infinite;
  }

  @keyframes glowIn{
    0%,100%{opacity:0}
    30%,70%{opacity:1}
  }

  body.tv-embedded .slide{
    background-size:cover;
  }
</style>
</head>

<body>
  <div class="slide"></div>
  <div class="shine"></div>
  <div class="callout"></div>
  <div class="qr-focus instagram"></div>
  <div class="qr-focus site"></div>
  <div class="bottom-glow"></div>
</body>
</html>
