<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP ÍMPAR • TV Master</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#020617;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    }

    .tv-wrap{
      width:100vw;
      height:100vh;
      position:relative;
      background:#020617;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      display:block;
      background:#020617;
      opacity:1;
    }

    .fade-out{
      animation:fadeOut .45s ease forwards;
    }

    .fade-in{
      animation:fadeIn .45s ease forwards;
    }

    @keyframes fadeOut{
      from{opacity:1}
      to{opacity:0}
    }

    @keyframes fadeIn{
      from{opacity:0}
      to{opacity:1}
    }

    .tv-label{
      position:fixed;
      left:14px;
      bottom:12px;
      z-index:9999;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(2,6,23,.68);
      color:#dbeafe;
      border:1px solid rgba(148,163,184,.25);
      font-size:12px;
      font-weight:800;
      letter-spacing:.04em;
      backdrop-filter:blur(6px);
    }
  </style>
</head>
<body>
  <div class="tv-wrap">
    <iframe id="tvFrame" src=""></iframe>
    <div class="tv-label" id="tvLabel">Carregando...</div>
  </div>

  <script>
    const paginas = [
      {
        nome: 'Gestão à Vista',
        url: 'https://www.erpimpar.com.br/tv/gestao_projetos_tv.html',
        tempo: 40000
      },
      {
        nome: 'Farol das Obras',
        url: 'https://www.erpimpar.com.br/cronograma/farol.html',
        tempo: 40000
      },
      {
        nome: 'KPIs',
        url: 'https://www.erpimpar.com.br/KPI_Coordenadores/index_tv_resumo.html',
        tempo: 40000
      }
    ];

    let indiceAtual = 0;
    let timer = null;

    const frame = document.getElementById('tvFrame');
    const label = document.getElementById('tvLabel');

    function carregarPagina(indice){
      const pagina = paginas[indice];
      label.textContent = pagina.nome;

      frame.classList.remove('fade-in');
      frame.classList.add('fade-out');

      setTimeout(() => {
        frame.src = pagina.url + (pagina.url.includes('?') ? '&' : '?') + 'tvts=' + Date.now();
        frame.classList.remove('fade-out');
        frame.classList.add('fade-in');
      }, 450);
    }

    function agendarProxima(){
      clearTimeout(timer);
      const tempoAtual = paginas[indiceAtual].tempo;

      timer = setTimeout(() => {
        indiceAtual = (indiceAtual + 1) % paginas.length;
        carregarPagina(indiceAtual);
        agendarProxima();
      }, tempoAtual);
    }

    function iniciarRotacao(){
      carregarPagina(indiceAtual);
      agendarProxima();
    }

    iniciarRotacao();
  </script>
</body>
</html>
