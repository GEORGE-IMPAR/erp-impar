<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERP ÍMPAR — Gestão à Vista</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root{
      --bg1:#0b1e4a;
      --bg2:#0e3b6e;
      --bg3:#0f766e;
      --panel: rgba(2,6,23,.66);
      --panel2: rgba(2,6,23,.78);
      --border: rgba(148,163,184,.45);
      --text: #e5e7eb;
      --soft: rgba(229,231,235,.78);
      --blue:#3b82f6;
      --green:#22c55e;
      --yellow:#facc15;
      --red:#ef4444;
      --radius: 18px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      min-height:100vh;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
      display:flex;
      flex-direction:column;
      opacity:0;
    }

    @keyframes imparEnter{
      0%{opacity:0; transform: translateY(28px) scale(.98); filter: blur(10px);}
      100%{opacity:1; transform: translateY(0) scale(1); filter: blur(0);}
    }
    body.impar-enter{animation:imparEnter .75s cubic-bezier(.16,1,.3,1) both;}

    header{
      padding:14px 14px 10px;
      display:flex;
      justify-content:center;
    }
    .header-inner{
      width:100%;
      max-width:1200px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-shadow:0 2px 6px rgba(0,0,0,.75);
      min-width:0;
    }
    .logo-orb{
      width:36px;height:36px;border-radius:999px;flex:0 0 auto;
      position:relative;
      background: conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);
      box-shadow:0 10px 22px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.18) inset;
      overflow:hidden;
    }
    .logo-orb:before{
      content:""; position:absolute; inset:-6px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.55), transparent 55%);
    }
    .brand-text{display:flex; flex-direction:column; gap:2px; min-width:0;}
    .brand-kicker{font-size:12px; letter-spacing:.22em; text-transform:uppercase; font-weight:800; opacity:.9;}
    .brand-title{font-size:18px; font-weight:900; line-height:1.05;}
    .brand-sub{font-size:14px; font-weight:800; opacity:.92; line-height:1.1;}

    .tag-top{
      margin-left:auto;
      font-size:11px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(15,23,42,.85);
      border:1px solid rgba(148,163,184,.6);
      color:var(--soft);
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .pill-btn{
      border:none;
      background:transparent;
      color:inherit;
      font:inherit;
      display:flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
      padding:0;
    }
    .pill-btn:hover{filter:brightness(1.08)}

    main{
      flex:1 0 auto;
      display:flex;
      justify-content:center;
      padding:12px 16px 18px;
    }
    .layout{
      width:100%;
      max-width:1200px;
      display:flex;
      justify-content:center;
    }
    .container{
      width:100%;
      border-radius:var(--radius);
      border:1px solid rgba(148,163,184,.6);
      box-shadow:0 24px 60px rgba(15,23,42,.9);
      background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
      padding:18px;
    }

    .topbox{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:12px 14px;
      border-radius:14px;
      border:2px solid rgba(34,197,94,.45);
      background:linear-gradient(120deg, rgba(2,6,23,.78), rgba(2,6,23,.35));
      box-shadow:0 18px 60px rgba(0,0,0,.35);
      flex-wrap:wrap;
    }
    .topbox-left .title{
      font-size:18px;
      font-weight:800;
      margin-bottom:4px;
    }
    .topbox-left .subtitle{
      font-size:12px;
      opacity:.82;
    }

    .form-section{
      margin-top:20px;
      padding:20px;
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--panel);
    }
    .form-section h3{
      font-size:16px;
      margin-bottom:16px;
      color:var(--green);
    }
    .form-group{
      margin-bottom:16px;
    }
    label{
      display:block;
      font-size:12px;
      font-weight:700;
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.05em;
      color:var(--soft);
    }
    select, input, textarea{
      width:100%;
      padding:10px 12px;
      border-radius:8px;
      border:1px solid var(--border);
      background:rgba(15,23,42,.6);
      color:var(--text);
      font-family:inherit;
      font-size:14px;
    }
    select:focus, input:focus, textarea:focus{
      outline:none;
      border-color:var(--green);
      box-shadow:0 0 0 3px rgba(34,197,94,.2);
    }
    textarea{
      min-height:92px;
      resize:vertical;
    }

    .radio-group{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    .radio-item{
      display:flex;
      align-items:center;
      gap:6px;
    }
    .radio-item input[type="radio"]{
      width:auto;
    }

    .farol-group{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    .farol-btn{
      flex:1;
      min-width:140px;
      padding:12px;
      border-radius:8px;
      border:2px solid transparent;
      background:rgba(15,23,42,.6);
      color:var(--text);
      cursor:pointer;
      font-weight:700;
      transition:all .2s;
      text-align:center;
    }
    .farol-btn:hover{
      transform:scale(1.02);
    }
    .farol-btn.active{
      border-color:currentColor;
      box-shadow:0 0 20px currentColor;
    }
    .farol-btn.verde{ color:var(--green); }
    .farol-btn.amarelo{ color:var(--yellow); }
    .farol-btn.vermelho{ color:var(--red); }

    .btn{
      padding:12px 24px;
      border-radius:10px;
      border:none;
      font-weight:700;
      cursor:pointer;
      transition:all .2s;
      font-size:14px;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .btn-primary{
      background:var(--green);
      color:#fff;
    }
    .btn-primary:hover{
      transform:scale(1.02);
      box-shadow:0 10px 25px rgba(34,197,94,.35);
    }
    .btn-secondary{
      background:rgba(148,163,184,.2);
      color:var(--text);
      border:1px solid var(--border);
    }
    .btn-secondary:hover{
      background:rgba(148,163,184,.3);
    }

    .actions{
      margin-top:24px;
      display:flex;
      gap:12px;
      justify-content:flex-end;
      flex-wrap:wrap;
    }

    footer{
      padding:12px;
      text-align:center;
      font-size:11px;
      opacity:.7;
    }

    @media (max-width:600px){
      .topbox{flex-direction:column; align-items:flex-start;}
      .actions{flex-direction:column;}
      .btn{width:100%;}
      .farol-group{flex-direction:column;}
      .farol-btn{min-width:0}
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="logo-orb"></div>
      <div class="brand-text">
        <div class="brand-kicker">ERP</div>
        <div class="brand-title">ÍMPAR</div>
        <div class="brand-sub">Gestão à Vista</div>
      </div>
    </div>
<div class="tag-top">
  <span>Logado como</span>
  <strong id="usuarioNome">—</strong>
  <span id="usuarioEmail" style="font-size:10px;opacity:.7">—</span>

  <button class="pill-btn" id="btnVoltarMenu">
    🏠 Menu principal
  </button>
</div>
  </div>
</header>

<main>
  <div class="layout">
    <div class="container">
      <div class="topbox">
        <div class="topbox-left">
          <div class="title">📊 Atualizar Status do Projeto</div>
          <div class="subtitle">Preencha os campos e clique em Salvar Atualização</div>
        </div>
      </div>

      <form id="formProjeto" class="form-section">
        <h3>📌 Dados do Projeto</h3>

        <div class="form-group">
          <label for="projeto">Projeto *</label>
          <select id="projeto" required>
            <option value="">Carregando...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="status">Status Atual *</label>
          <textarea id="status" placeholder="Ex: Fundação concluída, iniciando estrutura..." required></textarea>
        </div>

        <div class="form-group">
          <label>Execução *</label>
          <div class="radio-group">
            <div class="radio-item">
              <input type="radio" id="execInterno" name="execucao" value="Interno" required>
              <label for="execInterno" style="margin:0">Interno</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="execEmpreiteiro" name="execucao" value="Empreiteiro" required>
              <label for="execEmpreiteiro" style="margin:0">Empreiteiro</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Farol do Projeto *</label>
          <div class="farol-group">
            <button type="button" class="farol-btn verde" data-farol="verde" onclick="selecionarFarol('verde')">
              🟢 Verde<br><small style="font-size:10px;opacity:.8">Normal</small>
            </button>
            <button type="button" class="farol-btn amarelo" data-farol="amarelo" onclick="selecionarFarol('amarelo')">
              🟡 Amarelo<br><small style="font-size:10px;opacity:.8">Atenção</small>
            </button>
            <button type="button" class="farol-btn vermelho" data-farol="vermelho" onclick="selecionarFarol('vermelho')">
              🔴 Vermelho<br><small style="font-size:10px;opacity:.8">Crítico</small>
            </button>
          </div>
          <input type="hidden" id="farol" required>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary">
            💾 Salvar Atualização
          </button>
        </div>
      </form>
    </div>
  </div>
</main>

<footer>
  ERP ÍMPAR © 2026 — Sistema de Gestão à Vista
</footer>

<script>
const API_BASE = 'https://api.erpimpar.com.br/tv';
let farolSelecionado = '';

window.addEventListener('DOMContentLoaded', () => {
  document.body.classList.add('impar-enter');

function getLoggedUser(){
  const raw = localStorage.getItem("ERPIMPAR_USER") || sessionStorage.getItem("ERPIMPAR_USER");
  if(!raw) return { nome:"Usuário", email:"—" };

  try{
    const u = JSON.parse(raw);
    return {
      nome: u.nome || u.Nome || u.name || "Usuário",
      email: u.email || u.Email || "—"
    };
  }catch{
    return { nome:"Usuário", email:"—" };
  }
}

const user = getLoggedUser();
document.getElementById('usuarioNome').textContent = user.nome;
document.getElementById('usuarioEmail').textContent = user.email;
  
  carregarProjetos();
});

async function carregarProjetos() {
  try {
    const response = await fetch(`${API_BASE}/listar.php?t=${Date.now()}`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const data = await response.json();
    if (!data.success || !data.data || !Array.isArray(data.data.projetos)) {
      throw new Error('Formato de resposta inválido');
    }

    const projetos = [...data.data.projetos].sort(compareProjetos);
    const select = document.getElementById('projeto');
    select.innerHTML = '<option value="">Selecione um projeto</option>';

    projetos.forEach((proj) => {
      const option = document.createElement('option');
      option.value = String(proj.id);
      option.textContent = `${proj.nome} (${proj.coordenador})`;
      option.dataset.coordenador = proj.coordenador || '';
      select.appendChild(option);
    });
  } catch (error) {
    console.error(error);
    const select = document.getElementById('projeto');
    select.innerHTML = '<option value="">Erro ao carregar projetos</option>';

    Swal.fire({
      icon: 'error',
      title: 'Erro',
      text: 'Não foi possível carregar a lista de projetos.'
    });
  }
}

function compareProjetos(a, b){
  const idA = Number(a.id);
  const idB = Number(b.id);
  if (!Number.isNaN(idA) && !Number.isNaN(idB)) return idA - idB;
  return (a.nome || '').localeCompare(b.nome || '', 'pt-BR');
}

function selecionarFarol(cor) {
  document.querySelectorAll('.farol-btn').forEach(btn => btn.classList.remove('active'));
  const button = document.querySelector(`.farol-btn.${cor}`);
  if (button) button.classList.add('active');
  document.getElementById('farol').value = cor;
  farolSelecionado = cor;
}

document.getElementById('formProjeto').addEventListener('submit', async (e) => {
  e.preventDefault();

  const projetoId = document.getElementById('projeto').value;
  const status = document.getElementById('status').value.trim();
  const execucao = document.querySelector('input[name="execucao"]:checked')?.value;
  const farol = document.getElementById('farol').value;

  if (!projetoId || !status || !execucao || !farol) {
    Swal.fire({
      icon: 'warning',
      title: 'Atenção',
      text: 'Preencha todos os campos obrigatórios.'
    });
    return;
  }

  const option = document.querySelector(`#projeto option[value="${CSS.escape(projetoId)}"]`);
  const coordenador = option?.dataset?.coordenador || '';
  const usuario = user.nome;

  try {
    const response = await fetch(`${API_BASE}/atualizar.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        projeto_id: Number(projetoId),
        status,
        execucao,
        farol,
        coordenador,
        usuario_atualizacao: usuario
      })
    });

    const text = await response.text();

console.log("🔎 RESPOSTA BRUTA DO PHP:", text);

let data;
try {
  data = JSON.parse(text);
} catch (e) {
  console.error("❌ ERRO AO PARSEAR JSON:", text);

  Swal.fire({
    icon: 'error',
    title: 'Erro no servidor',
    text: 'O backend retornou um erro. Ver console.'
  });

  return;
}

    if (!response.ok || !data.success) {
      throw new Error(data.error || 'Não foi possível salvar a atualização');
    }

    await Swal.fire({
      icon: 'success',
      title: 'Sucesso!',
      text: 'Projeto atualizado com sucesso.',
      timer: 1800,
      showConfirmButton: false
    });

    document.getElementById('formProjeto').reset();
    farolSelecionado = '';
    document.querySelectorAll('.farol-btn').forEach(btn => btn.classList.remove('active'));
  } catch (error) {
    console.error(error);
    Swal.fire({
      icon: 'error',
      title: 'Erro',
      text: error.message || 'Não foi possível salvar a atualização.'
    });
  }
});

document.getElementById('btnVoltarMenu')
  .addEventListener('click', () => {
    window.location.href = 'index.html';
  });

</script>

</body>
</html>
