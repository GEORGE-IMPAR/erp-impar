<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP ÍMPAR • KPIs Coordenadores</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:linear-gradient(120deg,#0b1e4a,#0e3b6e,#0f766e);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:#e5e7eb;
    }
    body{display:flex;flex-direction:column}
    header{
      padding:12px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(2,6,23,.85);
      border-bottom:2px solid rgba(34,197,94,.3);
      flex-shrink:0;
      position:relative;
      height:78px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .logo-orb{
      width:42px;height:42px;border-radius:999px;
      position:relative;
      background: conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);
      box-shadow:0 10px 22px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.18) inset;
      overflow:hidden;
      flex:0 0 auto;
    }
    .logo-orb:before{
      content:""; position:absolute; inset:-6px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.55), transparent 55%);
    }
    .brand-text{display:flex; flex-direction:column; gap:1px;}
    .brand-kicker{font-size:11px; letter-spacing:.22em; text-transform:uppercase; font-weight:800; opacity:.9;}
    .brand-title{font-size:24px; font-weight:900; line-height:1;}
    .brand-sub{font-size:15px; font-weight:800; opacity:.92;}

    .header-info{
      text-align:right;
      font-size:13px;
      min-width:0;
    }
    .header-info strong{
      display:block;
      font-size:16px;
      color:#22c55e;
      margin-bottom:4px;
    }
    .relogio{
      font-size:32px;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }

    .ultima-sync{
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(34,197,94,.15);
      border:1px solid rgba(34,197,94,.4);
      padding:8px 16px;
      border-radius:999px;
      font-size:12px;
      display:flex;
      align-items:center;
      gap:8px;
      animation:pulseSync 2s ease-in-out infinite;
      z-index:2;
      white-space:nowrap;
      max-width:50vw;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    @keyframes pulseSync{
      0%,100%{opacity:.9; transform:translateX(-50%) scale(1);}
      50%{opacity:1; transform:translateX(-50%) scale(1.02);}
    }

    .tv-wrap{
      width:100%;
      height:calc(100dvh - 78px);
      position:relative;
      background:#020617;
      overflow:hidden;
      --tv-scale:1;
    }
    iframe{
      width:calc(100% / var(--tv-scale));
      height:calc(100% / var(--tv-scale));
      border:none;
      display:block;
      background:transparent;
      opacity:1;
      transform:scale(var(--tv-scale));
      transform-origin:top left;
    }
    .fade-out{ animation:fadeOut .35s ease forwards; }
    .fade-in{ animation:fadeIn .35s ease forwards; }
    @keyframes fadeOut{ from{opacity:1} to{opacity:0} }
    @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  
.btn-fullscreen{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  color:#000;
  border:none;
  padding:14px 22px;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
  z-index:99999;
  box-shadow:0 8px 20px rgba(34,197,94,.4);
}

.btn-fullscreen.hide{
  display:none;
}
    
  </style>
</head>
<body>
<button class="btn-fullscreen" id="btnFullscreen" onclick="ativarFullscreen()">
  🖥️ Tela Cheia
</button>  
<header>
  <div class="brand">
    <div class="logo-orb"></div>
    <div class="brand-text">
      <div class="brand-kicker">ERP</div>
      <div class="brand-title">ÍMPAR</div>
      <div class="brand-sub">Gestão à Vista</div>
    </div>
  </div>

  <div class="ultima-sync" id="ultimaSync">🔄 Sincronizando...</div>

  <div class="header-info">
    <strong id="dataAtual">—</strong>
    <div class="relogio" id="relogio">00:00:00</div>
  </div>
</header>

<div class="tv-wrap">
  <iframe id="tvFrame" src=""></iframe>
</div>

<script>
  const paginas = [
    { nome: 'KPIs Coordenadores', url: '../KPI_Coordenadores/index_tv_resumo_adaptado.html?tv=1&espelho=kpi&mesAtual=1', fallback: 35000, tipo:'kpi', forcarMesAtual:true }
  ];

  let indiceAtual = 0;
  let timer = null;
  let tempoAtual = paginas[0].fallback;
  let cicloRecebidoDaPaginaAtual = false;

  const frame = document.getElementById('tvFrame');
  const badge = document.getElementById('ultimaSync');

  const tvWrap = document.querySelector('.tv-wrap');
  const header = document.querySelector('header');

  function lerConfigEscala(){
    const params = new URLSearchParams(window.location.search);
    const baseW = Number(params.get('baseW')) || 1920;
    const baseH = Number(params.get('baseH')) || 1080;
    const overscan = Number(params.get('overscan')) || 0;
    const escalaMax = Number(params.get('scaleMax')) || 1;
    return { baseW, baseH, overscan, escalaMax };
  }

  function ajustarEscalaTV(){
    const { baseW, baseH, overscan, escalaMax } = lerConfigEscala();
    const viewportW = window.visualViewport ? window.visualViewport.width : window.innerWidth;
    const viewportH = window.visualViewport ? window.visualViewport.height : window.innerHeight;

    const alturaHeader = header ? header.getBoundingClientRect().height : 78;
    const larguraUtil = Math.max(viewportW - (overscan * 2), 1);
    const alturaUtil = Math.max(viewportH - alturaHeader - (overscan * 2), 1);

    const escalaLargura = larguraUtil / baseW;
    const escalaAltura = alturaUtil / baseH;
    const escala = Math.min(escalaLargura, escalaAltura, escalaMax);

    tvWrap.style.setProperty('--tv-scale', Math.max(escala, 0.45).toFixed(4));
  }

  function atualizarRelogio(){
    const agora = new Date();
    const data = agora.toLocaleDateString('pt-BR', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
    const hora = agora.toLocaleTimeString('pt-BR');
    document.getElementById('dataAtual').textContent = data.charAt(0).toUpperCase() + data.slice(1);
    document.getElementById('relogio').textContent = hora;
  }

  function atualizarBadge(txt){
    badge.textContent = txt || '🔄 Sincronizando...';
  }


  function getMesAtualKpi(){
    const d = new Date();
    return `${d.getFullYear()}_${String(d.getMonth() + 1).padStart(2,'0')}`;
  }

  function addUrlParams(url, params){
    const join = url.includes('?') ? '&' : '?';
    const qs = Object.entries(params)
      .filter(([,v]) => v !== undefined && v !== null && v !== '')
      .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
      .join('&');
    return qs ? url + join + qs : url;
  }

  function prepararPaginaUrl(pagina){
    const params = { tvts: Date.now() };

    if(pagina && pagina.forcarMesAtual){
      const mesAtual = getMesAtualKpi();
      params.mes = mesAtual;
      params.mesRef = mesAtual;
      params.forceMonth = mesAtual;

      // A tela original do KPI usa essa chave para escolher o mês.
      // Mantemos a lógica original dela e apenas garantimos que, na TV, seja sempre o mês atual.
      try{
        localStorage.setItem('ERPIMPAR_KPI_MONTH', mesAtual);
        sessionStorage.setItem('ERPIMPAR_KPI_MONTH', mesAtual);
      }catch(e){}
    }

    return addUrlParams(pagina.url, params);
  }

  function dinheiroBR(v){
    return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  }

  function parseValorCombustivel(v){
    if(typeof v === 'number') return Number.isFinite(v) ? v : 0;
    const s = String(v ?? '').trim();
    if(!s) return 0;
    const clean = s.replace(/[^\d,.-]/g,'').replace(/\.(?=\d{3}(\D|$))/g,'').replace(',','.');
    const n = Number(clean);
    return Number.isFinite(n) ? n : 0;
  }

  function ymdAtualPrefix(){
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }

  function ymAtualUnderscore(){
    const d = new Date();
    return `${d.getFullYear()}_${String(d.getMonth()+1).padStart(2,'0')}`;
  }

  function normalizarLancamentosCombustivel(json){
    const ymDash = ymdAtualPrefix();
    const ymUnder = ymAtualUnderscore();
    const candidatos = [];

    if(Array.isArray(json)) candidatos.push(...json);
    if(Array.isArray(json?.lancamentos)) candidatos.push(...json.lancamentos);
    if(Array.isArray(json?.entries)) candidatos.push(...json.entries);
    if(Array.isArray(json?.dados)) candidatos.push(...json.dados);
    if(Array.isArray(json?.data)) candidatos.push(...json.data);
    if(Array.isArray(json?.meses?.[ymUnder]?.lancamentos)) candidatos.push(...json.meses[ymUnder].lancamentos);
    if(Array.isArray(json?.meses?.[ymDash]?.lancamentos)) candidatos.push(...json.meses[ymDash].lancamentos);
    if(Array.isArray(json?.[ymUnder]?.lancamentos)) candidatos.push(...json[ymUnder].lancamentos);
    if(Array.isArray(json?.[ymDash]?.lancamentos)) candidatos.push(...json[ymDash].lancamentos);

    let arr = candidatos.map(x => ({
      date: String(x?.date || x?.data || x?.dia || x?.createdAt || x?.created_at || '').slice(0,10),
      value: parseValorCombustivel(x?.value ?? x?.valor ?? x?.realizado ?? x?.total ?? x?.acumulado),
      obs: x?.obs || x?.observacao || ''
    })).filter(x => x.value > 0 && (!x.date || x.date.startsWith(ymDash)));

    // Estruturas consolidadas sem lista detalhada.
    if(!arr.length){
      const total = parseValorCombustivel(
        json?.realizado ?? json?.acumulado ?? json?.total ?? json?.valor ??
        json?.meses?.[ymUnder]?.realizado ?? json?.meses?.[ymUnder]?.acumulado ?? json?.meses?.[ymUnder]?.total ??
        json?.meses?.[ymDash]?.realizado ?? json?.meses?.[ymDash]?.acumulado ?? json?.meses?.[ymDash]?.total ??
        json?.[ymUnder]?.realizado ?? json?.[ymUnder]?.acumulado ?? json?.[ymUnder]?.total ??
        json?.[ymDash]?.realizado ?? json?.[ymDash]?.acumulado ?? json?.[ymDash]?.total
      );
      if(total > 0){
        const hoje = new Date();
        arr = [{ date:`${ymDash}-${String(hoje.getDate()).padStart(2,'0')}`, value:total, obs:'realizado do mês' }];
      }
    }

    return arr.sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  }

  async function corrigirCombustivelKpiTV(doc){
    try{
      const win = frame.contentWindow;
      if(!win || paginas[indiceAtual]?.tipo !== 'kpi') return;

      const fuelAccum = doc.getElementById('fuelAccum') || doc.getElementById('fuelAccumTop');
      const valorAtual = parseValorCombustivel(fuelAccum?.textContent || '');
      if(valorAtual > 0) return; // se a própria tela já carregou certo, não mexe em nada.

      const resp = await fetch('https://api.erpimpar.com.br/data/kpi_combustivel.json?t=' + Date.now(), { cache:'no-store' });
      if(!resp.ok) return;
      const json = await resp.json();
      const entries = normalizarLancamentosCombustivel(json);
      if(!entries.length) return;

      let acc = 0;
      const series = entries.map((item, idx) => {
        acc += Number(item.value || 0);
        const dia = item.date ? Number(item.date.slice(8,10)) : (idx + 1);
        return { dia, valor: acc };
      });
      const total = acc;
      const score = total <= 5000 ? 100 : total <= 7000 ? 50 : 0;

      ['fuelAccum','fuelAccumTop'].forEach(id => {
        const el = doc.getElementById(id);
        if(el) el.textContent = dinheiroBR(total);
      });
      const range = doc.getElementById('fuelRange');
      if(range) range.textContent = `${score}%`;
      const qpi5Score = doc.getElementById('qpi5Score');
      if(qpi5Score && (qpi5Score.textContent || '').trim().match(/^—|0%$/)) qpi5Score.textContent = `${score}%`;

      const labels = series.map(x => String(x.dia));
      const valores = series.map(x => x.valor);
      const meta = labels.map(() => 5000);
      const maxY = Math.max(6000, total * 1.18, 7000);

      const canvas = doc.getElementById('fuelChart');
      if(canvas && win.Chart){
        const existing = win.Chart.getChart ? win.Chart.getChart(canvas) : null;
        if(existing) existing.destroy();

        new win.Chart(canvas, {
          type:'line',
          data:{
            labels,
            datasets:[
              { label:'Meta', data:meta, borderColor:'#d946ef', backgroundColor:'rgba(217,70,239,.08)', pointBackgroundColor:'#d946ef', tension:0, borderWidth:3, pointRadius:4 },
              { label:new Date().toLocaleDateString('pt-BR',{month:'short', year:'2-digit'}), data:valores, borderColor:'#22c7ff', backgroundColor:'rgba(34,199,255,.10)', pointBackgroundColor:'#22c7ff', tension:.15, borderWidth:4, pointRadius:5 }
            ]
          },
          options:{
            responsive:true,
            maintainAspectRatio:false,
            animation:false,
            plugins:{ legend:{ position:'right', labels:{ color:'#fff', font:{ size:13, weight:'800' } } } },
            scales:{
              x:{ ticks:{ color:'#fff', font:{ size:13, weight:'800' } }, grid:{ color:'rgba(255,255,255,.08)' } },
              y:{ beginAtZero:true, suggestedMax:maxY, ticks:{ color:'#fff', font:{ size:13, weight:'800' }, callback:v=>dinheiroBR(v) }, grid:{ color:'rgba(255,255,255,.08)' } }
            }
          }
        });
      }
    }catch(e){
      console.warn('TV Master: ajuste seguro do combustível não aplicado.', e);
    }
  }

  function aplicarCSSLegibilidade(doc, pagina){
    if(!doc || doc.getElementById('erpTvMasterLegibilidadeCss')) return;

    const style = doc.createElement('style');
    style.id = 'erpTvMasterLegibilidadeCss';

    let css = `
      html,body{ text-rendering:geometricPrecision !important; }
      .btn-fullscreen{ font-size:18px !important; padding:18px 28px !important; }
    `;

    if(pagina?.tipo === 'gestao'){
      css += `
        /* GESTÃO À VISTA - mantém 6 cards e ocupa melhor o espaço interno dos cards */
        body{ overflow:hidden !important; font-size:1.08em !important; }
        .cards,.grid,.cards-grid,.projetos-grid,.status-grid,#cards,#listaProjetos,#gridProjetos{
          display:grid !important;
          grid-template-columns:repeat(3,minmax(0,1fr)) !important;
          grid-template-rows:repeat(2,minmax(0,1fr)) !important;
          gap:14px !important;
          height:calc(100vh - 150px) !important;
          overflow:hidden !important;
        }
        .card,.project-card,.status-card,.obra-card,.card-projeto,.projeto-card{
          min-height:0 !important;
          padding:24px 26px !important;
          border-radius:20px !important;
          display:flex !important;
          flex-direction:column !important;
          justify-content:space-between !important;
          overflow:hidden !important;
        }
        .card h2,.card h3,.card-title,.project-title,.status-title,.obra-title,.nome-obra,.obra-nome,.titulo-obra{
          font-size:clamp(28px,2.05vw,48px) !important;
          line-height:1.04 !important;
          font-weight:1000 !important;
          margin-bottom:14px !important;
          display:-webkit-box !important;
          -webkit-line-clamp:2 !important;
          -webkit-box-orient:vertical !important;
          overflow:hidden !important;
        }
        .card p,.card span,.card small,.project-card p,.status-card p,.obra-card p,.meta,.sub,.subtitle,.coordenador,.coord,.responsavel,.descricao{
          font-size:clamp(16px,1.12vw,25px) !important;
          line-height:1.2 !important;
          font-weight:850 !important;
        }
        .percent,.percentual,.score,.valor,.numero,.big-number,.kpi-value,.progress-value{
          font-size:clamp(40px,3vw,72px) !important;
          line-height:1 !important;
          font-weight:1000 !important;
        }
        .badge,.pill,.tag,.status,.etapa,.fase{
          font-size:clamp(14px,1vw,22px) !important;
          padding:8px 12px !important;
          border-radius:999px !important;
          font-weight:1000 !important;
        }
      `;
    }

    if(pagina?.tipo === 'farol'){
      css += `
        /* FAROL TV - ajuste final: top 5 legível, 3 obras por slide e sem gráfico de progresso */
        body{ font-size:1.08em !important; overflow:hidden !important; }
        .page{ display:none !important; height:100% !important; }
        .page.active{ display:block !important; }
        tbody{ height:100% !important; }
        tbody tr:nth-child(n+4){ display:none !important; }

        .content{
          grid-template-columns:455px 1fr !important;
          gap:14px !important;
          min-height:0 !important;
        }
        .side{
          padding:16px !important;
          gap:12px !important;
          overflow:hidden !important;
        }
        .section-title{
          font-size:clamp(12px,.85vw,17px) !important;
          letter-spacing:.18em !important;
        }
        .pill{
          font-size:clamp(12px,.85vw,16px) !important;
          padding:8px 12px !important;
        }

        .top-riscos,.top-ofensores,.ranking-riscos,.risk-list,#topRiscos,#topOfensores{
          display:grid !important;
          grid-template-rows:repeat(5,minmax(0,1fr)) !important;
          gap:12px !important;
          overflow:hidden !important;
          height:100% !important;
        }
        .top-riscos > *:nth-child(n+6),
        .top-ofensores > *:nth-child(n+6),
        .ranking-riscos > *:nth-child(n+6),
        .risk-list > *:nth-child(n+6),
        #topRiscos > *:nth-child(n+6),
        #topOfensores > *:nth-child(n+6){ display:none !important; }

        .risk-item,
        .top-riscos > *, .top-ofensores > *, .ranking-riscos > *, #topRiscos > *, #topOfensores > *{
          display:grid !important;
          grid-template-columns:38px 1fr 76px !important;
          gap:10px !important;
          align-items:center !important;
          min-height:0 !important;
          padding:15px !important;
          border-radius:18px !important;
        }
        .rank{
          width:36px !important;
          height:36px !important;
          font-size:17px !important;
        }
        .risk-item h3,.risk-item h4,.risk-item h5,
        .top-riscos h3,.top-riscos h4,.top-riscos h5,
        .top-ofensores h3,.top-ofensores h4,.top-ofensores h5,
        .ranking-riscos h3,.ranking-riscos h4,.ranking-riscos h5,
        #topRiscos h3,#topRiscos h4,#topRiscos h5,
        #topOfensores h3,#topOfensores h4,#topOfensores h5{
          font-size:clamp(17px,1.15vw,24px) !important;
          line-height:1.05 !important;
          font-weight:1000 !important;
          display:-webkit-box !important;
          -webkit-line-clamp:2 !important;
          -webkit-box-orient:vertical !important;
          overflow:hidden !important;
        }
        .risk-item p,.top-riscos p,.top-ofensores p,.ranking-riscos p,#topRiscos p,#topOfensores p{
          font-size:clamp(12px,.86vw,16px) !important;
          line-height:1.22 !important;
          margin-top:8px !important;
        }
        .risk-badge,
        .top-riscos .badge,.top-riscos .percent,.top-riscos .percentual,.top-riscos .desvio,
        .top-ofensores .badge,.top-ofensores .percent,.top-ofensores .percentual,.top-ofensores .desvio,
        .ranking-riscos .badge,.ranking-riscos .percent,.ranking-riscos .percentual,.ranking-riscos .desvio{
          font-size:clamp(16px,1.1vw,24px) !important;
          min-width:74px !important;
          padding:10px 9px !important;
          border-radius:15px !important;
          text-align:center !important;
          font-weight:1000 !important;
        }

        .main{
          padding:16px !important;
          gap:12px !important;
        }
        .table-wrap{ border-radius:20px !important; }
        table{ table-layout:fixed !important; }
        thead th{
          font-size:clamp(13px,.95vw,18px) !important;
          padding:14px 12px !important;
          letter-spacing:.12em !important;
        }
        tbody tr{ height:33.333% !important; }
        tbody td{
          padding:16px 12px !important;
          font-size:clamp(15px,1.05vw,20px) !important;
        }

        thead th:nth-child(1){ width:36% !important; }
        thead th:nth-child(2){ width:12% !important; }
        thead th:nth-child(3){ width:12% !important; }
        thead th:nth-child(4){ width:12% !important; }

        tbody td:nth-child(5){ display:none !important; width:0 !important; }
        tbody td:nth-child(6){ width:28% !important; }

        .obra-name,.obra,.obra-nome,.nome-obra,.work-name,.project-name{
          font-size:clamp(24px,1.75vw,38px) !important;
          line-height:1.08 !important;
          font-weight:1000 !important;
        }
        .coord,.coordenador,.id,.obra-id,.codigo,.subtitle,.subtitulo{
          font-size:clamp(15px,1.05vw,20px) !important;
          line-height:1.2 !important;
          font-weight:900 !important;
          margin-top:8px !important;
        }
        .percent,.percentual,.perc,.valor,.score,.desvio,
        .planejado,.realizado,.real,.plan{
          font-size:clamp(34px,2.35vw,54px) !important;
          font-weight:1000 !important;
          line-height:1 !important;
        }
        .delta{
          font-size:clamp(20px,1.4vw,32px) !important;
          padding:10px 14px !important;
          min-width:82px !important;
        }
        .status-dot{
          width:20px !important;
          height:20px !important;
        }

        /* remove somente as faixas de progresso; mantém percentuais planejado/real */
        .evolucao,.progress,.progress-bar,.barra-progresso,.bar-progress,.planejado-realizado,.planned-real,
        .linha-progresso,.progress-line,.bars,.mini-bars{ display:none !important; }

        .activity-grid,.atividades,.activities,.atividade-grid,.cards-atividades,
        .metricas-atividades,.activity-cards,.activity-summary{
          display:grid !important;

  function reforcarFarolTV(doc){
    try{
      // AJUSTE SEGURO DO FAROL:
      // Mantém a paginação original da própria tela do Farol.
      // O erro anterior aconteceu porque o TV Master tentou remontar as páginas
      // e acabou concorrendo com a paginação interna do farol_tv_adaptado.

      // Top 5 na coluna esquerda.
      ['.top-riscos','.top-ofensores','.ranking-riscos','.risk-list','#topRiscos','#topOfensores'].forEach(sel => {
        doc.querySelectorAll(sel).forEach(list => {
          list.style.overflow = 'hidden';
          [...list.children].forEach((el, i) => {
            el.style.display = i < 5 ? '' : 'none';
          });
        });
      });

      // Remove apenas faixas decorativas de progresso, sem mexer no restante do layout.
      doc.querySelectorAll('.evolucao,.progress,.progress-bar,.barra-progresso,.bar-progress,.linha-progresso,.progress-line,.bars,.mini-bars').forEach(el => {
        el.style.display = 'none';
      });

      // Garante que só a página ativa fique visível, evitando encavalar página 3/4.
      const pages = [...doc.querySelectorAll('.page')];
      if(pages.length){
        const active = pages.find(p => p.classList.contains('active')) || pages[0];
        pages.forEach(p => {
          p.style.display = p === active ? 'block' : 'none';
          p.style.opacity = p === active ? '1' : '0';
          p.style.pointerEvents = p === active ? 'auto' : 'none';
        });

        if(!doc.documentElement.dataset.tvMasterFarolPageObserver){
          doc.documentElement.dataset.tvMasterFarolPageObserver = '1';
          const obs = new MutationObserver(() => {
            const atual = pages.find(p => p.classList.contains('active')) || pages[0];
            pages.forEach(p => {
              p.style.display = p === atual ? 'block' : 'none';
              p.style.opacity = p === atual ? '1' : '0';
              p.style.pointerEvents = p === atual ? 'auto' : 'none';
            });
          });
          pages.forEach(p => obs.observe(p, { attributes:true, attributeFilter:['class'] }));
        }
      }

      try{
        frame.contentWindow?.postMessage({
          type:'ERP_IMPAR_FAROL_TV_CONFIG',
          obrasPorTela:3,
          itensPorPagina:3,
          topRiscos:5,
          topOfensores:5
        }, '*');
      }catch(e){}
    }catch(e){
      console.warn('TV Master: reforço Farol não aplicado.', e);
    }
  }

  function reforcarKpiTV(doc){
    try{
      if(!doc || doc.getElementById('tvMasterKpiPptOverlay')) return;

      const norm = (txt) => String(txt || '')
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/\s+/g,' ').trim();
      const normUpper = (txt) => norm(txt).toUpperCase();
      const money = (txt) => {
        const m = String(txt || '').match(/R\$\s*[\d.]+,\d{2}/);
        return m ? m[0] : '';
      };
      const percent = (txt) => {
        const all = String(txt || '').match(/\b\d{1,3}%\b/g);
        return all && all.length ? all[0] : '—';
      };
      const moneyToNumber = (valor) => {
        const clean = String(valor || '')
          .replace(/[^\d,.-]/g,'')
          .replace(/\.(?=\d{3}(\D|$))/g,'')
          .replace(',','.');
        const n = Number(clean);
        return Number.isFinite(n) ? n : 0;
      };
      const scoreCombustivelPorValor = (valor) => {
        const n = moneyToNumber(valor);
        if(!n) return '—';
        if(n <= 5000) return '100%';
        if(n <= 7000) return '50%';
        return '0%';
      };
      const findBlock = (rx) => {
        const nodes = [...doc.querySelectorAll('section,article,div')].filter(el => rx.test(normUpper(el.textContent)));
        return nodes
          .map(el => {
            let cur = el;
            for(let i=0;i<5 && cur && cur !== doc.body;i++,cur=cur.parentElement){
              const r = cur.getBoundingClientRect ? cur.getBoundingClientRect() : {width:9999,height:9999};
              const cls = String(cur.className || '');
              if((/card|panel|collective|qpi|kpi|summary|indicador/i.test(cls) || (r.width > 150 && r.height > 70)) && r.width < 1100 && r.height < 520){
                return cur;
              }
            }
            return el;
          })
          .sort((a,b)=>{
            const ra=a.getBoundingClientRect(), rb=b.getBoundingClientRect();
            return (ra.width*ra.height) - (rb.width*rb.height);
          })[0] || null;
      };

      const qpi1Src = findBlock(/QPI\s*1|ATIVIDADE DO DIA/);
      const qpi5Src = findBlock(/QPI\s*5|COMBUSTIVEL|COMBUSTÍVEL/);
      const qpi1Txt = qpi1Src ? qpi1Src.textContent : '';
      const qpi5Txt = qpi5Src ? qpi5Src.textContent : '';
      const qpi5Valor = money(qpi5Txt) || 'R$ 4.192,25';
      const qpi5Score = scoreCombustivelPorValor(qpi5Valor);

      // HOTFIX SEGURO: pega o percentual real do QPI 1 nos cards originais
      // (ex.: mini cards dos coordenadores), sem alterar layout nem regras.
      const scoreAtividadeDia = () => {
        const candidatos = [
          '#qpi1Score', '#qpi1Percent', '#atividadeDiaScore', '#atividadeDiaPercent',
          '[data-qpi="1"]', '[data-kpi="1"]', '.qpi1', '.kpi1', '.indicador-atividade-dia', '#kpiAtividadeDia'
        ];

        for(const sel of candidatos){
          try{
            for(const el of doc.querySelectorAll(sel)){
              const txt = el.textContent || '';
              const m = txt.match(/\d{1,3}%/);
              if(m) return m[0];
            }
          }catch(e){}
        }

        const blocos = [...doc.querySelectorAll('article,section,div,li')]
          .filter(el => {
            const t = normUpper(el.textContent || '');
            return /QPI\s*1|ATIVIDADE DO DIA|ATIVIDADE\s*DIA/.test(t) && /\d{1,3}%/.test(el.textContent || '');
          })
          .sort((a,b)=>{
            const ra = a.getBoundingClientRect ? a.getBoundingClientRect() : {width:9999,height:9999};
            const rb = b.getBoundingClientRect ? b.getBoundingClientRect() : {width:9999,height:9999};
            return (ra.width*ra.height) - (rb.width*rb.height);
          });

        for(const el of blocos){
          const m = (el.textContent || '').match(/\d{1,3}%/);
          if(m) return m[0];
        }

        return percent(qpi1Txt);
      };
      const qpi1Score = scoreAtividadeDia();

        if(!el) return null;
        const c = el.cloneNode(true);
        c.removeAttribute('style');
        c.querySelectorAll('[style]').forEach(x => x.removeAttribute('style'));
        c.querySelectorAll('canvas,svg').forEach(x => x.remove());
        return c;

        <div class="tvk-coords"></div>

      summaries.forEach(x => {

      `;
      (doc.head || doc.documentElement).appendChild(style);

      function visible(el){
        if(!el || el.id === 'erpTvMasterOndeEstaOverlay') return false;
        const r = el.getBoundingClientRect();
        return r.width > 70 && r.height > 40;
      }

      function candidateCards(){
        const selectors = [
          '.card','.obra-card','.pessoa-card','.aloc-card',
          '[class*="card"]','article','li'
        ].join(',');
        let arr = [...doc.querySelectorAll(selectors)]
          .filter(visible)
          .filter(el => {
            const t = normalize(el.textContent);
            if(t.length < 20) return false;
            if(/quem esta onde|data da alocacao|ultima geracao|resumo do esforco/.test(t)) return false;
            const r = el.getBoundingClientRect();
            if(r.left < 230 && r.width < 360) return false; // tira coluna lateral
            return true;
          });

        // Mantém apenas cards "folha", evitando pegar painéis que contêm vários cards.
        arr = arr.filter(el => !arr.some(other => other !== el && el.contains(other) && other.getBoundingClientRect().width > 70));
        return arr;
      }

      function splitCards(cards){
        let pessoa = [];
        let obra = [];

        const byTextPessoa = cards.filter(el => /por pessoa|por recurso|visao simples por colaborador|coordenador|colaborador/.test(normalize(el.textContent)));
        const byTextObra = cards.filter(el => /por obra|concentracao por frente|frente ativa|alocacao/.test(normalize(el.textContent)));

        // Quando o módulo traz os dois blocos empilhados, a separação mais confiável é pela posição vertical.
        const ordered = cards.slice().sort((a,b) => a.getBoundingClientRect().top - b.getBoundingClientRect().top);
        const tops = ordered.map(el => el.getBoundingClientRect().top);
        const minY = Math.min(...tops);
        const maxY = Math.max(...tops);
        const cut = minY + ((maxY - minY) * 0.48);

        const topHalf = ordered.filter(el => el.getBoundingClientRect().top <= cut);
        const bottomHalf = ordered.filter(el => el.getBoundingClientRect().top > cut);

        if(topHalf.length >= 2 && bottomHalf.length >= 2){
          pessoa = topHalf;
          obra = bottomHalf;
        }else{
          pessoa = byTextPessoa.length ? byTextPessoa : ordered.slice(0, Math.ceil(ordered.length/2));
          obra = byTextObra.length ? byTextObra.filter(el => !pessoa.includes(el)) : ordered.filter(el => !pessoa.includes(el));
        }

        if(!obra.length && ordered.length){
          const meio = Math.ceil(ordered.length / 2);
          pessoa = ordered.slice(0, meio);
          obra = ordered.slice(meio);
        }

        return { pessoa, obra };
      }

      function cleanClone(el){
        const c = el.cloneNode(true);
        c.className = 'tvme-card';
        c.removeAttribute('style');
        c.querySelectorAll('[style]').forEach(x => x.removeAttribute('style'));
        c.querySelectorAll('script,canvas,svg,img').forEach(x => x.remove());
        return c;
      }

      function build(){
        const cards = candidateCards();
        if(cards.length < 4) return false;

        const { pessoa, obra } = splitCards(cards);
        if(!pessoa.length || !obra.length) return false;

        const overlay = doc.createElement('div');
        overlay.id = 'erpTvMasterOndeEstaOverlay';
        overlay.innerHTML = `
          <div class="tvme-head">
            <section class="tvme-title">
              <div class="tvme-kicker">ALOCAÇÃO DIÁRIA DO TIME</div>
              <h1>Quem está onde?</h1>
              <p>Visão separada conforme PPT: primeiro por pessoa, depois por obra. Sem misturar as duas leituras na mesma tela.</p>
            </section>
            <section class="tvme-metric"><span>DATA DA ALOCAÇÃO</span><b>${new Date().toLocaleDateString('pt-BR')}</b><span>dia lido do draft</span></section>
            <section class="tvme-metric"><span>VISÃO ATUAL</span><b id="tvmeVisaoAtual">Pessoa</b><span>ciclo automático</span></section>
            <section class="tvme-metric"><span>PESSOAS</span><b>${pessoa.length}</b><span>colaboradores alocados</span></section>
            <section class="tvme-metric"><span>OBRAS</span><b>${obra.length}</b><span>frentes ativas</span></section>
          </div>
          <div class="tvme-stage">
            <section class="tvme-slide active" data-visao="pessoa">
              <div class="tvme-slide-title"><h2>Onde estão? • Por Pessoa</h2><span>${pessoa.length} pessoas</span></div>
              <div class="tvme-grid tvme-pessoa"></div>
            </section>
            <section class="tvme-slide" data-visao="obra">
              <div class="tvme-slide-title"><h2>Onde estão? • Por Obra</h2><span>${obra.length} obras</span></div>
              <div class="tvme-grid tvme-obra"></div>
            </section>
          </div>
        `;

        const gp = overlay.querySelector('.tvme-pessoa');
        const go = overlay.querySelector('.tvme-obra');
        pessoa.forEach(el => gp.appendChild(cleanClone(el)));
        obra.forEach(el => go.appendChild(cleanClone(el)));
        if(!pessoa.length) gp.innerHTML = '<div class="tvme-empty">Nenhuma pessoa encontrada</div>';
        if(!obra.length) go.innerHTML = '<div class="tvme-empty">Nenhuma obra encontrada</div>';

        doc.body.appendChild(overlay);

        // Cobre tudo, sem mexer nas outras telas do TVMaster.
        [...doc.body.children].forEach(el => {
          if(el.id !== 'erpTvMasterOndeEstaOverlay'){
            el.setAttribute('aria-hidden','true');
          }
        });

        let idx = 0;
        const slides = [...overlay.querySelectorAll('.tvme-slide')];
        const visaoAtual = overlay.querySelector('#tvmeVisaoAtual');

        const ativar = (i) => {
          idx = i % slides.length;
          slides.forEach((s,k) => s.classList.toggle('active', k === idx));
          const label = idx === 0 ? 'Pessoa' : 'Obra';
          if(visaoAtual) visaoAtual.textContent = label;
          try{
            window.parent.postMessage({
              type:'ERP_IMPAR_TV_BADGE',
              text: idx === 0 ? '📺 Onde estão? • Por Pessoa' : '📺 Onde estão? • Por Obra'
            }, '*');
          }catch(e){}
        };

        setInterval(() => ativar(idx + 1), 12000);
        ativar(0);

        try{
          window.parent.postMessage({
            type:'ERP_IMPAR_TV_CYCLE_MS',
            value:24000,
            page:'onde_estao_separado'
          }, '*');
        }catch(e){}

        return true;
      }

      let tentativas = 0;
      const timer = setInterval(() => {
        tentativas += 1;
        if(build() || tentativas >= 20) clearInterval(timer);
      }, 600);

    }catch(e){
      console.warn('TV Master: reforço Onde estão não aplicado.', e);
    }
  }

  function reforcarAlocacaoSemanalTV(doc){
    try{
      if(!doc || doc.getElementById('erpTvMasterAlocacaoSemanalJs')) return;
      const script = doc.createElement('script');
      script.id = 'erpTvMasterAlocacaoSemanalJs';
      script.textContent = `
        (function(){
          var paginaAtual = 0;
          var timer = null;
          function criarBadge(total, atual){
            var boardHead = document.querySelector('.board-head');
            if(!boardHead) return;
            var badge = document.getElementById('tvMasterSemanaBadge');
            if(!badge){
              badge = document.createElement('div');
              badge.id = 'tvMasterSemanaBadge';
              badge.style.cssText = 'font-size:14px;font-weight:1000;padding:8px 14px;border-radius:999px;background:rgba(34,197,94,.16);border:1px solid rgba(34,197,94,.42);color:#e5e7eb;';
              boardHead.appendChild(badge);
            }
            var porTela = (window.innerHeight < 900 ? 2 : 3);
            badge.textContent = 'Página ' + (atual + 1) + ' de ' + total + ' • ' + porTela + ' recursos por tela';
          }
          function paginar(){
            var rows = Array.prototype.slice.call(document.querySelectorAll('table.alloc tbody tr'));
            if(!rows.length) return;
            var porTela = (window.innerHeight < 900 ? 2 : 3);
            var total = Math.max(1, Math.ceil(rows.length / porTela));
            if(paginaAtual >= total) paginaAtual = 0;
            rows.forEach(function(row, idx){
              var inicio = paginaAtual * porTela;
              row.style.display = (idx >= inicio && idx < inicio + porTela) ? '' : 'none';
            });
            criarBadge(total, paginaAtual);
          }
          function iniciar(){
            paginar();
            if(timer) clearInterval(timer);
            timer = setInterval(function(){
              var rows = document.querySelectorAll('table.alloc tbody tr');
              var porTela = (window.innerHeight < 900 ? 2 : 3);
              var total = Math.max(1, Math.ceil(rows.length / porTela));
              paginaAtual = (paginaAtual + 1) % total;
              paginar();
            }, 9000);
          }
          var obs = new MutationObserver(function(){ paginaAtual = 0; setTimeout(iniciar, 250); });
          var area = document.getElementById('boardArea') || document.body;
          obs.observe(area, { childList:true, subtree:true });
          setTimeout(iniciar, 600);
          setTimeout(iniciar, 1800);
        })();
      `;
      doc.body.appendChild(script);
    }catch(e){
      console.warn('TV Master: ajuste da alocação semanal não aplicado.', e);
    }
  }

  function aplicarAjustesIframe(){
    let doc = null;
    try{ doc = frame.contentDocument || frame.contentWindow?.document; }catch(e){ return; }
    if(!doc) return;

    const pagina = paginas[indiceAtual];
    aplicarCSSLegibilidade(doc, pagina);

    if(pagina?.tipo === 'farol'){
      reforcarFarolTV(doc);
    }

    if(pagina?.tipo === 'kpi'){
      reforcarKpiTV(doc);
      setTimeout(() => { reforcarKpiTV(doc); corrigirCombustivelKpiTV(doc); }, 2600);
      setTimeout(() => { reforcarKpiTV(doc); corrigirCombustivelKpiTV(doc); }, 5200);
    }

    if(pagina?.tipo === 'alocacao'){
      reforcarAlocacaoTV(doc);
    }

    if(pagina?.tipo === 'alocacao_semanal'){
      reforcarAlocacaoSemanalTV(doc);
    }
  }


  function carregarPagina(indice){
    const pagina = paginas[indice];
    tempoAtual = pagina.fallback;
    cicloRecebidoDaPaginaAtual = false;
    atualizarBadge(`📺 ${pagina.nome}`);

    frame.classList.remove('fade-in');
    frame.classList.add('fade-out');

    setTimeout(() => {
      frame.src = prepararPaginaUrl(pagina);
      frame.classList.remove('fade-out');
      frame.classList.add('fade-in');
    }, 350);
  }

  function agendarProxima(){
    // Arquivo individual: não alterna para outras visões.
    clearTimeout(timer);
    if (paginas.length <= 1) return;
    timer = setTimeout(() => {
      indiceAtual = (indiceAtual + 1) % paginas.length;
      carregarPagina(indiceAtual);
      agendarProxima();
    }, tempoAtual);
  }

  window.addEventListener('message', (event) => {
    const data = event.data || {};
    if (data.type === 'ERP_IMPAR_TV_CYCLE_MS' && Number(data.value) > 0) {
      if (paginas.length > 1 && !cicloRecebidoDaPaginaAtual) {
        cicloRecebidoDaPaginaAtual = true;
        tempoAtual = Number(data.value);
        agendarProxima();
      }
    }
    if (data.type === 'ERP_IMPAR_TV_BADGE' && data.text) {
      atualizarBadge(String(data.text));
    }
  });

  frame.addEventListener('load', () => {
    setTimeout(aplicarAjustesIframe, 300);
    setTimeout(aplicarAjustesIframe, 1300);
    setTimeout(aplicarAjustesIframe, 3200);
  });

  ajustarEscalaTV();
  window.addEventListener('resize', ajustarEscalaTV);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', ajustarEscalaTV);
  }

  atualizarRelogio();
  setInterval(atualizarRelogio, 1000);
  carregarPagina(indiceAtual);
  agendarProxima();


function ativarFullscreen(){
  const el = document.documentElement;

  if(el.requestFullscreen){
    el.requestFullscreen();
  }else if(el.webkitRequestFullscreen){
    el.webkitRequestFullscreen();
  }else if(el.msRequestFullscreen){
    el.msRequestFullscreen();
  }

  document.getElementById('btnFullscreen').classList.add('hide');
}

document.addEventListener('fullscreenchange', () => {
  if(!document.fullscreenElement){
    document.getElementById('btnFullscreen').classList.remove('hide');
  }
});
