<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ERP ÍMPAR — Alocação Semanal TV</title>
<style>
:root{
  --bg1:#071a3b;
  --bg2:#0b2a5a;
  --bg3:#075f5a;
  --panel:rgba(2,8,23,.72);
  --panel2:rgba(2,8,23,.48);
  --ink:#eef6ff;
  --muted:#a9bad0;
  --green:#22c55e;
  --lime:#9be329;
  --yellow:#facc15;
  --red:#ef4444;
  --blue:#60a5fa;
  --border:rgba(255,255,255,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
}
body{
  font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 16% 10%,rgba(34,211,238,.16),transparent 32%),
    radial-gradient(circle at 84% 18%,rgba(155,227,41,.13),transparent 28%),
    linear-gradient(135deg,var(--bg1),var(--bg2) 42%,var(--bg3));
}
.wrap{
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:18px;
  gap:10px;
}
header{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:14px 18px;
  border-radius:24px;
  border:1px solid rgba(34,197,94,.50);
  background:linear-gradient(135deg,rgba(12,35,73,.86),rgba(6,70,72,.78));
  box-shadow:0 22px 55px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.05);
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}
.logo{
  width:54px;
  height:54px;
  border-radius:14px;
  flex:0 0 54px;
  background:conic-gradient(from 210deg,#22d3ee,#7c3aed,#fb7185,#facc15,#22c55e,#22d3ee);
  box-shadow:0 0 28px rgba(34,211,238,.25), inset 0 0 18px rgba(255,255,255,.18);
}
.kicker{
  color:#b8ff38;
  font-size:12px;
  letter-spacing:.22em;
  text-transform:uppercase;
  font-weight:950;
  line-height:1;
}
h1{
  font-size:30px;
  line-height:1.05;
  margin-top:5px;
  font-weight:950;
}
.sub{
  font-size:14px;
  color:#c7d5e6;
  font-weight:800;
  margin-top:4px;
}
.kpis{
  display:flex;
  gap:6px;
  align-items:stretch;
}
.kpi{
  min-width:128px;
  padding:11px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(2,8,23,.42);
  display:grid;
  gap:3px;
}
.kpi span{
  color:#a9bad0;
  font-size:9px;
  letter-spacing:.13em;
  text-transform:uppercase;
  font-weight:950;
}
.kpi b{
  font-size:25px;
  color:#fff;
}
.main{
  flex:1;
  min-height:0;
  position:relative;
}
.slide{
  position:absolute;
  inset:0;
  display:grid;
  grid-template-rows:54px repeat(3,minmax(0,1fr));
  gap:6px;
  opacity:0;
  transform:translateX(22px) scale(.995);
  transition:opacity .45s ease, transform .45s ease;
  pointer-events:none;
}
.slide.active{
  opacity:1;
  transform:translateX(0) scale(1);
  pointer-events:auto;
}
.person-row{
  min-height:0;
  display:grid;
  grid-template-columns:145px repeat(5,minmax(0,1fr));
  gap:6px;
  padding:8px;
  border-radius:16px;
  border:1px solid rgba(96,165,250,.18);
  background:linear-gradient(145deg,rgba(3,12,31,.92),rgba(7,27,59,.70));
  box-shadow:0 16px 34px rgba(2,8,23,.28);
  overflow:hidden;
}
.person-box{
  min-width:0;
  border-radius:14px;
  padding:14px 14px;
  background:linear-gradient(145deg,rgba(9,26,61,.82),rgba(3,13,32,.84));
  border:1px solid rgba(96,165,250,.18);
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:6px;
}
.person-name{
  font-size:24px;
  font-weight:950;
  letter-spacing:.03em;
  text-transform:uppercase;
  line-height:1.05;
  overflow-wrap:anywhere;
}
.status{
  width:max-content;
  max-width:100%;
  border-radius:999px;
  padding:7px 11px;
  font-size:11px;
  font-weight:950;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:#fef08a;
  background:rgba(250,204,21,.12);
  border:1px solid rgba(250,204,21,.34);
}
.status.ok{
  color:#bbf7d0;
  background:rgba(34,197,94,.15);
  border-color:rgba(34,197,94,.40);
}
.day{
  min-width:0;
  min-height:0;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(2,8,23,.45);
  padding:6px;
  display:grid;
  grid-template-rows:auto 1fr;
  gap:7px;
  overflow:hidden;
}
.day-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:6px;
  padding:0 2px;
}
.day-name{
  font-size:12px;
  letter-spacing:.14em;
  text-transform:uppercase;
  font-weight:950;
  color:#e8f7ff;
}
.day-date{
  font-size:12px;
  font-weight:950;
  color:#b7ff43;
}
.allocs{
  min-height:0;
  display:grid;
  gap:6px;
  align-content:start;
  overflow:hidden;
}
.alloc{
  min-width:0;
  border-radius:14px;
  border:1px solid rgba(34,197,94,.32);
  background:linear-gradient(145deg,rgba(10,29,67,.92),rgba(3,13,32,.84));
  box-shadow:inset 4px 0 0 rgba(34,197,94,.68);
  padding:5px 6px;
  display:grid;
  gap:4px;
}
.alloc.warn{
  border-color:rgba(250,204,21,.36);
  box-shadow:inset 4px 0 0 rgba(250,204,21,.78);
}
.alloc.bad{
  border-color:rgba(239,68,68,.38);
  box-shadow:inset 4px 0 0 rgba(239,68,68,.78);
}
.obra{
  width:max-content;
  max-width:100%;
  color:#9be329;
  background:rgba(155,227,41,.10);
  border:1px solid rgba(155,227,41,.24);
  border-radius:999px;
  padding:4px 7px;
  font-size:9px;
  font-weight:950;
  text-transform:uppercase;
  line-height:1.1;
  overflow-wrap:anywhere;
}
.ativ{
  color:#fff;
  font-size:12px;
  font-weight:900;
  line-height:1.18;
  overflow-wrap:anywhere;
  display:-webkit-box;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.meta{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
  align-items:center;
}
.pill{
  display:inline-flex;
  align-items:center;
  gap:4px;
  border-radius:999px;
  padding:3px 7px;
  font-size:9px;
  font-weight:950;
  text-transform:uppercase;
  border:1px solid rgba(255,255,255,.12);
  color:#dbeafe;
  background:rgba(2,8,23,.42);
  white-space:nowrap;
}
.pill.trip{
  color:#bfdbfe;
  background:rgba(59,130,246,.16);
  border-color:rgba(147,197,253,.35);
}
.pill.gestao{
  color:#bbf7d0;
  background:rgba(34,197,94,.13);
  border-color:rgba(34,197,94,.33);
}
.empty{
  height:100%;
  border-radius:14px;
  border:1px dashed rgba(148,163,184,.24);
  display:grid;
  place-items:center;
  padding:10px;
  text-align:center;
  color:#94a3b8;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.09em;
  font-weight:950;
}
.footer{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  color:#cbd5e1;
  font-size:12px;
  font-weight:850;
}
.dots{
  display:flex;
  gap:8px;
}
.dot{
  width:11px;
  height:11px;
  border-radius:999px;
  background:rgba(255,255,255,.26);
}
.dot.active{
  background:#9be329;
  box-shadow:0 0 14px rgba(155,227,41,.48);
}
.loading,.empty-state{
  height:100%;
  display:grid;
  place-items:center;
  text-align:center;
  font-size:24px;
  font-weight:950;
  color:#fff;
  border-radius:24px;
  border:1px solid var(--border);
  background:linear-gradient(135deg,rgba(12,35,73,.78),rgba(6,70,72,.64));
}
.small-error{
  display:block;
  margin-top:8px;
  font-size:14px;
  color:#cbd5e1;
}
@media(max-width:1300px){
  .person-row{grid-template-columns:180px repeat(5,minmax(0,1fr))}
  .person-name{font-size:20px}
  .ativ{font-size:10.5px}
  .obra{font-size:8.5px}
}

.week-grid-head{
  display:grid;
  grid-template-columns:145px repeat(5,minmax(0,1fr));
  gap:6px;
  padding:8px 10px;
  border-radius:16px;
  border:1px solid rgba(34,197,94,.28);
  background:linear-gradient(145deg,rgba(3,12,31,.90),rgba(7,50,56,.62));
  box-shadow:0 12px 28px rgba(2,8,23,.22);
}
.head-cell{
  min-width:0;
  border-radius:16px;
  padding:10px 12px;
  background:rgba(2,8,23,.50);
  border:1px solid rgba(255,255,255,.09);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  text-align:center;
  overflow:hidden;
}
.head-cell.label{
  justify-content:flex-start;
  color:#dbeafe;
  font-size:12px;
  letter-spacing:.13em;
  text-transform:uppercase;
  font-weight:950;
}
.head-day{
  color:#fff;
  font-size:15px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-weight:950;
  white-space:nowrap;
}
.head-date{
  color:#b7ff43;
  font-size:15px;
  font-weight:950;
  white-space:nowrap;
}
.day{
  grid-template-rows:1fr!important;
}
.day-head{
  display:none!important;
}
.allocs{
  align-content:stretch;
}
.alloc{
  min-height:0;
}
.person-row{
  grid-template-columns:145px repeat(5,minmax(0,1fr))!important;
}
@media(max-width:1300px){
  .week-grid-head,.person-row{grid-template-columns:135px repeat(5,minmax(0,1fr))!important}
  .head-day,.head-date{font-size:13px}
}

</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"></div>
      <div>
        <div class="kicker">PLATAFORMA ERP ÍMPAR</div>
        <h1>Alocação Semanal</h1>
        <div class="sub" id="weekText">Planejamento operacional da equipe</div>
      </div>
    </div>
    <div class="kpis">
      <div class="kpi"><span>Colaboradores</span><b id="kpiColab">--</b></div>
      <div class="kpi"><span>Alocados</span><b id="kpiOk">--</b></div>
      <div class="kpi"><span>Pendentes</span><b id="kpiPend">--</b></div>
      <div class="kpi"><span>Viagens</span><b id="kpiTrip">--</b></div>
    </div>
  </header>

  <main class="main" id="main">
    <div class="loading">Carregando alocação semanal...</div>
  </main>

  <div class="footer">
    <div id="pageText">ERP ÍMPAR • Alocação Semanal</div>
    <div class="dots" id="dots"></div>
  </div>
</div>

<script>
const API = "https://api.erpimpar.com.br/agenda/";
const DIAS = ["SEG","TER","QUA","QUI","SEX"];
let obras = [];
let colaboradores = [];
let agenda = {};
let slides = [];
let slideAtual = 0;
let slideTimer = null;

const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));

const ATIVIDADES_GESTAO = [
  {id:"gestao_obra",nome:"Gestão da obra",tipo:"gerencial"},
  {id:"visita_tecnica",nome:"Visita técnica em obra",tipo:"gerencial"},
  {id:"reuniao_alinhamento",nome:"Reunião de alinhamento",tipo:"gerencial"},
  {id:"levantamento_campo",nome:"Levantamento em campo",tipo:"gerencial"},
  {id:"medicao_empreiteiro",nome:"Medição de empreiteiro",tipo:"gerencial"},
  {id:"analise_projeto",nome:"Análise de projeto",tipo:"gerencial"},
  {id:"planejamento_materiais",nome:"Planejamento de materiais",tipo:"gerencial"}
];

function iso(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function fmtBR(d){return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;}
function mondayOf(value){
  const d = value ? new Date(value+"T12:00:00") : new Date();
  const day=d.getDay();
  const diff=(day===0?-6:1-day);
  d.setDate(d.getDate()+diff);
  return d;
}
function weekDates(){
  const params = new URLSearchParams(location.search);
  const base = params.get("semana") || params.get("week") || "";
  const m = mondayOf(base);
  return Array.from({length:5},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});
}
function weekKey(){return iso(weekDates()[0]);}

async function fetchJson(url){
  const r = await fetch(url, {cache:"no-store"});
  const t = await r.text();
  if(!r.ok) throw new Error(t || "HTTP "+r.status);
  return t.trim()?JSON.parse(t):{};
}

function obraObj(id){return obras.find(o=>String(o.id)===String(id)) || null;}
function obraNome(id){return obraObj(id)?.nome || "";}
function atividadeGestaoObj(ativId){
  return ATIVIDADES_GESTAO.find(a=>String(a.id)===String(ativId)) || null;
}
function atividadeObj(obraId, ativId){
  const arr=obraObj(obraId)?.atividades || [];
  return arr.find(a=>String(a.id||a.nome)===String(ativId)) || atividadeGestaoObj(ativId) || null;
}
function atividadeNome(obraId, ativId){return atividadeObj(obraId,ativId)?.nome || "";}
function isGestao(ativId){return !!atividadeGestaoObj(ativId);}

function normalizarDiaObj(diaObj){
  if(!diaObj) return {alocacoes:[]};
  if(Array.isArray(diaObj.alocacoes)) return diaObj;
  const tem = diaObj.obraId || diaObj.atividadeId || diaObj.viagem;
  if(tem){
    diaObj.alocacoes=[{
      obraId:diaObj.obraId||"",
      atividadeId:diaObj.atividadeId||"",
      viagem:!!diaObj.viagem,
      horas:Number(diaObj.horas||8)||8
    }];
  }else{
    diaObj.alocacoes=[];
  }
  return diaObj;
}
function alocacoesDoDia(nome,dia){
  return normalizarDiaObj(agenda[nome]?.dias?.[dia]).alocacoes || [];
}
function alocacaoValida(a){
  return !!(a && a.obraId && a.atividadeId && atividadeObj(a.obraId,a.atividadeId));
}
function totalHoras(nome,dia){
  return alocacoesDoDia(nome,dia).reduce((s,a)=>s+(Number(a.horas)||0),0);
}
function colaboradorOk(nome){
  return [0,1,2,3,4].every(i=>alocacoesDoDia(nome,i).some(alocacaoValida));
}
function statusDia(nome,dia){
  const t=totalHoras(nome,dia);
  if(t===8) return "ok";
  if(t>8) return "bad";
  if(t>0) return "warn";
  return "";
}

function renderDia(nome,idx){
  const arr = alocacoesDoDia(nome,idx).filter(a=>alocacaoValida(a) || a.viagem);
  const cls = statusDia(nome,idx);

  const cards = arr.length ? arr.map(a=>{
    const valid = alocacaoValida(a);
    const obra = valid ? obraNome(a.obraId) : "VIAGEM";
    const ativ = valid ? atividadeNome(a.obraId,a.atividadeId) : "Sem obra/atividade";
    return `<div class="alloc ${cls}">
      <div class="obra">${esc(obra)}</div>
      <div class="ativ">${esc(ativ)}</div>
      <div class="meta">
        <span class="pill">⏱ ${Number(a.horas||0)}h</span>
        ${a.viagem?'<span class="pill trip">✈ Viagem</span>':''}
        ${isGestao(a.atividadeId)?'<span class="pill gestao">Gestão</span>':''}
      </div>
    </div>`;
  }).join("") : `<div class="empty">Sem alocação</div>`;

  return `<div class="day">
    <div class="allocs">${cards}</div>
  </div>`;
}


function renderWeekHead(){
  const ds = weekDates();
  return `<div class="week-grid-head">
    <div class="head-cell label">Colaborador</div>
    ${DIAS.map((d,i)=>`<div class="head-cell"><span class="head-day">${d}</span><span class="head-date">${fmtBR(ds[i])}</span></div>`).join("")}
  </div>`;
}

function renderPessoa(nome){
  const ok = colaboradorOk(nome);
  return `<section class="person-row">
    <div class="person-box">
      <div class="person-name">${esc(nome)}</div>
      <div class="status ${ok?'ok':''}">${ok?'OK':'Pendente'}</div>
    </div>
    ${[0,1,2,3,4].map(i=>renderDia(nome,i)).join("")}
  </section>`;
}

function chunk(arr,size){
  const out=[];
  for(let i=0;i<arr.length;i+=size) out.push(arr.slice(i,i+size));
  return out;
}

function atualizarKpis(){
  const total = colaboradores.length;
  const ok = colaboradores.filter(colaboradorOk).length;
  let viagens = 0;
  colaboradores.forEach(n=>{
    [0,1,2,3,4].forEach(i=>{
      viagens += alocacoesDoDia(n,i).filter(a=>a.viagem).length;
    });
  });
  $("kpiColab").textContent = total;
  $("kpiOk").textContent = ok;
  $("kpiPend").textContent = Math.max(0,total-ok);
  $("kpiTrip").textContent = viagens;
  const ds=weekDates();
  $("weekText").textContent = `Semana ${fmtBR(ds[0])} a ${fmtBR(ds[4])}`;
}

function render(){
  atualizarKpis();

  const grupos = chunk(colaboradores,3);
  const main = $("main");
  if(!grupos.length){
    main.innerHTML = `<div class="empty-state">Nenhuma agenda encontrada para a semana.</div>`;
    return;
  }

  main.innerHTML = grupos.map((g,idx)=>`
    <div class="slide ${idx===0?'active':''}" data-slide="${idx}">
      ${renderWeekHead()}
      ${g.map(renderPessoa).join("")}
    </div>
  `).join("");

  $("dots").innerHTML = grupos.map((_,i)=>`<div class="dot ${i===0?'active':''}"></div>`).join("");
  slides = Array.from(document.querySelectorAll(".slide"));
  slideAtual = 0;
  atualizarRodape();
  iniciarSlides();
}

function atualizarRodape(){
  $("pageText").textContent = `ERP ÍMPAR • Alocação Semanal • Página ${slideAtual+1}/${Math.max(1,slides.length)}`;
  document.querySelectorAll(".dot").forEach((d,i)=>d.classList.toggle("active",i===slideAtual));
  try{
    window.parent.postMessage({
      type:"ERP_IMPAR_TV_BADGE",
      text:`📅 Alocação Semanal • Página ${slideAtual+1}/${Math.max(1,slides.length)}`
    },"*");
  }catch(e){}
}
function mostrarSlide(i){
  if(!slides.length) return;
  slides[slideAtual]?.classList.remove("active");
  slideAtual = (i + slides.length) % slides.length;
  slides[slideAtual]?.classList.add("active");
  atualizarRodape();
}
function iniciarSlides(){
  clearInterval(slideTimer);
  if(slides.length > 1){
    slideTimer = setInterval(()=>mostrarSlide(slideAtual+1), 15000);
  }
}

async function init(){
  try{
    const ds=weekDates();
    $("weekText").textContent = `Semana ${fmtBR(ds[0])} a ${fmtBR(ds[4])}`;

    const [obrasResp, agendaResp] = await Promise.all([
      fetchJson(API+"listar_obras_agenda.php?t="+Date.now()),
      fetchJson(API+"carregar_agenda.php?semana="+encodeURIComponent(weekKey())+"&t="+Date.now())
    ]);

    obras = obrasResp.data || [];
    agenda = agendaResp.data || {};
    colaboradores = agendaResp.colaboradores || Object.keys(agenda || {});
    if(!colaboradores.length){
      colaboradores = Object.keys(agenda || {});
    }

    colaboradores = colaboradores
      .filter(n=>n && agenda[n])
      .sort((a,b)=>String(a).localeCompare(String(b),"pt-BR"));

    render();

    try{
      window.parent.postMessage({type:"ERP_IMPAR_TV_CYCLE_MS",value:52000},"*");
    }catch(e){}
  }catch(err){
    console.error(err);
    $("main").innerHTML = `<div class="empty-state">Não foi possível carregar a Alocação Semanal.<span class="small-error">${esc(err.message||err)}</span></div>`;
  }
}

init();
setInterval(init, 5*60*1000);
</script>
