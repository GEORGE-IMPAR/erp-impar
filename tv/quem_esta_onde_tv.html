<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP ÍMPAR • Quem está onde?</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:#e5e7eb;background:linear-gradient(120deg,#0b1e4a,#0e3b6e,#0f766e)}
    body{display:flex;flex-direction:column}
    header{height:78px;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(2,6,23,.88);border-bottom:2px solid rgba(34,197,94,.32);flex:0 0 auto}
    .brand{display:flex;align-items:center;gap:12px}.orb{width:42px;height:42px;border-radius:50%;background:conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);box-shadow:0 10px 22px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.18) inset;position:relative;overflow:hidden}.orb:before{content:"";position:absolute;inset:-6px;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.55),transparent 55%)}
    .brand-k{font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:900}.brand-t{font-size:24px;font-weight:1000;line-height:1}.brand-s{font-size:15px;font-weight:900;opacity:.92}.badge{position:absolute;left:50%;transform:translateX(-50%);background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.42);border-radius:999px;padding:8px 18px;font-size:13px;font-weight:900;white-space:nowrap}.clock{text-align:right}.clock strong{display:block;color:#22ff7a;font-size:16px;margin-bottom:2px}.clock div{font-size:32px;font-weight:1000;font-variant-numeric:tabular-nums}
    main{height:calc(100vh - 78px);padding:8px;overflow:hidden}.shell{height:100%;display:grid;grid-template-rows:86px 1fr;gap:8px}
    .hero{display:grid;grid-template-columns:1fr auto;align-items:center;gap:14px;padding:14px 18px;border-radius:16px;background:linear-gradient(100deg,rgba(8,53,84,.94),rgba(15,118,110,.82));border:1px solid rgba(34,197,94,.35);box-shadow:0 12px 35px rgba(0,0,0,.25);overflow:hidden}.hero h1{font-size:42px;line-height:1;font-weight:1000;letter-spacing:-.03em;text-shadow:0 3px 8px rgba(0,0,0,.5)}.hero p{font-size:15px;font-weight:850;margin-top:6px}.hero-stats{display:grid;grid-template-columns:repeat(4,150px);gap:8px}.stat{height:58px;border-radius:12px;background:rgba(2,6,23,.45);border:1px solid rgba(148,163,184,.18);padding:8px 10px}.stat b{display:block;font-size:25px;line-height:1;color:#fff}.stat span{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#bfe7ff;font-weight:900}
    .content{display:grid;grid-template-columns:330px 1fr;gap:10px;min-height:0;overflow:hidden}.side,.stage{border-radius:16px;background:rgba(2,6,23,.58);border:1px solid rgba(34,197,94,.22);overflow:hidden}.side{padding:14px;display:flex;flex-direction:column;gap:10px}.side-title{font-size:14px;letter-spacing:.18em;text-transform:uppercase;font-weight:1000;color:#dbeafe}.side-list{position:relative;display:block;overflow:hidden;min-height:0;flex:1}.side-list-inner{display:flex;flex-direction:column;gap:10px;will-change:transform;transition:transform 1.2s ease-in-out}.side-item{border-radius:14px;background:rgba(15,23,42,.76);border:1px solid rgba(148,163,184,.16);padding:12px;min-height:72px}.side-item h3{font-size:18px;line-height:1.05;text-transform:uppercase;font-weight:1000;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.side-item p{font-size:15px;font-weight:900;color:#cbd5e1;margin-top:6px}.side-item .num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#1d4ed8;margin-right:8px;font-size:13px}
    .stage{position:relative;padding:16px}.view{position:absolute;inset:16px;display:grid;grid-template-rows:44px 1fr;gap:12px;opacity:0;transform:translateX(40px);pointer-events:none;transition:opacity .65s ease,transform .65s ease}.view.active{opacity:1;transform:translateX(0);pointer-events:auto}.view-head{display:flex;align-items:center;justify-content:space-between}.view-head h2{font-size:24px;letter-spacing:.16em;text-transform:uppercase;font-weight:1000}.view-head span{font-size:15px;font-weight:1000;padding:8px 14px;border-radius:999px;background:rgba(34,197,94,.16);border:1px solid rgba(34,197,94,.35)}
    .cards{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:14px;min-height:0}.card{min-width:0;min-height:0;border-radius:18px;background:linear-gradient(160deg,rgba(2,6,23,.82),rgba(8,47,73,.68));border:1px solid rgba(34,211,238,.28);box-shadow:inset 4px 0 0 rgba(34,211,238,.7),0 10px 25px rgba(0,0,0,.22);padding:18px;display:flex;flex-direction:column;gap:10px;overflow:hidden}.card.person{box-shadow:inset 4px 0 0 rgba(34,211,238,.8),0 10px 25px rgba(0,0,0,.22)}.card.work{box-shadow:inset 4px 0 0 rgba(34,197,94,.9),0 10px 25px rgba(0,0,0,.22)}.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.card-top h3{width:100%}.card h3{font-size:clamp(20px,1.65vw,34px);line-height:1.04;font-weight:1000;text-transform:uppercase;letter-spacing:-.02em;overflow:visible;word-break:normal;hyphens:auto}.chip{flex:0 0 auto;border-radius:999px;padding:6px 10px;background:rgba(14,165,233,.22);border:1px solid rgba(56,189,248,.35);font-size:13px;font-weight:1000}.big,.muted{display:none!important}.list{display:flex;flex-direction:column;gap:10px;min-height:0;overflow:hidden;margin-top:2px;flex:1}.line{border-top:1px solid rgba(148,163,184,.18);padding-top:9px}.line b{display:block;font-size:clamp(17px,1.28vw,26px);line-height:1.1;text-transform:uppercase;white-space:normal;overflow:visible;word-break:normal}.line span{display:block;font-size:clamp(12px,.9vw,17px);color:#cbd5e1;font-weight:800;margin-top:4px;white-space:normal;overflow:visible;text-overflow:clip;line-height:1.18}.empty{height:100%;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:1000;color:#94a3b8;text-align:center}
    /* TV: controles manuais removidos/ocultos */
    .controls{display:none!important}
    .controls button{display:none!important}
    @media(max-width:1200px){.hero-stats{grid-template-columns:repeat(2,150px)}.content{grid-template-columns:270px 1fr}.cards{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(3,1fr)}.card h3{font-size:24px}}


    /* TV: garante que só o botão Tela Cheia fique visível */
    .controls,
    .controls *,
    button:not(#btnFullscreen){display:none!important}

    .btn-fullscreen{position:fixed;right:18px;bottom:18px;z-index:99999;background:#22c55e;color:#00120a;border:none;border-radius:14px;padding:14px 22px;font-size:15px;font-weight:1000;cursor:pointer;box-shadow:0 12px 28px rgba(34,197,94,.38)}
    .btn-fullscreen.hide{display:none!important}
  </style>
</head>
<body>
<button class="btn-fullscreen" id="btnFullscreen" onclick="ativarFullscreen()">🖥️ Tela Cheia</button>

<header>
  <div class="brand"><div class="orb"></div><div><div class="brand-k">ERP</div><div class="brand-t">ÍMPAR</div><div class="brand-s">Gestão à Vista</div></div></div>
  <div class="badge" id="modeBadge">📍 Quem está onde?</div>
  <div class="clock"><strong id="dateNow">—</strong><div id="timeNow">00:00:00</div></div>
</header>
<main>
  <div class="shell">
    <section class="hero">
      <div><h1>Quem está onde?</h1><p id="sourceInfo">Carregando alocação diária do time...</p></div>
      <div class="hero-stats">
        <div class="stat"><b id="statPeople">—</b><span>Pessoas</span></div>
        <div class="stat"><b id="statWorks">—</b><span>Obras</span></div>
        <div class="stat"><b id="statMulti">—</b><span>Multiobra</span></div>
        <div class="stat"><b id="statRows">—</b><span>Linhas</span></div>
      </div>
    </section>
    <section class="content">
      <aside class="side"><div class="side-title" id="sideTitle">Resumo</div><div class="side-list" id="sideList"></div></aside>
      <section class="stage">
        <div class="view active" id="viewPessoa"><div class="view-head"><h2>Visão por pessoa</h2><span id="pagePessoa">Página 1</span></div><div class="cards" id="cardsPessoa"></div></div>
        <div class="view" id="viewObra"><div class="view-head"><h2>Visão por obra</h2><span id="pageObra">Página 1</span></div><div class="cards" id="cardsObra"></div></div>
      </section>
    </section>
  </div>
</main>
<script>
(() => {
  const URLS = [
    'https://api.erpimpar.com.br/atividades/drafts/draft.json',
    'https://api.erpimpar.com.br/api/atividades/drafts/draft.json',
    '/api/atividades/drafts/draft.json',
    './draft.json'
  ];
  const perPage = 6;
  let mode = 'pessoa', pageP = 0, pageO = 0, people = [], works = [];
  const $ = id => document.getElementById(id);
  function tick(){ const d = new Date(); $('dateNow').textContent = d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}).replace(/^./,x=>x.toUpperCase()); $('timeNow').textContent = d.toLocaleTimeString('pt-BR'); }
  setInterval(tick,1000); tick();
  const esc = s => String(s ?? '').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
  const split = v => Array.isArray(v) ? v : String(v||'').split(/[,;|\n]+/).map(x=>x.trim()).filter(Boolean);
  const get = (o, keys) => { for(const k of keys){ if(o && o[k] != null && String(o[k]).trim() !== '') return o[k]; } return ''; };
  function findRows(json){
    const paths = [json?.rows,json?.linhas,json?.atividades,json?.data,json?.dados,json?.data?.rows,json?.data?.linhas,json?.draft?.rows,json?.draft?.linhas,json?.registros];
    return paths.find(Array.isArray) || [];
  }
  function normRows(rows){
    return rows.flatMap((r,idx)=>{
      const nomes = split(get(r,['nomes','nome','colaborador','responsavel','pessoa','funcionario','equipe']));
      const obras = split(get(r,['obras','obra','frente','local','projeto','cliente']));
      const atividade = String(get(r,['atividades','atividade','descricao','servico','detalhe','observacao','obs']) || 'Atividade não informada').trim();
      const horaTxt = String(get(r,['horas','hora','periodo','turno','tempo']) || '').trim();
      const horas = Number(String(horaTxt).replace(',','.').match(/\d+(\.\d+)?/)?.[0] || 8);
      const out=[];
      (nomes.length?nomes:['Não informado']).forEach(nome => (obras.length?obras:['Obra não informada']).forEach(obra => out.push({idx,nome,obra,atividade,horas: Number.isFinite(horas)?horas:8})));
      return out;
    });
  }
  function aggregate(rows){
    const pm = new Map(), om = new Map();
    rows.forEach(x=>{
      if(!pm.has(x.nome)) pm.set(x.nome,{nome:x.nome,obras:new Map(),atividades:[],horas:0});
      const p=pm.get(x.nome); p.horas+=x.horas; p.atividades.push(x); p.obras.set(x.obra,(p.obras.get(x.obra)||0)+1);
      if(!om.has(x.obra)) om.set(x.obra,{obra:x.obra,pessoas:new Map(),atividades:[],horas:0});
      const o=om.get(x.obra); o.horas+=x.horas; o.atividades.push(x); o.pessoas.set(x.nome,(o.pessoas.get(x.nome)||0)+1);
    });
    people=[...pm.values()].sort((a,b)=>b.horas-a.horas || a.nome.localeCompare(b.nome,'pt-BR'));
    works=[...om.values()].sort((a,b)=>b.horas-a.horas || a.obra.localeCompare(b.obra,'pt-BR'));
    $('statPeople').textContent=people.length; $('statWorks').textContent=works.length; $('statMulti').textContent=people.filter(p=>p.obras.size>1).length; $('statRows').textContent=rows.length;
  }
  function cardPessoa(p){
    const obras=[...p.obras.entries()].sort((a,b)=>b[1]-a[1]).slice(0,3);
    return `<article class="card person"><div class="card-top"><h3>${esc(p.nome)}</h3></div><div class="list">${obras.map(([obra,q])=>`<div class="line"><b>${esc(obra)}</b><span>${esc(p.atividades.find(a=>a.obra===obra)?.atividade||'')}</span></div>`).join('')}</div></article>`;
  }
  function cardObra(o){
    const pessoas=[...o.pessoas.entries()].sort((a,b)=>b[1]-a[1]).slice(0,4);
    return `<article class="card work"><div class="card-top"><h3>${esc(o.obra)}</h3></div><div class="list">${pessoas.map(([nome,q])=>`<div class="line"><b>${esc(nome)}</b><span>${esc(o.atividades.find(a=>a.nome===nome)?.atividade||'')}</span></div>`).join('')}</div></article>`;
  }
  let sideScrollTimer = null;
  let sideScrollY = 0;
  let tempoVisaoAtual = 9000;

  function aplicarScrollResumo(){
    const box = $('sideList');
    if(!box) return 9000;
    const inner = box.querySelector('.side-list-inner');
    if(!inner) return 9000;

    if(sideScrollTimer){
      clearInterval(sideScrollTimer);
      sideScrollTimer = null;
    }

    sideScrollY = 0;
    inner.style.transform = 'translateY(0px)';

    const maxScroll = Math.max(0, inner.scrollHeight - box.clientHeight);
    if(maxScroll <= 4){
      tempoVisaoAtual = 9000;
      return tempoVisaoAtual;
    }

    const passo = 82;
    const intervalo = 1800;
    const passos = Math.ceil(maxScroll / passo);
    tempoVisaoAtual = Math.max(9000, ((passos + 2) * intervalo) + 1200);

    sideScrollTimer = setInterval(() => {
      sideScrollY = Math.min(maxScroll, sideScrollY + passo);
      inner.style.transform = `translateY(-${sideScrollY}px)`;
      if(sideScrollY >= maxScroll){
        clearInterval(sideScrollTimer);
        sideScrollTimer = null;
      }
    }, intervalo);

    return tempoVisaoAtual;
  }

  function renderSide(){
    const arr = mode === 'pessoa' ? people : works;
    $('sideTitle').textContent = mode === 'pessoa' ? 'Todas as pessoas' : 'Todas as obras';
    $('sideList').innerHTML = `<div class="side-list-inner">${arr.map((x,i)=>`<div class="side-item"><h3><span class="num">${i+1}</span>${esc(mode==='pessoa'?x.nome:x.obra)}</h3><p>${mode==='pessoa'?`${x.obras.size} obra(s)`:`${x.pessoas.size} pessoa(s)`}</p></div>`).join('')}</div>`;
    setTimeout(() => { tempoVisaoAtual = aplicarScrollResumo(); }, 250);
  }
  function render(){
    const maxP = Math.max(1, Math.ceil(people.length/perPage)); const maxO = Math.max(1, Math.ceil(works.length/perPage));
    if(pageP >= maxP) pageP = 0; if(pageO >= maxO) pageO = 0;
    $('cardsPessoa').innerHTML = people.slice(pageP*perPage,pageP*perPage+perPage).map(cardPessoa).join('') || '<div class="empty">Nenhuma pessoa encontrada</div>';
    $('cardsObra').innerHTML = works.slice(pageO*perPage,pageO*perPage+perPage).map(cardObra).join('') || '<div class="empty">Nenhuma obra encontrada</div>';
    $('pagePessoa').textContent = `Página ${pageP+1} de ${maxP} • ${people.length} pessoas`;
    $('pageObra').textContent = `Página ${pageO+1} de ${maxO} • ${works.length} obras`;
    $('viewPessoa').classList.toggle('active',mode==='pessoa'); $('viewObra').classList.toggle('active',mode==='obra');
    $('modeBadge').textContent = mode === 'pessoa' ? '📍 Onde estão? • Por Pessoa' : '📍 Onde estão? • Por Obra';
    renderSide();
  }
  let cicloTimer = null;
  function agendarCiclo(){
    if(cicloTimer) clearTimeout(cicloTimer);
    cicloTimer = setTimeout(() => { cycle(); agendarCiclo(); }, tempoVisaoAtual || 9000);
  }
  window.manual = m => { mode=m; render(); agendarCiclo(); };
  window.nextPage = () => { if(mode==='pessoa') pageP++; else pageO++; render(); agendarCiclo(); };
  function cycle(){ if(mode==='pessoa'){ const max=Math.ceil(people.length/perPage)||1; if(pageP+1<max) pageP++; else {pageP=0;mode='obra';} } else { const max=Math.ceil(works.length/perPage)||1; if(pageO+1<max) pageO++; else {pageO=0;mode='pessoa';} } render(); }
  setTimeout(agendarCiclo, 600);
  async function load(){
    let lastErr='';
    for(const u of URLS){
      try{ const r=await fetch(u+(u.includes('?')?'&':'?')+'t='+Date.now(),{cache:'no-store'}); if(!r.ok) throw new Error('HTTP '+r.status); const json=await r.json(); const rows=normRows(findRows(json)); if(!rows.length) throw new Error('sem linhas'); aggregate(rows); $('sourceInfo').textContent = `Base: ${u.split('/').pop()} • última leitura ${new Date().toLocaleString('pt-BR')}`; render(); return; }catch(e){ lastErr=e.message; }
    }
    const demo = normRows([{nome:'Nicolas; Silvio; Pablo',obra:'Hospital São Sebastião',atividade:'Instalação da parte elétrica',horas:8},{nome:'Neri; Selo',obra:'Cooperativa Fumacense',atividade:'Instalação de dutos',horas:8},{nome:'Jaison',obra:'Hospital São Sebastião',atividade:'Checagem de materiais',horas:8},{nome:'Valdeci; Fabio',obra:'Clínica Focus',atividade:'Produção de dutos',horas:8},{nome:'Rafael',obra:'UBS Encosta do Sol',atividade:'Visitar obras',horas:8},{nome:'Pablo; Silvio',obra:'Empresa Hospital D.',atividade:'Conferência de material',horas:8}]);
    aggregate(demo); $('sourceInfo').textContent = `Não consegui ler o draft automaticamente (${lastErr}). Exibindo dados de demonstração para validar o layout.`; render();
  }
  load();
})();


function ativarFullscreen(){
  const el = document.documentElement;
  if(el.requestFullscreen){ el.requestFullscreen(); }
  else if(el.webkitRequestFullscreen){ el.webkitRequestFullscreen(); }
  else if(el.msRequestFullscreen){ el.msRequestFullscreen(); }
  const btn = document.getElementById('btnFullscreen');
  if(btn) btn.classList.add('hide');
}

document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('btnFullscreen');
  if(btn && !document.fullscreenElement) btn.classList.remove('hide');
});

</script>
</body>
</html>
