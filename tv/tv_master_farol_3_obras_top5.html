<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP ÍMPAR • TV Master</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:linear-gradient(120deg,#0b1e4a,#0e3b6e,#0f766e);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:#e5e7eb;
    }
    body{display:flex;flex-direction:column}
    header{
      padding:12px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(2,6,23,.85);
      border-bottom:2px solid rgba(34,197,94,.3);
      flex-shrink:0;
      position:relative;
      height:78px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .logo-orb{
      width:42px;height:42px;border-radius:999px;
      position:relative;
      background: conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);
      box-shadow:0 10px 22px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.18) inset;
      overflow:hidden;
      flex:0 0 auto;
    }
    .logo-orb:before{
      content:""; position:absolute; inset:-6px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.55), transparent 55%);
    }
    .brand-text{display:flex; flex-direction:column; gap:1px;}
    .brand-kicker{font-size:11px; letter-spacing:.22em; text-transform:uppercase; font-weight:800; opacity:.9;}
    .brand-title{font-size:24px; font-weight:900; line-height:1;}
    .brand-sub{font-size:15px; font-weight:800; opacity:.92;}

    .header-info{
      text-align:right;
      font-size:13px;
      min-width:0;
    }
    .header-info strong{
      display:block;
      font-size:16px;
      color:#22c55e;
      margin-bottom:4px;
    }
    .relogio{
      font-size:32px;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }

    .ultima-sync{
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(34,197,94,.15);
      border:1px solid rgba(34,197,94,.4);
      padding:8px 16px;
      border-radius:999px;
      font-size:12px;
      display:flex;
      align-items:center;
      gap:8px;
      animation:pulseSync 2s ease-in-out infinite;
      z-index:2;
      white-space:nowrap;
      max-width:50vw;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    @keyframes pulseSync{
      0%,100%{opacity:.9; transform:translateX(-50%) scale(1);}
      50%{opacity:1; transform:translateX(-50%) scale(1.02);}
    }

    .tv-wrap{
      width:100%;
      height:calc(100dvh - 78px);
      position:relative;
      background:#020617;
      overflow:hidden;
      --tv-scale:1;
    }
    iframe{
      width:calc(100% / var(--tv-scale));
      height:calc(100% / var(--tv-scale));
      border:none;
      display:block;
      background:transparent;
      opacity:1;
      transform:scale(var(--tv-scale));
      transform-origin:top left;
    }
    .fade-out{ animation:fadeOut .35s ease forwards; }
    .fade-in{ animation:fadeIn .35s ease forwards; }
    @keyframes fadeOut{ from{opacity:1} to{opacity:0} }
    @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  
.btn-fullscreen{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  color:#000;
  border:none;
  padding:14px 22px;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
  z-index:99999;
  box-shadow:0 8px 20px rgba(34,197,94,.4);
}

.btn-fullscreen.hide{
  display:none;
}
    
  </style>
</head>
<body>
<button class="btn-fullscreen" id="btnFullscreen" onclick="ativarFullscreen()">
  🖥️ Tela Cheia
</button>  
<header>
  <div class="brand">
    <div class="logo-orb"></div>
    <div class="brand-text">
      <div class="brand-kicker">ERP</div>
      <div class="brand-title">ÍMPAR</div>
      <div class="brand-sub">Gestão à Vista</div>
    </div>
  </div>

  <div class="ultima-sync" id="ultimaSync">🔄 Sincronizando...</div>

  <div class="header-info">
    <strong id="dataAtual">—</strong>
    <div class="relogio" id="relogio">00:00:00</div>
  </div>
</header>

<div class="tv-wrap">
  <iframe id="tvFrame" src=""></iframe>
</div>

<script>
  const paginas = [
    { nome: 'Gestão à Vista', url: './gestao_projetos_tv_adaptado.html?tv=1', fallback: 100000 },
    { nome: 'Farol de Obras', url: '../cronograma/farol_tv_adaptado.html?tv=1&porPagina=3&itensPorPagina=3&pageSize=3&topRiscos=5&top=5&tvMasterFarol=1', fallback: 40000 },
    { nome: 'KPIs', url: '../KPI_Coordenadores/index_tv_resumo_adaptado.html?tv=1&espelho=kpi', fallback: 35000 },
    { nome: 'Alocação do Time',  url: '../atividades/alocacao_diaria_time_tv_diretoria.html?tv=1', fallback:30000},
    { nome: 'Institucional ÍMPAR', url: './tv_marketing.html?tv=1', fallback: 14000}
  ];

  let indiceAtual = 0;
  let timer = null;
  let tempoAtual = paginas[0].fallback;
  let cicloRecebidoDaPaginaAtual = false;

  const frame = document.getElementById('tvFrame');
  const badge = document.getElementById('ultimaSync');

  const tvWrap = document.querySelector('.tv-wrap');
  const header = document.querySelector('header');

  function lerConfigEscala(){
    const params = new URLSearchParams(window.location.search);
    const baseW = Number(params.get('baseW')) || 1920;
    const baseH = Number(params.get('baseH')) || 1080;
    const overscan = Number(params.get('overscan')) || 0;
    const escalaMax = Number(params.get('scaleMax')) || 1;
    return { baseW, baseH, overscan, escalaMax };
  }

  function ajustarEscalaTV(){
    const { baseW, baseH, overscan, escalaMax } = lerConfigEscala();
    const viewportW = window.visualViewport ? window.visualViewport.width : window.innerWidth;
    const viewportH = window.visualViewport ? window.visualViewport.height : window.innerHeight;

    const alturaHeader = header ? header.getBoundingClientRect().height : 78;
    const larguraUtil = Math.max(viewportW - (overscan * 2), 1);
    const alturaUtil = Math.max(viewportH - alturaHeader - (overscan * 2), 1);

    const escalaLargura = larguraUtil / baseW;
    const escalaAltura = alturaUtil / baseH;
    const escala = Math.min(escalaLargura, escalaAltura, escalaMax);

    tvWrap.style.setProperty('--tv-scale', Math.max(escala, 0.45).toFixed(4));
  }

  function atualizarRelogio(){
    const agora = new Date();
    const data = agora.toLocaleDateString('pt-BR', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
    const hora = agora.toLocaleTimeString('pt-BR');
    document.getElementById('dataAtual').textContent = data.charAt(0).toUpperCase() + data.slice(1);
    document.getElementById('relogio').textContent = hora;
  }

  function atualizarBadge(txt){
    badge.textContent = txt || '🔄 Sincronizando...';
  }



  function montarUrlPagina(pagina){
    const sep = pagina.url.includes('?') ? '&' : '?';
    return pagina.url + sep + 'tvts=' + Date.now();
  }

  function aplicarAjusteFarolTV(){
    let doc = null;
    try{ doc = frame.contentDocument || frame.contentWindow?.document; }catch(e){ return; }
    if(!doc || !frame.src.includes('farol_tv_adaptado')) return;

    const styleId = 'erp-impar-farol-tv-master-ajuste';
    if(!doc.getElementById(styleId)){
      const st = doc.createElement('style');
      st.id = styleId;
      st.textContent = `
        /* TV MASTER - ajuste cirúrgico Farol: 3 obras + Top 5, sem mudar estrutura */
        body{ overflow:hidden !important; }

        /* Cabeçalhos e indicadores */
        .hero h1, .hero-title, .titulo, h1{ font-size:clamp(28px,2.1vw,42px) !important; line-height:1.05 !important; }
        .kpi-card .v, .summary-card .v, .metric-card .value{ font-size:clamp(34px,3vw,54px) !important; }
        .kpi-card .k, .summary-card .k, .metric-card .label, .eyebrow{ font-size:clamp(12px,.9vw,16px) !important; letter-spacing:.16em !important; }

        /* TOP RISCOS - só 5, com leitura maior */
        .top-riscos .risk-item:nth-child(n+6),
        .top-riscos .risco-item:nth-child(n+6),
        .top-riscos li:nth-child(n+6),
        .top-riscos article:nth-child(n+6),
        .top-riscos .row:nth-child(n+6),
        #topRiscos > *:nth-child(n+6),
        #topRisks > *:nth-child(n+6),
        .risks-list > *:nth-child(n+6),
        .risk-list > *:nth-child(n+6){ display:none !important; }

        .top-riscos, #topRiscos, #topRisks, .risks-list, .risk-list{ gap:14px !important; }
        .top-riscos .risk-item, .top-riscos .risco-item, .risks-list > *, .risk-list > *, #topRiscos > *, #topRisks > *{
          min-height:104px !important;
          padding:18px 18px !important;
          border-radius:18px !important;
        }
        .top-riscos h3, .top-riscos h4, .top-riscos strong,
        .risks-list h3, .risks-list h4, .risks-list strong,
        .risk-list h3, .risk-list h4, .risk-list strong,
        #topRiscos h3, #topRiscos h4, #topRiscos strong,
        #topRisks h3, #topRisks h4, #topRisks strong{
          font-size:clamp(22px,1.55vw,34px) !important;
          line-height:1.02 !important;
        }
        .top-riscos p, .top-riscos small, .top-riscos span,
        .risks-list p, .risks-list small, .risks-list span,
        .risk-list p, .risk-list small, .risk-list span,
        #topRiscos p, #topRiscos small, #topRiscos span,
        #topRisks p, #topRisks small, #topRisks span{
          font-size:clamp(15px,1vw,21px) !important;
          line-height:1.18 !important;
        }

        /* Tabela/lista do detalhamento: 3 obras visíveis */
        tbody tr:nth-child(n+4){ display:none !important; }
        .obra-row:nth-of-type(n+4),
        .obra-card:nth-of-type(n+4),
        .detail-row:nth-of-type(n+4),
        .farol-row:nth-of-type(n+4),
        .linha-obra:nth-of-type(n+4),
        .detalhe-obra:nth-of-type(n+4),
        #detalhamentoObras > *:nth-child(n+4),
        #obrasDetalhe > *:nth-child(n+4),
        .obras-detalhe > *:nth-child(n+4),
        .detalhamento-obras > *:nth-child(n+4){ display:none !important; }

        tbody tr, .obra-row, .obra-card, .detail-row, .farol-row, .linha-obra, .detalhe-obra{
          height:clamp(150px,18.5vh,210px) !important;
          min-height:clamp(150px,18.5vh,210px) !important;
        }
        tbody td{ padding:24px 18px !important; vertical-align:middle !important; }

        /* Texto principal da obra */
        tbody td:first-child, .obra-nome, .nome-obra, .work-name, .obra-title{
          font-size:clamp(30px,2.25vw,48px) !important;
          line-height:1.02 !important;
          font-weight:1000 !important;
        }
        .coordenador, .coord, .obra-coord, .id-obra, .work-meta, tbody small{
          font-size:clamp(16px,1.1vw,24px) !important;
          line-height:1.12 !important;
        }

        /* Percentuais plan/real/desvio */
        tbody td:nth-child(2), tbody td:nth-child(3), tbody td:nth-child(4),
        .plan, .real, .desvio, .percentual, .pct, .value-percent{
          font-size:clamp(34px,2.75vw,58px) !important;
          line-height:1 !important;
          font-weight:1000 !important;
        }

        /* Atividades: quatro quadrantes maiores, sem estourar */
        .atividades, .activity-grid, .stats-grid, .quad-grid{ gap:12px !important; }
        .atividade-card, .activity-card, .stat-card, .quad, .mini-card{
          min-height:72px !important;
          padding:12px 14px !important;
          border-radius:14px !important;
        }
        .atividade-card strong, .activity-card strong, .stat-card strong, .quad strong, .mini-card strong{
          font-size:clamp(30px,2.2vw,48px) !important;
          line-height:1 !important;
        }
        .atividade-card span, .activity-card span, .stat-card span, .quad span, .mini-card span{
          font-size:clamp(12px,.8vw,16px) !important;
          line-height:1 !important;
        }

        /* Evita encavalamento por textos gigantes */
        td, th, div, span, strong, p{ max-width:100%; }
      `;
      doc.head.appendChild(st);
    }

    // Segurança extra por DOM: se a página não respeitar parâmetros, escondemos excedentes.
    const hideAfter = (nodes, limit) => {
      nodes.forEach((el, idx) => { if(idx >= limit) el.style.setProperty('display','none','important'); });
    };

    const riskSelectors = ['.top-riscos .risk-item','.top-riscos .risco-item','#topRiscos > *','#topRisks > *','.risks-list > *','.risk-list > *'];
    for(const sel of riskSelectors){
      const nodes = [...doc.querySelectorAll(sel)];
      if(nodes.length > 5) hideAfter(nodes, 5);
    }

    const rowSelectors = ['tbody tr','.obra-row','.obra-card','.detail-row','.farol-row','.linha-obra','.detalhe-obra','#detalhamentoObras > *','#obrasDetalhe > *','.obras-detalhe > *','.detalhamento-obras > *'];
    for(const sel of rowSelectors){
      const nodes = [...doc.querySelectorAll(sel)].filter(el => (el.textContent || '').trim().length > 0);
      if(nodes.length > 3) hideAfter(nodes, 3);
    }
  }

  frame.addEventListener('load', () => {
    if(!frame.src.includes('farol_tv_adaptado')) return;
    let tentativas = 0;
    const intervalo = setInterval(() => {
      tentativas++;
      aplicarAjusteFarolTV();
      if(tentativas >= 20) clearInterval(intervalo);
    }, 250);
  });

  function carregarPagina(indice){
    const pagina = paginas[indice];
    tempoAtual = pagina.fallback;
    cicloRecebidoDaPaginaAtual = false;
    atualizarBadge(`📺 ${pagina.nome}`);

    frame.classList.remove('fade-in');
    frame.classList.add('fade-out');

    setTimeout(() => {
      frame.src = montarUrlPagina(pagina);
      frame.classList.remove('fade-out');
      frame.classList.add('fade-in');
    }, 350);
  }

  function agendarProxima(){
    clearTimeout(timer);
    timer = setTimeout(() => {
      indiceAtual = (indiceAtual + 1) % paginas.length;
      carregarPagina(indiceAtual);
      agendarProxima();
    }, tempoAtual);
  }

  window.addEventListener('message', (event) => {
    const data = event.data || {};
    if (data.type === 'ERP_IMPAR_TV_CYCLE_MS' && Number(data.value) > 0) {
      if (!cicloRecebidoDaPaginaAtual) {
        cicloRecebidoDaPaginaAtual = true;
        tempoAtual = Number(data.value);
        agendarProxima();
      }
    }
    if (data.type === 'ERP_IMPAR_TV_BADGE' && data.text) {
      atualizarBadge(String(data.text));
    }
  });

  ajustarEscalaTV();
  window.addEventListener('resize', ajustarEscalaTV);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', ajustarEscalaTV);
  }

  atualizarRelogio();
  setInterval(atualizarRelogio, 1000);
  carregarPagina(indiceAtual);
  agendarProxima();


function ativarFullscreen(){
  const el = document.documentElement;

  if(el.requestFullscreen){
    el.requestFullscreen();
  }else if(el.webkitRequestFullscreen){
    el.webkitRequestFullscreen();
  }else if(el.msRequestFullscreen){
    el.msRequestFullscreen();
  }

  document.getElementById('btnFullscreen').classList.add('hide');
}

document.addEventListener('fullscreenchange', () => {
  if(!document.fullscreenElement){
    document.getElementById('btnFullscreen').classList.remove('hide');
  }
});
  
</script>
</body>
</html>
