<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP ÍMPAR • TV Master</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#020617;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:#e5e7eb;
    }

    body{
      position:relative;
      background:linear-gradient(120deg,#0b1e4a,#0e3b6e,#0f766e);
    }

    #tvFrame{
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      border:0;
      background:#020617;
      opacity:1;
      transition:opacity .45s ease;
    }

    #tvFrame.fade-out{opacity:0}
    #tvFrame.fade-in{opacity:1}

    .master-badge{
      position:fixed;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      z-index:99998;
      background:rgba(34,197,94,.18);
      border:1px solid rgba(34,197,94,.42);
      color:#e5e7eb;
      border-radius:999px;
      padding:8px 18px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
      box-shadow:0 12px 28px rgba(0,0,0,.25);
      pointer-events:none;
      max-width:70vw;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .btn-fullscreen{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:99999;
      background:#22c55e;
      color:#00120a;
      border:none;
      border-radius:14px;
      padding:14px 22px;
      font-size:15px;
      font-weight:1000;
      cursor:pointer;
      box-shadow:0 12px 28px rgba(34,197,94,.38);
    }

    .btn-fullscreen.hide{display:none!important}

    .loading-mask{
      position:fixed;
      inset:0;
      z-index:99997;
      background:linear-gradient(120deg,#0b1e4a,#0e3b6e,#0f766e);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:14px;
      color:#fff;
      font-weight:1000;
      opacity:0;
      pointer-events:none;
      transition:opacity .25s ease;
    }

    .loading-mask.show{
      opacity:1;
      pointer-events:auto;
    }

    .orb{
      width:58px;
      height:58px;
      border-radius:50%;
      background:conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);
      box-shadow:0 10px 22px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.18) inset;
      position:relative;
      overflow:hidden;
      animation:pulse 1.4s ease-in-out infinite;
    }

    .orb:before{
      content:"";
      position:absolute;
      inset:-6px;
      background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.55),transparent 55%);
    }

    @keyframes pulse{
      0%,100%{transform:scale(1);opacity:.9}
      50%{transform:scale(1.06);opacity:1}
    }
  </style>
</head>
<body>
  <iframe id="tvFrame" src=""></iframe>

  <div class="master-badge" id="masterBadge">📺 TV Master</div>

  <div class="loading-mask show" id="loadingMask">
    <div class="orb"></div>
    <div id="loadingText">Carregando TV Master...</div>
  </div>

  <button class="btn-fullscreen" id="btnFullscreen" onclick="ativarFullscreen()">🖥️ Tela Cheia</button>

  <script>
    const paginas = [
      {
        nome: 'Gestão à Vista • Status das Obras',
        url: './gestao_a_vista_status_obras.html',
        tempo: 100000
      },
      {
        nome: 'Farol das Obras',
        url: './farol_obras_tv.html',
        tempo: 40000
      },
      {
        nome: 'KPIs Coordenadores',
        url: './kpis_coordenadores_tv.html',
        tempo: 35000
      },
      {
        nome: 'Quem está onde?',
        url: './quem_esta_onde_tv.html',
        tempo: 45000
      },
      {
        nome: 'Alocação Semanal',
        url: './alocacao_semanal_tv.html',
        tempo: 42000
      }
    ];

    const frame = document.getElementById('tvFrame');
    const badge = document.getElementById('masterBadge');
    const loadingMask = document.getElementById('loadingMask');
    const loadingText = document.getElementById('loadingText');

    let indiceAtual = 0;
    let timer = null;
    let cicloTravado = false;

    function urlComCacheBuster(url){
      const sep = url.includes('?') ? '&' : '?';
      return `${url}${sep}tvMaster=1&t=${Date.now()}`;
    }

    function atualizarBadge(){
      const atual = paginas[indiceAtual];
      badge.textContent = `📺 ${atual.nome} • ${indiceAtual + 1}/${paginas.length}`;
      loadingText.textContent = `Carregando ${atual.nome}...`;
    }

    function carregarPagina(indice){
      clearTimeout(timer);

      indiceAtual = indice % paginas.length;
      const atual = paginas[indiceAtual];
      atualizarBadge();

      frame.classList.remove('fade-in');
      frame.classList.add('fade-out');
      loadingMask.classList.add('show');

      setTimeout(() => {
        frame.src = urlComCacheBuster(atual.url);
      }, 300);
    }

    function agendarProxima(tempoCustom){
      clearTimeout(timer);
      const atual = paginas[indiceAtual];
      const tempo = Number(tempoCustom || atual.tempo || 40000);

      timer = setTimeout(() => {
        carregarPagina((indiceAtual + 1) % paginas.length);
      }, tempo);
    }

    frame.addEventListener('load', () => {
      setTimeout(() => {
        frame.classList.remove('fade-out');
        frame.classList.add('fade-in');
        loadingMask.classList.remove('show');
        agendarProxima();
      }, 650);
    });

    window.addEventListener('message', (event) => {
      const data = event.data || {};

      if(data.type === 'ERP_IMPAR_TV_BADGE' && data.text){
        badge.textContent = `${data.text} • ${indiceAtual + 1}/${paginas.length}`;
      }

      if(data.type === 'ERP_IMPAR_TV_CYCLE_MS' && Number(data.value) > 0){
        agendarProxima(Number(data.value));
      }

      if(data.type === 'ERP_IMPAR_TV_NEXT'){
        carregarPagina((indiceAtual + 1) % paginas.length);
      }
    });

    function ativarFullscreen(){
      const el = document.documentElement;

      if(el.requestFullscreen){
        el.requestFullscreen();
      }else if(el.webkitRequestFullscreen){
        el.webkitRequestFullscreen();
      }else if(el.msRequestFullscreen){
        el.msRequestFullscreen();
      }

      document.getElementById('btnFullscreen').classList.add('hide');
    }

    document.addEventListener('fullscreenchange', () => {
      if(!document.fullscreenElement){
        document.getElementById('btnFullscreen').classList.remove('hide');
      }
    });

    document.addEventListener('keydown', (e) => {
      if(e.key === 'ArrowRight'){
        carregarPagina((indiceAtual + 1) % paginas.length);
      }
      if(e.key === 'ArrowLeft'){
        carregarPagina((indiceAtual - 1 + paginas.length) % paginas.length);
      }
    });

    carregarPagina(0);
  </script>
</body>
</html>
