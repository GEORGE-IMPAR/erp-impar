<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERP ÍMPAR — Gestão à Vista TV</title>
  <style>
    :root{
      --bg1:#0b1e4a;
      --bg2:#0e3b6e;
      --bg3:#0f766e;
      --text:#e5e7eb;
      --green:#22c55e;
      --yellow:#facc15;
      --red:#ef4444;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
      display:flex;
      flex-direction:column;
    }

    header{
      padding:12px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(2,6,23,.85);
      border-bottom:2px solid rgba(34,197,94,.3);
      flex-shrink:0;
      position:relative;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .logo-orb{
      width:42px;height:42px;border-radius:999px;
      position:relative;
      background: conic-gradient(from 210deg,#22c55e,#06b6d4,#3b82f6,#a855f7,#f97316,#22c55e);
      box-shadow:0 10px 22px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.18) inset;
      overflow:hidden;
      flex:0 0 auto;
    }
    .logo-orb:before{
      content:""; position:absolute; inset:-6px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.55), transparent 55%);
    }
    .brand-text{display:flex; flex-direction:column; gap:1px;}
    .brand-kicker{font-size:11px; letter-spacing:.22em; text-transform:uppercase; font-weight:800; opacity:.9;}
    .brand-title{font-size:24px; font-weight:900; line-height:1;}
    .brand-sub{font-size:15px; font-weight:800; opacity:.92;}

    .header-info{
      text-align:right;
      font-size:13px;
      min-width:0;
    }
    .header-info strong{
      display:block;
      font-size:16px;
      color:var(--green);
      margin-bottom:4px;
    }
    .relogio{
      font-size:32px;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }

    .ultima-sync{
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(34,197,94,.15);
      border:1px solid rgba(34,197,94,.4);
      padding:8px 16px;
      border-radius:999px;
      font-size:12px;
      display:flex;
      align-items:center;
      gap:8px;
      animation:pulseSync 2s ease-in-out infinite;
      z-index:2;
      white-space:nowrap;
    }
    @keyframes pulseSync{
      0%,100%{opacity:.9; transform:translateX(-50%) scale(1);}
      50%{opacity:1; transform:translateX(-50%) scale(1.02);}
    }

    .btn-fullscreen{
      position:fixed;
      bottom:20px;
      right:20px;
      background:var(--green);
      color:#000;
      border:none;
      padding:14px 24px;
      border-radius:12px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(34,197,94,.4);
      transition:all .3s;
      z-index:9999;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .btn-fullscreen:hover{
      transform:scale(1.05);
      box-shadow:0 12px 30px rgba(34,197,94,.6);
    }
    .btn-fullscreen.hide{ display:none; }

    main{
      flex:1;
      overflow:hidden;
      padding:12px 14px;
      display:flex;
      justify-content:center;
    }

    .container{
      width:100%;
      max-width:none;
    }

    .projetos-grid{
      width:100%;
      height:calc(100vh - 120px);
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      grid-template-rows:repeat(2, 1fr);
      gap:16px;
    }

    .projeto-card{
      padding:22px;
      border-radius:18px;
      border:2px solid rgba(148,163,184,.4);
      background:rgba(2,6,23,.75);
      box-shadow:0 10px 30px rgba(0,0,0,.4);
      position:relative;
      transition:all .35s;
      overflow:hidden;
    }

    .projeto-card.atualizado{
      animation:destaque 2.6s ease-out;
      border-color:var(--green);
      box-shadow:0 0 40px rgba(34,197,94,.65), 0 10px 30px rgba(0,0,0,.4);
    }

    .projeto-card.stale{
      border-color:var(--red) !important;
      box-shadow:0 0 30px rgba(239,68,68,.8), 0 10px 30px rgba(0,0,0,.4) !important;
      animation:pulseRed 1.2s ease-in-out infinite;
    }

    @keyframes destaque{
      0%,100%{transform:scale(1);}
      50%{transform:scale(1.02);}
    }
    @keyframes pulseRed{
      0%,100%{transform:scale(1);}
      50%{transform:scale(1.02);}
    }

    .card-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:16px;
    }

    .card-titulo{
      font-size:26px;
      font-weight:900;
      color:#fff;
      line-height:1.2;
    }

    .farol{
      width:58px;
      height:58px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:36px;
      flex-shrink:0;
      animation:pulse 2s ease-in-out infinite;
    }
    .farol.verde{
      background:radial-gradient(circle, rgba(34,197,94,.25), transparent);
      box-shadow:0 0 25px rgba(34,197,94,.5);
    }
    .farol.amarelo{
      background:radial-gradient(circle, rgba(250,204,21,.25), transparent);
      box-shadow:0 0 25px rgba(250,204,21,.5);
    }
    .farol.vermelho{
      background:radial-gradient(circle, rgba(239,68,68,.25), transparent);
      box-shadow:0 0 25px rgba(239,68,68,.5);
    }

    @keyframes pulse{
      0%, 100%{transform:scale(1); opacity:1;}
      50%{transform:scale(1.08); opacity:.85;}
    }

    .card-info{
      display:flex;
      gap:12px;
      margin-bottom:14px;
    }
    .info-badge{
      flex:1;
      padding:8px 10px;
      border-radius:8px;
      background:rgba(15,23,42,.6);
      border:1px solid rgba(148,163,184,.2);
      font-size:12px;
    }
    .info-badge-label{
      text-transform:uppercase;
      letter-spacing:.05em;
      opacity:.7;
      margin-bottom:3px;
    }
    .info-badge-value{
      font-size:16px;
      font-weight:700;
    }

    .card-status{
      padding:16px;
      border-radius:10px;
      background:linear-gradient(135deg, rgba(2,6,23,.6), rgba(15,118,110,.1));
      border:1px solid rgba(34,197,94,.2);
      margin-bottom:12px;
      min-height:92px;
    }
    .status-label{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--green);
      margin-bottom:6px;
      font-weight:800;
    }
    .status-text{
      font-size:16px;
      line-height:1.45;
      color:#fff;
      display:-webkit-box;
      -webkit-line-clamp:4;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .card-footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding-top:10px;
      border-top:1px solid rgba(148,163,184,.15);
      font-size:11px;
      opacity:.86;
    }
    .footer-user{
      font-weight:700;
      color:var(--green);
    }

    .badge-novo{
      position:absolute;
      top:-8px;
      right:-8px;
      background:var(--green);
      color:#000;
      padding:4px 12px;
      border-radius:999px;
      font-size:10px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.05em;
      box-shadow:0 4px 12px rgba(34,197,94,.4);
      animation:badgePulse 1.5s ease-in-out infinite;
    }

    .badge-stale{
      position:absolute;
      top:-8px;
      right:-8px;
      background:var(--red);
      color:#000;
      padding:4px 12px;
      border-radius:999px;
      font-size:10px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.05em;
      box-shadow:0 4px 12px rgba(239,68,68,.55);
      animation:badgePulseRed 1.2s ease-in-out infinite;
    }

    @keyframes badgePulse{
      0%,100%{transform:scale(1);}
      50%{transform:scale(1.1);}
    }
    @keyframes badgePulseRed{
      0%,100%{transform:scale(1);}
      50%{transform:scale(1.12);}
    }

    .loading{
      text-align:center;
      padding:60px;
      font-size:20px;
      opacity:.7;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      grid-column:1 / -1;
    }

    footer{
      padding:8px;
      text-align:center;
      font-size:11px;
      opacity:.6;
      background:rgba(2,6,23,.5);
      flex-shrink:0;
    }

    .slide-out{ animation:slideOut .55s ease-in forwards; }
    .slide-in{ animation:slideIn .55s ease-out forwards; }

    @keyframes slideOut{
      from{ transform:translateX(0); opacity:1; }
      to{ transform:translateX(-60px); opacity:0; }
    }
    @keyframes slideIn{
      from{ transform:translateX(60px); opacity:0; }
      to{ transform:translateX(0); opacity:1; }
    }

    @media (max-width:1200px){
      .projetos-grid{ gap:12px; }
      .card-titulo{ font-size:22px; }
      .status-text{ font-size:14px; }
      .farol{ width:52px; height:52px; font-size:32px; }
      .ultima-sync{ display:none; }
    }

  .kpi-mini{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(34,197,94,.08);
  border:1px solid rgba(34,197,94,.3);
  text-align:center;
}

.kpi-score{
  font-size:22px;
  font-weight:900;
  color:#22c55e;
}

.kpi-label{
  font-size:11px;
  opacity:.8;
}
  
  
  </style>
</head>
<body>

<button class="btn-fullscreen" id="btnFullscreen" onclick="ativarFullscreen()">
  🖥️ Ativar Tela Cheia
</button>

<header>
  <div class="brand">
    <div class="logo-orb"></div>
    <div class="brand-text">
      <div class="brand-kicker">ERP</div>
      <div class="brand-title">ÍMPAR</div>
      <div class="brand-sub">Gestão à Vista</div>
    </div>
  </div>

  <div class="ultima-sync" id="ultimaSync">
    🔄 Sincronizando...
  </div>

  <div class="header-info">
    <strong id="dataAtual">—</strong>
    <div class="relogio" id="relogio">00:00:00</div>
  </div>
</header>

<main>
  <div class="container">
    <div class="projetos-grid" id="projetosGrid">
      <div class="loading">📊 Carregando projetos...</div>
    </div>
  </div>
</main>

<footer>
  ERP ÍMPAR © 2026 — Atualização automática a cada 10 segundos
</footer>

<script>
const API_BASE = 'https://api.erpimpar.com.br/tv/dashboard_full.php';

let projetosAtuais = [];
let ultimaAtualizacaoGlobal = null;
let ultimaAtualizacaoUsuario = null;

const PAGE_SIZE = 6;
const PAGE_INTERVAL_MS = 20000;
const STALE_MS = 7 * 24 * 60 * 60 * 1000;

let pageIndex = 0;
let pageTimer = null;

let highlightProjectId = null;
let highlightUntilTs = 0;

window.addEventListener('DOMContentLoaded', () => {
  atualizarRelogio();
  setInterval(atualizarRelogio, 1000);

  carregarProjetos();
  setInterval(carregarProjetos, 10000);

  iniciarPager();

  verificarFullscreen();
  document.addEventListener('fullscreenchange', verificarFullscreen);
  document.addEventListener('webkitfullscreenchange', verificarFullscreen);
  document.addEventListener('mozfullscreenchange', verificarFullscreen);
  document.addEventListener('MSFullscreenChange', verificarFullscreen);
});

function ativarFullscreen() {
  const elem = document.documentElement;
  if (elem.requestFullscreen) elem.requestFullscreen();
  else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
  else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
  else if (elem.mozRequestFullScreen) elem.mozRequestFullScreen();
}

function verificarFullscreen() {
  const isFullscreen =
    document.fullscreenElement ||
    document.webkitFullscreenElement ||
    document.mozFullScreenElement ||
    document.msFullscreenElement;

  const btn = document.getElementById('btnFullscreen');
  if (isFullscreen) btn.classList.add('hide');
  else btn.classList.remove('hide');
}

function atualizarRelogio() {
  const agora = new Date();
  const data = agora.toLocaleDateString('pt-BR', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  const hora = agora.toLocaleTimeString('pt-BR');

  document.getElementById('dataAtual').textContent = data.charAt(0).toUpperCase() + data.slice(1);
  document.getElementById('relogio').textContent = hora;
}

function parseDataBR(dataStr) {
  if (!dataStr || typeof dataStr !== 'string') return null;
  const partes = dataStr.split(' ');
  if (partes.length !== 2) return null;

  const [dataParte, horaParte] = partes;
  const [ano, mes, dia] = dataParte.split('-');
  const [hora, min, seg] = horaParte.split(':');

  return new Date(
    parseInt(ano, 10),
    parseInt(mes, 10) - 1,
    parseInt(dia, 10),
    parseInt(hora, 10),
    parseInt(min, 10),
    parseInt(seg, 10)
  );
}

function compareProjetos(a, b){
  const idA = Number(a.id);
  const idB = Number(b.id);
  if (!Number.isNaN(idA) && !Number.isNaN(idB)) return idA - idB;
  return (a.nome || '').localeCompare(b.nome || '', 'pt-BR');
}

function iniciarPager() {
  if (pageTimer) clearInterval(pageTimer);
  pageTimer = setInterval(() => {
    const totalPages = Math.max(1, Math.ceil(projetosAtuais.length / PAGE_SIZE));
    if (totalPages <= 1) return;
    const next = (pageIndex + 1) % totalPages;
    setPage(next, true);
  }, PAGE_INTERVAL_MS);
}

function setPage(newIndex, animate) {
  const totalPages = Math.max(1, Math.ceil(projetosAtuais.length / PAGE_SIZE));
  if (totalPages <= 1) {
    pageIndex = 0;
    renderizarProjetos(new Set(), false);
    return;
  }

  pageIndex = Math.max(0, Math.min(newIndex, totalPages - 1));
  renderizarProjetos(new Set(), animate);
}

async function carregarProjetos() {
  try {

    const res = await fetch(API_BASE);
    const json = await res.json();

    if (!json.success) throw new Error('Erro API');

    projetosAtuais = json.data.projetos;
projetosAtuais.sort(compareProjetos);

renderizarProjetos(new Set(), false);
atualizarBadgeSync();
iniciarPager();

  } catch (e) {
    console.error(e);
  }
}
  
function detectarAtualizacoes(projetosNovos) {
  const atualizados = new Set();

  projetosNovos.forEach((projetoNovo) => {
    const projetoAntigo = projetosAtuais.find((p) => String(p.id) === String(projetoNovo.id));
    if (projetoAntigo) {
      if (projetoNovo.data_atualizacao !== projetoAntigo.data_atualizacao) {
        atualizados.add(projetoNovo.id);
      }
    } else {
      atualizados.add(projetoNovo.id);
    }
  });

  return atualizados;
}

function encontrarMaisRecenteEntreAtualizados(setIds) {
  let best = null;
  let bestTs = -1;

  projetosAtuais.forEach((p) => {
    if (!setIds.has(p.id)) return;
    const d = parseDataBR(p.data_atualizacao);
    if (!d) return;
    const ts = d.getTime();
    if (ts > bestTs) {
      bestTs = ts;
      best = p;
    }
  });

  return best;
}

function renderizarProjetos(projetosAtualizados, animate) {
  const grid = document.getElementById('projetosGrid');
  const farolEmoji = {'verde':'🟢','amarelo':'🟡','vermelho':'🔴'};

  if (Date.now() > highlightUntilTs) {
    highlightProjectId = null;
  }

  const totalPages = Math.max(1, Math.ceil(projetosAtuais.length / PAGE_SIZE));
  if (pageIndex >= totalPages) pageIndex = 0;

  const start = pageIndex * PAGE_SIZE;
  const slice = projetosAtuais.slice(start, start + PAGE_SIZE);

  const doRender = () => {
    const agoraTs = Date.now();

    const html = slice.map((projeto) => {
      const dataAtualizada = parseDataBR(projeto.data_atualizacao);
      if (!dataAtualizada) return '';

      const diffMs = Date.now() - dataAtualizada.getTime();
      const diffMins = Math.floor(diffMs / 60000);
      const diffHoras = Math.floor(diffMins / 60);
      const diffDias = Math.floor(diffHoras / 24);

      let tempoRelativo;
      if (diffMins < 1) tempoRelativo = 'Agora mesmo';
      else if (diffMins < 60) tempoRelativo = `há ${diffMins} min`;
      else if (diffHoras < 24) tempoRelativo = `há ${diffHoras}h`;
      else tempoRelativo = `há ${diffDias} dia${diffDias > 1 ? 's' : ''}`;

      const dataFormatada = dataAtualizada.toLocaleString('pt-BR', {
        day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
      });

      const foiAtualizado = projetosAtualizados.has(projeto.id);
      const estaEmDestaque = (highlightProjectId === projeto.id) && (agoraTs < highlightUntilTs);
      const estaDesatualizado = (Date.now() - dataAtualizada.getTime()) > STALE_MS;

      const classAtualizado = (foiAtualizado || estaEmDestaque) ? 'atualizado' : '';
      const classStale = (estaDesatualizado && !foiAtualizado && !estaEmDestaque) ? 'stale' : '';

      let badge = '';
      if (estaDesatualizado && !foiAtualizado && !estaEmDestaque) {
        badge = '<div class="badge-stale">Falta atualização!</div>';
      } else if (foiAtualizado || estaEmDestaque) {
        badge = '<div class="badge-novo">Atualizado!</div>';
      }

      return `
        <div class="projeto-card ${classAtualizado} ${classStale}">
          ${badge}
          <div class="card-header">
            <h2 class="card-titulo">${escapeHtml(projeto.nome || 'Sem nome')}</h2>
            <div class="farol ${escapeFarolClass(projeto.farol)}">
              ${farolEmoji[projeto.farol] || '⚪'}
            </div>
          </div>

          <div class="card-info">
            <div class="info-badge">
              <div class="info-badge-label">👷 Coordenador</div>
              <div class="info-badge-value">${escapeHtml(projeto.coordenador || '—')}</div>
            </div>
            <div class="info-badge">
              <div class="info-badge-label">🔧 Execução</div>
              <div class="info-badge-value">${escapeHtml(projeto.execucao || '—')}</div>
            </div>
          </div>

          <div class="card-status">
            <div class="status-label">📊 Status Atual</div>
            <div class="status-text">${escapeHtml(projeto.status || 'Sem status')}</div>
          </div>

<div class="kpi-mini">
  <div class="kpi-score">${projeto.kpi ?? '--'}%</div>
  <div class="kpi-label">Performance</div>
</div>

          <div class="card-footer">
            <div>
              <span class="footer-user">🕐 ${tempoRelativo}</span>
              <div style="font-size:10px;opacity:.7;margin-top:2px">${dataFormatada}</div>
            </div>
            <div>
              <span class="footer-user">${escapeHtml(projeto.usuario_atualizacao || 'Sistema')}</span>
            </div>
          </div>
        </div>
      `;
    }).join('');

    grid.innerHTML = html || '<div class="loading">📭 Nenhum projeto cadastrado</div>';
  };

  if (!animate) {
    doRender();
    return;
  }

  grid.classList.remove('slide-in');
  grid.classList.add('slide-out');

  setTimeout(() => {
    grid.classList.remove('slide-out');
    doRender();
    grid.classList.add('slide-in');
    setTimeout(() => grid.classList.remove('slide-in'), 600);
  }, 560);
}

function atualizarBadgeSync() {
  const badge = document.getElementById('ultimaSync');

  if (ultimaAtualizacaoGlobal) {
    const dataFormatada = ultimaAtualizacaoGlobal.toLocaleString('pt-BR', {
      day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
    });

    const usuario = ultimaAtualizacaoUsuario || 'Sistema';
    badge.innerHTML = `✅ Última atualização: ${dataFormatada} — ${escapeHtml(usuario)}`;
    badge.style.background = 'rgba(34,197,94,.2)';
    badge.style.borderColor = 'rgba(34,197,94,.5)';
  } else {
    badge.innerHTML = '🔄 Aguardando dados...';
  }
}

function escapeHtml(value){
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function escapeFarolClass(value){
  return ['verde', 'amarelo', 'vermelho'].includes(value) ? value : '';
}
</script>

</body>
</html>
