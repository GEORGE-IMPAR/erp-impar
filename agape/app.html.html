<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>APP ÁGAPE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#000;
  overflow:hidden;
}

.app{
  position:fixed;
  inset:0;
  display:grid;
  grid-template-rows:auto auto 1fr 70px 30px;
  background:linear-gradient(180deg,#04192c,#0a4467,#0f6a92);
}

/* HEADER */
.header{
  background:#000;
  padding:10px;
  display:flex;
  align-items:center;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
}

.logo{
  width:60px;height:60px;border-radius:12px;background:#fff;margin-right:10px;
}

.title{
  font-weight:bold;
  font-size:14px;
}

/* TABS */
.tabs{
  display:flex;
  gap:8px;
  padding:10px;
}

.tab{
  flex:1;
  padding:12px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
  background:#ccc;
  color:#333;
}

.tab.active{
  background:#000;
  color:#fff;
  border:2px solid #0af;
}

.tab.disabled{
  opacity:0.4;
}

/* CONTENT */
.content{
  overflow:hidden;
  position:relative;
}

.screen{
  position:absolute;
  inset:0;
  padding:12px;
  display:none;
}

.screen.active{
  display:block;
}

/* CONFIRMAR */
.option{
  background:#0d2d48;
  margin-bottom:10px;
  padding:15px;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.toggle{
  width:120px;
  height:50px;
  border-radius:25px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.on{background:#2ecc71;}
.off{background:#e74c3c;}

.confirm-box{
  background:#eee;
  padding:15px;
  margin-top:10px;
  font-weight:bold;
  color:#333;
}

/* CONSUMO */
.product{
  background:#0d2d48;
  padding:12px;
  margin-bottom:10px;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.qty{
  display:flex;
  gap:10px;
  align-items:center;
}

.btn-small{
  width:35px;height:35px;
  border-radius:10px;
  background:#333;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}

.total{
  background:#eee;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:#114d72;
}

/* FOOTER */
.footer{
  background:#eee;
  position:relative;
}

.actions{
  position:absolute;
  right:10px;
  bottom:5px;
  display:flex;
  gap:10px;
}

.btn{
  width:55px;height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:24px;
}

.green{background:#2ecc71;}
.red{background:#e74c3c;}
.blue{background:#3498db;}

.footer2{
  background:#000;
  color:#fff;
  font-size:10px;
  padding:5px;
}
</style>
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="logo"></div>
  <div class="title">
    Loja Professor Clementino Brito<br>
    Sistema de Controle
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" id="tabConfirmar">CONFIRMAR</div>
  <div class="tab disabled" id="tabConsumo">CONSUMO</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- CONFIRMAR -->
<div class="screen active" id="screenConfirmar">

  <div class="option" onclick="selectOption(this,'SOMENTE SESSÃO')">
    SOMENTE SESSÃO
    <div class="toggle on">ON</div>
  </div>

  <div class="option" onclick="selectOption(this,'SOMENTE ÁGAPE')">
    SOMENTE ÁGAPE
    <div class="toggle off">OFF</div>
  </div>

  <div class="option" onclick="selectOption(this,'SESSÃO E ÁGAPE')">
    SESSÃO E ÁGAPE
    <div class="toggle off">OFF</div>
  </div>

  <div class="option" onclick="selectOption(this,'NÃO PODEREI IR')">
    NÃO PODEREI IR
    <div class="toggle off">OFF</div>
  </div>

  <div class="confirm-box" id="confirmText">
    Opção selecionada: SOMENTE SESSÃO
  </div>

</div>

<!-- CONSUMO -->
<div class="screen" id="screenConsumo">

  <div class="product">
    Água R$5
    <div class="qty">
      <div class="btn-small" onclick="changeQty(this,-1)">-</div>
      <div>0</div>
      <div class="btn-small" onclick="changeQty(this,1)">+</div>
    </div>
  </div>

  <div class="product">
    Carvão R$35
    <div class="qty">
      <div class="btn-small" onclick="changeQty(this,-1)">-</div>
      <div>0</div>
      <div class="btn-small" onclick="changeQty(this,1)">+</div>
    </div>
  </div>

  <div class="total" id="total">R$ 0,00</div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div class="actions">
    <div class="btn blue" onclick="goConfig()">⚙</div>
    <div class="btn green" onclick="confirmar()">✓</div>
    <div class="btn red" onclick="logout()">✕</div>
  </div>
</div>

<div class="footer2">
  SISTEMA AGAPE – v1.0
</div>

</div>

<script>

// STATUS SESSÃO
const sessaoAberta = localStorage.getItem('sessaoAberta') === 'true';

// LIBERAR CONSUMO
if(sessaoAberta){
  document.getElementById('tabConsumo').classList.remove('disabled');
}

// TROCA DE ABAS
document.getElementById('tabConfirmar').onclick = () => showScreen('confirmar');

document.getElementById('tabConsumo').onclick = () => {
  if(!sessaoAberta) return;
  showScreen('consumo');
};

function showScreen(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

  if(screen==='confirmar'){
    screenConfirmar.classList.add('active');
    tabConfirmar.classList.add('active');
  }else{
    screenConsumo.classList.add('active');
    tabConsumo.classList.add('active');
  }
}

// CONFIRMAR
function selectOption(el,text){
  document.querySelectorAll('.toggle').forEach(t=>{
    t.classList.remove('on');
    t.classList.add('off');
    t.innerText='OFF';
  });

  const toggle = el.querySelector('.toggle');
  toggle.classList.remove('off');
  toggle.classList.add('on');
  toggle.innerText='ON';

  confirmText.innerText = "Opção selecionada: " + text;
}

// CONSUMO
function changeQty(el,delta){
  let valueEl = el.parentElement.children[1];
  let val = parseInt(valueEl.innerText);
  val += delta;
  if(val<0) val=0;
  valueEl.innerText=val;

  updateTotal();
}

function updateTotal(){
  let total=0;
  document.querySelectorAll('.product').forEach(p=>{
    let price = p.innerText.includes("35")?35:5;
    let qty = parseInt(p.querySelector('.qty div:nth-child(2)').innerText);
    total += price*qty;
  });
  document.getElementById('total').innerText="R$ "+total+",00";
}

// BOTÕES
function goConfig(){
  window.location.href="index.html?admin=1";
}

function logout(){
  window.location.href="index.html";
}

function confirmar(){
  alert("Confirmado!");
}

</script>

</body>
</html>
