<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ágape - Passo 1</title>
  <style>
    :root{
      --bg:#07111f;
      --card:#0f1d33;
      --line:rgba(255,255,255,.12);
      --text:#eef4ff;
      --muted:#a9b9d7;
      --ok:#21c55d;
      --warn:#f59e0b;
      --blue1:#103d8f;
      --blue2:#0b60d1;
      --blue3:#0b2a5a;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:Arial,Helvetica,sans-serif;background:#000;color:var(--text);overflow:hidden}
    .screen{position:fixed;inset:0;display:none}
    .screen.active{display:flex}
    .center{display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center}

    #scr_splash1{
      background:radial-gradient(circle at center, #111 0%, #000 58%, #000 100%);
    }
    .mason-wrap{
      width:180px;height:180px;border-radius:50%;display:grid;place-items:center;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 0 0 16px rgba(255,255,255,.03), 0 0 50px rgba(255,255,255,.08);
      animation:pulse 1.8s ease-in-out infinite;
      margin-bottom:24px;
    }
    .mason{
      font-size:88px;line-height:1;filter:drop-shadow(0 0 18px rgba(255,255,255,.22));
      animation:spin 2.8s linear infinite;
    }
    .small{font-size:14px;color:#d9e0ec;letter-spacing:.18em;text-transform:uppercase}

    #scr_splash2{
      background:linear-gradient(180deg,#091122 0%, #0d1c37 60%, #0a1428 100%);
      padding:24px;
    }
    .brand-card{
      width:min(92vw,540px);padding:34px 28px;border-radius:26px;
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 24px 60px rgba(0,0,0,.38);
      backdrop-filter:blur(10px);
    }
    .brand-title{font-size:42px;font-weight:900;letter-spacing:.03em;margin:0 0 10px}
    .brand-sub{font-size:18px;color:#c8d5ee;margin:0}

    #scr_wait{
      background:linear-gradient(180deg,var(--blue1) 0%, var(--blue2) 46%, var(--blue3) 100%);
      padding:22px;
    }
    .blue-card{
      width:min(94vw,720px);border-radius:28px;padding:26px 22px 22px;
      background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 26px 70px rgba(0,0,0,.28);
    }
    .pill{
      display:inline-block;padding:10px 16px;border-radius:999px;font-size:14px;font-weight:800;
      background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.16);margin-bottom:16px;
    }
    .title{font-size:34px;font-weight:900;margin:0 0 10px}
    .desc{font-size:18px;color:#eef4ff;margin:0 0 22px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
    .item{
      border-radius:18px;padding:16px;background:rgba(4,10,24,.28);border:1px solid rgba(255,255,255,.14);
      text-align:left;
    }
    .item b{display:block;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#cfe0ff;margin-bottom:8px}
    .value{font-size:22px;font-weight:900}
    .footer{
      margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.16);font-size:13px;color:#d7e4ff;
      display:flex;flex-wrap:wrap;gap:10px 18px;justify-content:center
    }
    .status-ok{color:#b7ffd0}
    .status-off{color:#ffe0a7}
    .toast{
      position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:9999;display:none;
      padding:12px 16px;border-radius:14px;background:rgba(10,18,32,.92);border:1px solid rgba(255,255,255,.12);font-size:14px;
      box-shadow:0 12px 30px rgba(0,0,0,.25)
    }
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    @media (max-width:640px){
      .brand-title{font-size:34px}
      .title{font-size:28px}
      .grid{grid-template-columns:1fr}
      .mason-wrap{width:150px;height:150px}
      .mason{font-size:74px}
    }
  </style>
</head>
<body>
  <section id="scr_splash1" class="screen active center" aria-label="Splash preta">
    <div class="mason-wrap"><div class="mason">🜁</div></div>
    <div class="small">Ágape • carregando</div>
  </section>

  <section id="scr_splash2" class="screen center" aria-label="Sistema Ágape">
    <div class="brand-card">
      <h1 class="brand-title">Sistema Ágape</h1>
      <p class="brand-sub">Preparando a sessão…</p>
    </div>
  </section>

  <section id="scr_wait" class="screen center" aria-label="Tela azul passo 1">
    <div class="blue-card">
      <div class="pill">PASSO 1 • TELA AZUL</div>
      <h2 class="title">Sessão Ágape</h2>
      <p class="desc">Ciclo parado no início, pronto para validar.</p>
      <div class="grid">
        <div class="item"><b>Sessão</b><div id="st_sessao" class="value">fechada</div></div>
        <div class="item"><b>Push</b><div id="st_push" class="value">false</div></div>
        <div class="item"><b>Convocação</b><div id="st_conv" class="value">false</div></div>
        <div class="item"><b>Fechamento</b><div id="st_fech" class="value">false</div></div>
      </div>
      <div class="footer">
        <span id="st_gravacao">Gravação: aguardando…</span>
        <span id="st_versao">Versão: INDEX_1B_PASSO_1_V2026_04_03_2130</span>
      </div>
    </div>
  </section>

  <div id="toast" class="toast"></div>

  <script>
    (() => {
      'use strict';

      const VERSION = 'INDEX_1B_PASSO_1_V2026_04_03_2130';
      const CONFIG_URL = 'https://api.erpimpar.com.br/agape/consumo/agape_config.json';
      const SAVE_URL = 'https://api.erpimpar.com.br/agape/consumo/admin_save_config.php';

      const SPLASH_1_MS = 1800;
      const SPLASH_2_MS = 1800;

      function $(id){ return document.getElementById(id); }
      function show(id){
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        const el = $(id); if (el) el.classList.add('active');
      }
      function toast(msg){
        const el = $('toast');
        el.textContent = msg;
        el.style.display = 'block';
        clearTimeout(window.__toastTimer);
        window.__toastTimer = setTimeout(() => el.style.display = 'none', 2600);
      }
      function clearLocal(){
        try{ localStorage.clear(); }catch(_){ }
        try{ sessionStorage.clear(); }catch(_){ }
      }
      function buildStep1Config(cfg){
        const c = (cfg && typeof cfg === 'object') ? cfg : {};
        c.sessao = c.sessao && typeof c.sessao === 'object' ? c.sessao : {};
        c.push = c.push && typeof c.push === 'object' ? c.push : {};
        c.convocacao = c.convocacao && typeof c.convocacao === 'object' ? c.convocacao : {};
        c.estado = c.estado && typeof c.estado === 'object' ? c.estado : {};

        c.sessao.status = 'fechada';
        c.push.ativo = false;
        c.push.habilitado = false;
        c.convocacao.ativa = false;
        c.fechamento = false;
        c.estado.estagio = 1;
        c.estado.passo = 1;
        c.estado.versao = VERSION;
        c.estado.atualizado_em = new Date().toISOString();

        return c;
      }
      function renderStatus(cfg){
        $('st_sessao').textContent = String(cfg?.sessao?.status || 'fechada');
        $('st_push').textContent = String(!!(cfg?.push?.ativo || cfg?.push?.habilitado));
        $('st_conv').textContent = String(!!cfg?.convocacao?.ativa);
        $('st_fech').textContent = String(!!cfg?.fechamento);
      }
      async function loadConfig(){
        const r = await fetch(CONFIG_URL + '?v=' + Date.now(), { cache:'no-store' });
        if(!r.ok) throw new Error('Falha ao carregar agape_config.json');
        return await r.json();
      }
      async function saveConfig(cfg){
        const r = await fetch(SAVE_URL, {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify(cfg)
        });
        const txt = await r.text();
        let data;
        try{ data = JSON.parse(txt); }catch(_){ data = { ok:false, raw:txt }; }
        if(!r.ok || data.ok === false) throw new Error('Falha ao salvar config');
        return data;
      }
      async function applyStep1(){
        clearLocal();
        try{
          const loaded = await loadConfig().catch(() => ({}));
          const cfg = buildStep1Config(loaded);
          renderStatus(cfg);
          await saveConfig(cfg);
          $('st_gravacao').innerHTML = 'Gravação: <span class="status-ok">ok no Kinghost</span>';
          toast('Passo 1 gravado');
        }catch(err){
          console.error(err);
          const cfg = buildStep1Config({});
          renderStatus(cfg);
          $('st_gravacao').innerHTML = 'Gravação: <span class="status-off">falhou, mas a tela azul foi montada</span>';
          toast('Falha ao gravar no servidor');
        }
      }
      async function boot(){
        $('st_versao').textContent = 'Versão: ' + VERSION;
        show('scr_splash1');
        setTimeout(() => {
          show('scr_splash2');
          setTimeout(async () => {
            show('scr_wait');
            await applyStep1();
          }, SPLASH_2_MS);
        }, SPLASH_1_MS);
      }
      boot();
    })();
  </script>
</body>
</html>
