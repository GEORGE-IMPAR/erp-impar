<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>APP ÁGAPE</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg1: #04192c;
      --bg2: #0a4467;
      --bg3: #0f6a92;
      --tab-gray-1: #b5b5b5;
      --tab-gray-2: #8f8f8f;
      --tab-active-1: #131313;
      --tab-active-2: #000000;
      --tab-active-border: #2a9ce0;
      --footer-gray: #ececec;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    .app {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 48%, var(--bg3) 100%);
      overflow: hidden;
    }

    .top {
      background: #000;
      min-height: 78px;
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: calc(10px + env(safe-area-inset-top)) 16px 10px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.28);
      z-index: 3;
    }

    .logo-box {
      width: 68px;
      height: 68px;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      border: 2px solid rgba(255, 255, 255, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .brand {
      min-width: 0;
      line-height: 1.15;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .brand-subtitle {
      font-size: 14px;
      font-weight: 700;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px 12px 10px;
      z-index: 3;
    }

    .tab {
      min-height: 44px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: linear-gradient(var(--tab-gray-1), var(--tab-gray-2));
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 2px 8px rgba(0,0,0,0.22);
      transition: transform 0.08s ease, filter 0.15s ease, box-shadow 0.15s ease;
    }

    .tab:hover {
      filter: brightness(1.04);
    }

    .tab:active {
      transform: scale(0.98);
    }

    .tab.active {
      background: linear-gradient(var(--tab-active-1), var(--tab-active-2));
      border-color: var(--tab-active-border);
      box-shadow:
        inset 0 0 0 1px rgba(42, 156, 224, 0.35),
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 2px 8px rgba(0,0,0,0.35);
    }

    .tab.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.15);
    }

    .frame-wrap {
      min-height: 0;
      overflow: hidden;
      padding: 0;
    }

    .tab-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: transparent;
    }

    @media (max-width: 430px) {
      .top {
        min-height: 72px;
        padding: calc(8px + env(safe-area-inset-top)) 12px 8px;
      }

      .logo-box {
        width: 58px;
        height: 58px;
      }

      .brand-title {
        font-size: 14px;
      }

      .brand-subtitle {
        font-size: 12px;
      }

      .tabs {
        padding: 8px 10px 8px;
      }

      .tab {
        min-height: 42px;
        font-size: 11px;
      }
    }
  
/* =========================================================
   ÁGAPE — PADRÃO DE POPUPS v7.4 / OPÇÃO 2
   Verde musgo degradê + borda branca + listbox branco afundado
   ========================================================= */

.overlay {
  background: rgba(0, 0, 0, 0.78) !important;
  backdrop-filter: blur(4px);
}

.modal-card,
.payment-shell,
.dialog-card,
.popup-card,
.message-card,
.loading-card {
  background:
    radial-gradient(circle at top left, rgba(95, 147, 91, 0.35) 0%, transparent 34%),
    linear-gradient(145deg, #263f2f 0%, #13281d 46%, #07110d 100%) !important;
  border: 3px solid rgba(245, 245, 245, 0.92) !important;
  border-radius: 18px !important;
  box-shadow:
    0 24px 74px rgba(0, 0, 0, 0.78),
    0 0 0 1px rgba(255,255,255,0.18),
    0 0 28px rgba(187, 224, 176, 0.18) !important;
  color: #ffffff !important;
}

.payment-shell {
  border-radius: 28px !important;
  overflow: hidden;
}

.payment-top {
  background:
    radial-gradient(circle at top left, rgba(95, 147, 91, 0.34) 0%, transparent 38%),
    linear-gradient(145deg, #263f2f 0%, #101f17 100%) !important;
  color: #ffffff !important;
  text-shadow: 0 2px 8px rgba(0,0,0,0.62);
  border-bottom: 1px solid rgba(255,255,255,0.14);
  font-size: 26px !important;
}

.payment-body {
  background:
    radial-gradient(circle at top left, rgba(95, 147, 91, 0.28) 0%, transparent 40%),
    linear-gradient(145deg, #1e3527 0%, #0d1d15 100%) !important;
}

.modal-title,
.payment-top {
  color: #ffffff !important;
  text-shadow: 0 2px 8px rgba(0,0,0,0.62);
}

.modal-text,
.payment-desc {
  color: rgba(255,255,255,0.90) !important;
}

/* Listbox branco afundado */
.convocacao-text-box,
.qr-text-box,
.pix-box,
.list-box,
.lista-box,
.popup-list,
.modal-list,
.pix-info,
.option-group {
  background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 100%) !important;
  color: #111111 !important;
  border: 2px solid rgba(255,255,255,0.95) !important;
  border-radius: 14px !important;
  box-shadow:
    inset 0 3px 10px rgba(0,0,0,0.22),
    inset 0 -1px 0 rgba(255,255,255,0.88),
    0 4px 16px rgba(0,0,0,0.26) !important;
  max-height: 52vh;
  overflow-y: auto;
}

.convocacao-text-box *,
.qr-text-box *,
.pix-box *,
.list-box *,
.lista-box *,
.popup-list *,
.modal-list *,
.pix-info *,
.option-group * {
  color: #111111 !important;
}

.qr-input,
.pix-input {
  background: linear-gradient(180deg, #ffffff 0%, #f4f4f4 100%) !important;
  color: #111111 !important;
  border: 1px solid rgba(0,0,0,0.18) !important;
  box-shadow: inset 0 2px 7px rgba(0,0,0,0.16) !important;
}

/* Pagamento em formato de listbox branco */
.option-group {
  flex-direction: column !important;
  align-items: stretch !important;
  gap: 0 !important;
  padding: 10px 12px !important;
}

.option-btn {
  min-height: 48px !important;
  border-radius: 0 !important;
  border: none !important;
  background: transparent !important;
  box-shadow: none !important;
  justify-content: flex-start !important;
  color: #111111 !important;
  font-size: 17px !important;
}

.option-btn + .option-btn {
  border-top: 1px solid rgba(0,0,0,0.10) !important;
}

.option-btn span {
  color: #111111 !important;
}

.option-btn.selected span:last-child {
  color: #177c35 !important;
}

.option-dot {
  border: 2px solid rgba(0,0,0,0.35) !important;
  background: #ffffff !important;
}

.option-btn.selected .option-dot::after {
  background: #17863b !important;
}

/* QR com quadro branco afundado */
.qr-video {
  background: #ffffff !important;
  border: 2px solid rgba(255,255,255,0.95);
  box-shadow:
    inset 0 3px 10px rgba(0,0,0,0.20),
    0 4px 16px rgba(0,0,0,0.26);
}

/* Botões */
.modal-btn,
.copy-btn {
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.22),
    0 7px 18px rgba(0,0,0,0.34) !important;
}

.modal-btn,
.btn.green,
.copy-btn {
  background: linear-gradient(180deg, #35cf60 0%, #15983d 100%) !important;
  color: #ffffff !important;
}

.btn.red,
.modal-btn.red,
#qrFecharBtn,
#btnPaymentCancel,
.payment-actions .btn.red {
  background: linear-gradient(180deg, #ff4d4d 0%, #d92121 100%) !important;
  color: #ffffff !important;
}

.popup-footer,
.modal-footer,
.payment-footer {
  background: transparent !important;
  border-top: none !important;
}

/* listas analíticas */
.popup-list-item,
.modal-list-item {
  background: #ffffff !important;
  color: #111111 !important;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.12);
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.12);
  padding: 8px 10px;
  margin-bottom: 7px;
}

  </style>
</head>
<body>
  <section class="app">
    <div class="top">
      <div class="logo-box">
        <img id="logoImg" src="logo-maconaria.png" alt="Logo da loja" />
      </div>

      <div class="brand">
        <div class="brand-title">Loja Professor Clementino Brito</div>
        <div class="brand-subtitle">
          Sistema de Controle de presença,<br />
          consumo e pagamentos.
        </div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" id="tabConfirmar">CONFIRMAR</div>
      <div class="tab" id="tabConsumo">CONSUMO</div>
    </div>

    <div class="frame-wrap">
      <iframe id="tabFrame" class="tab-frame" src="confirmar_tab.html"></iframe>
    </div>
  </section>

  <script>
    const tabConfirmar = document.getElementById('tabConfirmar');
    const tabConsumo = document.getElementById('tabConsumo');
    const tabFrame = document.getElementById('tabFrame');

    function sessaoAberta() {
      return localStorage.getItem('sessaoAberta') === 'true';
    }

    function applyConsumoState() {
      if (sessaoAberta()) {
        tabConsumo.classList.remove('disabled');
      } else {
        tabConsumo.classList.add('disabled');
      }
    }

    function openTab(name) {
      if (name === 'confirmar') {
        tabConfirmar.classList.add('active');
        tabConsumo.classList.remove('active');
        tabFrame.src = 'confirmar_tab.html';
        return;
      }

      if (name === 'consumo') {
        if (!sessaoAberta()) return;
        tabConsumo.classList.add('active');
        tabConfirmar.classList.remove('active');
        tabFrame.src = 'consumo_tab.html';
      }
    }

    tabConfirmar.addEventListener('click', () => openTab('confirmar'));
    tabConsumo.addEventListener('click', () => openTab('consumo'));

    window.addEventListener('storage', applyConsumoState);

    async function setupLogo() {
      const logoImg = document.getElementById('logoImg');
      const candidates = [
        'logo-maconaria.png',
        'logo-maconaria.jpg',
        'logo-maconaria.jpeg',
        'logo-loja---d.png',
        'logo-loja-d.png',
        'maconaria.png',
        'maconaria.jpg'
      ];

      function tryLoad(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(src);
          img.onerror = reject;
          img.src = src;
        });
      }

      for (const src of candidates) {
        try {
          const validSrc = await tryLoad(src);
          logoImg.src = validSrc;
          return;
        } catch (error) {}
      }
    }

    setupLogo();
    applyConsumoState();
    openTab('confirmar');
  </script>
</body>
</html>
