<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>APP ÁGAPE</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg1: #04192c;
      --bg2: #0a4467;
      --bg3: #0f6a92;
      --tab-gray-1: #b5b5b5;
      --tab-gray-2: #8f8f8f;
      --tab-active-1: #131313;
      --tab-active-2: #000000;
      --tab-active-border: #2a9ce0;
      --footer-gray: #ececec;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    .app {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 48%, var(--bg3) 100%);
      overflow: hidden;
    }

    .top {
      background: #000;
      min-height: 78px;
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: calc(10px + env(safe-area-inset-top)) 16px 10px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.28);
      z-index: 3;
    }

    .logo-box {
      width: 68px;
      height: 68px;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      border: 2px solid rgba(255, 255, 255, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .brand {
      min-width: 0;
      line-height: 1.15;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .brand-subtitle {
      font-size: 14px;
      font-weight: 700;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px 12px 10px;
      z-index: 3;
    }

    .tab {
      min-height: 44px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: linear-gradient(var(--tab-gray-1), var(--tab-gray-2));
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 2px 8px rgba(0,0,0,0.22);
      transition: transform 0.08s ease, filter 0.15s ease, box-shadow 0.15s ease;
    }

    .tab:hover {
      filter: brightness(1.04);
    }

    .tab:active {
      transform: scale(0.98);
    }

    .tab.active {
      background: linear-gradient(var(--tab-active-1), var(--tab-active-2));
      border-color: var(--tab-active-border);
      box-shadow:
        inset 0 0 0 1px rgba(42, 156, 224, 0.35),
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 2px 8px rgba(0,0,0,0.35);
    }

    .tab.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.15);
    }

    .frame-wrap {
      min-height: 0;
      overflow: hidden;
      padding: 0;
    }

    .tab-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: transparent;
    }

    @media (max-width: 430px) {
      .top {
        min-height: 72px;
        padding: calc(8px + env(safe-area-inset-top)) 12px 8px;
      }

      .logo-box {
        width: 58px;
        height: 58px;
      }

      .brand-title {
        font-size: 14px;
      }

      .brand-subtitle {
        font-size: 12px;
      }

      .tabs {
        padding: 8px 10px 8px;
      }

      .tab {
        min-height: 42px;
        font-size: 11px;
      }
    }



/* =========================================================
   ÁGAPE v7.5 — PADRÃO FINAL POPUPS / OPÇÃO 2
   Verde musgo degradê + borda branca + listbox branco afundado
   SOMENTE VISUAL — não altera fluxo/lógica.
   ========================================================= */

.overlay {
  background: rgba(0, 0, 0, 0.80) !important;
  backdrop-filter: blur(4px) !important;
}

.modal-card,
.payment-shell,
.dialog-card,
.popup-card,
.message-card,
.loading-card {
  background:
    radial-gradient(circle at 18% 0%, rgba(103, 154, 95, 0.42) 0%, transparent 35%),
    linear-gradient(145deg, #263f2f 0%, #13281d 46%, #07110d 100%) !important;
  border: 3px solid rgba(245, 245, 245, 0.94) !important;
  border-radius: 20px !important;
  box-shadow:
    0 25px 76px rgba(0, 0, 0, 0.80),
    0 0 0 1px rgba(255,255,255,0.18),
    0 0 30px rgba(188, 224, 176, 0.18) !important;
  color: #ffffff !important;
}

.modal-card {
  padding: 24px 22px 20px !important;
}

.modal-title,
.payment-top {
  color: #ffffff !important;
  text-shadow:
    0 2px 8px rgba(0,0,0,0.72),
    0 0 12px rgba(255,255,255,0.10) !important;
  letter-spacing: .2px;
}

.modal-text,
.payment-desc {
  color: rgba(255,255,255,0.92) !important;
}

/* Ícones/check/spinner com verde no padrão */
.success-icon svg circle {
  stroke: rgba(132, 214, 117, 0.70) !important;
}

.success-icon svg path {
  stroke: #86e36f !important;
}

.loader-ring {
  border-top-color: #75e46d !important;
  border-left-color: #dfffe0 !important;
}

/* Pagamento no padrão opção 2 */
.payment-shell {
  border-radius: 30px !important;
  overflow: hidden !important;
  grid-template-rows: auto 1fr auto !important;
}

.payment-top {
  background:
    radial-gradient(circle at 18% 0%, rgba(103, 154, 95, 0.34) 0%, transparent 38%),
    linear-gradient(145deg, #263f2f 0%, #101f17 100%) !important;
  border-bottom: 1px solid rgba(255,255,255,0.16) !important;
  font-size: clamp(22px, 7vw, 34px) !important;
  padding: 22px 16px 16px !important;
}

.payment-body {
  background:
    radial-gradient(circle at 18% 0%, rgba(103, 154, 95, 0.26) 0%, transparent 40%),
    linear-gradient(145deg, #1e3527 0%, #0d1d15 100%) !important;
  padding: 18px !important;
}

.payment-footer {
  background: transparent !important;
  border-top: 1px solid rgba(255,255,255,0.12) !important;
  height: 70px !important;
}

/* Listbox branco afundado */
.convocacao-text-box,
.qr-text-box,
.pix-box,
.list-box,
.lista-box,
.popup-list,
.modal-list,
.pix-info,
.option-group,
.modal-card .readonly-box,
.modal-card .box-confirmacao,
.modal-card .box-acompanhamento,
.modal-card .box-extrato-irmaos,
.modal-card .box-extrato-produtos {
  background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 100%) !important;
  color: #111111 !important;
  border: 2px solid rgba(255,255,255,0.96) !important;
  border-radius: 14px !important;
  box-shadow:
    inset 0 3px 11px rgba(0,0,0,0.22),
    inset 0 -1px 0 rgba(255,255,255,0.90),
    0 5px 18px rgba(0,0,0,0.28) !important;
  overflow-y: auto !important;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,0,0,0.32) rgba(255,255,255,0.25);
}

.convocacao-text-box,
.qr-text-box,
.popup-list,
.modal-list,
.modal-card .readonly-box,
.modal-card .box-confirmacao,
.modal-card .box-acompanhamento,
.modal-card .box-extrato-irmaos,
.modal-card .box-extrato-produtos {
  max-height: 52vh !important;
}

.convocacao-text-box *,
.qr-text-box *,
.pix-box *,
.list-box *,
.lista-box *,
.popup-list *,
.modal-list *,
.pix-info *,
.option-group *,
.modal-card .readonly-box *,
.modal-card .box-confirmacao *,
.modal-card .box-acompanhamento *,
.modal-card .box-extrato-irmaos *,
.modal-card .box-extrato-produtos * {
  color: #111111 !important;
}

.convocacao-text-box::-webkit-scrollbar,
.qr-text-box::-webkit-scrollbar,
.popup-list::-webkit-scrollbar,
.modal-list::-webkit-scrollbar,
.readonly-box::-webkit-scrollbar,
.option-group::-webkit-scrollbar {
  width: 10px;
}

.convocacao-text-box::-webkit-scrollbar-thumb,
.qr-text-box::-webkit-scrollbar-thumb,
.popup-list::-webkit-scrollbar-thumb,
.modal-list::-webkit-scrollbar-thumb,
.readonly-box::-webkit-scrollbar-thumb,
.option-group::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,0.34);
  border-radius: 10px;
}

.convocacao-text-box::-webkit-scrollbar-track,
.qr-text-box::-webkit-scrollbar-track,
.popup-list::-webkit-scrollbar-track,
.modal-list::-webkit-scrollbar-track,
.readonly-box::-webkit-scrollbar-track,
.option-group::-webkit-scrollbar-track {
  background: rgba(0,0,0,0.06);
  border-radius: 10px;
}

/* Campo QR/PIX branco */
.qr-input,
.pix-input {
  background: linear-gradient(180deg, #ffffff 0%, #f4f4f4 100%) !important;
  color: #111111 !important;
  border: 1px solid rgba(0,0,0,0.18) !important;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.16) !important;
}

/* QR vídeo como painel branco */
.qr-video {
  background: #ffffff !important;
  border: 2px solid rgba(255,255,255,0.96) !important;
  box-shadow:
    inset 0 3px 11px rgba(0,0,0,0.20),
    0 5px 18px rgba(0,0,0,0.28) !important;
}

/* Opções de pagamento como listbox branco */
.option-group {
  flex-direction: column !important;
  align-items: stretch !important;
  justify-content: flex-start !important;
  gap: 0 !important;
  padding: 10px 12px !important;
  min-height: 120px !important;
}

.option-btn {
  min-height: 52px !important;
  border-radius: 0 !important;
  border: none !important;
  background: transparent !important;
  box-shadow: none !important;
  justify-content: flex-start !important;
  color: #111111 !important;
  font-size: 17px !important;
}

.option-btn + .option-btn {
  border-top: 1px solid rgba(0,0,0,0.10) !important;
}

.option-btn span,
.option-btn strong {
  color: #111111 !important;
}

.option-btn.selected span:last-child,
.option-btn.selected strong {
  color: #177c35 !important;
}

.option-dot {
  border: 2px solid rgba(0,0,0,0.35) !important;
  background: #ffffff !important;
}

.option-btn.selected .option-dot::after {
  background: #17863b !important;
}

/* Botões padronizados */
.modal-btn,
.copy-btn {
  min-height: 36px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.22),
    0 7px 18px rgba(0,0,0,0.34) !important;
}

.modal-btn,
.btn.green,
.copy-btn {
  background: linear-gradient(180deg, #37ce60 0%, #15983d 100%) !important;
  color: #ffffff !important;
  border: 1px solid rgba(255,255,255,0.18) !important;
}

.btn.red,
.modal-btn.red,
#qrFecharBtn,
#btnPaymentCancel,
.payment-actions .btn.red {
  background: linear-gradient(180deg, #ff4d4d 0%, #d92121 100%) !important;
  color: #ffffff !important;
  border: 1px solid rgba(255,255,255,0.18) !important;
}

.popup-footer,
.modal-footer {
  background: transparent !important;
  border-top: none !important;
}

/* Popups de consulta/listas antigas do ADM */
.consulta-badge {
  background: rgba(0,0,0,0.30) !important;
  border: 1px solid rgba(255,255,255,0.30) !important;
  color: #ffffff !important;
}

/* Evita que o listbox branco fique pequeno em popup grande */
.modal-card .readonly-box {
  min-height: 120px;
  padding: 14px !important;
}

/* Ajuste mobile */
@media (max-width: 430px) {
  .modal-card,
  .payment-shell {
    width: min(94vw, 420px) !important;
  }

  .payment-top {
    font-size: 28px !important;
  }
}

  
/* =========================================================
   ÁGAPE v7.6 — AJUSTE FINO OPÇÃO 2
   Cabeçalho com ícone + botões OK/Fechar retangulares
   ========================================================= */

/* Ícone nos títulos dos popups */
.modal-title::before {
  content: "✓";
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  margin-right: 10px;
  border-radius: 50%;
  border: 2px solid rgba(122, 218, 104, 0.82);
  color: #86e36f;
  font-size: 22px;
  font-weight: 900;
  vertical-align: middle;
  box-shadow: 0 0 12px rgba(134,227,111,0.18);
}

.modal-title.small::before {
  content: "";
  width: 34px;
  height: 34px;
  border: 4px solid rgba(255,255,255,0.20);
  border-top-color: #75e46d;
  border-left-color: #dfffe0;
  animation: spin 1s linear infinite;
}

/* Oculta o SVG grande quando o título já tem ícone */
.modal-card .success-icon {
  display: none !important;
}

/* Pagamento com ícone de cifrão no cabeçalho */
.payment-top {
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 10px !important;
  font-size: 14px !important;
  letter-spacing: 0.2px !important;
  padding: 18px 14px 12px !important;
}

.payment-top::before {
  content: "$";
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid rgba(122, 218, 104, 0.82);
  color: #86e36f;
  font-size: 22px;
  font-weight: 900;
  box-shadow: 0 0 12px rgba(134,227,111,0.18);
}

/* Botões retangulares padrão dentro de popups */
.payment-actions {
  position: static !important;
  display: flex !important;
  justify-content: center !important;
  gap: 22px !important;
  padding: 14px 16px 18px !important;
}

.payment-footer {
  height: auto !important;
  min-height: 64px !important;
}

.payment-actions .btn,
.modal-card .modal-btn,
#qrValidarBtn,
#qrFecharBtn,
#btnPaymentOk,
#btnPaymentCancel {
  width: 132px !important;
  height: 38px !important;
  min-height: 38px !important;
  border-radius: 8px !important;
  font-size: 0 !important;
  line-height: 1 !important;
  font-weight: 900 !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
}

/* Texto dos botões substitui ícones redondos */
#btnPaymentOk::before,
#qrValidarBtn::before {
  content: "OK";
  font-size: 16px;
  color: #ffffff;
}

#btnPaymentCancel::before,
#qrFecharBtn::before {
  content: "Fechar";
  font-size: 16px;
  color: #ffffff;
}

.modal-card .modal-btn {
  font-size: 16px !important;
  color: #ffffff !important;
}

/* Garante verde/vermelho nos botões */
#btnPaymentOk,
#qrValidarBtn,
.modal-card .modal-btn,
.payment-actions .btn.green {
  background: linear-gradient(180deg, #37ce60 0%, #15983d 100%) !important;
  border: 1px solid rgba(255,255,255,0.18) !important;
}

#btnPaymentCancel,
#qrFecharBtn,
.payment-actions .btn.red {
  background: linear-gradient(180deg, #ff4d4d 0%, #d92121 100%) !important;
  border: 1px solid rgba(255,255,255,0.18) !important;
}

/* Caixa branca do pagamento no modelo da imagem */
.option-group {
  min-height: 128px !important;
  padding: 12px !important;
}

.option-btn {
  justify-content: flex-start !important;
  gap: 14px !important;
  min-height: 54px !important;
  padding: 0 8px !important;
  text-align: left !important;
}

.option-btn span:last-child {
  font-size: 16px !important;
  font-weight: 900 !important;
}

/* Mensagens com conteúdo branco afundado quando houver texto longo/lista */
.modal-card .modal-text {
  margin-top: 8px;
}

.modal-card .modal-text.long,
.modal-card .modal-text.has-list {
  background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 100%) !important;
  color: #111111 !important;
  border: 2px solid rgba(255,255,255,0.96) !important;
  border-radius: 14px !important;
  box-shadow:
    inset 0 3px 11px rgba(0,0,0,0.22),
    inset 0 -1px 0 rgba(255,255,255,0.90),
    0 5px 18px rgba(0,0,0,0.28) !important;
  padding: 14px !important;
  max-height: 52vh;
  overflow-y: auto;
  color: #111 !important;
}

  </style>
</head>
<body>
  <section class="app">
    <div class="top">
      <div class="logo-box">
        <img id="logoImg" src="logo-maconaria.png" alt="Logo da loja" />
      </div>

      <div class="brand">
        <div class="brand-title">Loja Professor Clementino Brito</div>
        <div class="brand-subtitle">
          Sistema de Controle de presença,<br />
          consumo e pagamentos.
        </div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" id="tabConfirmar">CONFIRMAR</div>
      <div class="tab" id="tabTronco">TRONCO</div>
      <div class="tab" id="tabConsumo">CONSUMO</div>
    </div>

    <div class="frame-wrap">
      <iframe id="tabFrame" class="tab-frame" src="confirmar_tab.html"></iframe>
    </div>
  </section>

  <script>

    const AGAPE_API_BASE = 'https://api.erpimpar.com.br/agape';

    const tabConfirmar = document.getElementById('tabConfirmar');
    const tabTronco = document.getElementById('tabTronco');
    const tabConsumo = document.getElementById('tabConsumo');
    const tabFrame = document.getElementById('tabFrame');

    const params = new URLSearchParams(window.location.search);
    const telefoneAtual = params.get('telefone') || '';

    let agapeConfigAtual = null;
    let sessaoAtual = null;

    function normalizarTelefone(telefone) {
      let tel = String(telefone || '').replace(/\D/g, '');
      if (tel.length > 11 && tel.startsWith('55')) tel = tel.slice(2);
      return tel;
    }

    function brDateToIso(dataBR) {
      const m = String(dataBR || '').match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      return m ? `${m[3]}-${m[2]}-${m[1]}` : '';
    }

    function getDataSessaoIso() {
      return brDateToIso(sessaoAtual?.sessao?.data || agapeConfigAtual?.sessao?.data || '');
    }

    function usuarioConfirmou() {
      const tel = normalizarTelefone(telefoneAtual);
      if (!tel) return false;
      return (sessaoAtual?.confirmacoes || []).some(item => normalizarTelefone(item.telefone) === tel);
    }

    async function carregarConfigAgape() {
      const resp = await fetch(`${AGAPE_API_BASE}/carregar_config.php?t=${Date.now()}`);
      const data = await resp.json();
      agapeConfigAtual = data.config || data;
      sessaoAtual = data.sessao || null;
      return agapeConfigAtual;
    }

    function montarUrl(nomeArquivo) {
      const qs = new URLSearchParams();
      qs.set('t', Date.now());
      if (telefoneAtual) qs.set('telefone', telefoneAtual);
      const dataIso = getDataSessaoIso();
      if (dataIso) qs.set('data', dataIso);
      return `${nomeArquivo}?${qs.toString()}`;
    }

    function atualizarEstadoAbas() {
      const agapeAtivo = !!(sessaoAtual?.agape?.ativa || agapeConfigAtual?.agape?.ativa);
      const confirmado = usuarioConfirmou();
      tabTronco.classList.toggle('disabled', !confirmado);
      tabConsumo.classList.toggle('disabled', !(agapeAtivo && confirmado));
    }

    async function openTab(name) {
      await carregarConfigAgape();
      atualizarEstadoAbas();

      if (name === 'confirmar') {
        tabConfirmar.classList.add('active');
        tabTronco.classList.remove('active');
        tabConsumo.classList.remove('active');
        tabFrame.src = montarUrl('confirmar_tab.html');
        return;
      }

      if (name === 'tronco') {
        const confirmado = usuarioConfirmou();

        if (!confirmado) {
          tabTronco.classList.add('disabled');
          return;
        }

        tabTronco.classList.add('active');
        tabConfirmar.classList.remove('active');
        tabConsumo.classList.remove('active');
        tabFrame.src = montarUrl('tronco_tab.html');
        return;
      }

      if (name === 'consumo') {
        const agapeAtivo = !!(sessaoAtual?.agape?.ativa || agapeConfigAtual?.agape?.ativa);
        const confirmado = usuarioConfirmou();

        if (!agapeAtivo || !confirmado) {
          tabConsumo.classList.add('disabled');
          return;
        }

        tabConsumo.classList.add('active');
        tabConfirmar.classList.remove('active');
        tabTronco.classList.remove('active');
        tabFrame.src = montarUrl('consumo_tab.html');
      }
    }

    tabConfirmar.addEventListener('click', () => openTab('confirmar'));
    tabTronco.addEventListener('click', () => openTab('tronco'));
    tabConsumo.addEventListener('click', () => openTab('consumo'));

    async function setupLogo() {
      const logoImg = document.getElementById('logoImg');
      const candidates = [
        'logo-maconaria.png',
        'logo-maconaria.jpg',
        'logo-maconaria.jpeg',
        'logo-Clementino-Brito.jpeg',
        'logo-loja---d.png',
        'logo-loja-d.png',
        'maconaria.png',
        'maconaria.jpg'
      ];

      for (const src of candidates) {
        try {
          await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = resolve;
            img.onerror = reject;
            img.src = src;
          });
          logoImg.src = src;
          return;
        } catch (error) {}
      }
    }

    async function iniciar() {
      await setupLogo();
      await carregarConfigAgape();
      atualizarEstadoAbas();

      const agapeAtivo = !!(sessaoAtual?.agape?.ativa || agapeConfigAtual?.agape?.ativa);
      const confirmado = usuarioConfirmou();

      const tabSolicitada = (new URLSearchParams(window.location.search).get('tab') || '').toLowerCase();

      if (tabSolicitada === 'consumo' && agapeAtivo && confirmado) {
        await openTab('consumo');
      } else if (tabSolicitada === 'tronco' && confirmado) {
        await openTab('tronco');
      } else if (agapeAtivo && confirmado) {
        await openTab('consumo');
      } else if (confirmado) {
        await openTab('tronco');
      } else {
        await openTab('confirmar');
      }
    }

    iniciar();

  </script>
</body>
</html>
